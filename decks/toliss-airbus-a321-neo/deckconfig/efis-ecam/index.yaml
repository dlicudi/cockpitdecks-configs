    type: push
    commands:
      press: AirbusFBW/ECP/SelectEnginePage
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: greenyellow
        led: led
        dataref: AirbusFBW/OHPLightsATA31[30]
      - text: ENG
        text-size: 48
        text-font: DIN Bold
        formula: '1'
  view: AirbusFBW/PopUpSD
  view-if: ${AirbusFBW/PopUpStateArray[7]} not
