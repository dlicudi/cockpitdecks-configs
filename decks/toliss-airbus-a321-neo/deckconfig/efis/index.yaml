aircraft: Toliss A321neo
description: EFIS control for Srteamdeck+ (encoders and a few buttons)
version: 1.0.0
last-updated: 03-APR-2024
buttons:
- index: e1
  name: ND MODE ENCODER
  commands:
    toggle-on: none
    toggle-off: none
    cw: sim/instruments/EFIS_mode_dn
    ccw: sim/instruments/EFIS_mode_up
  options: modulo
  activation: encoder-toggle
- index: e2
  name: ND RANGE ENCODER
  commands:
    toggle-on: none
    toggle-off: none
    cw: sim/instruments/map_zoom_in
    ccw: sim/instruments/map_zoom_out
  options: modulo
  activation: encoder-toggle
- index: e3
  name: FCU Baro
  commands:
    toggle-on: toliss_airbus/capt_baro_push
    toggle-off: toliss_airbus/capt_baro_pull
    cw: sim/instruments/barometer_down
    ccw: sim/instruments/barometer_up
  options: modulo
  activation: encoder-toggle
- index: 0
  label: CHRONO
  label-size: 10
  sound: sonar-ping.wav
  push-switch:
    button-size: 120
    button-fill-color: black
    button-stroke-width: 0
    button-underline-color: coral
    witness-size: 0
    down: 36
  activation: push
  commands:
    press: AirbusFBW/CaptChronoButton
- index: 1
  name: ND MODE
  stops: 5
  initial-value: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 90
    tick-to: 270
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - LS
    - VOR
    - NAV
    - ARC
    - PLAN
  dataref: AirbusFBW/NDmodeCapt
  activation: sweep
  positions:
  - sim/instruments/EFIS_mode_up
  - sim/instruments/EFIS_mode_dn
- index: 2
  name: ND RANGE
  stops: 6
  initial-value: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 90
    tick-to: 315
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - '10'
    - '20'
    - '40'
    - '80'
    - '160'
    - '320'
  dataref: AirbusFBW/NDrangeCapt
  activation: sweep
  positions:
  - sim/instruments/map_zoom_out
  - sim/instruments/map_zoom_in
- index: 3
  name: INORMB
  stops: 2
  circular-switch:
    button-size: 100
    switch-style: none
    down: 30
    tick-from: 140
    tick-to: 220
    tick-space: 10
    tick-underline-width: 8
    needle-color: white
    needle-length: 50
    tick-label-size: 36
    tick-label-font: D-DIN-Bold.otf
    tick-labels:
    - inHg
    - hPa
  set-dataref: AirbusFBW/BaroUnitCapt
  dataref: AirbusFBW/BaroUnitCapt
  activation: sweep
- index: 4
  name: SIDE STICK PRIORITY
  label: SIDE STICK PRIORITY
  label-size: 7
  label-color: white
  annunciator:
    size: large
    model: B
    parts:
    - text: ${fa:arrow-left-long}
      text-color: lime
      text-font: fontawesome.otf
      text-size: 64
    - text: CAPT
      color: lime
      text-size: 64
      text-font: DIN Bold
      framed: true
  activation: reload
  representation: annunciator
- index: 5
  name: FD 1
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/FD1Engage}
    - text: FD
      color: white
      text-size: 64
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/fd1_push
- index: 6
  name: LS 1
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/ILSonCapt}
    - text: LS
      color: white
      text-size: 64
      text-font: DIN Bold
      formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/dispcommands/CaptLSButtonPush
- index: 7
  formula: ${AirbusFBW/BaroUnitCapt} ${AirbusFBW/BaroStdCapt} 2 * +
  multi-texts:
  - text: ${formula}
    text-format: '{:4.2f}'
    text-color: khaki
    text-size: 48
    text-font: Segment7Standard.otf
    text-bg-color: (40, 40, 40)
    formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
  - text: ${formula}
    text-format: '{:4.0f}'
    text-color: khaki
    text-size: 48
    text-font: Segment7Standard.otf
    text-bg-color: (40, 40, 40)
    formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.86389
      * round
  - text: Std
    text-color: khaki
    text-size: 48
    text-font: Segment7Standard.otf
    text-bg-color: (40, 40, 40)
  - text: Std
    text-color: khaki
    text-size: 48
    text-font: Segment7Standard.otf
    text-bg-color: (40, 40, 40)
  activation: sweep
  representation: multi-texts
  positions:
  - toliss_airbus/capt_baro_push
  - toliss_airbus/capt_baro_pull
- index: touchscreen
  name: FMA_DISPLAY
  page: fcu
  string-datarefs:
  - AirbusFBW/FMA1w
  - AirbusFBW/FMA1g
  - AirbusFBW/FMA1b
  - AirbusFBW/FMA2w
  - AirbusFBW/FMA2b
  - AirbusFBW/FMA2m
  - AirbusFBW/FMA3w
  - AirbusFBW/FMA3b
  - AirbusFBW/FMA3a
  multi-datarefs:
  - AirbusFBW/FMAAPFDboxing
  - AirbusFBW/FMAAPLeftArmedBox
  - AirbusFBW/FMAAPLeftModeBox
  - AirbusFBW/FMAAPRightArmedBox
  - AirbusFBW/FMAAPRightModeBox
  - AirbusFBW/FMAATHRModeBox
  - AirbusFBW/FMAATHRboxing
  - AirbusFBW/FMATHRWarning
  fma:
    label-mode: 0
    text-size: 60
    text-font: B612-Bold
  activation: page
