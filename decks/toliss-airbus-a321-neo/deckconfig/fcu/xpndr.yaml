_docs:
  title: Transponder
aircraft: Toliss A321neo
description: Transponder and other communication for Loupedeck Live
version: 1.0.0
buttons:
- index: 2
  name: RELOAD
  activation:
    type: reload
  representation:
    type: text
    text: ${fa:rotate-right}
    text-font: fontawesome.otf
    text-color: rgba(0,255,0,0)
    text-size: 60
    text-position: cm
- index: 3
  name: BACK
  activation:
    type: page
    page: back
  representation:
    type: text
    text: BACK
    text-font: DIN Bold
    text-color: white
    text-size: 24
    text-position: cm
- index: 0
  name: ATCONOFF
  activation:
    type: sweep
    stops: 2
    dataref: AirbusFBW/XPDRTCASMode
    set-dataref: AirbusFBW/XPDRTCASMode
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      tick-from: 160
      tick-to: 200
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      tick-labels:
      - AUTO
      - 'ON'
      left: 10
- index: 4
  name: ATCSYS
  activation:
    type: sweep
    stops: 3
    initial-value: 2
    dataref: AirbusFBW/XPDRSystem
    set-dataref: AirbusFBW/XPDRSystem
  representation:
    type: circular-switch
    label: 'S

      Y

      S'
    label-size: 8
    label-position: lm
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      tick-from: 140
      tick-to: 200
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      tick-labels:
      - ' '
      - '1'
      - '2'
      left: 10
- index: 5
  name: SQUAWK00XX
  activation:
    type: none
  representation:
    type: text
    text: ${formula}
    text-format: '{:02.0f}'
    text-color: khaki
    text-size: 50
    text-font: 7-segment-display-extended.otf
    text-bg-color: (40, 40, 40)
    text-position: rm
    formula: ${sim/cockpit/radios/transponder_code} 100 / floor
- index: 6
  name: SQUAWKXX00
  activation:
    type: none
  representation:
    type: text
    text: ${formula}
    text-format: '{:02.0f}'
    text-color: khaki
    text-size: 50
    text-font: 7-segment-display-extended.otf
    text-bg-color: (40, 40, 40)
    text-position: lm
    formula: ${sim/cockpit/radios/transponder_code} ${sim/cockpit/radios/transponder_code} 100 / floor 100 * -
- index: 7
  name: TCASMODE
  activation:
    type: sweep
    stops: 5
    dataref: AirbusFBW/XPDRPower
    set-dataref: AirbusFBW/XPDRPower
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      tick-from: 200
      tick-to: 340
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      tick-label-font: DIN Bold
      tick-labels:
      - STBY
      - ALT RPTG OFF
      - XPNDR
      - TA ONLY
      - TA/RA
      up: 30
      left: 55
- index: 8
  name: ATCMODE
  activation:
    type: sweep
    stops: 3
    initial-value: 2
    set-dataref: AirbusFBW/XPDRTCASAltSelect
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      tick-from: 220
      tick-to: 320
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      tick-labels:
      - ABV
      - N
      - BLW
      left: 30
      up: 20
- index: 9
  name: ATCCLR
  activation:
    type: push
    commands:
      press: AirbusFBW/ATCCodeKeyCLR
  representation:
    type: text
    text: CLR
    text-font: DIN Bold
    text-color: white
    text-size: 24
    text-position: cm
- index: 10
  name: ATCFAIL
  activation:
    type: none
  representation:
    type: push-switch
    label: 'ATC




      FAIL'
    label-position: cm
    label-size: 11
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 40
      witness-fill-color: (64, 32, 0)
      witness-stroke-color: (128, 64, 0)
- index: 11
  name: ATCIDENT
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_ident
  representation:
    type: push-switch
    label: IDENT
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: b0
  name: ATC0
  activation:
    type: push
    commands:
      press: AirbusFBW/ATCCodeKey0
  representation:
    type: colored-led
    formula: 1
  colored-led: (255, 128, 0)
