_docs:
  title: ToLiss
aircraft: Toliss A321neo
description: Transponder and other communication for Loupedeck Live
version: 1.0.0
last-updated: 03-APR-2024
buttons:
- index: left
  page: index
  label: XPNDR
  text:
    text: ${fa:backward}
    text-font: fontawesome.otf
    text-size: 30
    text-position: cm
    text-color: white
  activation: page
  representation: text
- index: right
  label: PAUSE
  label-size: 12
  label-color: red
  text:
    text: ${fa:pause}
    text-font: fontawesome.otf
    text-size: 30
    text-position: cm
    text-color: red
  activation: push
  representation: text
  commands:
    press: sim/operation/pause_toggle
- index: 0
  name: POWER
  label: EXT.POWER
  annunciator:
    model: B
    B0:
      text: AVAIL
      color: lime
      formula: ${AirbusFBW/EnableExternalPower} not
    B1:
      text: true
      framed: true
      color: deepskyblue
      dataref: AirbusFBW/EnableExternalPower
  set-dataref: AirbusFBW/EnableExternalPower
  activation: sweep
  representation: annunciator
- index: 1
  name: HP
  label: HP AIR
  annunciator:
    model: B
    B0:
      text: AVAIL
      color: lime
      formula: ${AirbusFBW/GroundHPAir} not
    B1:
      text: true
      framed: true
      color: deepskyblue
      dataref: AirbusFBW/GroundHPAir
  set-dataref: AirbusFBW/GroundHPAir
  activation: sweep
  representation: annunciator
- index: 2
  name: LP
  label: LP AIR
  annunciator:
    model: B
    B0:
      text: AVAIL
      color: lime
      formula: ${AirbusFBW/GroundLPAir} not
    B1:
      text: true
      framed: true
      color: deepskyblue
      dataref: AirbusFBW/GroundLPAir
  set-dataref: AirbusFBW/GroundLPAir
  activation: sweep
  representation: annunciator
- index: 3
  name: CHOCKS
  label: CHOCKS
  label-color: yellow
  annunciator:
    model: B
    B0:
      text: AVAIL
      color: lime
      formula: ${AirbusFBW/Chocks} not
    B1:
      text: true
      framed: true
      color: yellow
      dataref: AirbusFBW/Chocks
  set-dataref: AirbusFBW/Chocks
  activation: sweep
  representation: annunciator
- index: 7
  name: ISCS
  multi-icons:
  - ISCS_DARK
  - ISCS_DARK
  initial-value: 0
  activation: push
  representation: multi-icons
  commands:
    press: toliss_airbus/iscs_open
- index: 4
  name: Popup FD1
  dataref: AirbusFBW/PopUpStateArray[2]
  icon: FD
  activation: push
  representation: icon
  commands:
    press: AirbusFBW/PopUpPFD1
- index: 5
  name: Popup ND1
  dataref: AirbusFBW/PopUpStateArray[4]
  icon: ND
  activation: push
  representation: icon
  commands:
    press: AirbusFBW/PopUpND1
- index: 6
  name: Popup ISI
  label: ISI
  dataref: AirbusFBW/PopUpStateArray[8]
  icon: ISI
  frame:
    frame: FRAME.png
    frame-size:
    - 400
    - 400
    content-size:
    - 222
    - 222
    content-offset:
    - 90
    - 125
  activation: push
  representation: icon
  commands:
    press: AirbusFBW/PopUpISI
- index: 8
  name: Popup EWD
  dataref: AirbusFBW/PopUpStateArray[6]
  icon: ECAM
  activation: push
  representation: icon
  commands:
    press: AirbusFBW/PopUpEWD
- index: 9
  name: Popup SD
  dataref: AirbusFBW/PopUpStateArray[7]
  icon: ECAM_DOOR
  activation: push
  representation: icon
  commands:
    press: AirbusFBW/PopUpSD
- index: 10
  name: Popup MCDU
  label: CAPT
  label-color: lime
  label-position: cm
  dataref: AirbusFBW/PopUpStateArray[0]
  icon: MCDU
  activation: push
  representation: icon
  commands:
    press: AirbusFBW/UndockMCDU1
- index: 11
  name: Popup MCDU COPILOT
  label: FO
  label-color: lime
  label-position: cm
  dataref: AirbusFBW/PopUpStateArray[1]
  icon: MCDU
  activation: push
  representation: icon
  commands:
    press: AirbusFBW/UndockMCDU2
includes:
- views
