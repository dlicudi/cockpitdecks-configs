_docs:
  title: FCU
aircraft: Toliss A321neo
description: Main FCU page for Loupedeck Live
version: 1.0.0
last-updated: 03-APR-2024
buttons:
- index: e0
  name: FCU Airspeed
  activation: encoder-push
  commands:
    press: AirbusFBW/PushSPDSel
    long-press: AirbusFBW/PullSPDSel
    cw: sim/autopilot/airspeed_up
    ccw: sim/autopilot/airspeed_down
- index: e1
  name: FCU Heading
  activation: encoder-push
  commands:
    press: AirbusFBW/PushHDGSel
    long-press: AirbusFBW/PullHDGSel
    cw: sim/autopilot/heading_up
    ccw: sim/autopilot/heading_down
- index: e2
  name: FCU Baro
  commands:
    toggle-on: toliss_airbus/capt_baro_push
    toggle-off: toliss_airbus/capt_baro_pull
    cw: sim/instruments/barometer_up
    ccw: sim/instruments/barometer_down
  options: modulo
  activation: encoder-toggle
- index: e3
  name: FCU Altitude
  activation: encoder-push
  commands:
    press: AirbusFBW/PushAltitude
    long-press: AirbusFBW/PullAltitude
    cw: sim/autopilot/altitude_up
    ccw: sim/autopilot/altitude_down
- index: e4
  name: FCU V Speed
  dataref: sim/cockpit/autopilot/vertical_velocity
  step: 100
  value: 0
  value-min: -6000
  value-max: 6000
  set-dataref: sim/cockpit/autopilot/vertical_velocity
  commands:
    toggle-on: AirbusFBW/PullVSSel
    toggle-off: AirbusFBW/PushVSSel
  activation: encoder-value
  step-xl: 1000
- index: e5
  name: FCU Unused
  options: nostate
  activation: none
- index: 0
  name: SPDMACH
  label: 'SPD




    MACH'
  label-position: cm
  label-font: DIN Bold
  label-size: 10
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  activation: push
  commands:
    press: toliss_airbus/ias_mach_button_push
- index: 1
  name: MASTER CAUTION
  annunciator:
    text: 'MASTER

      CAUT'
    text-color: darkorange
    text-font: DIN Condensed Black.otf
    text-size: 72
    dataref: AirbusFBW/MasterCaut
  vibrate: RUMBLE5
  activation: push
  representation: annunciator
  commands:
    press: sim/annunciator/clear_master_caution
- index: 2
  name: MASTER WARNING
  annunciator-animate:
    text: 'MASTER

      WARN'
    text-color: firebrick
    text-font: DIN Condensed Black.otf
    text-size: 72
    dataref: AirbusFBW/MasterWarn
    animation-speed: 2.0
  vibrate: LONG
  activation: push
  representation: annunciator-animate
  commands:
    press: sim/annunciator/clear_master_warning
- index: 3
  name: ALTSCALE
  label: '1000




    100'
  label-font: DIN Bold
  label-size: 10
  label-position: cm
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  activation: push
  commands:
    press: toliss_airbus/metric_alt_button_push
- index: 4
  name: HDGTRACK
  label: 'HDG TRK




    V/S FPA'
  label-position: cm
  label-font: DIN Bold
  label-size: 10
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  activation: push
  commands:
    press: toliss_airbus/hdgtrk_button_push
- index: 5
  name: A/THR
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/ATHRmode}
    - text: A/THR
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: AirbusFBW/ATHRbutton
- index: 6
  name: AP1
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/AP1Engage}
    - text: AP1
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/ap1_push
- index: 8
  name: BAROMETRIC
  label: 'inHg




    hPa'
  label-position: cm
  label-font: DIN Bold
  label-size: 10
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  set-dataref: AirbusFBW/BaroUnitCapt
  activation: sweep
- index: 9
  name: LOC
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/LOCilluminated}
    - text: LOC
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  options: auto-repeat=3/3
  activation: push
  representation: annunciator
  commands:
    press: AirbusFBW/LOCbutton
- index: 10
  name: APPR
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/APPRilluminated}
    - text: APPR
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: AirbusFBW/APPRbutton
- index: 11
  name: EXPED
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/EXPEDilluminated}
    - text: EXPED
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: AirbusFBW/EXPEDbutton
- index: 7
  name: AP2
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/AP2Engage}
    - text: AP2
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/ap2_push
- index: left
  name: FCU-L
  multi-datarefs:
  - sim/cockpit2/autopilot/airspeed_dial_kts_mach
  - sim/cockpit/autopilot/heading_mag
  - sim/cockpit/autopilot/airspeed_is_mach
  - AirbusFBW/HDGTRKmode
  - AirbusFBW/SPDmanaged
  - AirbusFBW/HDGmanaged
  - AirbusFBW/SPDdashed
  - AirbusFBW/HDGdashed
  - AirbusFBW/BaroStdCapt
  - AirbusFBW/BaroUnitCapt
  - sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot
  fcu:
    mode: vertical-left
    text-size: 36
    text-font: B612-Bold
    text-color: gold
    value-size: 48
    value-font: Segment7Standard
    value-color: white
  activation: none
- index: right
  name: FCU-R
  page: index
  multi-datarefs:
  - sim/cockpit2/autopilot/altitude_dial_ft
  - sim/cockpit/autopilot/vertical_velocity
  - AirbusFBW/HDGTRKmode
  - AirbusFBW/ALTmanaged
  - AirbusFBW/VSdashed
  fcu:
    mode: vertical-right
    text-size: 36
    text-font: B612-Bold
    text-color: gold
    value-size: 48
    value-font: Segment7Standard
    value-color: white
  activation: page
includes:
- views
