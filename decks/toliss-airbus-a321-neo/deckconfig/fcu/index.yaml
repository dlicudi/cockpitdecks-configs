_docs:
  title: Home
aircraft: Toliss A321neo
description: Transponder and other communication for Loupedeck Live
version: 1.0.0
last-updated: 03-APR-2024
buttons:
- index: 1
  name: AIRCRAFT
  label: Aircraft
  string-datarefs:
  - sim/aircraft/view/acf_ICAO
  - sim/aircraft/view/acf_tailnum
  - sim/aircraft/view/acf_relative_path
  text:
    text: '${sim/aircraft/view/acf_ICAO}

      ${sim/aircraft/view/acf_tailnum}'
    text-font: B612-Bold
    text-size: 18
  activation: none
  representation: text
- index: 2
  label: Short/Long
  commands:
    press: /press/short
    long-press: /press/long
  long-time: 3
  vibrate: RUMBLE5
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  activation: short-or-long-press
- index: 3
  name: RELOAD
  text:
    text: ${fa:rotate-right}
    text-font: fontawesome.otf
    text-size: 60
    text-position: cm
    text-color: lime
  activation: reload
  representation: text
- index: left
  page: fcu
  label: FCU
  text:
    text: ${fa:backward}
    text-font: fontawesome.otf
    text-size: 30
    text-position: cm
    text-color: white
  activation: page
  representation: text
- index: right
  page: toliss
  label: VIEWS
  text:
    text: ${fa:forward}
    text-font: fontawesome.otf
    text-size: 30
    text-position: cm
    text-color: white
  activation: page
  representation: text
- index: 0
  name: ATCONOFF
  stops: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 160
    tick-to: 200
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - AUTO
    - true
    left: 10
  dataref: AirbusFBW/XPDRTCASMode
  set-dataref: AirbusFBW/XPDRTCASMode
  activation: sweep
- index: 4
  name: ATCSYS
  label: 'S

    Y

    S'
  label-size: 8
  label-position: lm
  stops: 3
  initial-value: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 140
    tick-to: 200
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - ' '
    - '1'
    - '2'
    left: 10
  dataref: AirbusFBW/XPDRSystem
  set-dataref: AirbusFBW/XPDRSystem
  activation: sweep
- index: 5
  name: SQUAWK00XX
  formula: ${sim/cockpit/radios/transponder_code} 100 / floor
  text:
    text: ${formula}
    text-format: '{:02.0f}'
    text-font: 7-segment-display-extended.otf
    text-size: 50
    text-position: rm
    text-color: khaki
    text-bg-color: (40, 40, 40)
  activation: none
  representation: text
- index: 6
  name: SQUAWKXX00
  formula: ${sim/cockpit/radios/transponder_code} ${sim/cockpit/radios/transponder_code} 100 / floor 100 * -
  text:
    text: ${formula}
    text-format: '{:02.0f}'
    text-font: 7-segment-display-extended.otf
    text-size: 50
    text-position: lm
    text-color: khaki
    text-bg-color: (40, 40, 40)
  activation: none
  representation: text
- index: 7
  name: TCASMODE
  stops: 5
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 200
    tick-to: 340
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 24
    tick-label-font: DIN Bold
    tick-labels:
    - STBY
    - ALT RPTG OFF
    - XPNDR
    - TA ONLY
    - TA/RA
    up: 30
    left: 55
  dataref: AirbusFBW/XPDRPower
  set-dataref: AirbusFBW/XPDRPower
  activation: sweep
- index: 8
  name: ATCMODE
  stops: 3
  initial-value: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 220
    tick-to: 320
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - ABV
    - N
    - BLW
    left: 30
    up: 20
  set-dataref: AirbusFBW/XPDRTCASAltSelect
  activation: sweep
- index: 9
  name: ATCCLR
  text:
    text: CLR
    text-font: DIN Bold
    text-color: white
    text-size: 24
    text-position: cm
  activation: push
  representation: text
  commands:
    press: AirbusFBW/ATCCodeKeyCLR
- index: 10
  label: 'ATC




    FAIL'
  label-position: cm
  label-size: 11
  name: ATCFAIL
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 40
    witness-fill-color: (64, 32, 0)
    witness-stroke-color: (128, 64, 0)
  activation: none
- index: 11
  label: IDENT
  name: ATCIDENT
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  activation: push
  commands:
    press: sim/transponder/transponder_ident
- index: b0
  name: ATC0
  colored-led:
