aircraft: Toliss A321neo
description: Cockpitdecks Special Dashboard of A21N
version: 1.0.0
last-updated: 03-APR-2024
buttons:
- index: 0
  name: METAR
  activation:
    type: none
  representation:
    type: none
    label: Weather
  weather-metar:
    weather-font: B612-Regular
- index: 1
  name: PRESSURE
  activation:
    type: none
  representation:
    type: data
    data:
      top-line-color: deepskyblue
      top-line-width: 10
      icon: fa:gauge
      icon-size: 60
      icon-color: deepskyblue
      data: ${formula}
      data-format: '{:04.0f}'
      data-font: DIN Condensed Light
      data-size: 80
      data-color: white
      formula: ${data:weather:pressure}
      bottomline: hPa
      bottomline-size: 30
      bottomline-color: red
      mark: ${fa:arrow-right}
      mark-size: 20
      mark-font: fontawesome.otf
      mark-color: red
- index: 2
  name: TEMPERATURE
  activation:
    type: none
  representation:
    type: data
    data:
      top-line-color: gold
      top-line-width: 10
      icon: fa:temperature-half
      icon-size: 60
      icon-color: gold
      data: ${formula}
      data-format: '{:3.0f}'
      data-font: DIN Condensed Light
      data-size: 80
      data-color: white
      formula: ${data:weather:temperature}
      bottomline: °C
      bottomline-size: 30
      bottomline-color: red
      mark: ${fa:arrow-right}
      mark-size: 20
      mark-font: fontawesome.otf
      mark-color: red
- index: 3
  name: WIND
  activation:
    type: none
  representation:
    type: data
    data:
      top-line-color: darkorchid
      top-line-width: 10
      icon: fa:wind
      icon-size: 60
      icon-color: darkorchid
      data: ${formula}
      data-format: '{:4.1f}'
      data-font: DIN Condensed Light
      data-size: 80
      data-color: white
      formula: ${data:weather:wind}
      bottomline: mph
      bottomline-size: 30
      bottomline-color: red
      mark: ${fa:arrow-right}
      mark-size: 20
      mark-font: fontawesome.otf
      mark-color: red
- index: 4
  name: DEWPOINT
  activation:
    type: none
  representation:
    type: data
    data:
      top-line-color: ivory
      top-line-width: 10
      icon: fa:droplet
      icon-size: 60
      icon-color: ivory
      data: ${formula}
      data-format: '{:3.0f}'
      data-font: DIN Condensed Light
      data-size: 80
      data-color: white
      data-progress: 31
      formula: ${data:weather:dew_point}
      bottomline: °C
      bottomline-size: 30
      bottomline-color: red
      mark: ${fa:arrow-right}
      mark-size: 20
      mark-font: fontawesome.otf
      mark-color: red
- index: 8
  name: FOB
  activation:
    type: none
  representation:
    type: data
    data:
      top-line-color: red
      top-line-width: 10
      icon: fa:gas-pump
      icon-size: 60
      icon-color: darkorange
      data: ${formula}
      data-format: '{:03.1f}'
      data-font: DIN Condensed Light
      data-size: 80
      data-color: white
      data-unit: T
      data-progress: 31
      formula: ${sim/flightmodel/weight/m_fuel_total} 1000 /
      bottomline: FOB
      bottomline-size: 30
      bottomline-color: lime
      mark: ${fa:arrow-right}
      mark-font: fontawesome.otf
      mark-size: 20
      mark-color: lime
- index: 16
  activation:
    type: none
  representation:
    type: chart
  chart:
    rule-height: 0
    charts:
    - name: events
      type: bar
      keep: 20
      update: 0.5
      rate: true
      color: orange
      marker: square
      value-max: 50
      value-min: 0
      dataref: data:Cockpitdecks/event_count_DatarefEvent
- index: 17
  activation:
    type: none
  representation:
    type: chart
  chart:
    rule-height: 0
    charts:
    - name: packet
      type: line
      keep: 20
      update: 1
      rate: true
      color: orange
      marker: square
      value-max: 400
      value-min: 0
      dataref: data:values_read
- index: 30
  name: RELOAD
  activation:
    type: reload
  representation:
    type: text
    label: RELOAD
    label-size: 14
    label-position: cm
    text:
      text: ${fa:rotate-right}
      text-font: fontawesome.otf
      text-size: 80
      text-position: cm
      text-color: lime
- index: 31
  name: Index
  activation:
    type: page
    page: index-alt
  representation:
    type: icon
    icon: TOLISS-A21N
