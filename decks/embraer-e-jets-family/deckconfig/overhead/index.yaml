name: index
default-icon-color: Black
default-vibrate: SHORT
background-color: Black
buttons:
- index: RELOAD
  activation:
    type: reload
  representation:
    type: text
    text: 🔁
    text-color: Lime
    text-size: 20
    text-font: fontawesome.otf
- index: MASTER
  activation:
    type: sweep
    dataref: XCrafts/ERJ/APU_switch
    positions:
    - XCrafts/APU_CCW
    - XCrafts/APU_CW
  representation:
    type: circular-switch
    label: MASTER
    label-color: White
    label-position: cb
    label-size: 8
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 0
      angle-end: 130
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 18
      options: invert
      ticks:
      - 'OFF'
      - 'ON'
      - START
  long-press: XCrafts/APU_CW
- index: START APU
  activation:
    type: long-press
    commands:
      press: XCrafts/APU_CW
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        formula: ${XCrafts/ERJ/APU_flasher} 2 eq
        led: dot
      - color: lime
        text-size: 60
        formula: '1'
        text: ${sim/cockpit2/electrical/APU_N1_percent}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}%'
- index: EMER STOP
  name: overhead_cockpit_lights
  activation:
    type: push
    commands:
      press: sim/electrical/APU_fire_shutoff
  representation:
    type: text
    text: ■
    text-color: BrickRed
    text-size: 60
    text-font: fontawesome.otf
    text-position: cm
- index: MAIN PNL
