    initial-value: 1
    dataref: sim/cockpit2/switches/panel_brightness_ratio[1]
    set-dataref: sim/cockpit2/switches/panel_brightness_ratio[1]
  representation:
    type: circular-switch
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 225
      angle-end: 130
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      options: invert
      ticks:
      - 'OFF'
      - BRT
