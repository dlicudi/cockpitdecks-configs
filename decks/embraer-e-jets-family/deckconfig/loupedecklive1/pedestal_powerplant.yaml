name: pedestal_powerplant
description: Powerplant
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 1
  activation:
    type: none
  representation:
    type: decor
    decor:
      type: line
      code: C
- index: 2
  activation:
    type: none
  representation:
    type: decor
    decor:
      type: line
      code: A
- index: 3
  activation:
    type: none
  representation:
    type: decor
    label: ENGINE 2
    label-size: 10
    label-color: White
    decor:
      type: segment
      code: '1265'
- index: 5
  activation:
    type: none
  representation:
    type: decor
    decor:
      type: line
      code: F
- index: 6
  activation:
    type: none
  representation:
    type: decor
    decor:
      type: line
      code: F
- index: 0
  activation:
    type: none
  representation:
    type: annunciator
    label: ENGINE 1
    label-size: 9
    label-color: White
    annunciator:
      size: medium
      model: F
      parts:
      - color: white
        text-size: 40
        formula: '1'
        text: N1
      - color: white
        text-size: 40
        formula: '1'
        text: N2
      - color: lime
        text-size: 40
        formula: ${sim/cockpit2/engine/indicators/N2_percent[0]}
        text: ${formula}
        text-format: '{0:.0f}%'
      - color: lime
        text-size: 40
        formula: ${sim/cockpit2/engine/indicators/N1_percent[0]}
        text: ${formula}
        text-format: '{0:.0f}%'
- index: 9
  activation:
    type: none
  representation:
    type: decor
    decor:
      type: line
      code: E
- index: 10
  activation:
    type: none
  representation:
    type: decor
    decor:
      type: line
      code: D
- index: 3
  activation:
    type: none
    commands:
      press: XCrafts/Starter_Eng_2_up_CW
  representation:
    type: annunciator
    label: ENGINE 2
    label-size: 9
    label-color: White
    annunciator:
      size: medium
      model: F
      parts:
      - color: white
        text-size: 40
        formula: '1'
        text: N1
      - color: white
        text-size: 40
        formula: '1'
        text: N2
      - color: lime
        text-size: 40
        formula: ${sim/cockpit2/engine/indicators/N2_percent[1]}
        text: ${formula}
        text-format: '{0:.0f}%'
      - color: lime
        text-size: 40
        formula: ${sim/cockpit2/engine/indicators/N1_percent[1]}
        text: ${formula}
        text-format: '{0:.0f}%'
- index: 4
  activation:
    type: push
    commands:
      press: XCrafts/Starter_Eng_1_down_CCW
  representation:
    type: multi-texts
    label: STOP
    label-color: White
    label-size: 9
    text-bg-color: Black
    multi-texts:
    - text: STOPPED
      text-size: 12
      text-color: Green
    - text: 'PUSH

        TO STOP'
      text-size: 12
      text-color: Red
    - text: STARTING
      text-size: 12
      text-color: Gold
    formula: ${XCrafts/ERJ/engine1_starter_knob}
- index: 7
  activation:
    type: push
    commands:
      press: XCrafts/Starter_Eng_2_down_CCW
  representation:
    type: multi-texts
    label: STOP
    label-color: White
    label-size: 9
    text-bg-color: Black
    multi-texts:
    - text: STOPPED
      text-size: 12
      text-color: Green
    - text: 'PUSH

        TO STOP'
      text-size: 12
      text-color: Red
    - text: STARTING
      text-size: 12
      text-color: Gold
    formula: ${XCrafts/ERJ/engine2_starter_knob}
- index: 8
  activation:
    type: long-press
    commands:
      press: XCrafts/Starter_Eng_1_up_CW
  representation:
    type: multi-texts
    label: START
    label-color: White
    label-size: 9
    text-bg-color: Black
    multi-texts:
    - text: 'PUSH

        TO RUN'
      text-size: 12
      text-color: Green
    - text: 'PUSH

        TO START'
      text-size: 12
      text-color: Green
    - text: STARTING
      text-size: 12
      text-color: Gold
    formula: ${XCrafts/ERJ/engine1_starter_knob}
  vibrate: LONG
- index: 11
  activation:
    type: long-press
    commands:
      press: XCrafts/Starter_Eng_2_up_CW
  representation:
    type: multi-texts
    label: START
    label-color: White
    label-size: 9
    text-bg-color: Black
    multi-texts:
    - text: 'PUSH

        TO RUN'
      text-size: 12
      text-color: Green
    - text: 'PUSH

        TO START'
      text-size: 12
      text-color: Green
    - text: STARTING
      text-size: 12
      text-color: Gold
    formula: ${XCrafts/ERJ/engine2_starter_knob}
  vibrate: LONG
