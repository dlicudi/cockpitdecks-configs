name: pfi
includes:
- pager
- encoders/encoders_fcu
cockpit-color: SlateGray
string-datarefs:
- sim/cockpit2/gauges/indicators/airspeed_kts_pilot
buttons:
- index: 0
  name: SPD
  label: SPD
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 1
  name: HDG
  label: HDG
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  name: ALT
  label: ALT
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text-format: '{0:.2f}'
      text: '${sim/cockpit/misc/barometer_setting}

        inHg'
    - color: white
      text-size: 32
      formula: ${sim/flightmodel/position/y_agl} 3.28084 *
      text-format: '{0:.0f}'
      text: '${formula}

        ft AGL'
  activation: none
  representation: annunciator
- index: 3
  name: VS
  label: VS
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 4
  name: FUEL
  label: FUEL QTY
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: L ${formula} gal
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: R ${formula} gal
  activation: none
  representation: annunciator
- index: 5
  name: WIND
  label: WIND DATA
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↓ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↑ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: → ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ← ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 6
  label: COM/NAV
  page: radio
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: F
    parts:
    - color: lime
      text-size: 28
      formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
      text: '${formula}

        NAV1'
      text-format: '{0:.2f}'
    - color: lime
      text-size: 28
      formula: ${sim/cockpit/radios/nav2_freq_hz} 100 /
      text: '${formula}

        NAV2'
      text-format: '{0:.2f}'
    - color: lime
      text-size: 28
      formula: ${sim/cockpit/radios/com1_freq_hz} 100 /
      text: '${formula}

        COM1'
      text-format: '{0:.2f}'
    - color: lime
      text-size: 28
      formula: ${sim/cockpit/radios/com2_freq_hz} 100 /
      text: '${formula}

        COM2'
      text-format: '{0:.2f}'
  activation: page
  representation: annunciator
- index: 7
  size: medium
  label: MODE
  label-size: 9
  label-color: White
  text-color: Lime
  text-bg-color: Black
  multi-texts:
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      OFF'
    text-format: '{:0.0f}'
    text-color: White
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: br
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      STBY'
    text-format: '{:0.0f}'
    text-color: White
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: br
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      ON'
    text-format: '{:0.0f}'
    text-color: Lime
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: br
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      ALT'
    text-format: '{:0.0f}'
    text-color: Lime
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: br
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      TEST'
    text-format: '{:0.0f}'
    text-color: White
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: br
  formula: ${sim/cockpit2/radios/actuators/transponder_mode}
  activation: none
  representation: multi-texts
- index: 8
  name: RPM
  label: RPM
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: white
      text-size: 30
      text: ${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}:${sim/cockpit2/clock_timer/hobbs_time_seconds}
      formula: '1'
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 9
  annunciator:
    size: full
    model: A
    parts:
    - text: WARN
      text-color: black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${sim/cockpit2/annunciators/master_warning}
      invert-color: firebrick
  activation: push
  representation: annunciator
  commands:
    press: sim/annunciator/clear_master_warning
- index: 10
  annunciator:
    size: full
    model: A
    parts:
    - text: CAUT
      text-color: black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${sim/cockpit2/annunciators/master_caution}
      invert-color: darkorange
  activation: push
  representation: annunciator
  commands:
    press: sim/annunciator/clear_master_caution
- index: 11
  name: WAYPOINT
  label: NEXT WAYPOINT
  label-size: 8
  label-color: black
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
  annunciator:
    size: medium
    model: F
    parts:
    - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 36
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

        DIS'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 38
      text-format: '{0:.1f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

        DTK'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
    - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
