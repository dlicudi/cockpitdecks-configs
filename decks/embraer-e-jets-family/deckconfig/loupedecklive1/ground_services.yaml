name: ground_services
description: Ground Services
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/other/GPU} 0 eq
    - text: GPU
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/OPS/GPU_toggle
- index: 1
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/doors/front_main}
    - text: Fwd Passenger
      text-size: 24
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/doors/front_main
- index: 2
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/doors/front_service}
    - text: Fwd Service
      text-size: 30
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/doors/front_service
- index: 3
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/doors/front_cargo}
    - text: Fwd Cargo
      text-size: 30
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/doors/front_cargo
- index: 4
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/other/ground_objects} 0 eq
    - text: Ground Objects
      text-size: 30
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/OPS/ground_equipment_toggle
- index: 5
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/doors/ENGINE_CVRS_ON} 0 eq
    - text: Engine Covers
      text-size: 30
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/OPS/engine_covers_toggle
- index: 6
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/doors/back_cargo}
    - text: Aft Cargo
      text-size: 30
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/doors/back_cargo
- index: 7
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/doors/back_main}
    - text: Aft Passenger
      text-size: 30
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/doors/back_main
- index: 8
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${XCrafts/doors/back_service}
    - text: Fwd Service
      text-size: 30
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/doors/back_service
