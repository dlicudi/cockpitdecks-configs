name: ground_services
description: Ground Services
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: XCrafts/ERJ/OPS/GPU_toggle
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${XCrafts/other/GPU} 0 eq
      - text: GPU
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 1
  activation:
    type: push
    commands:
      press: XCrafts/ERJ/doors/front_main
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${XCrafts/doors/front_main}
      - text: Fwd Passenger
        text-size: 24
        text-font: DIN Bold
        formula: '1'
- index: 2
