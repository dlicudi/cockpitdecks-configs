name: overhead_ice_protection
description: Ice Protection
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/ice/window_heat_tog
  representation:
    type: annunciator
    label: WINDSHIELD HEATING
    label-color: white
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        led: bars
        color: white
        formula: ${sim/cockpit2/ice/ice_window_heat_on} 1 eq not
      B1:
        text: '1'
        formula: '1'
- index: 1
  activation:
    type: push
    commands:
      press: sim/ice/window_heat_tog
  representation:
    type: annunciator
    label: WINDSHIELD HEATING
    label-color: white
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        led: bars
        color: white
        formula: ${sim/cockpit2/ice/ice_window_heat_on} 1 eq not
      B1:
        text: '2'
        formula: '1'
- index: 4
  activation:
    type: sweep
    set-dataref: sim/cockpit2/ice/cowling_thermal_anti_ice_per_engine[0]
  representation:
    type: annunciator
    label: ICE PROTECTION
    label-color: white
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        led: bars
        color: white
        formula: ${sim/cockpit2/ice/cowling_thermal_anti_ice_per_engine[0]} 1 eq not
      B1:
        text: ENG 1
        formula: '1'
- index: 5
  activation:
    type: sweep
    set-dataref: sim/cockpit2/ice/ice_surface_hot_bleed_air_on
  representation:
    type: annunciator
    label: ICE PROTECTION
    label-color: white
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        led: bars
        color: white
        formula: ${sim/cockpit2/ice/ice_surface_hot_bleed_air_on} 1 eq not
      B1:
        text: WING
        formula: '1'
- index: 6
  activation:
    type: sweep
    set-dataref: sim/cockpit2/ice/cowling_thermal_anti_ice_per_engine[1]
  representation:
    type: annunciator
    label: ICE PROTECTION
    label-color: white
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        led: bars
        color: white
        formula: ${sim/cockpit2/ice/cowling_thermal_anti_ice_per_engine[1]} 1 eq not
      B1:
        text: ENG 2
        formula: '1'
