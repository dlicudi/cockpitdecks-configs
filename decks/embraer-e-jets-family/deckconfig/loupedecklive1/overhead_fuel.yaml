name: overhead_fuel
description: Fuel
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_selector_3
  representation:
    type: annunciator
    label: XFEED
    label-color: white
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        led: bars
        color: white
        formula: ${sim/cockpit/engine/fuel_tank_selector} 3 eq
      B1:
        text: LOW 1
        color: white
        formula: '1'
- index: 1
  activation:
    type: push
    commands:
      press: sim/fuel/left_fuel_selector_up
  representation:
    type: annunciator
    label: FUEL XFEED
    label-color: white
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        led: bars
        color: white
        formula: ${sim/cockpit/engine/fuel_tank_selector} 4 eq
      B1:
        text: 'OFF'
        color: white
        formula: '1'
- index: 2
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_selector_1
  representation:
    type: annunciator
    label: FUEL XFEED
    label-color: white
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        led: bars
        color: white
        formula: ${sim/cockpit/engine/fuel_tank_selector} 1 eq
      B1:
        text: LOW 2
        color: white
        formula: '1'
- index: 4
  activation:
    type: sweep
    set-dataref: XCrafts/fuel_DC_pump_switch
  representation:
    type: circular-switch
    label: DC PUMP
    label-color: White
    label-position: cb
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 300
      angle-end: 0
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      options: invert
      ticks:
      - 'OFF'
      - AUTO
    formula: ${XCrafts/fuel_DC_pump_switch}
- index: 6
  activation:
    type: sweep
    set-dataref: sim/cockpit2/engine/actuators/fuel_pump_on[0]
  representation:
    type: circular-switch
    label: AC PUMP 1
    label-color: White
    label-position: cb
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 300
      angle-end: 0
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      options: invert
      ticks:
      - 'OFF'
      - AUTO
    formula: ${sim/cockpit2/engine/actuators/fuel_pump_on[0]}
- index: 7
  activation:
    type: sweep
    set-dataref: sim/cockpit2/engine/actuators/fuel_pump_on[1]
  representation:
    type: circular-switch
    label: AC PUMP 2
    label-color: White
    label-position: cb
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 300
      angle-end: 0
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      options: invert
      ticks:
      - 'OFF'
      - AUTO
    formula: ${sim/cockpit2/engine/actuators/fuel_pump_on[1]}
