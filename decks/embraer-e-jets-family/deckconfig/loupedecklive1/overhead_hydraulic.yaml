name: overhead_hydraulic
description: Hydraulic
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  label: PTU
  label-color: White
  label-position: cb
  label-size: 8
  stops: 3
  circular-switch:
    button-size: 60
    switch-style: large
    tick-from: 140
    tick-to: 220
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 24
    options: invert
    tick-labels:
    - 'OFF'
    - AUTO
    - 'ON'
  dataref: XCrafts/hydraulic/PTU_switch
  set-dataref: XCrafts/hydraulic/PTU_switch
