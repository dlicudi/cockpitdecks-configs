name: overhead_hydraulic
description: Hydraulic
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: sweep
    dataref: XCrafts/hydraulic/PTU_switch
    set-dataref: XCrafts/hydraulic/PTU_switch
  representation:
    type: circular-switch
    label: PTU
    label-color: White
    label-position: cb
    label-size: 8
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 320
      angle-end: 40
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      options: invert
      ticks:
      - 'OFF'
      - AUTO
      - 'ON'
