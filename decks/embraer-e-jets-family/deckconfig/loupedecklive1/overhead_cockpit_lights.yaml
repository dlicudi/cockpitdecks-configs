name: overhead_cockpit_lights
description: Cockpit Lights
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: sweep
    initial-value: 1
    dataref: sim/cockpit2/switches/panel_brightness_ratio[1]
    set-dataref: sim/cockpit2/switches/panel_brightness_ratio[1]
  representation:
    type: circular-switch
    label: MAIN PNL
    label-color: White
    label-size: 8
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 225
      angle-end: 130
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      options: invert
      ticks:
      - 'OFF'
      - BRT
- index: 1
  activation:
    type: sweep
    dataref: sim/cockpit2/switches/panel_brightness_ratio[3]
    set-dataref: sim/cockpit2/switches/panel_brightness_ratio[3]
  representation:
    type: circular-switch
    label: OVHD PNL
    label-color: White
    label-size: 8
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 225
      angle-end: 130
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      options: invert
      ticks:
      - 'OFF'
      - BRT
- index: 2
  activation:
    type: sweep
    dataref: sim/cockpit2/switches/panel_brightness_ratio[2]
    set-dataref: sim/cockpit2/switches/panel_brightness_ratio[2]
  representation:
    type: circular-switch
    label: PEDESTAL
    label-color: White
    label-size: 8
    circular-switch:
      button-size: 60
      switch-style: large
      angle-start: 225
      angle-end: 130
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      options: invert
      ticks:
      - 'OFF'
      - BRT
- index: 3
  activation:
    type: sweep
    stops: 2
    set-dataref: XCrafts/ERJ/cockpit/annunciators_test
  representation:
    type: switch
    label: ANNUN TEST
    label-size: 8
    label-color: White
    switch:
      switch-style: round
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${XCrafts/ERJ/cockpit/annunciators_test}
- index: 4
  activation:
    type: sweep
    stops: 2
    positions:
    - XCrafts/Lights/cockpit_dome_toggle
    - XCrafts/Lights/cockpit_dome_toggle
  representation:
    type: switch
    label: DOME
    label-size: 8
    label-color: White
    switch:
      switch-style: round
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${sim/cockpit/electrical/cockpit_lights}
