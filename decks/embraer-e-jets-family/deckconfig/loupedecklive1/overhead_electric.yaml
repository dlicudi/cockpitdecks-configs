name: overhead_electric
description: Electric
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  label: IDG 1
  label-position: cb
  label-color: White
  bgcolor: White
  stops: 2
  circular-switch:
    button-size: 60
    switch-style: large
    tick-from: 120
    tick-to: 180
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    options: invert
    tick-labels:
    - 'OFF'
    - AUTO
  dataref: sim/cockpit/electrical/generator_on[0]
  set-dataref: sim/cockpit/electrical/generator_on[0]
  activation: sweep
- index: 1
  label: AC BUS TIES
  label-color: White
  label-position: cb
  label-size: 8
  stops: 3
  circular-switch:
    button-size: 60
    switch-style: large
    tick-from: 140
    tick-to: 220
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 24
    options: invert
    tick-labels:
    - '1

      OPEN'
    - AUTO
    - '2

      OPEN'
  dataref: XCrafts/electrical/ac_bus_tie_switch
  set-dataref: XCrafts/electrical/ac_bus_tie_switch
  activation: sweep
- index: 2
  label: IDG 2
  label-color: White
  color: White
  label-position: cb
  stops: 2
  circular-switch:
    button-size: 60
    switch-style: large
    tick-from: 240
    tick-to: 180
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    options: invert
    tick-labels:
    - 'OFF'
    - AUTO
  dataref: sim/cockpit/electrical/generator_on[1]
  set-dataref: sim/cockpit/electrical/generator_on[1]
  activation: sweep
- index: 3
  label: GPU
  label-size: 7
  label-color: White
  annunciator:
    size: large
    model: B
    parts:
    - text: AVAIL
      text-size: 60
      text-font: DIN Bold
      text-color: white
      formula: ${XCrafts/doors/GPU_OFF} ${sim/cockpit/electrical/gpu_on} -
    - text: IN USE
      text-size: 60
      text-font: DIN Bold
      text-color: white
      formula: ${XCrafts/electric/GPU_sw}
  set-dataref: XCrafts/electric/GPU_sw
  activation: sweep
  representation: annunciator
- index: 4
  label: APU GEN
  label-size: 10
  label-color: white
  annunciator:
    size: small
    model: A
    parts:
    - text-color: white
      led: led
      formula: ${sim/cockpit/electrical/generator_apu_on} 0 eq
  set-dataref: sim/cockpit2/electrical/APU_generator_on
  activation: sweep
  representation: annunciator
- index: 5
  label: TRU 1
  label-size: 8
  label-color: White
  stops: 2
  switch:
    switch-style: round
    button-fill-color: White
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - AUTO
    - 'OFF'
    tick-space: 10
    tick-color: white
    tick-label-size: 40
    tick-label-font: DIN Bold
    tick-label-color: White
  formula: ${sim/cockpit/engine/inverter_on[0]}
  activation: sweep
  positions:
  - sim/electrical/inverter_1_on
  - sim/electrical/inverter_1_off
- index: 6
  label: TRU ESS
  label-size: 8
  label-color: White
  stops: 2
  switch:
    switch-style: round
    button-fill-color: White
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - AUTO
    - 'OFF'
    tick-space: 10
    tick-color: white
    tick-label-size: 40
    tick-label-font: DIN Bold
    tick-label-color: White
  formula: ${XCrafts/electrical/TRU_ESS_switch}
  set-dataref: XCrafts/electrical/TRU_ESS_switch
  activation: sweep
- index: 7
  label: TRU 2
  label-size: 8
  label-color: White
  stops: 2
  switch:
    switch-style: round
    button-fill-color: White
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - AUTO
    - 'OFF'
    tick-space: 10
    tick-color: White
    tick-label-size: 40
    tick-label-font: DIN Bold
    tick-label-color: White
  formula: ${sim/cockpit/engine/inverter_on[1]}
  activation: sweep
  positions:
  - sim/electrical/inverter_2_on
  - sim/electrical/inverter_2_off
- index: 8
  label: BATT 1
  label-color: White
  label-position: cb
  stops: 2
  circular-switch:
    button-size: 60
    switch-style: large
    tick-from: 120
    tick-to: 180
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    options: invert
    tick-labels:
    - 'OFF'
    - 'ON'
  dataref: sim/cockpit2/electrical/battery_on[0]
  set-dataref: sim/cockpit2/electrical/battery_on[0]
  activation: sweep
- index: 9
  label: BATT 2
  label-color: White
  label-position: cb
  stops: 2
  circular-switch:
    button-size: 60
    switch-style: large
    tick-from: 120
    tick-to: 180
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    options: invert
    tick-labels:
    - 'OFF'
    - 'ON'
  dataref: sim/cockpit2/electrical/battery_on[1]
  set-dataref: sim/cockpit2/electrical/battery_on[1]
  activation: sweep
