name: overhead_passenger_signs
description: Passenger Signs
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: sweep
    stops: 3
    set-dataref: XCrafts/light/emerg_switch
  representation:
    type: circular-switch
    label: EMER LT
    label-color: White
    label-size: 10
    label-position: cb
    circular-switch:
      button-size: 60
      switch-style: large
      tick-from: 120
      tick-to: 240
      tick-space: 40
      tick-underline-width: 4
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      options: invert
      tick-labels:
      - 'OFF'
      - ARMED
      - 'ON'
    formula: ${XCrafts/light/emerg_switch}
- index: 1
  activation:
    type: sweep
    stops: 2
    set-dataref: sim/cockpit2/switches/no_smoking
  representation:
    type: switch
    label: NO SMKG
    label-size: 8
    label-color: White
    switch:
      switch-style: round
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${sim/cockpit2/switches/no_smoking}
- index: 2
  activation:
    type: sweep
    stops: 2
    set-dataref: sim/cockpit2/switches/fasten_seat_belts
  representation:
    type: switch
    label: FSTN BELTS
    label-size: 8
    label-color: White
    switch:
      switch-style: round
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${sim/cockpit2/switches/fasten_seat_belts}
- index: 3
  activation:
    type: sweep
    stops: 2
    set-dataref: XCrafts/light/sterile_switch
  representation:
    type: switch
    label: STERILE
    label-size: 8
    label-color: White
    switch:
      switch-style: round
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${XCrafts/light/sterile_switch}
