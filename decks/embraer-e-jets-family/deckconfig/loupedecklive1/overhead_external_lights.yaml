name: overhead_external_lights
description: External Lights
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: sweep
    stops: 2
    set-dataref: sim/cockpit/electrical/nav_lights_on
  representation:
    type: switch
    label: NAV
    label-size: 12
    label-color: White
    switch:
      switch-style: round
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      options: invert
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${sim/cockpit/electrical/nav_lights_on}
- index: 1
