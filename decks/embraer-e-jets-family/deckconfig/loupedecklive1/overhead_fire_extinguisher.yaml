name: overhead_fire_extinguisher
description: Fire Extinguisher
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: sweep
    stops: 2
    set-dataref: sim/cockpit2/engine/actuators/fire_extinguisher_on[0]
  representation:
    type: switch
    label: FIRE 1
    label-size: 12
    label-color: White
    switch:
      switch-style: 3dot
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      options: invert
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${sim/cockpit2/engine/actuators/fire_extinguisher_on[0]}
- index: 1
  activation:
    type: sweep
    stops: 2
    set-dataref: sim/cockpit2/engine/actuators/fire_extinguisher_on[1]
  representation:
    type: switch
    label: FIRE 2
    label-size: 12
    label-color: White
    switch:
      switch-style: 3dot
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      options: invert
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${sim/cockpit2/engine/actuators/fire_extinguisher_on[1]}
- index: 3
  activation:
    type: sweep
    stops: 2
    set-dataref: XCrafts/ERJ/fire_test_on
  representation:
    type: switch
    label: TEST
    label-size: 12
    label-color: White
    switch:
      switch-style: rect
      button-fill-color: White
      button-underline-width: 4
      button-underline-color: coral
      options: invert
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: White
    formula: ${XCrafts/ERJ/fire_test_on}
