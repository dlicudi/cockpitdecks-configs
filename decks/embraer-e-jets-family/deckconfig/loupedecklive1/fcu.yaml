description: FCU
includes:
- pager
- encoders/encoders_fcu
default-icon-color: (40, 40, 40)
name: fcu
buttons:
- index: 0
  name: FD
  annunciator:
    size: medium
    model: B
    parts:
    - color: white
      led: led
      formula: ${sim/cockpit/autopilot/autopilot_mode} 1 eq
    - text: FD
      text-size: 40
      text-font: DIN Bold
      formula: '1'
      framed: true
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/ERJ/fdir_toggle
- index: 1
  name: AP
  annunciator:
    size: medium
    model: B
    parts:
    - color: white
      led: led
      formula: ${sim/cockpit2/autopilot/servos_on}
    - text: AP
      text-size: 40
      text-font: DIN Bold
      formula: '1'
      framed: true
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: XCrafts/APYD_Toggle
- index: 2
  name: HDG
  annunciator:
    size: medium
    model: B
    parts:
    - color: white
      led: led
      formula: ${sim/cockpit2/autopilot/heading_mode}
