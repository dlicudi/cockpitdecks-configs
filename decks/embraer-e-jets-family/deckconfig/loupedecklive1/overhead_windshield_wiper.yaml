name: overhead_windshield_wiper
description: Windshield Wiper
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: segment
  representation:
    type: none
  code: NSKL
- index: 1
  activation:
    type: segment
  representation:
    type: none
  code: IJKL
- index: 2
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 3
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 4
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 5
  activation:
    type: sweep
    stops: 3
    dataref: sim/cockpit2/switches/wiper_speed_switch[0]
    set-dataref: sim/cockpit2/switches/wiper_speed_switch[0]
  representation:
    type: circular-switch
    label: WINDSHIELD WIPER 1
    label-color: White
    label-position: cb
    label-size: 8
    circular-switch:
      button-size: 60
      switch-style: large
      tick-from: 180
      tick-to: 310
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      options: invert
      tick-labels:
      - 'OFF'
      - LOW
      - HIGH
- index: 6
  activation:
    type: sweep
    stops: 3
    dataref: sim/cockpit2/switches/wiper_speed_switch[1]
    set-dataref: sim/cockpit2/switches/wiper_speed_switch[1]
  representation:
    type: circular-switch
    label: WINDSHIELD WIPER 2
    label-color: White
    label-position: cb
    label-size: 8
    circular-switch:
      button-size: 60
      switch-style: large
      tick-from: 180
      tick-to: 310
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      options: invert
      tick-labels:
      - 'OFF'
      - LOW
      - HIGH
- index: 7
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 8
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 9
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 10
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 11
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
