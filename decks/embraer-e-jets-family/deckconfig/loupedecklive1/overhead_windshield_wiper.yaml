name: overhead_windshield_wiper
description: Windshield Wiper
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  code: NSKL
  activation: segment
- index: 1
  code: IJKL
  activation: segment
- index: 2
  icon: INOP.png
  activation: none
  representation: icon
- index: 3
  icon: INOP.png
  activation: none
  representation: icon
- index: 4
  icon: INOP.png
  activation: none
  representation: icon
- index: 5
  label: WINDSHIELD WIPER 1
  label-color: White
  label-position: cb
  label-size: 8
  stops: 3
  circular-switch:
    button-size: 60
    switch-style: large
    tick-from: 180
    tick-to: 310
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 24
    options: invert
    tick-labels:
    - 'OFF'
    - LOW
    - HIGH
  dataref: sim/cockpit2/switches/wiper_speed_switch[0]
  set-dataref: sim/cockpit2/switches/wiper_speed_switch[0]
  activation: sweep
- index: 6
  label: WINDSHIELD WIPER 2
  label-color: White
  label-position: cb
  label-size: 8
  stops: 3
  circular-switch:
    button-size: 60
    switch-style: large
    tick-from: 180
    tick-to: 310
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 24
    options: invert
    tick-labels:
    - 'OFF'
    - LOW
    - HIGH
  dataref: sim/cockpit2/switches/wiper_speed_switch[1]
  set-dataref: sim/cockpit2/switches/wiper_speed_switch[1]
  activation: sweep
- index: 7
  icon: INOP.png
  activation: none
  representation: icon
- index: 8
  icon: INOP.png
  activation: none
  representation: icon
- index: 9
  icon: INOP.png
  activation: none
  representation: icon
- index: 10
  icon: INOP.png
  activation: none
  representation: icon
- index: 11
  icon: INOP.png
  activation: none
  representation: icon
