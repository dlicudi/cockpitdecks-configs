name: overhead_pressurization
description: Pressurization
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  icon: INOP.png
  activation: none
  representation: icon
- index: 1
  label: DUMP
  label-size: 10
  label-color: white
  annunciator:
    size: small
    model: A
    parts:
    - text-color: white
      led: led
      formula: ${sim/cockpit/pressure/dump_to_alt}
  set-dataref: sim/cockpit/pressure/dump_to_alt
  activation: sweep
  representation: annunciator
