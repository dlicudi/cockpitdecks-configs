name: overhead_pressurization
description: Pressurization
includes:
- pager
- encoders/encoders_lights
default-icon-color: Black
buttons:
- index: 0
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 1
  activation:
    type: sweep
    set-dataref: sim/cockpit/pressure/dump_to_alt
  representation:
    type: annunciator
    label: DUMP
    label-size: 10
    label-color: white
    annunciator:
      size: small
      model: A
      parts:
      - text-color: white
        led: led
        formula: ${sim/cockpit/pressure/dump_to_alt}
