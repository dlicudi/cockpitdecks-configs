description: FCU 2
includes:
- pager
- encoders/encoders_fcu
default-icon-color: Black
name: fcu2
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/autopilot/fdir_toggle
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/flight_director_mode}
      - text: BANK
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 1
  activation:
    type: push
    commands:
      press: sim/autopilot/servos_toggle
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/servos_on}
      - text: FMS
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 2
  activation:
    type: push
    commands:
      press: sim/autopilot/heading
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/heading_status}
      - text: HSI
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 3
  activation:
    type: push
    commands:
      press: sim/autopilot/altitude_hold
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/altitude_hold_status}
      - text: FPA
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 4
  activation:
    type: push
    commands:
      press: sim/autopilot/gpss
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/gpss_status} 2 eq
      - text: PREV
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 5
  activation:
    type: push
    commands:
      press: sim/autopilot/vnav
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/vnav_armed}
      - text: O
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 6
  activation:
    type: push
    commands:
      press: sim/autopilot/approach
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/approach_status}
      - text: SRC
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 7
  activation:
    type: push
    commands:
      press: sim/autopilot/approach
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/approach_status}
      - text: V/L
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 8
  activation:
    type: push
    commands:
      press: sim/autopilot/vnav
  representation:
    type: annunciator
    annunciator:
      size: large
      model: B
      parts:
      - color: white
        led: led
        formula: ${sim/cockpit2/autopilot/vnav_armed}
      - text: O
        text-size: 60
        text-font: DIN Bold
        formula: '1'
        framed: true
- index: 11
  activation:
    type: page
    page: fcu
  representation:
    type: text
    text: →
    text-color: khaki
    text-size: 40
    text-font: fontawesome.otf
    text-position: cm
    text-bg-color: (40, 40, 40)
