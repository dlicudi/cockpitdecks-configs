- index: 4
  name: CLR
  text: CLR
  text-color: khaki
  text-size: 24
  text-font: DIN Condensed Light
  text-position: cm
  text-bg-color: (40, 40, 40)
  activation: push
  representation: text
  commands:
    press: sim/GPS/g1000n3_clr
- index: 5
  name: ENT
  text: ENT
  text-color: khaki
  text-size: 24
  text-font: DIN Condensed Light
  text-position: cm
  text-bg-color: (40, 40, 40)
  activation: push
  representation: text
  commands:
    press: sim/GPS/g1000n3_ent
- index: 6
  name: HOME
  text: HOME
  text-color: khaki
  text-size: 24
  text-font: DIN Condensed Light
  text-position: cm
  text-bg-color: (40, 40, 40)
  activation: push
  representation: text
  commands:
    press: sim/GPS/gcu479/home
- index: 7
  name: COM FF
  text: < COM >
  text-color: khaki
  text-size: 24
  text-font: DIN Condensed Light
  text-position: cm
  text-bg-color: (40, 40, 40)
  activation: push
  representation: text
  commands:
    press: sim/GPS/g1000n3_com_ff
- index: 8
  label: COM
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000
        /
      text: ${formula}
      text-format: '{0:.3f}'
      color: darkorange
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/g1000/gcu478_input_sel} 2 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/GPS/gcu478/com
- index: 9
  label: NAV
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
      color: darkorange
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/g1000/gcu478_input_sel} 3 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/GPS/gcu478/nav
- index: 10
  longpush: sim/autopilot/hsi_toggle_nav
  label: CRS
  label-color: black
  label-size: 9
  annunciator:
    model: E
    size: medium
    E0:
      text: ${sim/cockpit/radios/nav1_obs_degm}°
      text-format: '{:01.0f}'
      color: darkorange
      formula: '1'
    E1:
      text: ${sim/cockpit/radios/nav2_obs_degm}°
      text-format: '{:01.0f}'
      color: darkorange
      formula: '1'
    E2:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/g1000/gcu478_input_sel} 4 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/GPS/gcu479/crs
- index: 11
  label: XPDR
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: ${sim/cockpit2/radios/actuators/transponder_code}
      text-format: '{:01.0f}'
      color: darkorange
      formula: '1'
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/g1000/gcu478_input_sel} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/GPS/gcu478/xpdr
