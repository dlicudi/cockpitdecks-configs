name: g1000
includes:
- pager
- encoders/encoders_g1000
buttons:
- index: 0
  name: DIRECT
  text: DIRECT
  text-color: khaki
  text-size: 24
  text-font: DIN Condensed Light
  text-position: cm
  text-bg-color: (40, 40, 40)
  activation: push
  representation: text
  commands:
    press: sim/GPS/g1000n3_direct
- index: 1
  name: MENU
  text: MENU
  text-color: khaki
  text-size: 24
  text-font: DIN Condensed Light
  text-position: cm
  text-bg-color: (40, 40, 40)
  activation: push
  representation: text
  commands:
    press: sim/GPS/g1000n3_menu
- index: 2
  name: FPL
  text: FPL
  text-color: khaki
  text-size: 24
  text-font: DIN Condensed Light
  text-position: cm
  text-bg-color: (40, 40, 40)
  activation: push
  representation: text
  commands:
    press: sim/GPS/g1000n3_fpl
- index: 3
  name: PROC
  text: PROC
  text-color: khaki
  text-size: 24
  text-font: DIN Condensed Light
  text-position: cm
  text-bg-color: (40, 40, 40)
  activation: push
  representation: text
  commands:
