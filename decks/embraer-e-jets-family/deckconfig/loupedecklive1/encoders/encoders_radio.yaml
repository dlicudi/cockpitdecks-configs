buttons:
- index: e0
  name: com1_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/radios/com1_standy_flip
  representation:
    type: none
- index: e1
  name: com2_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/radios/com2_standy_flip
  representation:
    type: none
- index: e2
  name: adf_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/radios/adf1_standy_flip
  representation:
    type: none
- index: e3
  name: nav1_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/radios/nav1_standy_flip
  representation:
    type: none
- index: e4
  name: nav2_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/radios/nav2_standy_flip
  representation:
    type: none
- index: e5
  name: crs
  activation:
    type: encoder-push
    commands:
      press: sim/radios/obs_HSI_direct
      cw: sim/radios/obs_HSI_up
      ccw: sim/radios/obs_HSI_down
  representation:
    type: none
- index: left
  name: left_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: Black
      labels:
      - label: COM1
        label-size: 12
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /
        text-size: 14
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:.3f}'
        text: ${formula}
      - label: COM2
        label-size: 12
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit2/radios/actuators/com2_standby_frequency_hz_833} 1000 /
        text-size: 14
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:.3f}'
        text: ${formula}
      - label: ADF
        label-size: 14
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit/radios/adf1_stdby_freq_hz}
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:04.0f}'
        text: ${formula}
- index: right
  name: right_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: Black
      labels:
      - label: NAV1
        label-size: 12
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:.2f}'
        text: ${formula}
      - label: NAV2
        label-size: 12
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit/radios/nav2_stdby_freq_hz} 100 /
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:.2f}'
        text: ${formula}
      - label: CRS
        label-size: 16
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit2/radios/actuators/hsi_obs_deg_mag_pilot}
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:00.0f}'
        text: ${formula}
