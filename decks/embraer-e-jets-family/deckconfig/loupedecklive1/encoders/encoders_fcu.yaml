buttons:
- index: e0
  name: speed_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: XCrafts/ERJ/MACH_KIAS_toggle
  representation:
    type: none
- index: e1
  name: FCU Heading
  activation:
    type: encoder-push
    commands:
      press: sim/autopilot/heading_sync
      long-press: sim/autopilot/servos_toggle
      cw: sim/autopilot/heading_up
      ccw: sim/autopilot/heading_down
  representation:
    type: none
- index: e2
  name: FCU Baro
  activation:
    type: encoder-push
    options: modulo
    commands:
      press: sim/instruments/barometer_std
      cw: sim/instruments/barometer_up
      ccw: sim/instruments/barometer_down
  representation:
    type: none
- index: e3
  name: alt_encoder
  activation:
    type: encoder-value-extended
    dataref: XCrafts/ERJ/autopilot/altitude
    step: 1000
    value-min: 0
    value-max: 41000
    initial-value: 10000
    set-dataref: XCrafts/ERJ/autopilot/altitude
    commands:
      long-press: XCrafts/ERJ/PFD/altitude_meters
    step-xl: 100
  representation:
    type: none
- index: e4
  name: FCU V Speed
  activation:
    type: encoder-push
    commands:
      press: sim/autopilot/vertical_speed_sync
      long-press: AirbusFBW/PullSPDSel
      cw: XCrafts/ERJ/VS_up_100
      ccw: XCrafts/ERJ/VS_dn_100
  representation:
    type: none
- index: e5
  name: crs
  activation:
    type: encoder-push
    commands:
      press: sim/radios/obs_HSI_direct
      cw: sim/radios/obs_HSI_up
      ccw: sim/radios/obs_HSI_down
  representation:
    type: none
- index: left
  name: left_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: Black
      labels:
      - label: SPD
        label-size: 14
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit/autopilot/airspeed}
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:01.2f}'
        text: ${formula}
      - label: HDG
        label-size: 14
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit/autopilot/heading_mag}
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:00.0f}'
        text: ${formula}
      - label: QNH
        label-size: 14
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:01.2f}'
        text: ${formula}
- index: right
  name: right_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: Black
      labels:
      - label: ALT
        label-size: 16
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
        text-size: 16
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:04.0f}'
        text: ${formula}
      - label: VS
        label-size: 14
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:+01.0f}'
        text: ${formula}
      - label: CRS
        label-size: 16
        label-font: B612-Bold
        label-color: Gold
        formula: ${sim/cockpit2/radios/actuators/hsi_obs_deg_mag_pilot}
        text-size: 18
        text-font: Seven Segment.ttf
        text-color: White
        text-format: '{0:00.0f}'
        text: ${formula}
