buttons:
- index: e0
  activation:
    type: encoder-value-extended
    dataref: sim/cockpit2/switches/instrument_brightness_ratio[1]
    step: 0.01
    value-min: 0
    value-max: 1
    initial-value: 0.75
    set-dataref: sim/cockpit2/switches/instrument_brightness_ratio[1]
    step-xl: 0.01
  representation:
    type: none
