- index: left
  name: left_screen
  side:
    icon-color: Black
    labels:
    - label: Instr.
      label-size: 12
      label-font: B612-Bold
      label-color: Gold
      formula: ${data:sim/cockpit2/switches/instrument_brightness_ratio[1]} 100 *
      text-size: 18
      text-font: Seven Segment.ttf
      text-color: White
      text-format: '{0:.0f}'
      text: ${formula}%
    - label: Panel
      label-size: 12
      label-font: B612-Bold
      label-color: Gold
      formula: ${data:sim/cockpit2/switches/panel_brightness_ratio[0]} 100 *
      text-size: 18
