name: switches
includes:
- includes/pagerfull
default-icon-color: DarkSlateGray
buttons:
- index: 0
  activation:
    type: sweep
    stops: 2
    dataref: sim/cockpit/electrical/generator_on[0]
    set-dataref: sim/cockpit/electrical/generator_on[0]
  representation:
    type: circular-switch
    label: IDG 1
    label-position: cb
    label-color: White
    circular-switch:
      button-size: 60
      switch-style: large
      tick-from: 120
      tick-to: 180
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      options: invert
      tick-labels:
      - 'OFF'
      - AUTO
  bgcolor: White
- index: 1
  activation:
    type: sweep
    stops: 3
    dataref: XCrafts/electrical/ac_bus_tie_switch
    set-dataref: XCrafts/electrical/ac_bus_tie_switch
  representation:
    type: circular-switch
    label: AC BUS TIES
    label-color: White
    label-position: cb
    label-size: 8
    circular-switch:
      button-size: 60
      switch-style: large
      tick-from: 140
      tick-to: 220
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      options: invert
      tick-labels:
      - '1

        OPEN'
      - AUTO
      - '2

        OPEN'
