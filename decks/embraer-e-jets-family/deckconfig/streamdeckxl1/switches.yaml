    tick-from: 120
    tick-to: 180
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    options: invert
    tick-labels:
    - 'OFF'
    - AUTO
  dataref: sim/cockpit/electrical/generator_on[0]
  set-dataref: sim/cockpit/electrical/generator_on[0]
  activation: sweep
