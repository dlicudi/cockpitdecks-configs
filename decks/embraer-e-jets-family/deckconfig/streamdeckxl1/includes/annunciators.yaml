buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/annunciator/clear_master_warning
  representation:
    type: annunciator
    annunciator:
      size: full
      model: A
      parts:
      - text: WARN
        text-color: black
        text-font: DIN Condensed Black.otf
        text-size: 90
        formula: ${sim/cockpit/warnings/annunciators/master_warning}
        invert-color: firebrick
- index: 1
  activation:
    type: push
    commands:
      press: sim/annunciator/clear_master_caution
  representation:
    type: annunciator
    annunciator:
      size: full
      model: A
      parts:
      - text: CAUT
        text-color: Black
        text-font: DIN Condensed Black.otf
        text-size: 90
        formula: ${sim/cockpit/warnings/annunciators/master_caution}
        invert-color: darkorange
