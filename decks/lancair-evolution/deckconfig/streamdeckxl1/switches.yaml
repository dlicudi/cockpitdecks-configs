description: Switch Panel
includes:
- includes/pagerfull
name: switches
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/electrical/battery_1_toggle
  representation:
    type: annunciator
    label: BATTERY
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq
- index: 2
  activation:
    type: push
    commands:
      press: sim/systems/avionics_toggle
  representation:
    type: annunciator
    label: AVIONICS
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/avionics_power_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/avionics_power_on} 1 eq
- index: 3
  activation:
    type: push
    commands:
      press: sim/electrical/generator_1_toggle
  representation:
    type: annunciator
    label: ALTERNATOR
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[0]} 1 eq
- index: 5
  activation:
    type: push
    options: large,invert
    dataref: sim/cockpit/warnings/annunciator_test_pressed
    commands:
      press: sim/annunciator/test_all_annunciators
  representation:
    type: switch
    label: TEST
    label-font: D-DINCondensed.otf
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'OFF'
      - 'ON'
      tick-label-size: 42
      tick-label-font: D-DIN-Bold.otf
      tick-underline: false
- index: 16
  activation:
    type: push
    commands:
      press: sim/lights/landing_lights_toggle
  representation:
    type: annunciator
    label: LAND
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/electrical/landing_lights_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/electrical/landing_lights_on} 1 eq
- index: 17
  activation:
    type: push
    commands:
      press: sim/lights/taxi_lights_toggle
  representation:
    type: annunciator
    label: TAXI
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/electrical/taxi_light_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/electrical/taxi_light_on} 1 eq
- index: 18
  activation:
    type: push
    commands:
      press: sim/lights/strobe_lights_toggle
  representation:
    type: annunciator
    label: FLASH
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq
- index: 19
  activation:
    type: push
    commands:
      press: sim/lights/nav_lights_toggle
  representation:
    type: annunciator
    label: NAV
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
- index: 21
  name: FLAPS
  activation:
    type: sweep
    stops: 3
    options: 3way,invert
    dataref: sim/cockpit2/controls/flap_ratio
    positions:
    - sim/flight_controls/flaps_down
    - sim/flight_controls/flaps_up
  representation:
    type: switch
    label: FLAPS
    label-size: 9
    label-color: black
    switch:
      switch-style: large
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - UP
      - '25'
      - '50'
      tick-space: 24
      tick-color: white
      tick-label-size: 40
      tick-label-font: D-DIN-Bold.otf
      tick-label-color: black
    formula: ${sim/cockpit2/controls/flap_ratio} 2 *
- index: 23
  activation:
    type: push
    commands:
      press: sim/ice/pitot_heat0_tog
  representation:
    type: annunciator
    label: PITOT HT
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
- index: 22
  activation:
    type: sweep
    set-dataref: sim/cockpit/engine/fuel_pump_on[0]
  representation:
    type: annunciator
    label: ELECTRIC PUMP
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/engine/fuel_pump_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/engine/fuel_pump_on[0]} 1 eq
- index: 11
  activation:
    type: sweep
    set-dataref: sim/cockpit/switches/anti_ice_engine_air[0]
  representation:
    type: annunciator
    label: ALTERNATE AIR
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_engine_air[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_engine_air[0]} 1 eq
- index: 13
  name: PARKING BRAKE
  activation:
    type: sweep
    stops: 2
    positions:
    - sim/flight_controls/park_brake_valve_toggle
    - sim/flight_controls/park_brake_valve_toggle
  representation:
    type: switch
    label: PARKING BRAKE
    label-size: 8
    label-color: black
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 24
      tick-color: white
      tick-label-size: 40
      tick-label-font: D-DIN-Bold.otf
      tick-label-color: black
    formula: ${sim/cockpit2/controls/park_brake_valve}
- index: 15
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_transfer_from_off
  representation:
    type: annunciator
    label: FUEL XFER
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        led: dot
        color: Orange
        formula: ${sim/cockpit/engine/fuel_tank_transfer_from} 0 eq
      B1:
        text: 'OFF'
        color: White
        formula: '1'
- index: 14
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_transfer_from_3
  representation:
    type: annunciator
    label: FUEL XFER
    label-color: black
    label-size: 10
    annunciator:
      model: B
      size: medium
      B0:
        led: dot
        color: Orange
        formula: ${sim/cockpit/engine/fuel_tank_transfer_from} 3 eq
      B1:
        text: AUX TANK
        color: White
        formula: '1'
- index: 10
  activation:
    type: begin-end-command
    commands:
      press: sim/starters/engage_starter_1
  representation:
    type: text
    label: ENGINE START
    label-color: White
    label-size: 9
    text: START
    text-color: White
    text-bg-color: Black
    text-font: D-DIN-Bold.otf
    text-size: 28
  vibrate: LONG
- index: 6
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_selector_2
  representation:
    type: annunciator
    label: FUEL
    label-color: black
    label-size: 10
    annunciator:
      model: B
      size: medium
      B0:
        led: dot
        color: Orange
        formula: ${sim/cockpit/engine/fuel_tank_selector} 2 eq
      B1:
        text: 'ON'
        color: White
        formula: '1'
- index: 7
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_selector_none
  representation:
    type: annunciator
    label: FUEL
    label-color: black
    label-size: 10
    annunciator:
      model: B
      size: medium
      B0:
        led: dot
        color: Orange
        formula: ${sim/cockpit/engine/fuel_tank_selector} 0 eq
      B1:
        text: 'OFF'
        color: White
        formula: '1'
