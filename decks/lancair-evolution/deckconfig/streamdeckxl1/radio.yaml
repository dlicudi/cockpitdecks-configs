name: radio
includes:
- includes/pagerfull
buttons:
- index: 0
  name: COM1
  label: COM 1
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 36
      formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
      text: ${formula}
      text-format: '{0:.3f}'
    - color: green
      text-size: 36
      formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000
        /
      text: ${formula}
      text-format: '{0:.3f}'
      text-bg-color: (40, 40, 40)
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/com1_standy_flip
- index: 4
  name: COM2
  label: COM 2
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 36
      formula: ${sim/cockpit2/radios/actuators/com2_frequency_hz_833} 1000 /
      text: ${formula}
      text-format: '{0:.3f}'
    - color: green
      text-size: 36
      formula: ${sim/cockpit2/radios/actuators/com2_standby_frequency_hz_833} 1000
        /
      text: ${formula}
      text-format: '{0:.3f}'
      text-bg-color: (40, 40, 40)
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/com2_standy_flip
- index: 8
  name: ADF
  label: ADF FREQ
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: red
      text-size: 36
      formula: ${sim/cockpit/radios/adf1_freq_hz}
      text: ADF ${formula}
      text-format: '{0:04.0f}'
    - color: red
      text-size: 36
      formula: ${sim/cockpit/radios/adf1_stdby_freq_hz}
      text: FRQ ${formula}
      text-format: '{0:04.0f}'
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/adf1_standy_flip
- index: 3
  name: NAV1
  label: NAV 1
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 36
      formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
    - color: green
      text-size: 36
      formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/nav1_standy_flip
- index: 10
  name: IDENT
  vibrate: LONG
  annunciator:
    size: full
    model: B
    parts:
    - color: yellow
      led: bars
      formula: ${sim/cockpit/radios/transponder_id}
    - text: IDENT
      text-size: 60
      text-font: D-DIN-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/transponder/transponder_ident
- index: 7
  name: NAV2
  label: NAV 2
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 36
      formula: ${sim/cockpit/radios/nav2_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
    - color: green
      text-size: 36
      formula: ${sim/cockpit/radios/nav2_stdby_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/nav2_standy_flip
- index: 9
  name: Audio Panel
  page: audiopanel
  label: Audio Panel
  label-size: 9
  label-color: black
  text: →
  text-font: fontawesome.otf
  text-size: 48
  text-color: Gold
  activation: page
  representation: text
- index: 11
  name: TRANSPONDER_MODE
  stops: 5
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 200
    tick-to: 340
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - 'OFF'
    - STBY
    - 'ON'
    - ALT
    - TEST
    up: 30
    left: 45
  dataref: sim/cockpit/radios/transponder_mode
  set-dataref: sim/cockpit/radios/transponder_mode
  activation: sweep
- index: 12
  stops: 3
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 200
    tick-to: 340
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - LOC1
    - LOC2
    - GPS
    up: 30
    left: 45
  dataref: sim/cockpit/switches/HSI_selector
  set-dataref: sim/cockpit/switches/HSI_selector
  activation: sweep
- index: 13
  label: CRS
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/radios/actuators/hsi_obs_deg_mag_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
