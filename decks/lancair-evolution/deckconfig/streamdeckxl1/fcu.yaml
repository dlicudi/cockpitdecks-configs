description: FCU
includes:
- includes/pagerfull
name: fcu
buttons:
- index: 0
  annunciator:
    size: full
    model: E
    parts:
    - color: lime
      text-size: 60
      formula: ${laminar/n844x/autopilot_knob_mode} 0 eq
      text: TRK
    - led: dot
      color: lime
      formula: ${laminar/n844x/autopilot_knob_mode} 0 eq
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit/autopilot/heading_mag}
      text-format: '{0:03.0f}'
  activation: none
  representation: annunciator
- index: 1
  annunciator:
    size: full
    model: E
    parts:
    - color: lime
      text-size: 60
      formula: ${laminar/n844x/autopilot_knob_mode} 1 eq
      text: SEL
    - led: dot
      color: lime
      formula: ${laminar/n844x/autopilot_knob_mode} 1 eq
    - color: lime
      text-size: 60
      formula: '1'
      text: ${sim/cockpit2/autopilot/altitude_dial_ft}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  annunciator:
    size: full
    model: E
