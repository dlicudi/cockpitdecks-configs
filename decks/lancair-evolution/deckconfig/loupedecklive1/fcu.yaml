description: FCU
includes:
- pager
- encoders/encoders_fcu
name: fcu
buttons:
- index: 0
  name: TRK
  activation:
    type: push
    commands:
      press: sim/autopilot/track
  representation:
    type: text
    text: TRK
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
- index: 1
  name: NAV
  activation:
    type: push
    commands:
      press: sim/autopilot/gpss
  representation:
    type: multi-texts
    text-bg-color: black
    multi-texts:
    - text: NAV
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: NAV
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: NAV
      text-color: Lime
      text-size: 40
      text-font: D-DINCondensed.otf
    formula: ${sim/cockpit2/autopilot/nav_status}
- index: 2
  name: REV
  activation:
    type: push
    commands:
      press: sim/autopilot/back_course
  representation:
    type: text
    text: REV
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
- index: 3
  name: ALT
  activation:
    type: push
    commands:
      press: sim/autopilot/altitude_hold
  representation:
    type: text
    text: ALT
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
  vibrate: SHORT
- index: 4
  name: SEL
  activation:
    type: push
    commands:
      press: sim/autopilot/alt_vs
  representation:
    type: multi-texts
    text-bg-color: black
    multi-texts:
    - text: SEL
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: SEL
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: SEL
      text-color: Lime
      text-size: 40
      text-font: D-DINCondensed.otf
    formula: ${sim/cockpit2/autopilot/vvi_status}
- index: 5
  name: VNAV
  activation:
    type: push
    commands:
      press: sim/autopilot/vnav
  representation:
    type: text
    text: VNAV
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
  vibrate: SHORT
- index: 6
  name: AP
  activation:
    type: push
    commands:
      press: sim/autopilot/servos_toggle
  representation:
    type: multi-texts
    text-bg-color: black
    multi-texts:
    - text: AP
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: AP
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: AP
      text-color: Lime
      text-size: 40
      text-font: D-DINCondensed.otf
    formula: ${sim/cockpit/autopilot/autopilot_mode}
- index: 7
  name: GPSS
  activation:
    type: push
    commands:
      press: sim/autopilot/gpss
  representation:
    type: multi-texts
    text-bg-color: black
    multi-texts:
    - text: GPSS
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: GPSS
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: GPSS
      text-color: Lime
      text-size: 40
      text-font: D-DINCondensed.otf
    formula: ${sim/cockpit2/autopilot/gpss_status}
