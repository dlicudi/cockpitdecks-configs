name: pfi
includes:
- pager
- encoders/encoders_fcu
buttons:
- index: 0
  name: SPD
  label: SPD
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 1
  name: HDG
  label: HDG
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/heading_AHARS_deg_mag_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  name: ALT
  label: ALT
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text-format: '{0:.2f}'
      text: '${sim/cockpit/misc/barometer_setting}

        inHg'
    - color: white
      text-size: 32
      formula: ${sim/cockpit/misc/barometer_setting} 33.8639 *
      text-format: '{0:.0f}'
      text: '${formula}

        hPa'
  activation: none
  representation: annunciator
- index: 3
  name: VS
  label: VS
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 4
  name: FUEL
  label: FUEL QTY
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: L ${formula} gal
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: R ${formula} gal
  activation: none
  representation: annunciator
- index: 5
  name: WIND
  label: WIND DATA
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↓ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↑ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: → ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ← ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 6
  name: GEAR
  label: GEAR
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: D
    parts:
    - color: Lime
      led: dot
      formula: ${laminar/n844x/lights/nose_gear_down} 1 eq
    - color: Lime
      led: dot
      formula: ${laminar/n844x/lights/left_gear_down} 1 eq
    - color: Lime
      led: dot
      formula: ${laminar/n844x/lights/right_gear_down} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/flight_controls/landing_gear_toggle
- index: 7
  name: FLAPS
  label: FLAPS
  label-size: 9
  label-color: black
  stops: 3
  switch:
    switch-style: large
    button-fill-color: black
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - UP
    - '25'
    - '50'
    tick-space: 24
    tick-color: white
    tick-label-size: 40
    tick-label-font: D-DIN-Bold.otf
    tick-label-color: black
  options: 3way,invert
  dataref: sim/cockpit2/controls/flap_ratio
  formula: ${sim/cockpit2/controls/flap_ratio} 2 *
  activation: sweep
  positions:
  - sim/flight_controls/flaps_down
  - sim/flight_controls/flaps_up
- index: 8
  name: FUEL_DURATION
  label: FUEL DURATION
  label-size: 8
  label-position: ct
  label-color: Lime
  data-bg-color: Black
  data:
    icon: fa:gas-pump
    icon-size: 60
    icon-color: Gold
    data: ${formula}
    data-format: '{:02.0f}'
    data-font: D-DINCondensed.otf
    data-color: White
    data-size: 70
    data-unit: hrs
    data-progress: 20
    data-trend: 1
    formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]}
      + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 +
      / 3600 / 1 roundn
    bottomline: Go Faster
  activation: none
  representation: data
- index: 9
  name: CAUTION
  label: CAUTION
  label-size: 10
  label-color: black
  annunciator:
    size: medium
    model: B
    parts:
    - text: OIL PRESS
      text-color: firebrick
      text-font: D-DINCondensed-Bold.otf
      text-size: 50
      formula: ${sim/cockpit/warnings/annunciators/oil_pressure}
    - text: VOLTS
      text-color: firebrick
      text-font: D-DINCondensed-Bold.otf
      text-size: 50
      formula: ${sim/cockpit/warnings/annunciators/generator}
  activation: none
  representation: annunciator
- index: 10
  name: WARNING
  label: WARNING
  label-size: 10
  label-color: black
  annunciator:
    size: medium
    model: B
    parts:
    - text: L FUEL R
      text-color: darkorange
      text-font: D-DINCondensed-Bold.otf
      text-size: 50
      formula: ${sim/cockpit/warnings/annunciators/fuel_pressure}
    - text: L VAC R
      text-color: darkorange
      text-font: D-DINCondensed-Bold.otf
      text-size: 50
      formula: ${sim/cockpit/warnings/annunciators/low_vacuum}
  activation: none
  representation: annunciator
- index: 11
  name: WAYPOINT
  label: NEXT WAYPOINT
  label-size: 8
  label-color: black
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
  annunciator:
    size: medium
    model: F
    parts:
    - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
      text-color: Lime
      text-font: Segment7Standard.otf
      text-size: 36
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

        DIS'
      text-color: Lime
      text-font: Segment7Standard.otf
      text-size: 38
      text-format: '{0:.1f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

        DTK'
      text-color: Lime
      text-font: Segment7Standard.otf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
    - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
      text-color: Lime
      text-font: Segment7Standard.otf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
