description: Engine
includes:
- pager
- encoders/encoders_fcu
name: engine
buttons:
- index: 0
  name: TRQ
  label: TRQ
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: Lime
      text-size: 60
      formula: ${sim/cockpit2/engine/indicators/torque_n_mtr[0]} 0.737562 *
      text: ${formula}
      text-format: '{0:.0f}'
    - color: White
      text-size: 42
      formula: '1'
      text: FT-LB
  activation: none
  representation: annunciator
- index: 1
  name: ITT
  label: ITT
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: Lime
      text-size: 60
      text: ${sim/cockpit2/engine/indicators/ITT_deg_C[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: White
      text-size: 42
      text: °C
      formula: '1'
  activation: none
  representation: annunciator
- index: 2
  name: NP
  label: NP
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/engine/indicators/engine_speed_rpm[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: White
      text-size: 42
      text: RPM
      formula: '1'
  activation: none
  representation: annunciator
- index: 3
  name: NG
  label: NG
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 60
      text: ${sim/cockpit2/engine/indicators/N1_percent[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: White
      text-size: 42
      text: '%'
      formula: '1'
  activation: none
  representation: annunciator
- index: 4
  name: OIL
  label: OIL
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}
      text-format: '{0:.0f} PSI'
      formula: '1'
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]}
      text-format: '{0:.0f} °C'
      formula: '1'
  activation: none
  representation: annunciator
- index: 5
  name: AMPS
  label: AMPS
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: Lime
      text-size: 42
      text: ${sim/cockpit2/electrical/bus_load_amps[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: Lime
      text-size: 42
      text: ${sim/cockpit2/electrical/bus_load_amps[1]}
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
- index: 6
  name: VOLTS
  label: VOLTS
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/electrical/bus_volts[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/electrical/bus_volts[1]}
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
- index: 7
  name: FUEL QTY
  label: FUEL QTY
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      text-format: '{0:.0f}'
      text: ${formula} gal
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
    - color: lime
      text-size: 42
      text-format: '{0:.0f}'
      text: ${formula} gal
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
  activation: none
  representation: annunciator
- index: 8
  name: FUEL
  label: FUEL
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: Lime
      text-size: 42
      text-format: '{0:.0f}'
      text: ${formula} GPH
      formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3600 * 0.8 /
        3.78541 / 2 roundn
    - color: Lime
      text-size: 42
      text-format: '{0:.0f}'
      text: ${sim/cockpit2/engine/indicators/fuel_pressure_psi[0]} PSI
      formula: '1'
  activation: none
  representation: annunciator
- index: 9
  name: FUEL TOTAL
  label: FUEL TOT
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: Lime
      text-size: 36
      text-format: '{0:.1f}'
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[0]}
        + 0.264172 * 2 roundn
      text: ${formula} g
    - color: Lime
      text-size: 36
      text-format: '{0:.1f}'
      formula: ${sim/cockpit2/fuel/fuel_totalizer_sum_kg} 0.264172 * 2 roundn
      text: ${formula} g
    - color: White
      text-size: 36
      text: REM
      formula: '1'
    - color: White
      text-size: 36
      text: USED
      formula: '1'
  activation: none
  representation: annunciator
- index: 10
  name: ELEC_GEN
  label: ELEC
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: Lime
      text-size: 36
      text-format: '{0:.1f}'
      text: ${sim/cockpit2/electrical/generator_amps[0]} A
      formula: '1'
    - color: Lime
      text-size: 36
      text-format: '{0:.1f}'
      text: ${sim/cockpit2/electrical/generator_amps[1]} A
      formula: '1'
    - color: White
      text-size: 36
      text: GEN
      formula: '1'
    - color: White
      text-size: 36
      text: ALT
      formula: '1'
  activation: none
  representation: annunciator
- index: 11
  name: FUEL_DURATION
  label: FUEL DURATION
  label-size: 8
  label-position: ct
  label-color: Lime
  data-bg-color: Black
  data:
    icon: fa:gas-pump
    icon-size: 60
    icon-color: Gold
    data: ${formula}
    data-format: '{:02.0f}'
    data-font: D-DINCondensed.otf
    data-color: White
    data-size: 70
    data-unit: hrs
    data-progress: 20
    data-trend: 1
    formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]}
      + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 +
      / 3600 / 1 roundn
    bottomline: Go Faster
  activation: none
  representation: data
