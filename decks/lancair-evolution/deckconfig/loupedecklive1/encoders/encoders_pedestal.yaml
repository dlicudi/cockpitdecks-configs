buttons:
- index: e0
  name: range_encoder
  activation:
    type: encoder-push
    commands:
      press: sim/GPS/gcu478/pan_push
      cw: sim/GPS/gcu478/range_up
      ccw: sim/GPS/gcu478/range_down
  representation:
    type: none
- index: e1
  name: fms_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/GPS/gcu479/cursor
  representation:
    type: none
- index: e2
  name: FCU Baro
  activation:
    type: encoder-push
    options: modulo
    commands:
      press: sim/instruments/barometer_std
      cw: sim/instruments/barometer_up
      ccw: sim/instruments/barometer_down
  representation:
    type: none
- index: e3
  name: alt_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/autopilot/altitude_sync
  representation:
    type: none
- index: e4
  name: FCU V Speed
  activation:
    type: encoder-push
    commands:
      press: sim/autopilot/vertical_speed_sync
      long-press: AirbusFBW/PullSPDSel
      cw: sim/autopilot/vertical_speed_up
      ccw: sim/autopilot/vertical_speed_down
  representation:
    type: none
- index: e5
  name: mixture_encoder
  activation:
    type: encoder-push
    commands:
      press: sim/engines/mixture_max
      cw: sim/engines/mixture_up
      ccw: sim/engines/mixture_down
  representation:
    type: none
- index: left
  name: left_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: Black
      labels:
      - label: RNG
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
        text-size: 18
        text-font: Segment7Standard.otf
        text-color: White
        text-format: '{0:01.0f}'
        text: ${formula}%
      - label: FMS
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/cockpit/autopilot/heading_mag}
        text-size: 18
        text-font: Segment7Standard.otf
        text-color: White
        text-format: '{0:00.0f}'
        text: ${formula}
      - label: QNH
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
        text-size: 18
        text-font: Segment7Standard.otf
        text-color: White
        text-format: '{0:01.2f}'
        text: ${formula}
- index: right
  name: right_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: Black
      labels:
      - label: ALT
        label-size: 16
        label-font: D-DIN-Bold.otf
        label-color: Grey
        formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
        text-size: 16
        text-font: Segment7Standard.otf
        text-color: White
        text-format: '{0:04.0f}'
        text: ${formula}
      - label: VS
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
        text-size: 18
        text-font: Segment7Standard.otf
        text-color: White
        text-format: '{0:+01.0f}'
        text: ${formula}
      - label: MIX
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
        text-size: 18
        text-font: Segment7Standard.otf
        text-color: White
        text-format: '{0:01.0f}'
        text: ${formula}%
