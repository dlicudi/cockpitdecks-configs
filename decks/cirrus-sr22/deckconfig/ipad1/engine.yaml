name: engine
fill-empty-keys: false
buttons:
- index: 0
  activation:
    type: page
    page: main
  representation:
    type: text
    label: HOME
    label-size: 14
    label-color: white
    text: HOME
    text-size: 13
    text-font: D-DINCondensed-Bold.otf
    text-color: white
- index: 1
  span:
  - 2
  - 2
  name: RPM
  activation:
    type: none
  representation:
    type: gauge
    label: "RPM \xD7100"
    label-size: 7
    label-color: white
    formula: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]} 2700 / 9 *
    gauge:
      tick-from: -120
      tick-to: 120
      ticks: 9
      gauge-offset: 20
      needle-color: white
      needle-width: 6
      needle-length: 80
      tick-color: white
      tick-width: 3
      tick-label-size: 18
      tick-labels:
      - '0'
      - '3'
      - '6'
      - '9'
      - '12'
      - '15'
      - '18'
      - '21'
      - '24'
      - '27'
- index: 3
  span:
  - 2
  - 2
  name: FF
  activation:
    type: none
  representation:
    type: gauge
    label: FF GPH
    label-size: 7
    label-color: white
    formula: ${sim/flightmodel/engine/ENGN_FF_[0]} 0.69 / 0.264172 * 3600 * 30 / 6
      *
    gauge:
      tick-from: -120
      tick-to: 120
      ticks: 6
      gauge-offset: 20
      needle-color: yellow
      needle-width: 6
      needle-length: 80
      tick-color: white
      tick-width: 3
      tick-label-size: 18
      tick-labels:
      - '0'
      - '5'
      - '10'
      - '15'
      - '20'
      - '25'
      - '30'
- index: 5
  span:
  - 2
  - 2
  name: OILT
  activation:
    type: none
  representation:
    type: gauge
    label: "OIL \xB0F"
    label-size: 9
    label-color: white
    formula: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]} 9 * 5 / 32
      + 250 / 5 *
    gauge:
      tick-from: -120
      tick-to: 120
      ticks: 5
      gauge-offset: 20
      needle-color: red
      needle-width: 6
      needle-length: 80
      tick-color: green
      tick-width: 3
      tick-label-size: 18
      tick-labels:
      - '0'
      - '50'
      - '100'
      - '150'
      - '200'
      - '250'
- index: 7
  span:
  - 2
  - 2
