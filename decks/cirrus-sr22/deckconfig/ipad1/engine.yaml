name: engine
fill-empty-keys: false
buttons:
- index: 0
  type: page
  page: main
  label: HOME
  label-size: 16
  text: HOME
  text-size: 13
  text-font: D-DINCondensed-Bold.otf
  text-color: white
- index: 1
  name: RPM
  type: none
  label: RPM
  label-size: 16
  annunciator:
    size: medium
    model: A
    parts:
      A0:
        color: lime
        text-size: 32
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 2
  name: MP
  type: none
  label: MP INHG
  label-size: 16
  annunciator:
    size: medium
    model: A
    parts:
      A0:
        color: lime
        text-size: 32
        formula: ${sim/cockpit2/engine/indicators/MPR_in_hg[0]}
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:.1f}'
- index: 3
  name: FF
  type: none
  label: FF GPH
  label-size: 16
  annunciator:
    size: medium
    model: A
    parts:
      A0:
        color: yellow
        text-size: 29
        formula: ${sim/flightmodel/engine/ENGN_FF_[0]} 0.69 / 0.264172 * 3600 *
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:.1f}'
- index: 4
  name: OILP
  type: none
  label: OIL PSI
  label-size: 16
  annunciator:
    size: medium
    model: A
    parts:
      A0:
        color: yellow
        text-size: 32
        formula: ${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 5
  name: OILT
  type: none
  label: OIL TEMP
  label-size: 11
  annunciator:
    size: medium
    model: A
    parts:
      A0:
        color: yellow
        text-size: 20
        formula: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]} 9 * 5
          / 32 +
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 6
  name: FUELQ
  type: none
  label: FUEL GAL
  label-size: 16
  annunciator:
    size: medium
    model: B
    parts:
      B0:
        color: yellow
        text-size: 15
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
        text: L ${formula}
        text-format: '{0:.1f}'
      B1:
        color: yellow
        text-size: 15
        formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
        text: R ${formula}
        text-format: '{0:.1f}'
- index: 7
  type: page
  page: systems
  label: SYSTEMS
  label-size: 16
  text: ELEC/LTS
  text-size: 12
  text-font: D-DINCondensed-Bold.otf
  text-color: orange
