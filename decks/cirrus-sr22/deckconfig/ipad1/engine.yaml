name: engine
fill-empty-keys: false
buttons:
- index: 0
  page: main
  label: HOME
  label-size: 14
  label-color: white
  text: HOME
  text-size: 13
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: page
  representation: text
- index: 1
  span:
  - 2
  - 2
  name: RPM
  label: RPM ×100
  label-size: 11
  label-color: white
  formula: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]} 2700 / 9 *
  gauge:
    tick-from: -120
    tick-to: 120
    ticks: 9
    gauge-offset: 20
    needle-color: white
    needle-width: 6
    needle-length: 80
    tick-color: white
    tick-width: 3
    tick-label-size: 18
    tick-labels:
    - '0'
    - '3'
    - '6'
    - '9'
    - '12'
    - '15'
    - '18'
    - '21'
    - '24'
    - '27'
  activation: none
  representation: gauge
- index: 3
  span:
  - 2
  - 2
  name: FF
  label: FF GPH
  label-size: 11
  label-color: white
  formula: ${sim/flightmodel/engine/ENGN_FF_[0]} 0.69 / 0.264172 * 3600 * 30 / 6 *
  gauge:
    tick-from: -120
    tick-to: 120
    ticks: 6
    gauge-offset: 20
    needle-color: yellow
    needle-width: 6
    needle-length: 80
    tick-color: white
    tick-width: 3
    tick-label-size: 18
    tick-labels:
    - '0'
    - '5'
    - '10'
    - '15'
    - '20'
    - '25'
    - '30'
  activation: none
  representation: gauge
- index: 5
  span:
  - 2
  - 2
  name: OILT
  label: OIL °F
  label-size: 11
  label-color: white
  formula: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]} 9 * 5 / 32 +
    250 / 5 *
  gauge:
    tick-from: -120
    tick-to: 120
    ticks: 5
    gauge-offset: 20
    needle-color: yellow
    needle-width: 6
    needle-length: 80
    tick-color: white
    tick-width: 3
    tick-label-size: 18
    tick-labels:
    - '0'
    - '50'
    - '100'
    - '150'
    - '200'
    - '250'
  activation: none
  representation: gauge
- index: 7
  span:
  - 2
