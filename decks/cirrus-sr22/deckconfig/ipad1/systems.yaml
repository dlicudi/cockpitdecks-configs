    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/pitot_heat0_tog
- index: 8
  label: MIXTURE -
  label-size: 16
  text: LEAN
  text-size: 13
  text-font: D-DINCondensed-Bold.otf
  text-color: orange
