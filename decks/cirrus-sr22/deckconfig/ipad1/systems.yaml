name: systems
fill-empty-keys: false
buttons:
- index: 0
  activation:
    type: page
    page: main
  representation:
    type: text
    label: HOME
    label-size: 16
    text: HOME
    text-size: 13
    text-font: D-DINCondensed-Bold.otf
    text-color: white
- index: 1
  activation:
    type: push
    commands:
      press: sim/electrical/battery_1_toggle
  representation:
    type: annunciator
    label: BAT 1
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq
- index: 2
  activation:
    type: push
    commands:
      press: sim/systems/avionics_toggle
  representation:
    type: annunciator
    label: AVIONICS
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/electrical/avionics_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/electrical/avionics_on} 1 eq
- index: 3
  activation:
    type: sweep
    set-dataref: sim/cockpit2/engine/actuators/fuel_pump_on[0]
  representation:
    type: annunciator
    label: BOOST PUMP
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/engine/actuators/fuel_pump_on[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/engine/actuators/fuel_pump_on[0]} 1 eq
- index: 4
  activation:
    type: push
    commands:
      press: sim/lights/nav_lights_toggle
  representation:
    type: annunciator
    label: NAV
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
- index: 5
  activation:
    type: push
    commands:
      press: sim/lights/strobe_lights_toggle
  representation:
    type: annunciator
    label: STROBE
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq
- index: 6
  activation:
    type: push
    commands:
      press: sim/lights/landing_01_light_tog
  representation:
    type: annunciator
    label: LAND
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 1 eq
- index: 7
  activation:
    type: push
    commands:
      press: sim/ice/pitot_heat0_tog
  representation:
    type: annunciator
    label: PITOT HEAT
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
- index: 8
  activation:
    type: push
    commands:
      press: sim/engines/mixture_down
  representation:
    type: text
    label: MIXTURE -
    label-size: 16
    text: LEAN
    text-size: 13
    text-font: D-DINCondensed-Bold.otf
    text-color: orange
- index: 9
  activation:
    type: push
    commands:
      press: sim/engines/mixture_max
  representation:
    type: text
    label: MIX FULL
    label-size: 16
    text: RICH
    text-size: 13
    text-font: D-DINCondensed-Bold.otf
    text-color: lime
- index: 10
  activation:
    type: page
    page: engine
  representation:
    type: text
    label: ENGINE
    label-size: 16
    text: EIS
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: orange
- index: 11
  activation:
    type: page
    page: tuning
  representation:
    type: text
    label: TUNING
    label-size: 16
    text: BUGS
    text-size: 13
    text-font: D-DINCondensed-Bold.otf
    text-color: violet
