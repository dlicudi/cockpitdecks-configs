name: systems
fill-empty-keys: false
buttons:
- index: 0
  page: main
  label: HOME
  label-size: 16
  text: HOME
  text-size: 13
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: page
  representation: text
- index: 1
  label: BAT 1
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/electrical/battery_on[0]} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/electrical/battery_1_toggle
- index: 2
  label: AVIONICS
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/electrical/avionics_on} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/electrical/avionics_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/systems/avionics_toggle
- index: 3
  set-dataref: sim/cockpit2/engine/actuators/fuel_pump_on[0]
  label: BOOST PUMP
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/engine/actuators/fuel_pump_on[0]} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/engine/actuators/fuel_pump_on[0]} 1 eq
  activation: sweep
  representation: annunciator
- index: 4
  label: NAV
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/nav_lights_toggle
- index: 5
  label: STROBE
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/strobe_lights_toggle
- index: 6
  label: LAND
  label-size: 16
