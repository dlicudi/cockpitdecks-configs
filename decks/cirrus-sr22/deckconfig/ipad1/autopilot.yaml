name: autopilot
fill-empty-keys: false
buttons:
- index: 0
  activation:
    type: page
    page: main
  representation:
    type: text
    label: HOME
    label-size: 10
    text: HOME
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: white
- index: 1
  name: AP
  activation:
    type: push
    commands:
      press: sim/autopilot/servos_toggle
  representation:
    type: annunciator
    label: MASTER AP
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/servos_on}
      - text: AP
        text-size: 18
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 2
  name: FD
  activation:
    type: push
    commands:
      press: sim/autopilot/fdir_toggle
  representation:
    type: annunciator
    label: FLT DIR
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/flight_director_mode}
      - text: FD
        text-size: 18
        text-font: D-DINCondensed-Bold.otf
        text-color: Turquoise
        formula: '1'
- index: 3
  name: NAV
  activation:
    type: push
    commands:
      press: sim/autopilot/gpss
  representation:
    type: annunciator
    label: NAV
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/gpss_status} 2 eq
      - text: NAV
        text-size: 18
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 4
  name: HDG
  activation:
    type: push
    commands:
      press: sim/autopilot/heading
  representation:
    type: annunciator
    label: HDG
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/heading_status}
      - text: HDG
        text-size: 18
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 5
  name: ALT
  activation:
    type: push
    commands:
      press: sim/autopilot/altitude_hold
  representation:
    type: annunciator
    label: ALT HOLD
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_hold_status}
      - text: ALT
        text-size: 18
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 6
  name: APR
  activation:
    type: push
    commands:
      press: sim/autopilot/approach
  representation:
    type: annunciator
    label: APPROACH
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/approach_status}
      - text: APR
        text-size: 18
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 7
  name: VS
  activation:
    type: push
    commands:
      press: sim/autopilot/vertical_speed
  representation:
    type: annunciator
    label: VERT SPD
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_mode} 4 eq
      - text: VS
        text-size: 18
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 8
  activation:
    type: page
    page: tuning
  representation:
    type: text
    label: BUGS
    label-size: 10
    text: TUNE
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: violet
- index: 9
  activation:
    type: page
    page: radio
  representation:
    type: text
    label: RADIO
    label-size: 10
    text: COM/NAV
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: gold
- index: 10
  activation:
    type: page
    page: systems
  representation:
    type: text
    label: SYSTEMS
    label-size: 10
    text: ELEC
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: orange
- index: 11
  name: ALTSEL
  activation:
    type: none
  representation:
    type: annunciator
    label: ALT SEL
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: cyan
        text-size: 18
        formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
      - color: white
        text-size: 12
        formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
        text: VS ${formula}
        text-format: '{0:.0f}'
