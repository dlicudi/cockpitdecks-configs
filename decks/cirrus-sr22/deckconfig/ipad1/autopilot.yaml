name: autopilot
fill-empty-keys: false

buttons:
  - index: 0
    type: page
    page: main
    label: HOME
    label-size: 10
    text: HOME
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 1
    name: AP
    type: push
    command: sim/autopilot/servos_toggle
    label: MASTER AP
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
        B0:
          color: lime
          led: bars
          formula: ${sim/cockpit2/autopilot/servos_on}
        B1:
          text: AP
          text-size: 18
          text-font: D-DINCondensed-Bold.otf
          formula: "1"

  - index: 2
    name: FD
    type: push
    command: sim/autopilot/fdir_toggle
    label: FLT DIR
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
        B0:
          color: lime
          led: bars
          formula: ${sim/cockpit2/autopilot/flight_director_mode}
        B1:
          text: FD
          text-size: 18
          text-font: D-DINCondensed-Bold.otf
          text-color: Turquoise
          formula: "1"

  - index: 3
    name: NAV
    type: push
    command: sim/autopilot/gpss
    label: NAV
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
        B0:
          color: lime
          led: bars
          formula: ${sim/cockpit2/autopilot/gpss_status} 2 eq
        B1:
          text: NAV
          text-size: 18
          text-font: D-DINCondensed-Bold.otf
          formula: "1"

  - index: 4
    name: HDG
    type: push
    command: sim/autopilot/heading
    label: HDG
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
        B0:
          color: lime
          led: bars
          formula: ${sim/cockpit2/autopilot/heading_status}
        B1:
          text: HDG
          text-size: 18
          text-font: D-DINCondensed-Bold.otf
          formula: "1"

  - index: 5
    name: ALT
    type: push
    command: sim/autopilot/altitude_hold
    label: ALT HOLD
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
        B0:
          color: lime
          led: bars
          formula: ${sim/cockpit2/autopilot/altitude_hold_status}
        B1:
          text: ALT
          text-size: 18
          text-font: D-DINCondensed-Bold.otf
          formula: "1"

  - index: 6
    name: APR
    type: push
    command: sim/autopilot/approach
    label: APPROACH
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
        B0:
          color: lime
          led: bars
          formula: ${sim/cockpit2/autopilot/approach_status}
        B1:
          text: APR
          text-size: 18
          text-font: D-DINCondensed-Bold.otf
          formula: "1"

  - index: 7
    name: VS
    type: push
    command: sim/autopilot/vertical_speed
    label: VERT SPD
    label-size: 10
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
        B0:
          color: lime
          led: bars
          formula: ${sim/cockpit2/autopilot/altitude_mode} 4 eq
        B1:
          text: VS
          text-size: 18
          text-font: D-DINCondensed-Bold.otf
          formula: "1"

  - index: 8
    type: page
    page: tuning
    label: BUGS
    label-size: 10
    text: TUNE
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: violet

  - index: 9
    type: page
    page: radio
    label: RADIO
    label-size: 10
    text: COM/NAV
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: gold

  - index: 10
    type: page
    page: systems
    label: SYSTEMS
    label-size: 10
    text: ELEC
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: orange

  - index: 11
    name: ALTSEL
    type: none
    label: ALT SEL
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: cyan
          text-size: 18
          formula: "${sim/cockpit2/autopilot/altitude_dial_ft}"
          text: "${formula}"
          text-font: Seven Segment.ttf
          text-format: "{0:.0f}"
        B1:
          color: white
          text-size: 12
          formula: "${sim/cockpit/autopilot/vertical_velocity} 100 /"
          text: "VS ${formula}"
          text-format: "{0:.0f}"
