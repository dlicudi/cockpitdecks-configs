name: autopilot
fill-empty-keys: false
buttons:
- index: 0
  page: main
  label: HOME
  label-size: 10
  text: HOME
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: page
  representation: text
- index: 1
  name: AP
  label: MASTER AP
  label-size: 10
  annunciator:
    annunciator-style: v
    light-off-intensity: 8
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/servos_on}
    - text: AP
      text-size: 18
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/servos_toggle
- index: 2
  name: FD
  label: FLT DIR
  label-size: 10
  annunciator:
    annunciator-style: v
    light-off-intensity: 8
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/flight_director_mode}
    - text: FD
      text-size: 18
      text-font: D-DINCondensed-Bold.otf
      text-color: Turquoise
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/fdir_toggle
- index: 3
  name: NAV
  label: NAV
  label-size: 10
  annunciator:
    annunciator-style: v
    light-off-intensity: 8
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/gpss_status} 2 eq
    - text: NAV
      text-size: 18
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/gpss
- index: 4
  name: HDG
  label: HDG
  label-size: 10
  annunciator:
    annunciator-style: v
    light-off-intensity: 8
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/heading_status}
    - text: HDG
      text-size: 18
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/heading
- index: 5
  name: ALT
  label: ALT HOLD
  label-size: 10
  annunciator:
    annunciator-style: v
    light-off-intensity: 8
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_hold_status}
    - text: ALT
      text-size: 18
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/altitude_hold
- index: 6
  name: APR
  label: APPROACH
  label-size: 10
  annunciator:
    annunciator-style: v
    light-off-intensity: 8
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/approach_status}
    - text: APR
      text-size: 18
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/approach
- index: 7
  name: VS
  label: VERT SPD
  label-size: 10
  annunciator:
    annunciator-style: v
    light-off-intensity: 8
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_mode} 4 eq
    - text: VS
      text-size: 18
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/vertical_speed
- index: 8
  page: tuning
  label: BUGS
  label-size: 10
  text: TUNE
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: violet
  activation: page
  representation: text
- index: 9
  page: radio
  label: RADIO
  label-size: 10
  text: COM/NAV
  text-size: 12
  text-font: D-DINCondensed-Bold.otf
  text-color: gold
  activation: page
  representation: text
- index: 10
  page: systems
  label: SYSTEMS
  label-size: 10
  text: ELEC
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: orange
  activation: page
  representation: text
- index: 11
  name: ALTSEL
  label: ALT SEL
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: cyan
      text-size: 18
      formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
      text: ${formula}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 12
      formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
      text: VS ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
