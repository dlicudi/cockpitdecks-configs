name: pfd
fill-empty-keys: false
buttons:
- index: 0
  activation:
    type: page
    page: main
  representation:
    type: text
    label: HOME
    label-size: 10
    text: HOME
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: white
- index: 1
  name: SPD
  activation:
    type: none
  representation:
    type: annunciator
    label: IAS KT
    label-size: 10
    annunciator:
      annunciator-style: v
      size: medium
      model: D
      parts:
      - color: lime
        text-size: 24
        formula: '1'
        text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 2
  name: ALT
  activation:
    type: none
  representation:
    type: annunciator
    label: ALT FT
    label-size: 10
    annunciator:
      annunciator-style: v
      size: medium
      model: D
      parts:
      - color: lime
        text-size: 24
        formula: '1'
        text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 3
  name: VSI
  activation:
    type: none
  representation:
    type: annunciator
    label: VSI FPM
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 20
        formula: '1'
        text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
      - color: deepskyblue
        text-size: 12
        formula: ${sim/cockpit2/gauges/indicators/flight_path_angle_deg}
        text: FPA ${formula}
        text-format: '{0:0.1f}°'
- index: 4
  name: HDG
  activation:
    type: none
  representation:
    type: annunciator
    label: HDG/TRK
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: cyan
        text-size: 20
        formula: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:03.0f}'
      - color: white
        text-size: 12
        formula: ${sim/cockpit2/gauges/indicators/ground_track_mag_pilot}
        text: TRK ${formula}
        text-format: '{0:03.0f}'
- index: 5
  name: BARO
  activation:
    type: none
  representation:
    type: annunciator
    label: BARO
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: gold
        text-size: 16
        formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
        text: ${formula} in
        text-format: '{0:.2f}'
      - color: white
        text-size: 12
        formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.8639 *
        text: ${formula} hPa
        text-format: '{0:.0f}'
- index: 6
  name: GS
  activation:
    type: none
  representation:
    type: annunciator
    label: GS/TAS
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 20
        formula: ${sim/cockpit2/gauges/indicators/ground_speed_kt}
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
      - color: white
        text-size: 12
        formula: ${sim/cockpit2/gauges/indicators/true_airspeed_kts_pilot}
        text: TAS ${formula}
        text-format: '{0:.0f}'
- index: 7
  activation:
    type: page
    page: tuning
  representation:
    type: text
    label: NEXT
    label-size: 10
    text: BUGS
    text-size: 16
    text-font: D-DINCondensed-Bold.otf
    text-color: violet
