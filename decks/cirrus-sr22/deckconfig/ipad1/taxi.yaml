name: taxi
fill-empty-keys: false
buttons:
- index: 0
  page: main
  label: HOME
  label-size: 16
  text: HOME
  text-size: 34
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: page
  representation: text
- index: 1
  label: PARK BRAKE
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
    - text: 'ON'
      color: red
      framed: true
      formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/flight_controls/park_brake_valve_toggle
- index: 2
  label: NAV
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/nav_lights_toggle
- index: 3
  label: STROBE
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/strobe_lights_toggle
- index: 4
  label: TAXI/LAND
  label-size: 16
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/landing_01_light_tog
- index: 5
  label: IDENT
  label-size: 16
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      led: bars
      formula: ${sim/cockpit/radios/transponder_id}
    - text: IDENT
      text-size: 18
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/transponder/transponder_ident
- index: 6
  page: radio
  label: COM/NAV
  label-size: 16
  text: RADIO
  text-size: 13
  text-font: D-DINCondensed-Bold.otf
  text-color: gold
  activation: page
  representation: text
- index: 7
  page: tuning
  label: HDG BUG
  label-size: 16
  text: BUGS
  text-size: 34
  text-font: D-DINCondensed-Bold.otf
  text-color: cyan
  activation: page
  representation: text
