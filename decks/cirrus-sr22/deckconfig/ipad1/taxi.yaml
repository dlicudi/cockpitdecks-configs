name: taxi
fill-empty-keys: false

buttons:
  - index: 0
    type: page
    page: main
    label: HOME
    label-size: 16
    text: HOME
    text-size: 34
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 1
    type: push
    command: sim/flight_controls/park_brake_valve_toggle
    label: PARK BRAKE
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
        B0:
          text: "OFF"
          color: darkorange
          formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
        B1:
          text: "ON"
          color: red
          framed: true
          formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq

  - index: 2
    type: push
    command: sim/lights/nav_lights_toggle
    label: NAV
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
        B0:
          text: "OFF"
          color: darkorange
          formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
        B1:
          text: "ON"
          color: deepskyblue
          framed: true
          formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq

  - index: 3
    type: push
    command: sim/lights/strobe_lights_toggle
    label: STROBE
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
        B0:
          text: "OFF"
          color: darkorange
          formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
        B1:
          text: "ON"
          color: deepskyblue
          framed: true
          formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq

  - index: 4
    type: push
    command: sim/lights/landing_01_light_tog
    label: TAXI/LAND
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
        B0:
          text: "OFF"
          color: darkorange
          formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 0 eq
        B1:
          text: "ON"
          color: deepskyblue
          framed: true
          formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 1 eq

  - index: 5
    type: push
    command: sim/transponder/transponder_ident
    label: IDENT
    label-size: 16
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          led: bars
          formula: ${sim/cockpit/radios/transponder_id}
        B1:
          text: IDENT
          text-size: 18
          text-font: D-DINCondensed-Bold.otf
          formula: "1"

  - index: 6
    type: page
    page: radio
    label: COM/NAV
    label-size: 16
    text: RADIO
    text-size: 13
    text-font: D-DINCondensed-Bold.otf
    text-color: gold

  - index: 7
    type: page
    page: tuning
    label: HDG BUG
    label-size: 16
    text: BUGS
    text-size: 34
    text-font: D-DINCondensed-Bold.otf
    text-color: cyan
