name: taxi
fill-empty-keys: false
buttons:
- index: 0
  activation:
    type: page
    page: main
  representation:
    type: text
    label: HOME
    label-size: 16
    text: HOME
    text-size: 34
    text-font: D-DINCondensed-Bold.otf
    text-color: white
- index: 1
  activation:
    type: push
    commands:
      press: sim/flight_controls/park_brake_valve_toggle
  representation:
    type: annunciator
    label: PARK BRAKE
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
      - text: 'ON'
        color: red
        framed: true
        formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq
- index: 2
  activation:
    type: push
    commands:
      press: sim/lights/nav_lights_toggle
  representation:
    type: annunciator
    label: NAV
    label-size: 8
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
        text-size: 11
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
        text-size: 10
      annunciator-style: v
- index: 3
  activation:
    type: push
    commands:
      press: sim/lights/strobe_lights_toggle
  representation:
    type: annunciator
    label: STROBE
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq
- index: 4
  activation:
    type: push
    commands:
      press: sim/lights/landing_01_light_tog
  representation:
    type: annunciator
    label: TAXI/LAND
    label-size: 16
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 1 eq
- index: 5
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_ident
  representation:
    type: annunciator
    label: IDENT
    label-size: 16
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        led: bars
        formula: ${sim/cockpit/radios/transponder_id}
      - text: IDENT
        text-size: 18
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 6
  activation:
    type: page
    page: radio
  representation:
    type: text
    label: COM/NAV
    label-size: 16
    text: RADIO
    text-size: 13
    text-font: D-DINCondensed-Bold.otf
    text-color: gold
- index: 7
  activation:
    type: page
    page: tuning
  representation:
    type: text
    label: HDG BUG
    label-size: 16
    text: BUGS
    text-size: 34
    text-font: D-DINCondensed-Bold.otf
    text-color: cyan
