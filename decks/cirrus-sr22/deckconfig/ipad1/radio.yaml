name: radio
fill-empty-keys: false

buttons:
  - index: 0
    type: page
    page: main
    label: HOME
    label-size: 10
    text: HOME
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 1
    name: COM1
    label: COM 1
    type: push
    command: sim/radios/com1_standy_flip
    label-color: white
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 14
          formula: "${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /"
          text: "${formula}"
          text-format: "{0:.3f}"
        B1:
          color: green
          text-size: 14
          formula: "${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /"
          text: "${formula}"
          text-format: "{0:.3f}"
          text-bg-color: (40, 40, 40)
          frame: True

  - index: 2
    name: NAV1
    label: NAV 1
    type: push
    command: sim/radios/nav1_standy_flip
    label-color: white
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 14
          formula: "${sim/cockpit/radios/nav1_freq_hz} 100 /"
          text: "${formula}"
          text-format: "{0:.2f}"
        B1:
          color: green
          text-size: 14
          formula: "${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /"
          text: "${formula}"
          text-format: "{0:.2f}"
          frame: True

  - index: 3
    name: XPDR
    type: none
    label: XPDR
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          text-size: 20
          formula: "${sim/cockpit/radios/transponder_code}"
          text: "${formula}"
          text-font: Seven Segment.ttf
          text-format: "{0:04.0f}"
        B1:
          color: white
          text-size: 12
          formula: "${sim/cockpit/radios/transponder_mode}"
          text: "MODE ${formula}"
          text-format: "{0:.0f}"

  - index: 4
    name: IDENT
    type: push
    label: IDENT
    label-size: 10
    command: sim/transponder/transponder_ident
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          led: bars
          formula: ${sim/cockpit/radios/transponder_id}
        B1:
          text: IDENT
          text-size: 16
          text-font: D-DINCondensed-Bold.otf
          formula: "1"

  - index: 5
    name: COM1 COARSE DOWN
    type: push
    command: sim/radios/stby_com1_coarse_down
    label: COM1 MHz -
    label-size: 10
    text: COM1 -
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 6
    name: COM1 COARSE UP
    type: push
    command: sim/radios/stby_com1_coarse_up
    label: COM1 MHz +
    label-size: 10
    text: COM1 +
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 7
    name: COM1 FINE
    type: push
    command: sim/radios/stby_com1_fine_up
    label: COM1 kHz +
    label-size: 10
    text: 8.33 +
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 8
    name: NAV1 COARSE DOWN
    type: push
    command: sim/radios/stby_nav1_coarse_down
    label: NAV1 MHz -
    label-size: 10
    text: NAV1 -
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 9
    name: NAV1 COARSE UP
    type: push
    command: sim/radios/stby_nav1_coarse_up
    label: NAV1 MHz +
    label-size: 10
    text: NAV1 +
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 10
    name: NAV1 FINE
    type: push
    command: sim/radios/stby_nav1_fine_up
    label: NAV1 kHz +
    label-size: 10
    text: 0.05 +
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 11
    type: page
    page: tuning
    label: TUNING
    label-size: 10
    text: BUGS
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: violet
