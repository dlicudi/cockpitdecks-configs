name: radio
fill-empty-keys: false
buttons:
- index: 0
  page: main
  label: HOME
  label-size: 10
  text: HOME
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: page
  representation: text
- index: 1
  name: COM1
  label: COM 1
  label-color: white
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 14
      formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
      text: ${formula}
      text-format: '{0:.3f}'
    - color: green
      text-size: 14
      formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000
        /
      text: ${formula}
      text-format: '{0:.3f}'
      text-bg-color: (40, 40, 40)
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/com1_standy_flip
- index: 2
  name: NAV1
  label: NAV 1
  label-color: white
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 14
      formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
    - color: green
      text-size: 14
      formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/nav1_standy_flip
- index: 3
  name: XPDR
  label: XPDR
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 20
      formula: ${sim/cockpit/radios/transponder_code}
      text: ${formula}
      text-font: Seven Segment.ttf
      text-format: '{0:04.0f}'
    - color: white
      text-size: 12
      formula: ${sim/cockpit/radios/transponder_mode}
      text: MODE ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 4
  name: IDENT
  label: IDENT
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      led: bars
      formula: ${sim/cockpit/radios/transponder_id}
    - text: IDENT
      text-size: 16
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/transponder/transponder_ident
- index: 5
  name: COM1 COARSE DOWN
  label: COM1 MHz -
  label-size: 10
  text: COM1 -
  text-size: 12
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: push
  representation: text
  commands:
    press: sim/radios/stby_com1_coarse_down
- index: 6
  name: COM1 COARSE UP
  label: COM1 MHz +
  label-size: 10
  text: COM1 +
  text-size: 12
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: push
  representation: text
  commands:
    press: sim/radios/stby_com1_coarse_up
- index: 7
  name: COM1 FINE
  label: COM1 kHz +
  label-size: 10
  text: 8.33 +
  text-size: 12
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: push
  representation: text
  commands:
    press: sim/radios/stby_com1_fine_up
- index: 8
  name: NAV1 COARSE DOWN
  label: NAV1 MHz -
  label-size: 10
  text: NAV1 -
  text-size: 12
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: push
  representation: text
  commands:
    press: sim/radios/stby_nav1_coarse_down
- index: 9
  name: NAV1 COARSE UP
  label: NAV1 MHz +
  label-size: 10
  text: NAV1 +
  text-size: 12
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: push
  representation: text
  commands:
    press: sim/radios/stby_nav1_coarse_up
- index: 10
  name: NAV1 FINE
  label: NAV1 kHz +
  label-size: 10
  text: 0.05 +
  text-size: 12
