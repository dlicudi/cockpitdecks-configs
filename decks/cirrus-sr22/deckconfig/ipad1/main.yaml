name: main
fill-empty-keys: false
buttons:
- index: 0
  type: push
  vibrate: SHORT
  command: sim/electrical/battery_2_toggle
  label: BAT 2
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[1]} 0 eq
      B1:
        text: 'ON'
