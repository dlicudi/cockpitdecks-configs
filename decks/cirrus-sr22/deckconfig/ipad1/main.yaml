  name: ''
- index: 18
  type: push
  vibrate: SHORT
  command: laminar/sr22/fuel_sel_left_off
  label: FUEL OFF
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq ${laminar/sr22/fuel_selector_pos}
