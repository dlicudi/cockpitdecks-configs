      B1:
        text: 'OFF'
        color: red
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 0 eq ${laminar/sr22/fuel_selector_pos}
          3 eq +
  name: ''
- index: 39
  type: push
  vibrate: SHORT
  text: UP
  text-color: Lime
  command: sim/flight_controls/flaps_up
  text-bg-color: Black
  name: ''
