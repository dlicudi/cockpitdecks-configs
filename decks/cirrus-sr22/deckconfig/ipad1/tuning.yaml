name: tuning
fill-empty-keys: false
buttons:
- index: 0
  page: main
  label: HOME
  label-size: 10
  text: HOME
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: white
  activation: page
  representation: text
- index: 1
  name: HDG DOWN
  label: HDG -
  label-size: 10
  text: HDG -
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: cyan
  activation: push
  representation: text
  commands:
    press: sim/autopilot/heading_down
- index: 2
  name: HDG BUG
  label: HDG BUG
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: cyan
      text-size: 18
      formula: ${sim/cockpit/autopilot/heading_mag}
      text: ${formula}
      text-font: Seven Segment.ttf
      text-format: '{0:03.0f}'
    - color: white
      text-size: 12
      formula: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
      text: MAG ${formula}
      text-format: '{0:03.0f}'
  activation: none
  representation: annunciator
- index: 3
  name: HDG UP
  label: HDG +
  label-size: 10
  text: HDG +
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: cyan
  activation: push
  representation: text
  commands:
    press: sim/autopilot/heading_up
- index: 4
  name: ALT DOWN
  label: ALT -
  label-size: 10
  text: ALT -
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: lime
  activation: push
  representation: text
  commands:
    press: sim/GPS/g1000n1_alt_outer_down
- index: 5
  name: ALT BUG
  label: ALT SEL
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 18
      formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
      text: ${formula}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 10
      formula: ${sim/cockpit2/autopilot/altitude_dial_ft} 100 /
      text: ${formula} x100
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 6
  name: ALT UP
  label: ALT +
  label-size: 10
  text: ALT +
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: lime
  activation: push
  representation: text
  commands:
    press: sim/GPS/g1000n1_alt_outer_up
- index: 7
  name: VS DOWN
  label: VS -
  label-size: 10
  text: VS -
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: gold
  activation: push
  representation: text
  commands:
    press: sim/autopilot/vertical_speed_down
- index: 8
  name: VS BUG
  label: VS BUG
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 18
      formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
      text: ${formula}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 10
      formula: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text: ACT ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 9
  name: VS UP
  label: VS +
  label-size: 10
  text: VS +
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: gold
  activation: push
  representation: text
  commands:
    press: sim/autopilot/vertical_speed_up
- index: 10
  page: autopilot
  label: AP
  label-size: 10
  text: AP
  text-size: 14
  text-font: D-DINCondensed-Bold.otf
  text-color: lime
  activation: page
  representation: text
- index: 11
  page: radio
  label: RADIO
  label-size: 10
  text: COM/NAV
  text-size: 12
  text-font: D-DINCondensed-Bold.otf
  text-color: gold
  activation: page
  representation: text
