name: tuning
fill-empty-keys: false
buttons:
- index: 0
  activation:
    type: page
    page: main
  representation:
    type: text
    label: HOME
    label-size: 10
    text: HOME
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: white
- index: 1
  name: HDG DOWN
  activation:
    type: push
    commands:
      press: sim/autopilot/heading_down
  representation:
    type: text
    label: HDG -
    label-size: 10
    text: HDG -
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: cyan
- index: 2
  name: HDG BUG
  activation:
    type: none
  representation:
    type: annunciator
    label: HDG BUG
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: cyan
        text-size: 18
        formula: ${sim/cockpit/autopilot/heading_mag}
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:03.0f}'
      - color: white
        text-size: 12
        formula: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        text: MAG ${formula}
        text-format: '{0:03.0f}'
- index: 3
  name: HDG UP
  activation:
    type: push
    commands:
      press: sim/autopilot/heading_up
  representation:
    type: text
    label: HDG +
    label-size: 10
    text: HDG +
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: cyan
- index: 4
  name: ALT DOWN
  activation:
    type: push
    commands:
      press: sim/GPS/g1000n1_alt_outer_down
  representation:
    type: text
    label: ALT -
    label-size: 10
    text: ALT -
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: lime
- index: 5
  name: ALT BUG
  activation:
    type: none
  representation:
    type: annunciator
    label: ALT SEL
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 18
        formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
      - color: white
        text-size: 10
        formula: ${sim/cockpit2/autopilot/altitude_dial_ft} 100 /
        text: ${formula} x100
        text-format: '{0:.0f}'
- index: 6
  name: ALT UP
  activation:
    type: push
    commands:
      press: sim/GPS/g1000n1_alt_outer_up
  representation:
    type: text
    label: ALT +
    label-size: 10
    text: ALT +
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: lime
- index: 7
  name: VS DOWN
  activation:
    type: push
    commands:
      press: sim/autopilot/vertical_speed_down
  representation:
    type: text
    label: VS -
    label-size: 10
    text: VS -
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: gold
- index: 8
  name: VS BUG
  activation:
    type: none
  representation:
    type: annunciator
    label: VS BUG
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 18
        formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
        text: ${formula}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
      - color: white
        text-size: 10
        formula: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
        text: ACT ${formula}
        text-format: '{0:.0f}'
- index: 9
  name: VS UP
  activation:
    type: push
    commands:
      press: sim/autopilot/vertical_speed_up
  representation:
    type: text
    label: VS +
    label-size: 10
    text: VS +
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: gold
- index: 10
  activation:
    type: page
    page: autopilot
  representation:
    type: text
    label: AP
    label-size: 10
    text: AP
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: lime
- index: 11
  activation:
    type: page
    page: radio
  representation:
    type: text
    label: RADIO
    label-size: 10
    text: COM/NAV
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: gold
