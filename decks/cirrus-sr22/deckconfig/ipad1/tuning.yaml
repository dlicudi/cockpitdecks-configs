name: tuning
fill-empty-keys: false

buttons:
  - index: 0
    type: page
    page: main
    label: HOME
    label-size: 10
    text: HOME
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: white

  - index: 1
    name: HDG DOWN
    type: push
    command: sim/autopilot/heading_down
    label: HDG -
    label-size: 10
    text: HDG -
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: cyan

  - index: 2
    name: HDG BUG
    type: none
    label: HDG BUG
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: cyan
          text-size: 18
          formula: "${sim/cockpit/autopilot/heading_mag}"
          text: "${formula}"
          text-font: Seven Segment.ttf
          text-format: "{0:03.0f}"
        B1:
          color: white
          text-size: 12
          formula: "${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}"
          text: "MAG ${formula}"
          text-format: "{0:03.0f}"

  - index: 3
    name: HDG UP
    type: push
    command: sim/autopilot/heading_up
    label: HDG +
    label-size: 10
    text: HDG +
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: cyan

  - index: 4
    name: ALT DOWN
    type: push
    command: sim/GPS/g1000n1_alt_outer_down
    label: ALT -
    label-size: 10
    text: ALT -
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: lime

  - index: 5
    name: ALT BUG
    type: none
    label: ALT SEL
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 18
          formula: "${sim/cockpit2/autopilot/altitude_dial_ft}"
          text: "${formula}"
          text-font: Seven Segment.ttf
          text-format: "{0:.0f}"
        B1:
          color: white
          text-size: 10
          formula: "${sim/cockpit2/autopilot/altitude_dial_ft} 100 /"
          text: "${formula} x100"
          text-format: "{0:.0f}"

  - index: 6
    name: ALT UP
    type: push
    command: sim/GPS/g1000n1_alt_outer_up
    label: ALT +
    label-size: 10
    text: ALT +
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: lime

  - index: 7
    name: VS DOWN
    type: push
    command: sim/autopilot/vertical_speed_down
    label: VS -
    label-size: 10
    text: VS -
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: gold

  - index: 8
    name: VS BUG
    type: none
    label: VS BUG
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          text-size: 18
          formula: "${sim/cockpit/autopilot/vertical_velocity} 100 /"
          text: "${formula}"
          text-font: Seven Segment.ttf
          text-format: "{0:.0f}"
        B1:
          color: white
          text-size: 10
          formula: "${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}"
          text: "ACT ${formula}"
          text-format: "{0:.0f}"

  - index: 9
    name: VS UP
    type: push
    command: sim/autopilot/vertical_speed_up
    label: VS +
    label-size: 10
    text: VS +
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: gold

  - index: 10
    type: page
    page: autopilot
    label: AP
    label-size: 10
    text: AP
    text-size: 14
    text-font: D-DINCondensed-Bold.otf
    text-color: lime

  - index: 11
    type: page
    page: radio
    label: RADIO
    label-size: 10
    text: COM/NAV
    text-size: 12
    text-font: D-DINCondensed-Bold.otf
    text-color: gold
