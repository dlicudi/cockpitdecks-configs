name: fms_load
includes:
- includes/pagerfull
buttons:
- index: 0
  name: LOAD_R1_FILE
  activation:
    type: push
    dataref: cockpitdecks/fms_browser/list_row_1_is_selected
    commands:
      press: cockpitdecks/fms_browser/list_select_row_1
  representation:
    type: multi-texts
    label: FILE
    label-size: 9
    label-color: Gold
    multi-texts:
    - text: '${cockpitdecks/fms_browser/list_row_1_filename}

        ${cockpitdecks/fms_browser/list_row_1_timestamp}'
      text-font: D-DINCondensed.otf
      text-size: 15
      text-color: white
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: '${cockpitdecks/fms_browser/list_row_1_filename}

        ${cockpitdecks/fms_browser/list_row_1_timestamp}'
      text-font: D-DINCondensed.otf
      text-size: 15
      text-color: white
      text-position: cm
      text-bg-color: (70, 55, 20)
  vibrate: SHORT
  render-cooldown-ms: 80
- index: 1
  name: LOAD_R1_WPTS
  activation:
    type: push
    dataref: cockpitdecks/fms_browser/list_row_1_is_selected
    commands:
      press: cockpitdecks/fms_browser/list_select_row_1
  representation:
    type: multi-texts
    label: WPTS
    label-size: 9
    label-color: Gold
    multi-texts:
    - text: ${cockpitdecks/fms_browser/list_row_1_wpt_count}
      text-format: '{0:.0f}'
      text-color: white
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: ${cockpitdecks/fms_browser/list_row_1_wpt_count}
      text-format: '{0:.0f}'
      text-color: white
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)
  vibrate: SHORT
  render-cooldown-ms: 80
