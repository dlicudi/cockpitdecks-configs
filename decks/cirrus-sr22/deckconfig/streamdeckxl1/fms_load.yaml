      text-format: "{0:.0f}"
      text-color: white
      text-size: 20
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms_browser/list_row_1_max_alt_ft}\nft"
      text-format: "{0:.0f}"
      text-color: white
      text-size: 20
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 3
