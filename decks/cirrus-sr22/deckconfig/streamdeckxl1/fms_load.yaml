# LOAD FPL — same logical layout as Loupedeck fms_load + encoders_load.
#
# FMS Browser shows up to 3 plans at a time (datarefs list_row_1 .. list_row_3 only).
# Scrolling the list remaps which files occupy those three rows — not more than 3 visible rows.
#
# Stream Deck XL (8×4): rows 0–2 = list (cols 0–3) + control strip (cols 4–7). Row 3 = pagerfull.
name: fms_load
includes: includes/pagerfull

buttons:

# ═══ Row 0 — plan slot 1 + list navigation ═══════════════════
- index: 0
  name: LOAD_R1_FILE
  type: push
  command: cockpitdecks/fms_browser/list_select_row_1
  dataref: cockpitdecks/fms_browser/list_row_1_is_selected
  vibrate: SHORT
  render-cooldown-ms: 80
  label: FILE
  label-size: 9
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms_browser/list_row_1_filename}\n${cockpitdecks/fms_browser/list_row_1_timestamp}"
      text-font: D-DINCondensed.otf
      text-size: 15
      text-color: white
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms_browser/list_row_1_filename}\n${cockpitdecks/fms_browser/list_row_1_timestamp}"
      text-font: D-DINCondensed.otf
      text-size: 15
      text-color: white
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 1
  name: LOAD_R1_WPTS
  type: push
  command: cockpitdecks/fms_browser/list_select_row_1
  dataref: cockpitdecks/fms_browser/list_row_1_is_selected
  vibrate: SHORT
  render-cooldown-ms: 80
  label: WPTS
  label-size: 9
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms_browser/list_row_1_wpt_count}"
      text-format: "{0:.0f}"
      text-color: white
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms_browser/list_row_1_wpt_count}"
      text-format: "{0:.0f}"
      text-color: white
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 2
  name: LOAD_R1_MAX
  type: none
  dataref: cockpitdecks/fms_browser/list_row_1_is_selected
  render-cooldown-ms: 80
  label: MAX ALT
  label-size: 8
  label-color: Gold
  multi-texts:
