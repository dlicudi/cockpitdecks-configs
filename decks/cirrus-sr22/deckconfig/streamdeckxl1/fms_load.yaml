    - text: "${cockpitdecks/fms_browser/list_row_1_distance_nm}\nnm"
      text-format: "{0:.0f}"
      text-color: darkorange
      text-size: 20
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms_browser/list_row_1_distance_nm}\nnm"
