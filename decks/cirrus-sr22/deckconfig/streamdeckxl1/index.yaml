description: Quick-access hub for common controls
name: index
includes:
- includes/pagerfull
buttons:
- index: 0
  name: AP
  activation:
    type: push
    commands:
      press: sim/autopilot/servos_toggle
  representation:
    type: annunciator
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/servos_on}
      - text: AP
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 1
  name: FD
  activation:
    type: push
    commands:
      press: sim/autopilot/fdir_toggle
  representation:
