name: transponder
includes:
- includes/pagerfull
buttons:
- index: 0
  name: SQUAWK0
  vibrate: SHORT
  label: 'S Q U '
  label-position: rt
  label-size: 10
  label-color: White
  text: ${formula}
  text-format: '{:01.0f}'
  text-size: 19
  text-font: Seven Segment.ttf
  text-color: Lime
  text-bg-color: Black
  formula: ${sim/cockpit/radios/transponder_code} 1000 / floor
  activation: push
  representation: text
  commands:
    press: sim/transponder/transponder_thousands_up
- index: 1
  name: SQUAWK1
  vibrate: SHORT
  label: ' A W K'
