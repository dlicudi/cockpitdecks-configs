- index: 7
  name: REV
  activation:
    type: push
    commands:
      press: sim/autopilot/back_course
  representation:
    type: annunciator
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/backcourse_status}
      - text: REV/BC
        text-size: 19
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 8
  name: VS
  activation:
    type: push
    commands:
      press: sim/autopilot/vertical_speed
  representation:
    type: annunciator
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
