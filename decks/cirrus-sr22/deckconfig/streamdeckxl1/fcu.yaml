- index: 9
  name: FLC
  activation:
    type: push
    commands:
      press: sim/autopilot/level_change
  representation:
    type: annunciator
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_mode} 5 eq
      - text: FLC
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 10
  name: GPS
  activation:
    type: push
    commands:
      press: sim/autopilot/hsi_toggle_gps
  representation:
    type: annunciator
    label: HSI GPS
    label-size: 10
    label-color: black
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - text: GPS
        text-color: yellow
        text-font: D-DINCondensed-Bold.otf
        text-size: 19
        formula: ${sim/cockpit/switches/HSI_selector} 2 eq
      - text: GPS2
        text-color: lime
        text-font: D-DINCondensed-Bold.otf
        text-size: 19
        formula: ${sim/cockpit/switches/HSI_selector} 3 eq
- index: 11
  name: VOR
  activation:
    type: push
    commands:
      press: sim/autopilot/hsi_toggle_nav
  representation:
    type: annunciator
    label: HSI NAV
    label-size: 10
    label-color: black
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - text: VOR1
        text-color: yellow
        text-font: D-DINCondensed-Bold.otf
        text-size: 19
        formula: ${sim/cockpit/switches/HSI_selector} 0 eq
      - text: VOR2
        text-color: lime
        text-font: D-DINCondensed-Bold.otf
        text-size: 19
        formula: ${sim/cockpit/switches/HSI_selector} 1 eq
