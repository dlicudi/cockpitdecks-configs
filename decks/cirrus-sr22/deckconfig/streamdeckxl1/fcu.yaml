        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 3
  name: ALT
  activation:
    type: push
    commands:
      press: sim/autopilot/altitude_hold
  representation:
    type: annunciator
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_hold_status}
      - text: ALT
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 4
  name: NAV
  activation:
    type: push
    commands:
      press: sim/autopilot/gpss
  representation:
    type: annunciator
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/gpss_status} 2 eq
      - text: NAV
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 5
  name: VNAV
  activation:
    type: push
    commands:
      press: sim/autopilot/vnav
  representation:
    type: annunciator
    annunciator:
      annunciator-style: v
      light-off-intensity: 8
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/vnav_armed}
      - text: VNAV
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 6
  name: APR
  activation:
    type: push
    commands:
      press: sim/autopilot/approach
  representation:
