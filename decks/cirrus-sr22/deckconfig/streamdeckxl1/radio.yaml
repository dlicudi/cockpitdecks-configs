name: radio
includes: includes/pagerfull
buttons:

  - index: 0
    name: SQUAWK0
    vibrate: SHORT
    label: "S Q U "
    label-position: rt
    label-size: 10
    label-color: White
    type: push
    text: ${formula}
    text-format: "{:01.0f}"
    text-size: 19
    text-font: Segment7Standard.otf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 1000 / floor
    command: sim/transponder/transponder_thousands_up

  - index: 1
    name: SQUAWK1
    vibrate: SHORT
    label: " A W K"
    label-position: lt
    label-size: 10
    label-color: White
    type: push
    text: ${formula}
    text-format: "{:01.0f}"
    text-size: 19
    text-font: Segment7Standard.otf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 100 / floor 10 %
    command: sim/transponder/transponder_hundreds_up

  - index: 2
    name: SQUAWK2
    vibrate: SHORT
    label: "C O "
    label-position: rt
    label-size: 10
    label-color: White
    type: push
    text: ${formula}
    text-format: "{:01.0f}"
    text-size: 19
    text-font: Segment7Standard.otf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 10 / floor 10 %
    command: sim/transponder/transponder_tens_up

  - index: 3
    name: SQUAWK3
    vibrate: SHORT
    label: " D E"
    label-position: lt
    label-size: 10
    label-color: White
    type: push
    text: ${formula}
    text-format: "{:01.0f}"
    text-size: 19
    text-font: Segment7Standard.otf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 10 %
    command: sim/transponder/transponder_ones_up

  - index: 4
    name: TRANSPONDER_MODE
    label: TRANSPONDER
    label-color: black
    label-size: 8
    type: updown
    stops: 5
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      tick-from: 200
      tick-to: 340
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      tick-labels:
        - "OFF"
        - "STBY"
        - "ON"
        - "ALT"
        - "TEST"
      up: 30
      left: 45
    dataref: sim/cockpit/radios/transponder_mode
    set-dataref: sim/cockpit/radios/transponder_mode

  - index: 5
    name: IDENT
    type: push
    vibrate: LONG
    annunciator:
      size: full
      model: B
      parts:
        B0:
          color: yellow
          led: bars
          formula: ${sim/cockpit/radios/transponder_id}
        B1:
          text: IDENT
          text-size: 23
          text-font: D-DIN-Bold.otf
          formula: "1"
    command: sim/transponder/transponder_ident

  - index: 7
    name: COM1
    label: "COM 1"
    type: push
    command: sim/radios/com1_standy_flip
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 14
          formula: "${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /"
          text: "${formula}"
          text-format: "{0:.3f}"
        B1:
          color: green
          text-size: 14
          formula: "${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /"
          text: "${formula}"
          text-format: "{0:.3f}"
          text-bg-color: (40, 40, 40)
          frame: True

  - index: 8
    name: ADF
    label: "ADF FREQ"
    type: push
    command: sim/radios/adf1_standy_flip
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: red
          text-size: 14
          formula: "${sim/cockpit/radios/adf1_freq_hz}"
          text: "ADF ${formula}"
          text-format: "{0:04.0f}"
        B1:
          color: red
          text-size: 14
          formula: "${sim/cockpit/radios/adf1_stdby_freq_hz}"
          text: "FRQ ${formula}"
          text-format: "{0:04.0f}"
          frame: True

  - index: 11
    name: NAV1
    label: "VLOC 1"
    type: push
    command: sim/radios/nav1_standy_flip
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 14
          formula: "${sim/cockpit/radios/nav1_freq_hz} 100 /"
          text: "${formula}"
          text-format: "{0:.2f}"
        B1:
          color: green
          text-size: 14
          formula: "${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /"
          text: "${formula}"
          text-format: "{0:.2f}"
          frame: True
