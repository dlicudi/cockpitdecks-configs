name: radio
includes:
- includes/pagerfull
buttons:
- index: 0
  name: SQUAWK0
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_thousands_up
  representation:
    type: text
    label: 'S Q U '
    label-position: rt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 19
    text-font: Segment7Standard.otf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 1000 / floor
  vibrate: SHORT
- index: 1
  name: SQUAWK1
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_hundreds_up
  representation:
    type: text
    label: ' A W K'
    label-position: lt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 19
    text-font: Segment7Standard.otf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 100 / floor 10 %
  vibrate: SHORT
- index: 2
  name: SQUAWK2
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_tens_up
  representation:
    type: text
    label: 'C O '
    label-position: rt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 19
    text-font: Segment7Standard.otf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 10 / floor 10 %
  vibrate: SHORT
- index: 3
  name: SQUAWK3
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_ones_up
  representation:
    type: text
    label: ' D E'
    label-position: lt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 19
    text-font: Segment7Standard.otf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 10 %
  vibrate: SHORT
- index: 4
  name: TRANSPONDER_MODE
  activation:
    type: sweep
    dataref: sim/cockpit/radios/transponder_mode
    set-dataref: sim/cockpit/radios/transponder_mode
  representation:
    type: circular-switch
    label: TRANSPONDER
    label-color: black
    label-size: 8
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 20
      angle-end: 160
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      ticks:
      - 'OFF'
      - STBY
      - 'ON'
      - ALT
      - TEST
      up: 30
      left: 45
- index: 5
  name: IDENT
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_ident
  representation:
    type: annunciator
    annunciator:
      size: full
      model: B
      parts:
      - color: yellow
        led: bars
        formula: ${sim/cockpit/radios/transponder_id}
      - text: IDENT
        text-size: 23
        text-font: D-DIN-Bold.otf
        formula: '1'
  vibrate: LONG
- index: 7
  name: COM1
  activation:
    type: push
    commands:
      press: sim/radios/com1_standy_flip
  representation:
    type: annunciator
    label: COM 1
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 14
        formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
      - color: green
        text-size: 14
        formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
        text-bg-color: (40, 40, 40)
        frame: true
- index: 8
  name: ADF
  activation:
    type: push
    commands:
      press: sim/radios/adf1_standy_flip
  representation:
    type: annunciator
    label: ADF FREQ
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: red
        text-size: 14
        formula: ${sim/cockpit/radios/adf1_freq_hz}
        text: ADF ${formula}
        text-format: '{0:04.0f}'
      - color: red
        text-size: 14
        formula: ${sim/cockpit/radios/adf1_stdby_freq_hz}
        text: FRQ ${formula}
        text-format: '{0:04.0f}'
        frame: true
- index: 11
  name: NAV1
  activation:
    type: push
    commands:
      press: sim/radios/nav1_standy_flip
  representation:
    type: annunciator
    label: VLOC 1
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 14
        formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
      - color: green
        text-size: 14
        formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
        frame: true
