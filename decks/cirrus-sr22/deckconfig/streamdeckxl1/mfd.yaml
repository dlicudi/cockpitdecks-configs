name: mfd
includes:
- includes/pagerfull
buttons:
- index: 0
  name: PCT POWER
  label: '% PWR'
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 30
      formula: ${sim/flightmodel/engine/ENGN_power[0]} 231167 / 100 *
      text: ${formula}%
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 1
  name: RPM
  label: RPM
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 30
      formula: '1'
      text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  name: MP
  label: MP inHg
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 30
      formula: ${sim/cockpit2/engine/indicators/MPR_in_hg[0]}
      text: ${formula}
      text-font: Segment7Standard.otf
      text-format: '{0:.1f}'
  activation: none
  representation: annunciator
- index: 3
  name: FUEL FLOW
  label: FF GPH
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: yellow
      text-size: 30
      formula: ${sim/flightmodel/engine/ENGN_FF_[0]} 0.69 / 0.264172 * 3600 *
      text: ${formula}
      text-font: Segment7Standard.otf
      text-format: '{0:.1f}'
  activation: none
  representation: annunciator
- index: 4
  name: EGT
  label: EGT °F
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: yellow
      text-size: 30
      formula: ${sim/cockpit2/engine/indicators/EGT_deg_cel[0]} 9 * 5 / 32 +
      text: ${formula}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 5
  name: CHT
  label: CHT °F
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: yellow
      text-size: 30
      formula: ${sim/cockpit2/engine/indicators/CHT_deg_C[0]} 9 * 5 / 32 +
      text: ${formula}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 6
  name: OIL TEMP
  label: OIL °F
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: yellow
      text-size: 30
      formula: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]} 9 * 5 /
        32 +
      text: ${formula}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 7
  name: OIL PRESS
  label: OIL PSI
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: yellow
      text-size: 34
      formula: ${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}
      text: ${formula}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 8
  name: FUEL_L
  label: FUEL L
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 12
      formula: ${laminar/sr22/fuel_selector_pos} 1 eq
      led: bar
    - color: yellow
      text-size: 11
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: ${formula} gal
      text-format: '{0:.1f}'
  activation: push
  representation: annunciator
  commands:
    press: laminar/sr22/fuel_sel_left_select
- index: 9
  name: FUEL_R
  label: FUEL R
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 12
      formula: ${laminar/sr22/fuel_selector_pos} 2 eq
      led: bar
    - color: yellow
      text-size: 11
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: ${formula} gal
      text-format: '{0:.1f}'
  activation: push
  representation: annunciator
  commands:
    press: laminar/sr22/fuel_sel_right_select
- index: 10
  name: FUEL QTY
  label: FUEL QTY
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 15
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: L ${formula}
      text-format: '{0:.1f}'
    - color: yellow
      text-size: 15
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: R ${formula}
      text-format: '{0:.1f}'
  activation: none
  representation: annunciator
- index: 11
  name: FUEL EST
  label: FUEL EST
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: green
      text-size: 30
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]}
        + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001
        + / 3600 / 1 roundn
      text: ${formula} hrs
      text-font: Segment7Standard.otf
      text-format: '{0:.1f}'
  activation: none
  representation: annunciator
- index: 12
  name: FUEL USED
  label: FUEL USED
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: white
      text-size: 30
      formula: ${sim/cockpit2/fuel/fuel_totalizer_sum_kg} 0.264172 * 2 roundn
      text: ${formula} g
      text-font: Segment7Standard.otf
      text-format: '{0:.1f}'
  activation: none
  representation: annunciator
- index: 13
  name: THROTTLE
  label: THROTTLE
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 38
      formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
      text: ${formula}%
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 14
  name: MIXTURE
  label: MIXTURE
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 38
      formula: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
      text: ${formula}%
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 15
  name: ELECTRICAL
  label: ELECTRICAL
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: Lime
      text-size: 11
      text: '${formula}

        BAT A'
      text-format: '{0:.1f}'
      formula: ${sim/cockpit2/electrical/battery_amps[0]}
    - color: deepskyblue
      text-size: 11
      text: ALT1
      framed: true
      formula: ${sim/cockpit2/electrical/generator_on[0]} 1 eq
    - color: deepskyblue
      text-size: 11
      text: ALT2
      framed: true
      formula: ${sim/cockpit2/electrical/generator_on[1]} 1 eq
    - color: deepskyblue
      text-size: 11
      text: AVNX
      framed: true
      formula: ${sim/cockpit/electrical/avionics_on} 1 eq
  activation: none
  representation: annunciator
- index: 16
  name: VACUUM
  label: VACUUM
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: A
    parts:
    - color: yellow
      text-size: 34
      formula: '1'
      text: ${sim/cockpit/misc/vacuum}
      text-font: Segment7Standard.otf
      text-format: '{0:.2f}'
  activation: none
  representation: annunciator
- index: 17
  name: VOLTS
  label: VOLTS
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 18
      formula: '1'
      text: ${sim/cockpit2/electrical/bus_volts[0]}
      text-format: '{0:.1f}'
    - color: lime
      text-size: 18
      formula: '1'
      text: ${sim/cockpit2/electrical/bus_volts[1]}
      text-format: '{0:.1f}'
  activation: none
  representation: annunciator
- index: 18
  name: AIRCRAFT
  label: AIRCRAFT
  label-color: black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: Gold
      text-size: 11
      text: '${formula}

        QNH'
      text-format: '{0:.2f}'
      formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
    - color: White
      text-size: 11
      text: '${formula}

        hPa'
      text-format: '{0:.0f}'
      formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.8639
        *
    - color: White
      text-size: 11
      text: '${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}

        HOBBS'
      formula: '1'
    - color: Turquoise
      text-size: 11
      text: '${sim/cockpit/radios/transponder_code}

        XPDR'
      text-format: '{:04.0f}'
      formula: '1'
  activation: none
  representation: annunciator
