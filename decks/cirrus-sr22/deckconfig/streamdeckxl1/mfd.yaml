name: mfd
includes: includes/pagerfull

buttons:

  - index: 0
    name: WAYPOINT
    render-cooldown-ms: 750
    type: none
    label: NEXT WAYPOINT
    label-size: 8
    label-color: black
    string-datarefs: ["sim/cockpit2/radios/indicators/gps_nav_id"]
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          text: "${sim/cockpit2/radios/indicators/gps_nav_id}"
          text-color: Lime
          text-font: Seven Segment.ttf
          text-size: 36
          formula: "1"
        F1:
          text: "${sim/cockpit2/radios/indicators/gps_dme_distance_nm}\nDIS"
          text-color: Lime
          text-font: Seven Segment.ttf
          text-size: 38
          text-format: "{0:.1f}"
          formula: "1"
        F2:
          text: "${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}\nDTK"
          text-color: Lime
          text-font: Seven Segment.ttf
          text-size: 40
          text-format: "{0:.0f}"
          formula: "1"
        F3:
          text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min\nETA"
          text-color: Lime
          text-font: Seven Segment.ttf
          text-size: 40
          text-format: "{0:.0f}"
          formula: "1"

  - index: 1
    name: SELECTED
    type: none
    label: SELECTED
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: Gold
          text-size: 32
          text: "${formula}\nHDG"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit/autopilot/heading_mag}"
        F1:
          color: Gold
          text-size: 32
          text: "${formula}\nALT"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit2/autopilot/altitude_dial_ft}"
        F2:
          color: Gold
          text-size: 32
          text: "${formula}\nVS"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit/autopilot/vertical_velocity} 100 /"
        F3:
          color: White
          text-size: 30
          text: "AP"
          framed: true
          formula: "${sim/cockpit2/autopilot/servos_on} 1 eq"

  - index: 2
    name: FUEL EST
    type: none
    label: FUEL EST
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: green
          text-size: 42
          formula: "${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]} + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 + / 3600 / 1 roundn"
          text: "${formula} hrs"
        B1:
          text: FUEL EST
          text-size: 42
          text-font: D-DIN-Bold.otf
          formula: "1"

  - index: 3
    name: EGT/FUEL_FLOW
    type: none
    label: EGT/FF
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          text-size: 32
          formula: "${sim/cockpit2/engine/indicators/EGT_deg_cel[0]}"
          text: "${formula} EGT"
          text-format: "{0:.2f}"
        B1:
          color: yellow
          text-size: 32
          formula: "${sim/flightmodel/engine/ENGN_FF_[0]} 0.69 / 0.264172 * 3600 *"
          text: "${formula} GPH"
          text-format: "{0:.2f}"

  - index: 4
    name: ENGINE
    type: none
    label: ENGINE
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: green
          text-size: 42
          text: "${formula}\nRPM"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}"
        B1:
          color: green
          text-size: 38
          text: "${formula}\nMP"
          text-format: "{0:.1f}"
          formula: "${sim/cockpit2/engine/indicators/MPR_in_hg[0]}"

  - index: 5
    name: OIL
    type: none
    label: OIL
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          text-size: 32
          text: "TEMP ${formula} F"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]}"
        B1:
          color: yellow
          text-size: 32
          text: "PRESS ${formula} PSI"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}"

  - index: 6
    name: VACAMP
    type: none
    label: VAC/AMP
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          text-size: 32
          text: "VAC ${sim/cockpit/misc/vacuum}"
          text-format: "{0:.2f}"
          formula: "1"
        B1:
          color: yellow
          text-size: 32
          text: "AMP ${sim/cockpit2/electrical/battery_amps[0]}"
          text-format: "{0:.2f}"
          formula: "1"

  - index: 7
    name: AUTOPILOT
    type: none
    label: AP MODES
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: Lime
          text-size: 28
          text: "AP"
          framed: true
          formula: "${sim/cockpit2/autopilot/servos_on} 1 eq"
        F1:
          color: deepskyblue
          text-size: 28
          text: "FD"
          framed: true
          formula: "${sim/cockpit2/autopilot/flight_director_mode} 1 eq"
        F2:
          color: Gold
          text-size: 28
          text: "HDG"
          framed: true
          formula: "${sim/cockpit2/autopilot/heading_status} 1 eq"
        F3:
          color: Turquoise
          text-size: 28
          text: "GPS"
          framed: true
          formula: "${sim/cockpit2/autopilot/gpss_status} 2 eq"

  - index: 8
    name: WARNINGS
    type: none
    label: ALERTS
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          text: "OIL"
          text-color: firebrick
          off-color: "#3f1414"
          text-font: D-DINCondensed-Bold.otf
          text-size: 44
          formula: ${sim/cockpit/warnings/annunciators/oil_pressure}
        F1:
          text: "VOLTS"
          text-color: firebrick
          off-color: "#3f1414"
          text-font: D-DINCondensed-Bold.otf
          text-size: 32
          formula: ${sim/cockpit/warnings/annunciators/generator}
        F2:
          text: "FUEL"
          text-color: darkorange
          off-color: "#3a2613"
          text-font: D-DINCondensed-Bold.otf
          text-size: 38
          formula: ${sim/cockpit/warnings/annunciators/fuel_pressure}
        F3:
          text: "VAC"
          text-color: darkorange
          off-color: "#3a2613"
          text-font: D-DINCondensed-Bold.otf
          text-size: 44
          formula: ${sim/cockpit/warnings/annunciators/low_vacuum}

  - index: 9
    name: FUEL_L
    type: push
    command: laminar/sr22/fuel_sel_left_select
    label: FUEL L
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 32
          formula: "${laminar/sr22/fuel_selector_pos} 1 eq"
          led: bar
        B1:
          color: yellow
          text-size: 24
          formula: "${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn"
          text: "${formula} g"

  - index: 10
    name: FUEL_R
    type: push
    command: laminar/sr22/fuel_sel_right_select
    label: FUEL R
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 32
          formula: "${laminar/sr22/fuel_selector_pos} 2 eq"
          led: bar
        B1:
          color: yellow
          text-size: 24
          formula: "${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn"
          text: "${formula} g"

  - index: 11
    type: page
    page: pedestal
    label: PEDESTAL
    label-color: Gold
    text: 
    text-color: khaki
    text-size: 40
    text-font: fontawesome.otf
    text-position: cm
    text-bg-color: (40, 40, 40)
