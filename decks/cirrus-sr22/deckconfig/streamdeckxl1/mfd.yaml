name: mfd
includes: includes/pagerfull

buttons:

  # Row 1 — EIS strip (G1000 order: % Power → RPM → MP → FF → EGT → CHT → Oil T → Oil P)

  - index: 0
    name: PCT POWER
    type: none
    label: "% PWR"
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 30
          formula: "${sim/flightmodel/engine/ENGN_power[0]} 231167 / 100 *"
          text: "${formula}%"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 1
    name: RPM
    type: none
    label: RPM
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 30
          formula: "1"
          text: "${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 2
    name: MP
    type: none
    label: MP inHg
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 30
          formula: "${sim/cockpit2/engine/indicators/MPR_in_hg[0]}"
          text: "${formula}"
          text-font: Segment7Standard.otf
          text-format: "{0:.1f}"

  - index: 3
    name: FUEL FLOW
    type: none
    label: FF GPH
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: yellow
          text-size: 30
          formula: "${sim/flightmodel/engine/ENGN_FF_[0]} 0.69 / 0.264172 * 3600 *"
          text: "${formula}"
          text-font: Segment7Standard.otf
          text-format: "{0:.1f}"

  - index: 4
    name: EGT
    type: none
    label: EGT °F
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: yellow
          text-size: 30
          formula: "${sim/cockpit2/engine/indicators/EGT_deg_cel[0]} 9 * 5 / 32 +"
          text: "${formula}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 5
    name: CHT
    type: none
    label: CHT °F
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: yellow
          text-size: 30
          formula: "${sim/cockpit2/engine/indicators/CHT_deg_C[0]} 9 * 5 / 32 +"
          text: "${formula}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 6
    name: OIL TEMP
    type: none
    label: OIL °F
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: yellow
          text-size: 30
          formula: "${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]} 9 * 5 / 32 +"
          text: "${formula}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 7
    name: OIL PRESS
    type: none
    label: OIL PSI
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: yellow
          text-size: 34
          formula: "${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}"
          text: "${formula}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  # Row 2 — fuel management, power controls, electrical

  - index: 8
    name: FUEL_L
    type: push
    command: laminar/sr22/fuel_sel_left_select
    label: FUEL L
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 12
          formula: "${laminar/sr22/fuel_selector_pos} 1 eq"
          led: bar
        B1:
          color: yellow
          text-size: 11
          formula: "${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn"
          text: "${formula} gal"
          text-format: "{0:.1f}"

  - index: 9
    name: FUEL_R
    type: push
    command: laminar/sr22/fuel_sel_right_select
    label: FUEL R
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 12
          formula: "${laminar/sr22/fuel_selector_pos} 2 eq"
          led: bar
        B1:
          color: yellow
          text-size: 11
          formula: "${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn"
          text: "${formula} gal"
          text-format: "{0:.1f}"

  - index: 10
    name: FUEL QTY
    type: none
    label: FUEL QTY
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          text-size: 15
          formula: "${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn"
          text: "L ${formula}"
          text-format: "{0:.1f}"
        B1:
          color: yellow
          text-size: 15
          formula: "${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn"
          text: "R ${formula}"
          text-format: "{0:.1f}"

  - index: 11
    name: FUEL EST
    type: none
    label: FUEL EST
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: green
          text-size: 30
          formula: "${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]} + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 + / 3600 / 1 roundn"
          text: "${formula} hrs"
          text-font: Segment7Standard.otf
          text-format: "{0:.1f}"

  - index: 12
    name: FUEL USED
    type: none
    label: FUEL USED
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: white
          text-size: 30
          formula: "${sim/cockpit2/fuel/fuel_totalizer_sum_kg} 0.264172 * 2 roundn"
          text: "${formula} g"
          text-font: Segment7Standard.otf
          text-format: "{0:.1f}"

  - index: 13
    name: THROTTLE
    type: none
    label: THROTTLE
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 38
          formula: "${sim/flightmodel/engine/ENGN_thro[0]} 100 *"
          text: "${formula}%"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 14
    name: MIXTURE
    type: none
    label: MIXTURE
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 38
          formula: "${sim/flightmodel/engine/ENGN_mixt[0]} 100 *"
          text: "${formula}%"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 15
    name: ELECTRICAL
    type: none
    label: ELECTRICAL
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: Lime
          text-size: 11
          text: "${formula}\nBAT A"
          text-format: "{0:.1f}"
          formula: "${sim/cockpit2/electrical/battery_amps[0]}"
        F1:
          color: deepskyblue
          text-size: 11
          text: "ALT1"
          framed: true
          formula: "${sim/cockpit2/electrical/generator_on[0]} 1 eq"
        F2:
          color: deepskyblue
          text-size: 11
          text: "ALT2"
          framed: true
          formula: "${sim/cockpit2/electrical/generator_on[1]} 1 eq"
        F3:
          color: deepskyblue
          text-size: 11
          text: "AVNX"
          framed: true
          formula: "${sim/cockpit/electrical/avionics_on} 1 eq"

  # Row 3 — secondary systems (breathing room intentional)

  - index: 16
    name: VACUUM
    type: none
    label: VACUUM
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: yellow
          text-size: 34
          formula: "1"
          text: "${sim/cockpit/misc/vacuum}"
          text-font: Segment7Standard.otf
          text-format: "{0:.2f}"

  - index: 17
    name: VOLTS
    type: none
    label: VOLTS
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 18
          formula: "1"
          text: "${sim/cockpit2/electrical/bus_volts[0]}"
          text-format: "{0:.1f}"
        B1:
          color: lime
          text-size: 18
          formula: "1"
          text: "${sim/cockpit2/electrical/bus_volts[1]}"
          text-format: "{0:.1f}"

  - index: 18
    name: AIRCRAFT
    type: none
    label: AIRCRAFT
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: Gold
          text-size: 11
          text: "${formula}\nQNH"
          text-format: "{0:.2f}"
          formula: "${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}"
        F1:
          color: White
          text-size: 11
          text: "${formula}\nhPa"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.8639 *"
        F2:
          color: White
          text-size: 11
          text: "${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}\nHOBBS"
          formula: "1"
        F3:
          color: Turquoise
          text-size: 11
          text: "${sim/cockpit/radios/transponder_code}\nXPDR"
          text-format: "{:04.0f}"
          formula: "1"

