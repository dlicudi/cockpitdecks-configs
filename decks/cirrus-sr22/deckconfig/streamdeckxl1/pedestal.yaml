name: pedestal
includes:
- includes/pagerfull
buttons:
- index: 0
  name: THROTTLE
  label: THROTTLE
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 38
      formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
      text: ${formula}%
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  vibrate: SHORT
  label: TOGGLE BRAKES
  label-size: 8
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/flight_controls/park_brake_valve_toggle
- index: 3
  vibrate: SHORT
  text: UP
  text-color: Lime
  text-bg-color: Black
  activation: push
  representation: text
  commands:
    press: sim/flight_controls/flaps_up
- index: 4
  name: MIXTURE
  label: MIXTURE
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 38
      formula: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
      text: ${formula}%
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 7
  label: FLAPS RATIO
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    parts:
    - text: DISAGREE
      color: darkorange
      formula: ${sim/cockpit2/controls/flap_disagree} 1 eq
    - color: deepskyblue
      framed: true
      text: ${sim/cockpit2/controls/flap_ratio}
      text-format: '{0:.2f}'
      formula: '1'
  activation: none
  representation: annunciator
- index: 11
  text: DOWN
  text-color: Lime
  text-bg-color: Black
  activation: push
  representation: text
  commands:
    press: sim/flight_controls/flaps_down
