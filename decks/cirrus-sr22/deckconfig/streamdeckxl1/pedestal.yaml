name: pedestal
includes:
- includes/pagerfull
buttons:
- index: 0
  name: THROTTLE
  activation:
    type: none
  representation:
    type: annunciator
    label: THROTTLE
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 38
        formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
        text: ${formula}%
        text-font: Segment7Standard.otf
        text-format: '{0:.0f}'
- index: 2
  activation:
    type: push
    commands:
      press: sim/flight_controls/park_brake_valve_toggle
  representation:
    type: annunciator
    label: TOGGLE BRAKES
    label-size: 8
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq
  vibrate: SHORT
- index: 3
  activation:
    type: push
    commands:
      press: sim/flight_controls/flaps_up
  representation:
    type: text
    text: UP
    text-color: Lime
    text-bg-color: Black
  vibrate: SHORT
- index: 4
  name: MIXTURE
  activation:
    type: none
  representation:
    type: annunciator
    label: MIXTURE
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 38
        formula: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
        text: ${formula}%
        text-font: Segment7Standard.otf
        text-format: '{0:.0f}'
- index: 7
  activation:
    type: none
  representation:
    type: annunciator
    label: FLAPS RATIO
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: DISAGREE
        color: darkorange
        formula: ${sim/cockpit2/controls/flap_disagree} 1 eq
      - color: deepskyblue
        framed: true
        text: ${sim/cockpit2/controls/flap_ratio}
        text-format: '{0:.2f}'
        formula: '1'
- index: 11
  activation:
    type: push
    commands:
      press: sim/flight_controls/flaps_down
  representation:
    type: text
    text: DOWN
    text-color: Lime
    text-bg-color: Black
