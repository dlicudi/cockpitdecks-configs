description: Engine
name: engine
includes: includes/pagerfull

buttons:

  - index: 0
    name: ENGINE_RPM
    type: none
    label: RPM
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: green
          text-size: 42
          formula: "1"
          text: "${sim/cockpit2/engine/indicators/engine_speed_rpm[0]}"
          text-format: "{0:.0f}"
        B1:
          text: ENG RPM
          text-size: 36
          text-font: D-DIN-Bold.otf
          formula: "1"

  - index: 1
    name: MANIFOLD_PRESSURE
    type: none
    label: MAN PRESS
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: green
          text-size: 42
          formula: "${sim/cockpit2/engine/indicators/MPR_in_hg[0]} round"
          text: "${formula}"
        B1:
          text: "MANIFOLD\nPRESSURE"
          text-size: 30
          text-font: D-DIN-Bold.otf
          formula: "1"

  - index: 2
    name: FUEL_FLOW
    type: none
    label: FUEL FLOW
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: green
          text-size: 42
          formula: "${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3600 * 0.8 / 3.78541 / 2 roundn"
          text: "${formula}"
        B1:
          text: FUEL FLOW
          text-size: 36
          text-font: D-DIN-Bold.otf
          formula: "1"

  - index: 3
    name: OIL
    type: none
    label: OIL
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: green
          text-size: 32
          formula: "${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]}"
          text: "${formula} C"
          text-format: "{0:.0f}"
        B1:
          color: green
          text-size: 32
          formula: "${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}"
          text: "${formula} PSI"
          text-format: "{0:.0f}"

  - index: 4
    name: CHT
    type: none
    label: CHT
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: green
          text-size: 42
          formula: "${sim/cockpit2/engine/indicators/CHT_deg_C[0]} round"
          text: "${formula}"
        B1:
          text: CHT C
          text-size: 40
          text-font: D-DIN-Bold.otf
          formula: "1"

  - index: 5
    name: EGT
    type: none
    label: EGT
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          text-size: 42
          formula: "${sim/cockpit2/engine/indicators/EGT_deg_cel[0]} round"
          text: "${formula}"
        B1:
          text: EGT C
          text-size: 40
          text-font: D-DIN-Bold.otf
          formula: "1"

  - index: 6
    name: FUEL_EST
    type: none
    label: ENDURANCE
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: green
          text-size: 42
          formula: "${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]} + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 + / 3600 / 1 roundn"
          text: "${formula} hrs"
        B1:
          text: FUEL EST
          text-size: 36
          text-font: D-DIN-Bold.otf
          formula: "1"

  - index: 7
    name: FUEL_QTY
    type: none
    label: FUEL QTY
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: yellow
          text-size: 32
          formula: "${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn"
          text: "L ${formula} gal"
        B1:
          color: yellow
          text-size: 32
          formula: "${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn"
          text: "R ${formula} gal"

  - index: 8
    name: ELECTRICAL
    type: none
    label: ELECTRICAL
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: Lime
          text-size: 30
          text: "${formula}\nBAT A"
          text-format: "{0:.1f}"
          formula: "${sim/cockpit2/electrical/battery_amps[0]}"
        F1:
          color: deepskyblue
          text-size: 28
          text: "ALT1"
          framed: true
          formula: "${sim/cockpit2/electrical/generator_on[0]} 1 eq"
        F2:
          color: deepskyblue
          text-size: 28
          text: "ALT2"
          framed: true
          formula: "${sim/cockpit2/electrical/generator_on[1]} 1 eq"
        F3:
          color: deepskyblue
          text-size: 28
          text: "AVNX"
          framed: true
          formula: "${sim/cockpit/electrical/avionics_on} 1 eq"

  - index: 9
    name: BATTERY
    type: none
    label: BATTERY
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 34
          text: "${sim/cockpit/electrical/battery_charge_watt_hr[0]}"
          text-format: "{0:.1f}"
          formula: "1"
        B1:
          color: lime
          text-size: 34
          text: "${sim/cockpit2/electrical/battery_amps[0]}"
          text-format: "{0:.1f}"
          formula: "1"

  - index: 10
    name: ICE_STATUS
    type: none
    label: ICE SYS
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: deepskyblue
          text-size: 24
          text: "PITOT"
          framed: true
          formula: "${sim/cockpit/switches/pitot_heat_on} 1 eq"
        F1:
          color: deepskyblue
          text-size: 24
          text: "TKS"
          framed: true
          formula: "${laminar/sr22/switch/ice_protect} 1 eq"
        F2:
          color: deepskyblue
          text-size: 24
          text: "PROP"
          framed: true
          formula: "${sim/cockpit/switches/anti_ice_prop_heat} 1 eq"
        F3:
          color: deepskyblue
          text-size: 24
          text: "WSHLD"
          framed: true
          formula: "${sim/cockpit/switches/anti_ice_window_heat} 1 eq"

  - index: 11
    name: ALERTS
    type: none
    label: ALERTS
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          text: "OIL"
          text-color: firebrick
          off-color: "#3f1414"
          text-font: D-DINCondensed-Bold.otf
          text-size: 44
          formula: ${sim/cockpit/warnings/annunciators/oil_pressure}
        F1:
          text: "VOLTS"
          text-color: firebrick
          off-color: "#3f1414"
          text-font: D-DINCondensed-Bold.otf
          text-size: 32
          formula: ${sim/cockpit/warnings/annunciators/generator}
        F2:
          text: "FUEL"
          text-color: darkorange
          off-color: "#3a2613"
          text-font: D-DINCondensed-Bold.otf
          text-size: 38
          formula: ${sim/cockpit/warnings/annunciators/fuel_pressure}
        F3:
          text: "VAC"
          text-color: darkorange
          off-color: "#3a2613"
          text-font: D-DINCondensed-Bold.otf
          text-size: 44
          formula: ${sim/cockpit/warnings/annunciators/low_vacuum}

  - index: 12
    name: FUEL_L
    type: push
    command: laminar/sr22/fuel_sel_left_select
    label: FUEL L
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 32
          formula: "${laminar/sr22/fuel_selector_pos} 1 eq"
          led: bar
        B1:
          color: yellow
          text-size: 24
          formula: "${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn"
          text: "${formula} g"

  - index: 13
    name: FUEL_R
    type: push
    command: laminar/sr22/fuel_sel_right_select
    label: FUEL R
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 32
          formula: "${laminar/sr22/fuel_selector_pos} 2 eq"
          led: bar
        B1:
          color: yellow
          text-size: 24
          formula: "${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn"
          text: "${formula} g"

  - index: 14
    name: THROTTLE
    type: none
    label: THROTTLE
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 100
          formula: "${sim/flightmodel/engine/ENGN_thro[0]} 100 *"
          text: "${formula}%"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 15
    name: MIXTURE
    type: none
    label: MIXTURE
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 100
          formula: "${sim/flightmodel/engine/ENGN_mixt[0]} 100 *"
          text: "${formula}%"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 16
    name: WAYPOINT
    render-cooldown-ms: 750
    type: none
    label: NEXT WAYPOINT
    label-size: 8
    label-color: black
    string-datarefs: ["sim/cockpit2/radios/indicators/gps_nav_id"]
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          text: "${sim/cockpit2/radios/indicators/gps_nav_id}"
          text-color: Lime
          text-font: Seven Segment.ttf
          text-size: 36
          formula: "1"
        F1:
          text: "${sim/cockpit2/radios/indicators/gps_dme_distance_nm}\nDIS"
          text-color: Lime
          text-font: Seven Segment.ttf
          text-size: 38
          text-format: "{0:.1f}"
          formula: "1"
        F2:
          text: "${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}\nDTK"
          text-color: Lime
          text-font: Seven Segment.ttf
          text-size: 40
          text-format: "{0:.0f}"
          formula: "1"
        F3:
          text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min\nETA"
          text-color: Lime
          text-font: Seven Segment.ttf
          text-size: 40
          text-format: "{0:.0f}"
          formula: "1"

  - index: 17
    name: SELECTED
    type: none
    label: SELECTED
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: Gold
          text-size: 32
          text: "${formula}\nHDG"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit/autopilot/heading_mag}"
        F1:
          color: Gold
          text-size: 32
          text: "${formula}\nALT"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit2/autopilot/altitude_dial_ft}"
        F2:
          color: Gold
          text-size: 32
          text: "${formula}\nVS"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit/autopilot/vertical_velocity} 100 /"
        F3:
          color: White
          text-size: 30
          text: "AP"
          framed: true
          formula: "${sim/cockpit2/autopilot/servos_on} 1 eq"

  - index: 18
    name: AIR_DATA
    type: none
    label: AIR DATA
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: Gold
          text-size: 30
          text: "${formula}\nOAT C"
          text-format: "{0:.0f}"
          formula: "${sim/weather/aircraft/temperature_ambient_deg_c}"
        F1:
          color: White
          text-size: 30
          text: "${formula}\nALT"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit2/gauges/indicators/altitude_ft_pilot}"
        F2:
          color: White
          text-size: 28
          text: "${formula}\nQNH"
          text-format: "{0:.2f}"
          formula: "${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}"
        F3:
          color: White
          text-size: 28
          text: "${formula}\nhPa"
          text-format: "{0:.0f}"
          formula: "${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.8639 *"

  - index: 19
    name: AIRCRAFT
    type: none
    label: AIRCRAFT
    label-color: black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          color: White
          text-size: 30
          text: "${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}\nHOBBS"
          formula: "1"
        F1:
          color: Turquoise
          text-size: 30
          text: "${sim/cockpit/radios/transponder_code}\nXPDR"
          text-format: "{:04.0f}"
          formula: "1"
        F2:
          color: deepskyblue
          text-size: 24
          text: "LEFT"
          framed: true
          formula: "${laminar/sr22/fuel_selector_pos} 1 eq"
        F3:
          color: deepskyblue
          text-size: 24
          text: "RIGHT"
          framed: true
          formula: "${laminar/sr22/fuel_selector_pos} 2 eq"

