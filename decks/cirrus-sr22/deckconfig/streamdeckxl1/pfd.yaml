      text-font: Seven Segment.ttf
      text-format: '{0:03.0f}'
    - color: cyan
      text-size: 11
      formula: ${sim/cockpit2/gauges/indicators/ground_track_mag_pilot} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - 180 + 360 % 180 -
      text: 'DRIFT

        ${formula}'
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 6
  name: BARO
  label: BARO
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: B
    parts:
    - color: gold
      text-size: 15
      formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
