      text-format: '{0:.2f}'
    - color: white
      text-size: 12
      formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.8639
        *
      text: ${formula} hPa
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 7
