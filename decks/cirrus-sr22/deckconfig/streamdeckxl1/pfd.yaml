name: pfd
includes:
- includes/pagerfull
buttons:
- index: 0
  name: SPD
  label: SPD
  label-size: 9
  label-color: black
  annunciator:
    annunciator-style: v
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 27
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 12
      formula: '1'
      text: '${sim/cockpit2/gauges/indicators/true_airspeed_kts_pilot}

        TAS'
      text-format: '{0:.0f}'
    - color: white
      text-size: 12
      formula: '1'
      text: '${sim/cockpit2/gauges/indicators/ground_speed_kt}

        GS'
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 1
  name: ATT
  label: ATTITUDE
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: F
    parts:
    - color: white
      text-size: 23
      formula: ${sim/cockpit2/gauges/indicators/pitch_ahrs_deg_pilot}
      text: ${formula}
      text-format: '{0:+.0f}'
    - color: white
      text-size: 12
      formula: ${sim/cockpit2/gauges/indicators/roll_ahrs_deg_pilot}
      text: 'ROLL

        ${formula}'
      text-format: '{:0.0f}'
    - color: lime
      text-size: 9
      formula: ${sim/cockpit2/gauges/indicators/slip_deg}
      text: '${formula}

        BALL'
      text-format: '{0:0.1f}'
    - color: white
      text-size: 11
      formula: ${sim/cockpit2/gauges/indicators/turn_rate_heading_deg_sec}
      text: ${formula}°/s
      text-format: '{0:0.1f}'
  activation: none
  representation: annunciator
- index: 2
  name: ALT
  label: ALT ft
  label-size: 9
  label-color: black
