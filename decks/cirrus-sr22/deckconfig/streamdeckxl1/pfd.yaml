      text-format: '{0:.0f}'
    - color: gold
      text-size: 12
      formula: ${sim/cockpit2/gauges/indicators/radio_altimeter_height_ft_pilot}
      text: 'RA

        ${formula}'
      text-format: '{0:.0f}'
    - color: gold
      text-size: 12
      formula: ${sim/cockpit2/autopilot/altitude_minimums}
      text: 'MINS

        ${formula}'
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 3
