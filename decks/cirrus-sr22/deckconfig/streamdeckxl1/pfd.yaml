      off-color: '#3f1414'
      text-font: D-DINCondensed-Bold.otf
      text-size: 14
      formula: ${sim/cockpit2/annunciators/master_warning}
    - text: CAU
      text-color: '#000000'
      on-color: darkorange
      off-color: '#3a2613'
      text-font: D-DINCondensed-Bold.otf
      text-size: 14
