description: Switch Panel
includes:
- includes/pagerfull
name: lights
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/lights/nav_lights_toggle
  representation:
    type: annunciator
    label: NAV
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
- index: 1
  activation:
    type: push
    commands:
      press: sim/lights/strobe_lights_toggle
  representation:
    type: annunciator
    label: STROBE
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq
- index: 2
  activation:
    type: push
    commands:
      press: sim/lights/landing_01_light_tog
  representation:
    type: annunciator
    label: LAND
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 1 eq
- index: 3
  activation:
    type: push
    commands:
      press: sim/lights/generic_01_light_tog
  representation:
    type: annunciator
    label: ICE
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/generic_lights_switch[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/generic_lights_switch[0]} 1 eq
- index: 11
  name: Switches
  activation:
    type: page
    page: switches
  representation:
    type: text
    label: SWITCHES
    label-size: 12
    text: 
    text-font: fontawesome.otf
    text-size: 12
    text-color: Gold
