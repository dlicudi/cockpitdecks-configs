name: fms
includes: includes/pagerfull

buttons:

# Row 1 — Flight plan browser + loaded plan summary

- index: 0
  name: PLAN_PREV
  type: push
  label: PLAN
  label-size: 9
  label-color: Gold
  text: "\uf060"
  text-font: fontawesome.otf
  text-size: 32
  text-color: white
  command: cockpitdecks/fms_browser/previous

- index: 1
  name: PLAN_FILE
  type: none
  label: PLAN FILE
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_filename}"
      text-font: B612Mono-Regular.ttf
      text-size: 30
      color: darkorange
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/index}/${cockpitdecks/fms_browser/count}"
      text-font: B612Mono-Regular.ttf
      text-size: 40
      color: white
      formula: "1"

- index: 2
  name: PLAN_NEXT
  type: push
  label: PLAN
  label-size: 9
  label-color: Gold
  text: "\uf061"
  text-font: fontawesome.otf
  text-size: 32
  text-color: white
  command: cockpitdecks/fms_browser/next

- index: 3
  name: PLAN_OPEN
  type: push
  label: OPEN
  label-size: 9
  label-color: deepskyblue
  text: "\uf07c"
  text-font: fontawesome.otf
  text-size: 30
  text-color: deepskyblue
  command: cockpitdecks/fms_browser/open_fpl

- index: 4
  name: FMS_DEP
  type: none
  label: DEP
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_first_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 56
      color: deepskyblue
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_first_altitude}ft"
      text-font: B612Mono-Regular.ttf
      text-size: 34
      color: darkorange
      formula: "1"

- index: 5
  name: FMS_ACTIVE
  type: none
  label: ACTIVE
  label-size: 9
  label-color: lime
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_active_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 40
      color: lime
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_active_altitude}ft"
      text-font: B612Mono-Regular.ttf
      text-size: 34
      color: darkorange
      formula: "1"

- index: 6
  name: FMS_DEST
  type: none
  label: DEST
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_last_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 56
      color: deepskyblue
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_last_altitude}ft"
      text-font: B612Mono-Regular.ttf
      text-size: 34
      color: darkorange
      formula: "1"

- index: 7
  name: PLAN_LOAD
  type: push
  label: LOAD
  label-size: 9
  label-color: lime
  text: "\uf0c7"
  text-font: fontawesome.otf
  text-size: 30
  text-color: lime
  command: cockpitdecks/fms_browser/load


# Row 2 — Waypoint navigation + plan telemetry

- index: 8
  name: WP_PREV
  type: push
  label: WP
  label-size: 9
  label-color: Gold
  text: "\uf060"
  text-font: fontawesome.otf
  text-size: 32
  text-color: white
  command: cockpitdecks/fms_browser/wp_previous

- index: 9
  name: WP_DIRECT
  type: push
  label: DIRECT
  label-size: 9
  label-color: lime
  text: "D→"
  text-font: B612Mono-Regular.ttf
  text-size: 30
  text-color: lime
  command: cockpitdecks/fms_browser/wp_direct

- index: 10
  name: WP_NEXT
  type: push
  label: WP
  label-size: 9
  label-color: Gold
  text: "\uf061"
  text-font: fontawesome.otf
  text-size: 32
  text-color: white
  command: cockpitdecks/fms_browser/wp_next

- index: 11
  name: WP_CLR
  type: push
  label: CLR
  label-size: 9
  label-color: red
  text: "\uf00d"
  text-font: fontawesome.otf
  text-size: 32
  text-color: red
  command: cockpitdecks/fms_browser/clear_fms_entry

- index: 12
  name: SELECTED_WP
  type: none
  label: SELECTED
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_displayed_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 40
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_displayed_index}/${cockpitdecks/fms_browser/fms_entry_count}"
      text-font: B612Mono-Regular.ttf
      text-size: 36
      color: darkorange
      formula: "1"

- index: 13
  name: PROGRESS
  type: none
  label: PROGRESS
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_active_index}/${cockpitdecks/fms_browser/fms_entry_count}"
      text-font: B612Mono-Regular.ttf
      text-size: 44
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_distance_nm}nm"
      text-font: B612Mono-Regular.ttf
      text-size: 32
      text-format: "{0:.0f}"
      color: darkorange
      formula: "1"

- index: 14
  name: DIST_ETE
  type: none
  label: DIST/ETE
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${sim/cockpit2/radios/indicators/gps_dme_distance_nm}nm"
      text-format: "{0:.1f}"
      text-font: B612Mono-Regular.ttf
      text-size: 34
      color: white
      formula: "1"
    B1:
      text: "${sim/cockpit2/radios/indicators/gps_dme_time_min}min"
      text-format: "{0:.0f}"
      text-font: B612Mono-Regular.ttf
      text-size: 34
      color: darkorange
      formula: "1"

- index: 15
  name: GS_DTK
  type: none
  label: GS/DTK
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${sim/cockpit2/gauges/indicators/ground_speed_kt}kts"
      text-format: "{0:.0f}"
      text-font: B612Mono-Regular.ttf
      text-size: 34
      color: white
      formula: "1"
    B1:
      text: "${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}"
      text-format: "{0:.0f}"
      text-font: B612Mono-Regular.ttf
      text-size: 34
      color: darkorange
      formula: "1"


# Row 3 — Navigation awareness

- index: 16
  name: TOD
  type: none
  label: TOD
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/radios/indicators/fms_distance_to_tod_pilot}\nnm"
  text-format: "{0:.1f}"
  text-font: B612Mono-Regular.ttf
  text-size: 26
  text-color: white

- index: 17
  name: ETA
  type: none
  label: ETA
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/radios/indicators/fms1_act_eta_hour}:${sim/cockpit2/radios/indicators/fms1_act_eta_minute}Z"
  text-font: B612Mono-Regular.ttf
  text-size: 30
  text-color: darkorange

- index: 18
  name: SID_STAR
  type: none
  label: SID/STAR
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_sid}"
      text-font: B612Mono-Regular.ttf
      text-size: 28
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_star}"
      text-font: B612Mono-Regular.ttf
      text-size: 28
      color: darkorange
      formula: "1"

- index: 19
  name: MAP_MODE
  type: none
  label: MAP
  label-size: 9
  label-color: deepskyblue
  text: "${cockpitdecks/fms_browser/map_mode}"
  text-font: D-DIN-Bold.otf
  text-size: 32
  text-color: deepskyblue


- index: 23
  name: PLAN_REFRESH
  type: push
  label: REFRESH
  label-size: 9
  label-color: Gold
  text: "\uf021"
  text-font: fontawesome.otf
  text-size: 30
  text-color: white
  command: cockpitdecks/fms_browser/refresh