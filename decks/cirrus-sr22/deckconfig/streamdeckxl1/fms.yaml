name: fms
includes:
- includes/pagerfull
buttons:
- index: 0
  name: FMS_DEP
  activation:
    type: none
  representation:
    type: annunciator
    label: DEP
    label-size: 9
    label-color: Gold
    annunciator:
      size: medium
      model: B
      parts:
      - text: ${cockpitdecks/fms_browser/fms_first_ident}
        text-font: B612Mono-Regular.ttf
        text-size: 21
        color: deepskyblue
        formula: '1'
      - text: ${cockpitdecks/fms_browser/fms_first_altitude}ft
        text-font: B612Mono-Regular.ttf
        text-size: 13
        color: darkorange
        formula: '1'
- index: 1
  name: FMS_ACTIVE
  activation:
    type: none
  representation:
    type: annunciator
    label: ACTIVE
    label-size: 9
    label-color: lime
    annunciator:
      size: medium
      model: B
      parts:
      - text: ${cockpitdecks/fms_browser/fms_active_ident}
        text-font: B612Mono-Regular.ttf
        text-size: 15
        color: lime
        formula: '1'
      - text: ${cockpitdecks/fms_browser/fms_active_altitude}ft
        text-font: B612Mono-Regular.ttf
        text-size: 13
        color: darkorange
        formula: '1'
- index: 2
  name: FMS_DEST
  activation:
    type: none
