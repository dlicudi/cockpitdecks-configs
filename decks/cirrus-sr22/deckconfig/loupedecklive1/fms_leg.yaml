name: fms_leg
includes: pager,encoders/encoders_fms_leg

buttons:

# ============================================================
# LEGS LIST
# Question: Which waypoints are in the active route?
# Primary object: ScrollableWaypointList (3-row window)
# E1 (e0) turn: scroll selection up/down through route
# E2 (e1) push: direct-to selected waypoint
# E3 (e2) turn: page-cycle (PLAN/ROUTE/LEGS/NAV)
#
# Layout: 3 rows × 3 columns (col 4 reserved)
# Each row = one waypoint: INDEX | IDENT | ALT
# ============================================================

# ----------------------------------------------------------
# Row 1: Waypoint at window position 1
# ----------------------------------------------------------

- index: 0
  name: LEGS_R1_IDX
  type: none
  label: "#"
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_legs/row_1_index}"
      text-font: D-DINCondensed.otf
      text-size: 48
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_legs/row_1_status}"
      text-font: D-DINCondensed.otf
      text-size: 28
      color: lime
      formula: "${cockpitdecks/fms_legs/row_1_is_active} ${cockpitdecks/fms_legs/row_1_is_selected} or"

- index: 1
  name: LEGS_R1_WPT
  type: none
  label: WPT
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_legs/row_1_ident}"
  text-color: white
  text-size: 30
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 2
  name: LEGS_R1_ALT
  type: none
  label: ALT
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_legs/row_1_alt}"
  text-color: darkorange
  text-size: 22
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 3
  name: LEGS_SCROLL_UP
  type: push
  command: cockpitdecks/fms_legs/scroll_up
  vibrate: SHORT
  label: UP
  label-size: 9
  label-color: Gold
  text: "UP"
  text-color: white
  text-size: 28
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

