description: Switch Panel
includes: pager,encoders/encoders_fcu
name: switches

buttons:

  - index: 0
    type: begin-end-command
    command: sim/starters/engage_starter_1
    vibrate: RUMBLE5
    label: "IGNITION"
    label-color: Lime
    text-bg-color: Black
    multi-texts:
      - text: "OFF"
        text-color: White
      - text: "R"
        text-color: Orange
      - text: "L"
        text-color: Orange
      - text: "BOTH"
        text-color: Orange
      - text: "START"
        text-color: Red
    formula: ${sim/cockpit2/engine/actuators/ignition_key[0]}

  - index: 1
    type: push
    vibrate: SHORT
    command: sim/systems/avionics_toggle
    label: AVIONICS
    label-size: 10
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit/electrical/avionics_on} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/electrical/avionics_on} 1 eq


  - index: 2
    type: push
    vibrate: SHORT
    command: sim/electrical/battery_2_toggle
    label: BAT 2
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[1]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[1]} 1 eq

  - index: 3
    type: push
    vibrate: SHORT
    command: sim/electrical/battery_1_toggle
    label: BAT 1
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[0]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq

  - index: 4
    vibrate: SHORT
    type: push
    command: sim/electrical/generator_1_toggle    
    label: ALT 1
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[0]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[0]} 1 eq

  - index: 5
    vibrate: SHORT
    type: push
    command: sim/electrical/generator_2_toggle    
    label: ALT 2
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[1]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[1]} 1 eq


  - index: 7
    name: switches2
    type: page
    vibrate: SHORT
    page: switches2
    label: SWITCHES 2
    label-size: 11
    text: →
    text-font: fontawesome.otf
    text-size: 40
    text-color: Gold

  - index: 6
    type: push
    vibrate: SHORT
    command: sim/flight_controls/park_brake_valve_toggle
    label: PARK BRAKE
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq

  - index: 8
    vibrate: SHORT
    type: push
    command: laminar/sr22/fuel_sel_left_off    
    label: FUEL OFF
    annunciator:
      model: B
      size: medium
      B0:
        led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 0 eq not
      B1:
        text: "OFF"
        color: red
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 0 eq

  - index: 9
    vibrate: SHORT
    type: push
    command: laminar/sr22/fuel_sel_left_select 
    label: FUEL LEFT
    annunciator:
      model: B
      size: medium
      B0:
        led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq not
      B1:
        text: "SELECTED"
        color: deepskyblue
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq

  - index: 10
    vibrate: SHORT
    type: push
    command: laminar/sr22/fuel_sel_right_select 
    label: FUEL RIGHT
    annunciator:
      model: B
      size: medium
      B0:
        led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 2 eq not
      B1:
        text: "SELECTED"
        color: deepskyblue
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 2 eq


  - index: 11
    vibrate: SHORT
    type: push
    command: laminar/sr22/fuel_sel_right_off    
    label: FUEL OFF
    annunciator:
      model: B
      size: medium
      B0:
        led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 3 eq not
      B1:
        text: "OFF"
        color: red
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 3 eq
