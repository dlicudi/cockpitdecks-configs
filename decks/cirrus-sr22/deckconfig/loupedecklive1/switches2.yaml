description: Lights, Icing & Parking Brake
includes: pager,encoders/encoders_fcu
name: switches2

buttons:

  # --- Lights ---
  - index: 0
    type: push
    command: sim/lights/nav_lights_toggle
    label: NAV
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq

  - index: 1
    type: push
    command: sim/lights/strobe_lights_toggle
    label: STROBE
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq

  - index: 2
    type: push
    label: LAND
    command: sim/lights/landing_01_light_tog
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 1 eq

  - index: 3
    type: push
    label: ICE
    command: sim/lights/generic_01_light_tog
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/generic_lights_switch[0]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/generic_lights_switch[0]} 1 eq

  # --- Icing ---
  - index: 4
    type: push
    command: sim/ice/pitot_heat0_tog
    label: PITOT
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq

  - index: 5
    type: onoff
    label: ICE PROTECT
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${laminar/sr22/switch/ice_protect} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${laminar/sr22/switch/ice_protect} 1 eq
    set-dataref: laminar/sr22/switch/ice_protect
    initial-value: 0

  - index: 6
    type: onoff
    label: PUMP BKUP
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/ice/tks_backup_pump} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/ice/tks_backup_pump} 1 eq
    set-dataref: sim/cockpit2/ice/tks_backup_pump

  - index: 7
    type: onoff
    label: NORM/HIGH
    annunciator:
      model: B
      size: medium
      B0:
        text: "NORM"
        color: darkorange
        formula: ${laminar/sr22/switch/ice_norm_high} 0 eq
      B1:
        text: "HIGH"
        color: deepskyblue
        framed: true
        formula: ${laminar/sr22/switch/ice_norm_high} 1 eq
    set-dataref: laminar/sr22/switch/ice_norm_high

  - index: 8
    type: push
    command: sim/ice/prop_heat_tog
    label: PROP
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_prop_heat} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_prop_heat} 1 eq

  - index: 9
    type: push
    command: sim/ice/window_heat_tog
    label: WSHLD
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_window_heat} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_window_heat} 1 eq

  # --- Parking brake ---
  - index: 10
    type: push
    vibrate: SHORT
    command: sim/flight_controls/park_brake_valve_toggle
    label: PARK BRAKE
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq

  # --- Back to Switches ---
  - index: 11
    name: Switches
    type: page
    page: switches
    label: SWITCHES
    label-size: 12
    text: ""
    text-font: fontawesome.otf
    text-size: 40
    text-color: Gold
