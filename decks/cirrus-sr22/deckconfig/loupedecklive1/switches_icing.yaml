description: Ice Protection
includes: pager,encoders/fcu
name: switches_icing

buttons:

- index: 0
  type: push
  vibrate: SHORT
  command: sim/ice/pitot_heat0_tog
  label: PITOT
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq

- index: 1
  type: onoff
  vibrate: SHORT
  formula: ${laminar/sr22/switch/ice_protect}
  label: ICE PROTECT
  label-size: 10
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: "OFF"
        color: darkorange
        formula: ${laminar/sr22/switch/ice_protect} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${laminar/sr22/switch/ice_protect} 1 eq
  command-on: laminar/sr22/switch/ice_protect_on
  command-off: laminar/sr22/switch/ice_protect_off
  initial-value: 0

- index: 2
  type: onoff
  vibrate: SHORT
  formula: ${laminar/sr22/switch/ice_norm_high}
  label: NORM/HIGH
  label-size: 10
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: "NORM"
        color: darkorange
        formula: ${laminar/sr22/switch/ice_norm_high} 0 eq
      B1:
        text: "HIGH"
        color: deepskyblue
        framed: true
        formula: ${laminar/sr22/switch/ice_norm_high} 1 eq
  command-on: laminar/sr22/switch/ice_protect_high
  command-off: laminar/sr22/switch/ice_protect_norm

- index: 3
  type: begin-end-command
  vibrate: LONG
  label: MAX
  command: laminar/sr22/anti_ice_tks_max
  annunciator:
    model: A
    size: medium
    parts:
      A0:
        text: "ON"
        text-size: 47
        text-font: D-DIN-Bold.otf
        text-color: white
        off-color: "#1a1a1a"
        formula: ${laminar/sr22/switch/ice_max}

- index: 4
  type: onoff
  vibrate: SHORT
  label: PUMP BKUP
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/ice/tks_backup_pump} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/ice/tks_backup_pump} 1 eq
  command-on: sim/ice/tks_bkup_on
  command-off: sim/ice/tks_bkup_off

- index: 5
  type: push
  vibrate: SHORT
  command: sim/ice/window_heat_tog
  label: WSHLD
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_window_heat} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_window_heat} 1 eq

  # Nav row
- index: 8
  type: page
  page: switches_master
  vibrate: SHORT
  text: MASTER
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)

- index: 9
  type: page
  page: switches_lights
  vibrate: SHORT
  text: LIGHTS
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)

- index: 10
  type: none
  text: ICE
  text-color: Gold
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (40, 35, 0)

- index: 11
  type: page
  page: switches_ground
  vibrate: SHORT
  text: GROUND
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)
