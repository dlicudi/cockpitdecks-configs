description: Switch Panel
includes: pager,encoders/encoders_fcu
name: lights


buttons:


  - index: 0
    type: push
    command: sim/lights/nav_lights_toggle
    label: NAV
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq

  - index: 1
    type: push
    command: sim/lights/strobe_lights_toggle
    label: STROBE
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq


  - index: 2
    type: push
    label: LAND
    command: sim/lights/landing_01_light_tog    
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} 1 eq


  - index: 3
    type: push
    label: READ 1
    command: sim/lights/generic_01_light_tog
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/generic_lights_switch[0]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/generic_lights_switch[0]} 1 eq

  # --- Internal ---
  - index: 4
    type: push
    vibrate: SHORT
    label: DOME
    command: sim/lights/generic_05_light_tog
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/generic_lights_switch[4]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/generic_lights_switch[4]} 1 eq

  - index: 5
    type: push
    vibrate: SHORT
