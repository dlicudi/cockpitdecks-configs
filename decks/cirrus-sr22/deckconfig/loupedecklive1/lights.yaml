    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/generic_lights_switch[6]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/generic_lights_switch[6]} 1 eq

  - index: 6
    type: push
    vibrate: SHORT
    label: READ 2
    command: sim/lights/generic_02_light_tog
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/switches/generic_lights_switch[1]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/generic_lights_switch[1]} 1 eq

  - index: 7
