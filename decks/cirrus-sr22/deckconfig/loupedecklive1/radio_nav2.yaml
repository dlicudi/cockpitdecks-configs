name: radio_nav2
includes: pager,encoders/encoders_nav2

buttons:

  - index: 0
    name: NAV2_STDBY
    label: "STDBY"
    label-color: white
    type: push
    vibrate: SHORT
    render-cooldown-ms: 50
    command: sim/radios/nav2_standy_flip
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: cyan
          text-size: 80
          text-font: D-DINCondensed.otf
          formula: "${sim/cockpit/radios/nav2_stdby_freq_hz} 100 /"
          text: "${formula}"
          text-format: "{0:.2f}"

  - index: 1
    name: NAV2_FLIPFLOP
    label: "FLIP FLOP"
    label-color: white
    type: push
    vibrate: SHORT
    command: sim/radios/nav2_standy_flip
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: white
          text-size: 240
          text-font: DejaVuSans.ttf
          formula: 1
          text: "↔"
          frame: false

  - index: 2
    name: NAV2_ACTIVE
    label: "NAV2"
    label-color: white
    type: none
    render-cooldown-ms: 50
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 80
          text-font: D-DINCondensed.otf
          formula: "${sim/cockpit/radios/nav2_freq_hz} 100 /"
          text: "${formula}"
          text-format: "{0:.2f}"

  - index: 3
    name: NAV2_AUDIO
    type: push
    vibrate: SHORT
    label: AUDIO
    label-color: white
    command: sim/audio_panel/select_audio_nav2
    annunciator:
      model: A
      size: medium
      parts:
        A0:
          led: dot
          color: deepskyblue
          formula: ${laminar/sr22/annunciators/audio/nav2}

  # Nav row
  - index: 8
    type: page
    page: radio_com1
    vibrate: SHORT
    text: COM1
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)

  - index: 9
    type: page
    page: radio_com2
    vibrate: SHORT
    text: COM2
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)

  - index: 10
    type: page
    page: radio_nav1
    vibrate: SHORT
    text: NAV1
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)

  - index: 11
    type: none
    text: NAV2
    text-color: Gold
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (40, 35, 0)
