name: radio_nav2
includes:
- pager
- encoders/nav2
buttons:
- index: 0
  name: NAV2_STDBY
  label: STDBY
  label-color: white
  vibrate: SHORT
  render-cooldown-ms: 50
  annunciator:
    size: medium
    model: A
    parts:
    - color: cyan
      text-size: 30
      text-font: D-DINCondensed.otf
      formula: ${sim/cockpit/radios/nav2_stdby_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/nav2_standy_flip
- index: 1
  name: NAV2_FLIPFLOP
  label: FLIP FLOP
  label-color: white
  vibrate: SHORT
  annunciator:
    size: medium
    model: A
    parts:
    - color: white
      text-size: 91
      text-font: DejaVuSans.ttf
      formula: 1
      text: ↔
      frame: false
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/nav2_standy_flip
- index: 2
  name: NAV2_ACTIVE
  label: NAV2
  label-color: white
  render-cooldown-ms: 50
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 30
      text-font: D-DINCondensed.otf
      formula: ${sim/cockpit/radios/nav2_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
  activation: none
  representation: annunciator
- index: 3
  name: NAV2_AUDIO
  vibrate: SHORT
  label: AUDIO
  label-color: white
  annunciator:
    model: A
    size: medium
    parts:
    - led: dot
      color: deepskyblue
      formula: ${laminar/sr22/annunciators/audio/nav2}
  activation: push
  representation: annunciator
  commands:
    press: sim/audio_panel/select_audio_nav2
- index: 8
  page: radio_com1
  vibrate: SHORT
  text: COM1
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)
  activation: page
  representation: text
- index: 9
  page: radio_com2
  vibrate: SHORT
  text: COM2
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)
  activation: page
  representation: text
- index: 10
  page: radio_nav1
  vibrate: SHORT
  text: NAV1
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)
  activation: page
  representation: text
- index: 11
  text: NAV2
  text-color: Gold
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (40, 35, 0)
  activation: none
  representation: text
