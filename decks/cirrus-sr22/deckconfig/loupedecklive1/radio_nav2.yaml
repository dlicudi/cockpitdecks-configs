name: radio_nav2
includes: pager,encoders/encoders_nav2

buttons:

  - index: 0
    name: NAV2_STDBY
    label: "STDBY"
    label-color: white
    type: push
    vibrate: SHORT
    command: sim/radios/nav2_standy_flip
    annunciator:
      size: medium
      model: D
      parts:
        D0:
          color: cyan
          text-size: 80
          text-font: D-DINCondensed.otf
          formula: "${sim/cockpit/radios/nav2_stdby_freq_hz} 100 /"
          text: "${formula}"
          text-format: "{0:.2f}"

  - index: 1
    name: NAV2_ACTIVE
    label: "NAV2"
    label-color: white
    type: push
    vibrate: SHORT
    command: sim/radios/nav2_standy_flip
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 80
          text-font: D-DINCondensed.otf
          formula: "${sim/cockpit/radios/nav2_freq_hz} 100 /"
          text: "${formula}"
          text-format: "{0:.2f}"
        B1:
          color: darkgrey
          text-size: 64
          text-font: DejaVuSans.ttf
          formula: "1"
          text: "⇄"

  # Nav row
  - index: 8
    type: page
    page: radio_com1
    vibrate: SHORT
    text: COM1
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)

  - index: 9
    type: page
    page: radio_com2
    vibrate: SHORT
    text: COM2
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)

  - index: 10
    type: page
    page: radio_nav1
    vibrate: SHORT
    text: NAV1
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)

  - index: 11
    type: none
    text: NAV2
    text-color: Gold
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (40, 35, 0)
