name: fms_route
includes: pager,encoders/encoders_fms_route

buttons:

# ============================================================
# ACTIVE ROUTE OVERVIEW
# Question: What route is currently loaded and where am I in it?
# Primary object: ActiveRoute
# E2 (e0) turn: pre-scroll legs (sets displayed index)
# Columns 1/2/3 are spatially coherent: ident above altitude at same fix
# ============================================================

# Row 1: Three-point spatial summary (origin → active waypoint → destination)

- index: 0
  name: FMS_ORIG
  type: none
  render-cooldown-ms: 500
  label: ORIG
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_first_ident}"
  text-color: deepskyblue
  text-size: 24
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 1
  name: FMS_ACT
  type: none
  render-cooldown-ms: 500
  label: ">WPT"
  label-size: 9
  label-color: lime
  text: "${cockpitdecks/fms_browser/fms_active_ident}"
  text-color: lime
  text-size: 24
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 2
  name: FMS_DEST
  type: none
  render-cooldown-ms: 500
  label: DEST
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_last_ident}"
  text-color: deepskyblue
  text-size: 24
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 3
  name: FMS_LDIST
  type: none
  render-cooldown-ms: 500
  label: NM
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/loaded_distance_nm}\nnm"
  text-format: "{0:.0f}"
  text-color: white
  text-size: 24
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 2: Altitude at each of the three fix points + total leg count
# Columns align vertically with Row 1: ident above altitude at same fix

- index: 4
  name: FMS_ORIG_ALT
  type: none
  render-cooldown-ms: 500
  label: DEP ALT
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_first_altitude}\nft"
  text-color: darkorange
  text-size: 22
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 5
  name: FMS_ACT_ALT
  type: none
  render-cooldown-ms: 500
  label: CRZ ALT
  label-size: 9
  label-color: lime
  text: "${cockpitdecks/fms_browser/fms_active_altitude}\nft"
  text-color: darkorange
  text-size: 22
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 6
  name: FMS_DEST_ALT
  type: none
  render-cooldown-ms: 500
  label: ALDEST ALT
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_last_altitude}\nft"
  text-color: darkorange
  text-size: 22
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 7
  name: FMS_LEGS
  type: none
  render-cooldown-ms: 500
  label: LEGS
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_entry_count}"
  text-color: white
  text-size: 32
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 3: Progress index — active leg position within route

- index: 8
  name: FMS_R3_A
  type: none

- index: 9
  name: FMS_PROG_IDX
  type: none
  render-cooldown-ms: 500
  label: LEG
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_active_index}"
  text-color: white
  text-size: 40
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 10
  name: FMS_PROG_OF
  type: none
  render-cooldown-ms: 500
  label: OF
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_entry_count}"
  text-color: white
  text-size: 40
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 11
  name: FMS_R3_B
  type: none
