name: fms_edit
includes: pager,encoders/encoders_fms_edit

buttons:

# Row 1: Selected WP + actions

- index: 0
  name: WP_DISPLAYED
  type: none
  label: SELECTED
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_displayed_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 20
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_displayed_altitude}ft"
      text-font: B612Mono-Regular.ttf
      text-size: 14
      color: darkorange
      formula: "1"

- index: 1
  name: WP_DISPLAYED_INDEX
  type: none
  label: INDEX
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_displayed_index}/${cockpitdecks/fms_browser/fms_entry_count}"
  text-color: white
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 2
  name: WP_DIRECT
  type: push
  label: DIRECT
  label-size: 9
  label-color: Gold
  text: "-D->"
  text-color: lime
  text-size: 24
  text-font: D-DIN-Bold.otf
  text-position: cm
  text-bg-color: (18, 28, 18)
  command: cockpitdecks/fms_browser/wp_direct

- index: 3
  name: WP_CLEAR
  type: push
  label: CLEAR
  label-size: 9
  label-color: Gold
  text: "CLR"
  text-color: red
  text-size: 20
  text-font: D-DIN-Bold.otf
  text-position: cm
  text-bg-color: (28, 18, 18)
  command: cockpitdecks/fms_browser/clear_fms_entry

# Row 2: Active WP + nav info

- index: 4
  name: WP_ACTIVE
  type: none
  label: ACTIVE
  label-size: 9
  label-color: lime
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_active_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 20
      color: lime
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_active_index}/${cockpitdecks/fms_browser/fms_entry_count}"
      text-font: B612Mono-Regular.ttf
      text-size: 14
      color: darkorange
      formula: "1"

- index: 5
  name: WP_ACTIVE_INFO
  type: none
  label: NAV
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${sim/cockpit2/radios/indicators/gps_dme_distance_nm}nm"
      text-font: B612Mono-Regular.ttf
      text-size: 14
      color: white
      formula: "1"
    B1:
      text: "${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}"
      text-font: B612Mono-Regular.ttf
      text-size: 14
      color: darkorange
      formula: "1"

- index: 6
  name: FMS_DEP
  type: none
  label: DEP
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_departure}"
      text-font: B612Mono-Regular.ttf
      text-size: 36
      color: deepskyblue
      formula: "1"
    B1:
      text: "RW${cockpitdecks/fms_browser/plan_dep_runway}"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: darkorange
      formula: "1"

- index: 7
  name: FMS_DEST
  type: none
  label: DEST
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_destination}"
      text-font: B612Mono-Regular.ttf
      text-size: 36
      color: deepskyblue
      formula: "1"
    B1:
      text: "RW${cockpitdecks/fms_browser/plan_dest_runway}"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: darkorange
      formula: "1"

# Row 3: Route info + navigation

- index: 8
  name: FMS_ROUTE_INFO
  type: none
  label: ROUTE
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_distance_nm}nm"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_entry_count} wpts"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: darkorange
      formula: "1"

- index: 9
  name: FMS_PLAN_NAME
  type: none
  label: PLAN
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_name}"
  text-color: deepskyblue
  text-size: 14
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 10
  type: page
  page: fms
  text: "TRACK"
  text-color: khaki
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (40, 30, 40)

- index: 11
  type: page
  page: fms_load
  text: "LOAD"
  text-color: khaki
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (40, 30, 40)
