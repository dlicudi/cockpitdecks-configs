description: Ground Operations
includes: pager,encoders/fcu
name: switches_ground

buttons:

- index: 6
  type: push
  vibrate: SHORT
  command: laminar/sr22/fuel_sel_left_off
  label: FUEL OFF
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq ${laminar/sr22/fuel_selector_pos} 2 eq +
      B1:
        text: "OFF"
        color: red
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 0 eq ${laminar/sr22/fuel_selector_pos} 3 eq +

- index: 0
  type: push
  vibrate: SHORT
  command: laminar/sr22/fuel_sel_left_select
  label: FUEL LEFT
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq not
      B1:
        text: "SELECTED"
        color: deepskyblue
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq

- index: 1
  type: push
  vibrate: SHORT
  command: laminar/sr22/fuel_sel_right_select
  label: FUEL RIGHT
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 2 eq not
      B1:
        text: "SELECTED"
        color: deepskyblue
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 2 eq

- index: 5
  type: onoff
  vibrate: SHORT
  set-dataref: sim/cockpit2/engine/actuators/fuel_pump_on[0]
  label: BOOST PUMP
  label-size: 10
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/engine/actuators/fuel_pump_on[0]} 0 eq
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/engine/actuators/fuel_pump_on[0]} 1 eq

- index: 4
  type: push
  vibrate: SHORT
  command: sim/flight_controls/park_brake_valve_toggle
  label: PARK BRAKE
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
      B1:
        text: "ON"
        color: red
        framed: true
        formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq

- index: 2
  type: push
  vibrate: SHORT
  command: sim/engines/mixture_max
  label: MAX MIXTURE
  annunciator:
    model: B
    size: medium
    parts:
      B0:
        text: "OFF"
        color: darkorange
        formula: ${sim/cockpit2/engine/actuators/mixture_ratio[0]} 1 lt
      B1:
        text: "ON"
        color: green
        framed: true
        formula: ${sim/cockpit2/engine/actuators/mixture_ratio[0]} 1 eq

- index: 3
  name: ENGINE START
  type: begin-end-command
  vibrate: LONG
  command: sim/starters/engage_starter_1
  multi-icons:
  - ENGINE_START.png
  - ENGINE_START.png
  - ENGINE_START.png
  - ENGINE_START.png
  - ENGINE_START_PRESSED.png
  formula: ${sim/cockpit2/engine/actuators/ignition_key[0]}

  # Nav row
- index: 8
  type: page
  page: switches_master
  vibrate: SHORT
  text: MASTER
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)

- index: 9
  type: page
  page: switches_lights
  vibrate: SHORT
  text: LIGHTS
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)

- index: 10
  type: page
  page: switches_icing
  vibrate: SHORT
  text: ICE
  text-color: khaki
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 20)

- index: 11
  type: none
  text: GROUND
  text-color: Gold
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (40, 35, 0)
