description: Lights
includes:
- includes/pager
- includes/encoder_fcu
name: switches_lights
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/lights/nav_lights_toggle
  representation:
    type: annunciator
    label: NAV
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
  vibrate: SHORT
- index: 1
  activation:
    type: push
    commands:
