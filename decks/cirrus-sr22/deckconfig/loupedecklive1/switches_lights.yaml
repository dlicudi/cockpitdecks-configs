description: Lights
includes:
- pager
- encoders/fcu
name: switches_lights
buttons:
- index: 0
  vibrate: SHORT
  label: NAV
  annunciator:
    model: B
    size: medium
    parts:
    - text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
    - text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/nav_lights_toggle
- index: 1
  vibrate: SHORT
  label: STROBE
