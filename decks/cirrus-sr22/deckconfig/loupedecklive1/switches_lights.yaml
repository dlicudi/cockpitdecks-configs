  # Nav row
  - index: 8
    type: page
    page: switches_master
    vibrate: SHORT
    text: MASTER
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)

  - index: 9
    type: none
    text: LIGHTS
    text-color: Gold
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (40, 35, 0)

  - index: 10
