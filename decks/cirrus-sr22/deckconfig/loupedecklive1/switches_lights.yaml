description: Lights
includes: pager,encoders/encoders_fcu
name: switches_lights

buttons:

  - index: 0
    type: push
    vibrate: SHORT
    command: sim/lights/nav_lights_toggle
    label: NAV
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: "${sim/cockpit2/switches/navigation_lights_on} 0 eq"
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: "${sim/cockpit2/switches/navigation_lights_on} 1 eq"

  - index: 1
    type: push
    vibrate: SHORT
    command: sim/lights/strobe_lights_toggle
    label: STROBE
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: "${sim/cockpit2/switches/strobe_lights_on} 0 eq"
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: "${sim/cockpit2/switches/strobe_lights_on} 1 eq"

  - index: 2
    type: push
    vibrate: SHORT
    label: LAND
    command: sim/lights/landing_01_light_tog
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: "${sim/cockpit2/switches/landing_lights_switch[0]} 0 eq"
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: "${sim/cockpit2/switches/landing_lights_switch[0]} 1 eq"

  - index: 3
    type: push
    vibrate: SHORT
    label: ICE
    command: sim/lights/generic_13_light_tog
    annunciator:
      model: B
      size: medium
      B0:
        text: "OFF"
        color: darkorange
        formula: "${sim/cockpit2/switches/generic_lights_switch[12]} 0 eq"
      B1:
        text: "ON"
        color: deepskyblue
        framed: true
        formula: "${sim/cockpit2/switches/generic_lights_switch[12]} 1 eq"

  - index: 4
    type: push
    vibrate: SHORT
    label: DOME
    command: sim/lights/generic_05_light_tog
    annunciator:
      model: B
