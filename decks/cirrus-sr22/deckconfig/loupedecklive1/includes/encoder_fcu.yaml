screen:
  background: Black
  render-cooldown-ms: 100
buttons:
- index: e0
  name: throttle_encoder
  activation:
    type: encoder-push
    commands:
      cw: sim/engines/throttle_up
      ccw: sim/engines/throttle_down
      press: sim/engines/throttle_full
      long-press: sim/engines/throttle_idle
  representation:
    type: side-display
    label: THR
    label-size: 20
    text: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
    text-size: 18
    text-format: '{0:01.0f}%'
- index: e1
  name: FCU Heading
  activation:
    type: encoder-push
    commands:
      cw: sim/autopilot/heading_up
      ccw: sim/autopilot/heading_down
      press: sim/autopilot/heading_sync
      long-press: sim/autopilot/servos_toggle
  representation:
    type: side-display
    label: HDG
    label-size: 20
    text: ${sim/cockpit/autopilot/heading_mag}
    text-size: 18
    text-format: '{0:00.0f}'
- index: e2
  name: FCU Baro
  activation:
    type: encoder-push
    commands:
      cw: sim/instruments/barometer_up
      ccw: sim/instruments/barometer_down
      press: sim/instruments/barometer_std
  representation:
    type: side-display
    label: QNH
    label-size: 20
    text: ${sim/cockpit/misc/barometer_setting}
    text-size: 18
    text-format: '{0:01.2f}'
- index: e3
  name: alt_encoder
  activation:
    type: encoder-mode
    commands:
      cw: sim/autopilot/altitude_up
      ccw: sim/autopilot/altitude_down
      cw-off: sim/autopilot/altitude_up
      ccw-off: sim/autopilot/altitude_down
      long-press: sim/autopilot/altitude_sync
  representation:
    type: side-display
    label: ALT
    label-size: 20
    text: ${sim/cockpit2/autopilot/altitude_dial_ft}
    text-size: 18
    text-format: '{0:04.0f}'
- index: e4
  name: FCU V Speed
  activation:
    type: encoder-push
    commands:
      cw: sim/autopilot/vertical_speed_up
      ccw: sim/autopilot/vertical_speed_down
      press: sim/autopilot/vertical_speed_sync
  representation:
    type: side-display
    label: VS
    label-size: 20
    text: ${sim/cockpit/autopilot/vertical_velocity} 100 /
    text-size: 18
    text-format: '{0:.0f}'
- index: e5
  name: mixture_encoder
  activation:
    type: encoder-push
    commands:
      cw: sim/engines/mixture_up
      ccw: sim/engines/mixture_down
      press: sim/engines/mixture_max
  representation:
    type: side-display
    label: MIX
    label-size: 20
    text: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
    text-size: 18
    text-format: '{0:01.0f}%'
