name: fms
includes: pager,encoders/encoders_fms

buttons:

# ============================================================
# Flight Plan Browser & Preview
# Everything here reflects the BROWSED plan (e4 to browse)
# Push e4 to load selected plan into FMS
# ============================================================

# Row 1: Plan identity + route

- index: 0
  name: FMS_SEL
  type: none
  label: SEL
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_filename}"
      text-font: D-DINCondensed.otf
      text-size: 30
      color: darkorange
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/index}/${cockpitdecks/fms_browser/count}"
      text-font: B612Mono-Regular.ttf
      text-size: 44
      color: white
      formula: "1"

- index: 1
  name: FMS_DEP
  type: none
  label: DEP
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_departure}"
      text-font: B612Mono-Regular.ttf
      text-size: 56
      color: deepskyblue
      formula: "1"
    B1:
      text: "RW${cockpitdecks/fms_browser/plan_dep_runway}"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      color: darkorange
      formula: "1"

- index: 2
  name: FMS_DEST
  type: none
  label: DEST
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_destination}"
      text-font: B612Mono-Regular.ttf
      text-size: 56
      color: deepskyblue
      formula: "1"
    B1:
      text: "RW${cockpitdecks/fms_browser/plan_dest_runway}"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      color: darkorange
      formula: "1"

- index: 3
  name: FMS_CYCLE
  type: none
  label: CYCLE
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_cycle}"
  text-color: white
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 2: Plan details

- index: 4
  name: FMS_DIST
  type: none
  label: DIST
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_distance_nm}\nnm"
  text-format: "{0:.0f}"
  text-color: white
  text-size: 24
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 5
  name: FMS_WPTS
  type: none
  label: WPTS
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_waypoint_count}"
  text-color: white
  text-size: 24
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 6
  name: FMS_ALT
  type: none
  label: MAX FL
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_max_altitude}\nft"
  text-color: white
  text-size: 24
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 7
  name: FMS_NAME
  type: none
  label: ROUTE
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_name}"
  text-color: darkorange
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 3: Procedures + loaded plan reference

- index: 8
  name: FMS_SID
  type: none
  label: SID
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_sid}"
  text-color: white
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 9
  name: FMS_STAR
  type: none
  label: STAR
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_star}"
  text-color: darkorange
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 10
  name: FMS_STATUS
  type: none
  label: STATUS
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/status}"
  text-color: lime
  text-size: 18
  text-font: D-DIN-Bold.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 11
  name: FMS_LOADED
  type: none
  label: LOADED
  label-size: 9
  label-color: lime
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/loaded_filename}"
      text-font: D-DINCondensed.otf
      text-size: 30
      color: lime
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/loaded_index}/${cockpitdecks/fms_browser/count}"
      text-font: B612Mono-Regular.ttf
      text-size: 44
      color: white
      formula: "1"
