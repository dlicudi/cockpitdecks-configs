name: fms
includes: pager,encoders/encoders_fms

buttons:

# Row 1: Plan → DEP → Active → DEST (real-time FMS state)

- index: 0
  name: FMS_PLAN
  type: none
  label: PLAN
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/loaded_filename}"
      text-font: B612Mono-Regular.ttf
      text-size: 30
      color: darkorange
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/loaded_index}/${cockpitdecks/fms_browser/count}"
      text-font: B612Mono-Regular.ttf
      text-size: 44
      color: white
      formula: "1"

- index: 1
  name: FMS_DEP
  type: none
  label: DEP
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_first_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 56
      color: deepskyblue
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_first_altitude}ft"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      color: darkorange
      formula: "1"

- index: 2
  name: FMS_ACTIVE_WP
  type: none
  label: ACTIVE
  label-size: 9
  label-color: lime
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_active_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      color: lime
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_active_altitude}ft"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      color: darkorange
      formula: "1"

- index: 3
  name: FMS_DEST
  type: none
  label: DEST
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_last_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 56
      color: deepskyblue
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_last_altitude}ft"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      color: darkorange
      formula: "1"

# Row 2: Live nav data + displayed WP

- index: 4
  name: FMS_DIST_ETE
  type: none
  label: DIST/ETE
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${sim/cockpit2/radios/indicators/gps_dme_distance_nm}nm"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      text-format: "{0:.1f}"
      color: white
      formula: "1"
    B1:
      text: "${sim/cockpit2/radios/indicators/gps_dme_time_min}min"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      text-format: "{0:.0f}"
      color: darkorange
      formula: "1"

- index: 5
  name: FMS_GS_DTK
  type: none
  label: GS/DTK
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${sim/cockpit2/gauges/indicators/ground_speed_kt}kts"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      text-format: "{0:.0f}"
      color: white
      formula: "1"
    B1:
      text: "${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      text-format: "{0:.0f}"
      color: darkorange
      formula: "1"

- index: 6
  name: FMS_TOD
  type: none
  label: TOD
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/radios/indicators/fms_distance_to_tod_pilot}\nnm"
  text-format: "{0:.1f}"
  text-color: white
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 7
  name: FMS_DISPLAYED_WP
  type: none
  label: WPT SEL
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_displayed_ident}"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/fms_displayed_index}/${cockpitdecks/fms_browser/fms_entry_count}"
      text-font: B612Mono-Regular.ttf
      text-size: 44
      color: darkorange
      formula: "1"

# Row 3: Progress + procedures + actions

- index: 8
  name: FMS_PROGRESS
  type: none
  label: PROGRESS
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/fms_active_index}/${cockpitdecks/fms_browser/fms_entry_count}"
      text-font: B612Mono-Regular.ttf
      text-size: 56
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_distance_nm}nm"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      text-format: "{0:.0f}"
      color: darkorange
      formula: "1"

- index: 9
  name: FMS_SID_STAR
  type: none
  label: SID/STAR
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_sid}"
      text-font: B612Mono-Regular.ttf
      text-size: 30
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_star}"
      text-font: B612Mono-Regular.ttf
      text-size: 30
      color: darkorange
      formula: "1"

- index: 10
  name: FMS_ETA_MAP
  type: none
  label: ETA/MAP
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${sim/cockpit2/radios/indicators/fms1_act_eta_hour}:${sim/cockpit2/radios/indicators/fms1_act_eta_minute}Z"
      text-font: B612Mono-Regular.ttf
      text-size: 38
      color: darkorange
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/map_mode}"
      text-font: D-DIN-Bold.otf
      text-size: 30
      color: deepskyblue
      formula: "1"

- index: 11
  name: FMS_LOAD_PLAN
  type: none
  label: LOAD PLAN
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_filename}"
      text-font: B612Mono-Regular.ttf
      text-size: 30
      color: darkorange
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/index}/${cockpitdecks/fms_browser/count}"
      text-font: B612Mono-Regular.ttf
      text-size: 44
      color: white
      formula: "1"
