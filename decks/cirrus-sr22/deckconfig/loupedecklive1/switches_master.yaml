description: Master Electrical
includes:
- pager
- encoders/fcu
name: switches_master
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/electrical/battery_2_toggle
  representation:
    type: annunciator
    label: BAT 2
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[1]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[1]} 1 eq
  vibrate: SHORT
- index: 1
  activation:
    type: push
    commands:
      press: sim/electrical/battery_1_toggle
  representation:
    type: annunciator
    label: BAT 1
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq
  vibrate: SHORT
- index: 2
  activation:
    type: push
    commands:
      press: sim/electrical/generator_1_toggle
  representation:
    type: annunciator
    label: ALT 1
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[0]} 1 eq
  vibrate: SHORT
- index: 3
  activation:
    type: push
    commands:
      press: sim/electrical/generator_2_toggle
  representation:
    type: annunciator
    label: ALT 2
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[1]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[1]} 1 eq
  vibrate: SHORT
- index: 4
  activation:
    type: push
    commands:
      press: sim/systems/avionics_toggle
  representation:
    type: annunciator
    label: AVIONICS
    label-size: 10
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/electrical/avionics_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/electrical/avionics_on} 1 eq
  vibrate: SHORT
- index: 5
  activation:
    type: push
    commands:
      press: sim/flight_controls/flaps_up
  representation:
    type: text
    text: UP
    text-color: Lime
    text-bg-color: Black
  vibrate: SHORT
- index: 6
  activation:
    type: none
  representation:
    type: annunciator
    label: FLAPS
    label-size: 8
    annunciator:
      model: F
      size: medium
      parts:
      - text: CRUISE
        text-color: '#ffffff'
        on-color: deepskyblue
        off-color: '#000000'
        text-size: 11
        formula: ${laminar/sr22/annunciators/flaps_up} 1 eq
      - text: TAKE OFF
        text-color: '#ffffff'
        on-color: deepskyblue
        off-color: '#000000'
        text-size: 11
        formula: ${laminar/sr22/annunciators/flaps_50} 1 eq
      - text: LANDING
        text-color: '#ffffff'
        on-color: deepskyblue
        off-color: '#000000'
        text-size: 11
        formula: ${laminar/sr22/annunciators/flaps_100} 1 eq
- index: 7
  activation:
    type: push
    commands:
      press: sim/flight_controls/flaps_down
  representation:
    type: text
    text: DOWN
    text-color: Lime
    text-bg-color: Black
- index: 8
  activation:
    type: none
  representation:
    type: text
    text: MASTER
    text-color: Gold
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (40, 35, 0)
- index: 9
  activation:
    type: page
    page: switches_lights
  representation:
    type: text
    text: LIGHTS
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 10
  activation:
    type: page
    page: switches_icing
  representation:
    type: text
    text: ICE
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 11
  activation:
    type: page
    page: switches_ground
  representation:
    type: text
    text: GROUND
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
