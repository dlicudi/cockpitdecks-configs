name: gcu479
includes:
- pager
- encoders/gcu479
buttons:
- index: 0
  name: DIRECT
  activation:
    type: push
    commands:
      press: sim/GPS/gcu478/direct
  representation:
    type: text
    text: DIRECT
    text-color: white
    text-size: 9
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
- index: 1
  name: MENU
