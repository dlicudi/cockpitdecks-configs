name: radio_nav1
includes:
- includes/pager
- includes/encoder_nav1
buttons:
- index: 0
  name: NAV1_STDBY
  activation:
    type: push
    commands:
      press: sim/GPS/g1000n3_nav_ff
  representation:
    type: annunciator
    label: STDBY
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 30
        text-font: D-DINCondensed.otf
        formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
  vibrate: SHORT
  render-cooldown-ms: 50
- index: 1
  name: NAV1_FLIPFLOP
  activation:
    type: push
    commands:
      press: sim/GPS/g1000n3_nav_ff
  representation:
    type: annunciator
    label: FLIP FLOP
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: white
        text-size: 91
        text-font: DejaVuSans.ttf
        formula: 1
        text: ↔
        frame: false
  vibrate: SHORT
- index: 2
  name: NAV1_ACTIVE
  activation:
    type: none
  representation:
    type: annunciator
    label: NAV1
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 30
        text-font: D-DINCondensed.otf
        formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
  render-cooldown-ms: 50
- index: 3
  name: NAV1_AUDIO
  activation:
    type: push
    commands:
      press: sim/audio_panel/select_audio_nav1
  representation:
    type: annunciator
    label: AUDIO
    label-color: white
    annunciator:
      model: A
      size: medium
      parts:
      - led: dot
        color: deepskyblue
        formula: ${laminar/sr22/annunciators/audio/nav1}
  vibrate: SHORT
- index: 8
  activation:
    type: page
    page: radio_com1
  representation:
    type: text
    text: COM1
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 9
  activation:
    type: page
    page: radio_com2
  representation:
    type: text
    text: COM2
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 10
  activation:
    type: none
  representation:
    type: text
    text: NAV1
    text-color: Gold
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (40, 35, 0)
- index: 11
  activation:
    type: page
    page: radio_nav2
  representation:
    type: text
    text: NAV2
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
