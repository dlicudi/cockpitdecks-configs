# DEP — Departure procedure browser (SIDs).
# Browse with E0 (page scroll) or E1 (row select within page).
# Activate selected SID with E3 push.
# Col0: row index | Col1: procedure name (tap to select) | Col2: runway | Col3: UP / status / DN
name: fms_proc_dep
includes: pager,encoders/fms_proc_dep

buttons:

# ── Row 1 ────────────────────────────────────────────────────
- index: 0
  name: DEP_R1_IDX
  type: none
  dataref: cockpitdecks/fms/dep/list_row_1_is_selected
  render-cooldown-ms: 80
  label: "#"
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms/dep/list_row_1_index}"
      text-color: white
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms/dep/list_row_1_index}"
      text-color: white
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 1
  name: DEP_R1_NAME
  type: push
  command: cockpitdecks/fms/dep/select_row_1
  dataref: cockpitdecks/fms/dep/list_row_1_is_selected
  vibrate: SHORT
  render-cooldown-ms: 80
  label: SID
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms/dep/list_row_1_name}"
      text-color: white
      text-size: 20
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms/dep/list_row_1_name}"
      text-color: white
      text-size: 20
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 2
  name: DEP_R1_RWY
  type: none
  dataref: cockpitdecks/fms/dep/list_row_1_is_selected
  render-cooldown-ms: 80
  label: RWY
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms/dep/list_row_1_runway}"
      text-color: darkorange
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms/dep/list_row_1_runway}"
      text-color: darkorange
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 3
  name: DEP_SCROLL_UP
  type: push
  command: cockpitdecks/fms/dep/scroll_up
  vibrate: SHORT
  label: UP
  label-color: Gold
  text: "UP"
  text-color: white
  text-size: 28
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

