name: fms_plan
includes: pager,encoders/encoders_fms_plan

buttons:

# ============================================================
# PLAN
# Question: Which stored flight plan am I browsing before loading?
# Primary object: BrowsedPlan
# E2 (e0) turn: browse plans  |  E3 (e1) push: load plan
# ============================================================

# Row 1: Route identity — name/file, departure, destination, distance

- index: 0
  name: FMS_PLAN
  type: none
  render-cooldown-ms: 80
  label: PLAN
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_name}"
      text-font: D-DINCondensed.otf
      text-size: 50
      color: darkorange
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_filename}"
      text-font: D-DINCondensed.otf
      text-size: 34
      color: white
      formula: "1"

- index: 1
  name: FMS_DEP
  type: none
  render-cooldown-ms: 80
  label: DEP
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_departure}"
  text-color: deepskyblue
  text-size: 24
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 2
  name: FMS_DEST
  type: none
  render-cooldown-ms: 80
  label: DEST
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_destination}"
  text-color: deepskyblue
  text-size: 24
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 3
  name: FMS_DIST
  type: none
  render-cooldown-ms: 80
  label: NM
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_distance_nm}\nnm"
  text-format: "{0:.0f}"
  text-color: white
  text-size: 24
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 2: Runway + waypoint count + plan index

- index: 4
  name: FMS_IDX
  type: none
  render-cooldown-ms: 80
  label: IDX
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/index}/${cockpitdecks/fms_browser/count}"
  text-color: white
  text-size: 24
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 5
  name: FMS_DEP_RWY
  type: none
  render-cooldown-ms: 80
  label: RWY
  label-size: 9
  label-color: Gold
  text: "RW${cockpitdecks/fms_browser/plan_dep_runway}"
  text-color: darkorange
  text-size: 28
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 6
  name: FMS_DEST_RWY
  type: none
  render-cooldown-ms: 80
  label: RWY
  label-size: 9
  label-color: Gold
  text: "RW${cockpitdecks/fms_browser/plan_dest_runway}"
  text-color: darkorange
  text-size: 28
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 7
  name: FMS_WPTS
  type: none
  render-cooldown-ms: 80
  label: WPTS
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_waypoint_count}"
  text-color: white
  text-size: 32
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 3: Procedures + nav data currency + status

- index: 8
  name: FMS_STATUS
  type: push
  render-cooldown-ms: 80
  label: STATUS
  label-size: 9
  label-color: Gold
  vibrate: SHORT
  command: cockpitdecks/fms_browser/refresh
  text: "${cockpitdecks/fms_browser/status}"
  text-color: lime
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 9
  name: FMS_SID
  type: none
  render-cooldown-ms: 80
  label: SID
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_sid}"
  text-color: white
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 10
  name: FMS_STAR
  type: none
  render-cooldown-ms: 80
  label: STAR
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_star}"
  text-color: darkorange
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 11
  name: FMS_CYCLE
  type: none
  render-cooldown-ms: 80
  label: CYCLE
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_cycle}"
  text-color: darkorange
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)
