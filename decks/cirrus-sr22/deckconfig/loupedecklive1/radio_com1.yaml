name: radio_com1
includes:
- pager
- encoders/com1
buttons:
- index: 0
  name: COM1_STDBY
  activation:
    type: push
    commands:
      press: sim/GPS/g1000n1_com_ff
  representation:
    type: annunciator
    label: STDBY
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 30
        text-font: D-DINCondensed.otf
        formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
  vibrate: SHORT
  render-cooldown-ms: 50
- index: 1
  name: COM1_FLIPFLOP
  activation:
    type: push
    commands:
      press: sim/GPS/g1000n1_com_ff
  representation:
    type: annunciator
    label: FLIP FLOP
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: white
        text-size: 91
        text-font: DejaVuSans.ttf
        formula: 1
        text: ↔
        frame: false
  vibrate: SHORT
- index: 2
  name: COM1_ACTIVE
  activation:
    type: none
  representation:
    type: annunciator
    label: COM1
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 30
        text-font: D-DINCondensed.otf
        formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
  render-cooldown-ms: 50
- index: 3
  name: COM1_AUDIO
  activation:
    type: push
    commands:
      press: sim/audio_panel/select_audio_com1
  representation:
    type: annunciator
    label: AUDIO
    label-color: white
    annunciator:
      model: A
      size: medium
      parts:
      - led: dot
        color: deepskyblue
        formula: ${laminar/sr22/annunciators/audio/com1}
  vibrate: SHORT
- index: 8
  activation:
    type: none
  representation:
    type: text
    text: COM1
    text-color: Gold
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (40, 35, 0)
- index: 9
  activation:
    type: page
    page: radio_com2
  representation:
    type: text
    text: COM2
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 10
  activation:
    type: page
    page: radio_nav1
  representation:
    type: text
    text: NAV1
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 11
  activation:
    type: page
    page: radio_nav2
  representation:
    type: text
    text: NAV2
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 7
  name: COM1_MIC
  activation:
    type: push
    commands:
      press: sim/audio_panel/transmit_audio_com1
  representation:
    type: annunciator
    label: MIC1
    label-color: white
    annunciator:
      model: A
      size: medium
      parts:
      - led: dot
        color: deepskyblue
        formula: ${laminar/sr22/annunciators/audio/mic1}
  vibrate: SHORT
