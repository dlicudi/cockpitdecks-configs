description: FCU
includes:
- pager
- encoders/fcu
name: fcu
buttons:
- index: 0
  name: AP
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/servos_on}
    - text: AP
      text-size: 20
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/servos_toggle
- index: 1
  name: FD
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/flight_director_mode}
    - text: FD
      text-size: 20
      text-font: D-DINCondensed-Bold.otf
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/fdir_toggle
- index: 2
  name: HDG
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/heading_status}
    - text: HDG
      text-size: 23
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/heading
- index: 3
  name: ALT
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_hold_status}
    - text: ALT
      text-size: 23
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/altitude_hold
- index: 4
  name: NAV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${laminar/sr22/annunciators/ap/nav}
    - text: NAV
      text-size: 23
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/NAV
- index: 5
  name: VNAV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/vnav_armed}
    - text: VNAV
      text-size: 23
      text-font: D-DINCondensed-Bold.otf
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/vnav
- index: 6
  name: APR
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/approach_status}
    - text: APR
      text-size: 23
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/approach
- index: 7
  name: REV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/backcourse_status}
    - text: REV/BC
      text-size: 19
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/back_course
- index: 8
  name: VS
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_mode} 4 eq
    - text: VS
      text-size: 23
      text-font: D-DINCondensed-Bold.otf
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/vertical_speed
- index: 9
  name: FLC
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_mode} 5 eq
    - text: FLC
      text-size: 23
      text-font: D-DINCondensed-Bold.otf
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/level_change
- index: 10
  name: GPS
  label: HSI GPS
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - text: GPS
      text-color: yellow
      text-font: D-DINCondensed-Bold.otf
      text-size: 19
      formula: ${sim/cockpit/switches/HSI_selector} 2 eq
    - text: GPS2
      text-color: lime
      text-font: D-DINCondensed-Bold.otf
      text-size: 19
      formula: ${sim/cockpit/switches/HSI_selector} 3 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/hsi_toggle_gps
- index: 11
  name: VOR
  label: HSI NAV
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - text: VOR1
      text-color: yellow
      text-font: D-DINCondensed-Bold.otf
      text-size: 19
      formula: ${sim/cockpit/switches/HSI_selector} 0 eq
    - text: VOR2
      text-color: lime
      text-font: D-DINCondensed-Bold.otf
      text-size: 19
      formula: ${sim/cockpit/switches/HSI_selector} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/hsi_toggle_nav
