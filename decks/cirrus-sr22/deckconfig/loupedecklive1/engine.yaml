description: Engine
includes:
- includes/pager
- includes/encoder_fcu
name: engine
buttons:
- index: 0
  name: ENGINE_RPM
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 16
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/engine_speed_rpm[0]}
        text-format: '{0:.0f}'
      - text: ENG RPM
        text-size: 16
        text-font: D-DIN-Bold.otf
        formula: '1'
- index: 1
  name: MANIFOLD_PRESSURE
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 16
        formula: ${sim/cockpit2/engine/indicators/MPR_in_hg[0]} round
        text: ${formula}
      - text: 'MANIFOLD

          PRESSURE'
        text-size: 12
        text-font: D-DIN-Bold.otf
        formula: '1'
- index: 2
  name: OIL_TEMP
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 16
        formula: '1'
        text: ${sim/cockpit2/transmissions/indicators/oil_temperature}
        text-format: '{0:.0f} C'
      - text: 'OIL

          TEMP'
        text-size: 12
        formula: '1'
- index: 3
  name: OIL_PRESSURE
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 16
        text: ${sim/cockpit2/transmissions/indicators/oil_pressure}
        formula: '1'
        text-format: '{0:.0f} PSI'
      - text: 'OIL

          PRESSURE'
        text-size: 12
        text-font: D-DIN-Bold.otf
        formula: '1'
- index: 4
  name: FUEL_FLOW
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 16
        formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3600 * 0.8 / 3.78541 / 2 roundn
        text: ${formula}
      - text: FUEL FLOW
        text-size: 14
        text-font: D-DIN-Bold.otf
        formula: '1'
- index: 5
  name: CHT
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 16
        formula: ${sim/cockpit2/engine/indicators/CHT_deg_C[0]} round
        text: ${formula}
      - text: CHT
        text-size: 16
        text-font: D-DIN-Bold.otf
        formula: '1'
- index: 6
  name: BATTERY
  activation:
    type: none
  representation:
    type: annunciator
    label: BATTERY
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 14
        text: ${sim/cockpit/electrical/battery_charge_watt_hr[0]}
        text-format: '{0:.2f}'
        formula: '1'
      - color: lime
        text-size: 14
        text: ${sim/cockpit2/electrical/battery_amps[0]}
        text-format: '{0:.2f}'
        formula: '1'
- index: 7
  name: EGT
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 16
        formula: ${sim/cockpit2/engine/indicators/EGT_deg_cel[0]} round
        text: ${formula}
      - text: EGT
        text-size: 16
        text-font: D-DIN-Bold.otf
        formula: '1'
- index: 8
  name: FUEL EST
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 16
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]} + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 + / 3600 / 1 roundn
        text: ${formula} hrs
      - text: FUEL EST
        text-size: 16
        text-font: D-DIN-Bold.otf
        formula: '1'
- index: 9
  name: FUEL_L
  activation:
    type: push
    commands:
      press: laminar/sr22/fuel_sel_left_select
  representation:
    type: annunciator
    label: FUEL L
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 12
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq
        led: bar
      - color: yellow
        text-size: 11
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
        text: ${formula} g
- index: 10
  name: FUEL_R
  activation:
    type: push
    commands:
      press: laminar/sr22/fuel_sel_right_select
  representation:
    type: annunciator
    label: FUEL R
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 12
        formula: ${laminar/sr22/fuel_selector_pos} 2 eq
        led: bar
      - color: yellow
        text-size: 9
        formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
        text: ${formula} g
- index: 11
  name: ALTERNATOR
  activation:
    type: none
  representation:
    type: annunciator
    label: ALTERNATOR
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 12
        formula: '1'
        text-format: '{0:.0f}'
        text: ALT1 ${sim/cockpit2/electrical/generator_amps[0]}A
      - color: lime
        text-size: 12
        formula: '1'
        text-format: '{0:.0f}'
        text: ALT2 ${sim/cockpit2/electrical/generator_amps[1]}A
