# LOAD page encoders — E0: page scroll | E1: select in page | E2 push: LOAD | E5 push: REFRESH
# Always shows the 9 most recent plans (newest first); no sort controls needed.
# E0 type encoder: [0]=CCW, [1]=CW
# E1 type encoder: [0]=CCW, [1]=CW

buttons:

# LEFT SCREEN
- index: e0
  name: browse_plan_pages
  type: encoder
  dataref: cockpitdecks/fms_browser/list_window_page
  commands:
  - cockpitdecks/fms_browser/list_scroll_up
  - cockpitdecks/fms_browser/list_scroll_down

- index: e1
  name: select_plan
  type: encoder
  dataref: cockpitdecks/fms_browser/index
  commands:
  - cockpitdecks/fms_browser/previous
  - cockpitdecks/fms_browser/next

- index: e2
  name: load_selected_plan
  type: push
  command: cockpitdecks/fms_browser/load


# RIGHT SCREEN

# - index: e3
#   name: load_spare_e3
#   type: none

# - index: e4
#   name: load_spare_e4
#   type: none

- index: e3
  name: refresh_plan_list
  type: push
  command: cockpitdecks/fms_browser/refresh

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "PAGE"
        label-size: 18
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DINCondensed.otf
        text-color: White
        text: "${cockpitdecks/fms_browser/list_page}"
      - label: "SEL"
        label-size: 18
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DINCondensed.otf
        text-color: White
        text: "${cockpitdecks/fms_browser/list_sel_count}"
      - label: "LOAD"
        label-size: 18
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 14
        text-font: D-DINCondensed.otf
        text-color: White
        text: "${cockpitdecks/fms_browser/status}"

- index: right
  name: right_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "REFR"
        label-size: 18
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 14
        text-font: D-DINCondensed.otf
        text-color: White
        text: "PUSH"
