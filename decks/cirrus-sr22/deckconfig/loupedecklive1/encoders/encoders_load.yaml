# LOAD page encoders — browse plans, push to load
# E0: browse prev/next | E1: push = load plan
# No page-cycle (LOAD is standalone from HOME)

buttons:

- index: e0
  name: browse_plan
  type: encoder
  commands:
  - cockpitdecks/fms_browser/previous
  - cockpitdecks/fms_browser/next

- index: e1
  name: load_plan
  type: push
  command: cockpitdecks/fms_browser/load

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "PLAN"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms_browser/index}/${cockpitdecks/fms_browser/count}"
      - label: "LOAD"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: ""
      - label: ""
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: ""
