
buttons:

# Left encoders: file browser

- index: e0
  name: plan_browser
  type: encoder-push
  commands:
  - cockpitdecks/fms_browser/load
  - cockpitdecks/fms_browser/previous
  - cockpitdecks/fms_browser/next

- index: e1
  name: plan_browser_alt
  type: encoder-push
  commands:
  - cockpitdecks/fms_browser/refresh
  - cockpitdecks/fms_browser/previous
  - cockpitdecks/fms_browser/next

- index: e2
  name: unused_e2
  type: none

# Right encoders: unused on load page

- index: e3
  name: unused_e3
  type: none

- index: e4
  name: unused_e4
  type: none

- index: e5
  name: unused_e5
  type: none

