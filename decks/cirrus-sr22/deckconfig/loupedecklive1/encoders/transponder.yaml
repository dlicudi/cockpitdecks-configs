screen:
  background: Black
  render-cooldown-ms: 100

buttons:
- index: e0
  name: transponder_12
  activation:
    type: encoder
    commands:
      cw: sim/transponder/transponder_12_up
      ccw: sim/transponder/transponder_12_down
  representation:
    type: side-display
    label: XPDR

    text: ${sim/cockpit/radios/transponder_code} 100 / floor
    text-format: '{0:02.0f}'
- index: e3
  name: transponder_34
  activation:
    type: encoder
    commands:
      cw: sim/transponder/transponder_34_up
      ccw: sim/transponder/transponder_34_down
  representation:
    type: side-display
    label: XPDR

    text: ${sim/cockpit/radios/transponder_code} 100 %
    text-format: '{0:02.0f}'
