
buttons:

- index: e0
  name: transponder_12
  type: encoder
  commands:
  - sim/transponder/transponder_12_down
  - sim/transponder/transponder_12_up

- index: e3
  name: transponder_34
  type: encoder
  commands:
  - sim/transponder/transponder_34_down
  - sim/transponder/transponder_34_up

- index: left
  name: left_screen
  render-cooldown-ms: 100
  type: none
  side:
    icon-color: Black
    labels:
      - label: "XPDR"
        label-size: 14
        label-font: B612Mono-Regular.ttf
        label-color: Gold
        formula: "${sim/cockpit/radios/transponder_code} 100 / floor"
        text-size: 20
        text-font: Segment7Standard.otf
        text-color: Lime
        text-format: "{0:02.0f}"
        text: "${formula}"
      - label: ""
      - label: ""

- index: right
  name: right_screen
  render-cooldown-ms: 100
  type: none
  side:
    icon-color: Black
    labels:
      - label: "XPDR"
        label-size: 14
        label-font: B612Mono-Regular.ttf
        label-color: Gold
        formula: "${sim/cockpit/radios/transponder_code} 100 %"
        text-size: 20
        text-font: Segment7Standard.otf
        text-color: Lime
        text-format: "{0:02.0f}"
        text: "${formula}"
      - label: ""
      - label: ""
