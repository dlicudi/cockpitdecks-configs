buttons:
- index: e0
  name: transponder_12
  activation: encoder
  commands:
    cw: sim/transponder/transponder_12_up
    ccw: sim/transponder/transponder_12_down
- index: e3
  name: transponder_34
  activation: encoder
  commands:
    cw: sim/transponder/transponder_34_up
    ccw: sim/transponder/transponder_34_down
- index: left
  name: left_screen
  render-cooldown-ms: 100
  side:
    icon-color: Black
    labels:
    - label: XPDR
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      formula: ${sim/cockpit/radios/transponder_code} 100 / floor
      text-size: 20
      text-font: Segment7Standard.otf
      text-color: Lime
      text-format: '{0:02.0f}'
      text: ${formula}
    - label: ''
    - label: ''
  activation: none
- index: right
  name: right_screen
  render-cooldown-ms: 100
  side:
    icon-color: Black
    labels:
    - label: XPDR
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      formula: ${sim/cockpit/radios/transponder_code} 100 %
      text-size: 20
      text-font: Segment7Standard.otf
      text-color: Lime
      text-format: '{0:02.0f}'
      text: ${formula}
    - label: ''
    - label: ''
  activation: none
