buttons:
- index: e0
  name: throttle_encoder
  activation: encoder-push
  commands:
    press: sim/engines/throttle_full
    cw: sim/engines/throttle_up
    ccw: sim/engines/throttle_down
- index: e1
  name: FCU Heading
  activation: encoder-push
  commands:
    press: sim/autopilot/heading_sync
    long-press: sim/autopilot/servos_toggle
    cw: sim/autopilot/heading_up
    ccw: sim/autopilot/heading_down
- index: e2
  name: FCU Baro
  options: modulo
  activation: encoder-push
  commands:
    press: sim/instruments/barometer_std
    cw: sim/instruments/barometer_up
    ccw: sim/instruments/barometer_down
- index: e3
  name: alt_encoder
  commands:
    long-press: sim/autopilot/altitude_sync
  activation: encoder-mode
- index: e4
  name: FCU V Speed
  activation: encoder-push
  commands:
    press: sim/autopilot/vertical_speed_sync
    cw: sim/autopilot/vertical_speed_up
    ccw: sim/autopilot/vertical_speed_down
- index: e5
  name: mixture_encoder
  activation: encoder-push
  commands:
    press: sim/engines/mixture_max
    cw: sim/engines/mixture_up
    ccw: sim/engines/mixture_down
- index: left
  name: left_screen
  render-cooldown-ms: 100
  side:
    icon-color: Black
    labels:
    - label: THR
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
      text-size: 20
      text-font: D-DINCondensed.otf
      text-color: White
      text-format: '{0:01.0f}'
      text: ${formula}%
    - label: HDG
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      formula: ${sim/cockpit/autopilot/heading_mag}
      text-size: 20
      text-font: D-DINCondensed.otf
      text-color: White
      text-format: '{0:00.0f}'
      text: ${formula}
    - label: QNH
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      formula: ${sim/cockpit/misc/barometer_setting}
      text-size: 20
      text-font: D-DINCondensed.otf
      text-color: White
      text-format: '{0:01.2f}'
      text: ${formula}
  activation: none
- index: right
  name: right_screen
  render-cooldown-ms: 100
  side:
    icon-color: Black
    labels:
    - label: ALT
      label-size: 16
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
      text-size: 20
      text-font: D-DINCondensed.otf
      text-color: White
      text-format: '{0:04.0f}'
      text: ${formula}
    - label: VS
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
      text-size: 20
      text-font: D-DINCondensed.otf
      text-color: White
      text-format: '{0:.0f}'
      text: ${formula}
    - label: MIX
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      formula: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
      text-size: 20
      text-font: D-DINCondensed.otf
      text-color: White
      text-format: '{0:01.0f}'
      text: ${formula}%
  activation: none
