screen:
  background: Black
  render-cooldown-ms: 100
buttons:
- index: e0
  name: throttle_encoder
  activation:
    type: encoder-push
    commands:
      cw: sim/engines/throttle_up
      ccw: sim/engines/throttle_down
      press: sim/engines/throttle_full
      long-press: sim/engines/throttle_idle
  representation:
    type: side-display
    label: THR
    label-size: 25
    label-color: Gold
    text: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
    text-color: yellow
    text-format: '{0:01.0f}%'
- index: e1
  name: FCU Heading
  commands: &id001
    cw: sim/autopilot/heading_up
    ccw: sim/autopilot/heading_down
    press: sim/autopilot/heading_sync
    long-press: sim/autopilot/servos_toggle
  activation:
    type: encoder-push
    commands: *id001
  representation:
    type: side-display
    label: HDG
    label-size: 24
    label-color: Gold
    text: ${sim/cockpit/autopilot/heading_mag}
    text-format: '{0:00.0f}'
- index: e2
  name: FCU Baro
  commands: &id002
    cw: sim/instruments/barometer_up
    ccw: sim/instruments/barometer_down
    press: sim/instruments/barometer_std
  activation:
    type: encoder-push
    commands: *id002
  representation:
    type: side-display
    label: QNH
    label-size: 15
    label-color: Gold
    text: ${sim/cockpit/misc/barometer_setting}
    text-size: 19
    text-format: '{0:01.2f}'
- index: e3
  name: alt_encoder
  commands: &id003
    long-press: sim/autopilot/altitude_sync
  activation:
    type: encoder-mode
    commands: *id003
  representation:
    type: side-display
    label: ALT
    label-size: 24
    label-color: Gold
    text: ${sim/cockpit2/autopilot/altitude_dial_ft}
    text-size: 18
    text-color: white
    text-format: '{0:04.0f}'
- index: e4
  name: FCU V Speed
  commands: &id004
    cw: sim/autopilot/vertical_speed_up
    ccw: sim/autopilot/vertical_speed_down
    press: sim/autopilot/vertical_speed_sync
  activation:
    type: encoder-push
    commands: *id004
  representation:
    type: side-display
    label: VS
    label-size: 29
    label-color: Gold
    text: ${sim/cockpit/autopilot/vertical_velocity} 100 /
    text-size: 20
    text-color: lime
    text-format: '{0:.0f}'
- index: e5
  name: mixture_encoder
  commands: &id005
    cw: sim/engines/mixture_up
    ccw: sim/engines/mixture_down
    press: sim/engines/mixture_max
  activation:
    type: encoder-push
    commands: *id005
  representation:
    type: side-display
    label: MIX
    label-size: 17
    label-color: Gold
    text: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
    text-size: 17
    text-color: lime
    text-format: '{0:01.0f}%'
