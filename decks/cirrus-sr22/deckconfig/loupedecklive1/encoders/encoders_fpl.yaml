# FPL encoders — E0: waypoint page scroll | E2: function cycle (FPL <-> NAV)
# E1: row selection (within visible rows 1-3) + CLR push | E3: Direct To selected

buttons:

- index: e0
  name: browse_fpl_pages
  type: encoder
  dataref: cockpitdecks/fms_legs/window_start
  commands:
  - cockpitdecks/fms_legs/scroll_up
  - cockpitdecks/fms_legs/scroll_down

- index: e1
  name: select_leg
  type: encoder-push
  dataref: cockpitdecks/fms_legs/selected_index
  commands:
  - cockpitdecks/fms_legs/clear_selected
  - cockpitdecks/fms_legs/previous
  - cockpitdecks/fms_legs/next

- index: e2
  name: func_cycle
  type: page-cycle
  pages:
    - fms_nav
    - fms_fpl
  page-labels:
    - NAV
    - FPL

- index: e3
  name: direct_to
  type: push
  command: cockpitdecks/fms_legs/direct_to

- index: e5
  name: fpl_spare
  type: none

# Some devices emit SEL push/turn on e4; mirror e1 mapping to avoid dropped events.
- index: e4
  name: select_leg_alt
  type: encoder-push
  dataref: cockpitdecks/fms_legs/selected_index
  commands:
  - cockpitdecks/fms_legs/clear_selected
  - cockpitdecks/fms_legs/previous
  - cockpitdecks/fms_legs/next

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "PAGE"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms_legs/page}"
      - label: "SEL"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms_legs/sel_count}"
      - label: "FUNC"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${data:cockpitdecks/page_cycle/current_page}"

- index: right
  name: right_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: ""
      - label: "D>"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "Push"
      - label: "FPL"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms_legs/selected_index}/${cockpitdecks/fms_legs/entry_count}"
