buttons:
- index: e0
  name: range_encoder
  activation:
    type: encoder-push
    commands:
      press: sim/GPS/gcu478/pan_push
      cw: sim/GPS/gcu478/range_down
      ccw: sim/GPS/gcu478/range_up
  representation:
    type: side-display
    label: RNG
    label-color: Gold
    text: +/-
- index: e1
  name: range_leftright
  activation:
    type: encoder-push
    commands:
      press: sim/GPS/gcu478/pan_push
      cw: sim/GPS/gcu478/pan_right
      ccw: sim/GPS/gcu478/pan_left
  representation:
    type: side-display
    label: PAN
    label-color: Gold
    text: L/R
- index: e2
  name: range_updown
  activation:
    type: encoder-push
    commands:
      press: sim/GPS/gcu478/pan_push
      cw: sim/GPS/gcu478/pan_up
      ccw: sim/GPS/gcu478/pan_down
  representation:
    type: side-display
    label: PAN
    label-color: Gold
    text: U/D
- index: e3
  name: fms_encoder_outer
  activation:
    type: encoder-push
    commands:
      press: sim/GPS/gcu479/cursor
      cw: sim/GPS/g1000n3_fms_outer_up
      ccw: sim/GPS/g1000n3_fms_outer_down
  representation:
    type: side-display
    label: FMS
    label-color: Gold
    text: Outer
- index: e4
  name: fms_encoder_inner
  activation:
    type: encoder-push
    commands:
      press: sim/GPS/gcu479/cursor
      cw: sim/GPS/g1000n3_fms_inner_up
      ccw: sim/GPS/g1000n3_fms_inner_down
  representation:
    type: side-display
    label: FMS
    label-color: Gold
    text: Inner
- index: e5
  name: gcu479_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/GPS/gcu479/1_2_ctr
  representation:
    type: side-display
    label: GCU479
    label-color: Gold
    text: COMBO
