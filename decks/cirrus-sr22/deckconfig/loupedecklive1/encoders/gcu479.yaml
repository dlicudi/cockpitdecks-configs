buttons:
- index: e0
  name: range_encoder
  activation: encoder-push
  commands:
    press: sim/GPS/gcu478/pan_push
    cw: sim/GPS/gcu478/range_down
    ccw: sim/GPS/gcu478/range_up
- index: e1
  name: range_leftright
  activation: encoder-push
  commands:
    press: sim/GPS/gcu478/pan_push
    cw: sim/GPS/gcu478/pan_right
    ccw: sim/GPS/gcu478/pan_left
- index: e2
  name: range_updown
  activation: encoder-push
  commands:
    press: sim/GPS/gcu478/pan_push
    cw: sim/GPS/gcu478/pan_up
    ccw: sim/GPS/gcu478/pan_down
- index: e3
  name: fms_encoder_outer
  activation: encoder-push
  commands:
    press: sim/GPS/gcu479/cursor
    cw: sim/GPS/g1000n3_fms_outer_up
    ccw: sim/GPS/g1000n3_fms_outer_down
- index: e4
  name: fms_encoder_inner
  activation: encoder-push
  commands:
    press: sim/GPS/gcu479/cursor
    cw: sim/GPS/g1000n3_fms_inner_up
    ccw: sim/GPS/g1000n3_fms_inner_down
- index: e5
  name: gcu479_encoder
  commands:
    long-press: sim/GPS/gcu479/1_2_ctr
  activation: encoder-mode
- index: left
  name: left_screen
  side:
    icon-color: Black
    labels:
    - label: RNG
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      text-size: 18
      text-font: D-DINCondensed.otf
      text-color: White
      text: +/-
    - label: PAN
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      text-size: 18
      text-font: D-DINCondensed.otf
      text-color: White
      text: L/R
    - label: PAN
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      text-size: 18
      text-font: D-DINCondensed.otf
      text-color: White
      text: U/D
  activation: none
- index: right
  name: right_screen
  side:
    icon-color: Black
    labels:
    - label: FMS
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      text-size: 18
      text-font: D-DINCondensed.otf
      text-color: White
      text: Outer
    - label: FMS
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      text-size: 18
      text-font: D-DINCondensed.otf
      text-color: White
      text: Inner
    - label: GCU479
      label-size: 14
      label-font: B612Mono-Regular.ttf
      label-color: Gold
      text-size: 18
      text-font: D-DINCondensed.otf
      text-color: White
      text: COMBO
  activation: none
