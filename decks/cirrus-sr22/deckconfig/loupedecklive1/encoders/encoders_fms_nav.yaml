
buttons:

# ============================================================
# NAV PRIMARY encoders
# All read-only telemetry page — no browse or action encoders.
# E4 (e2): page-cycle only
# ============================================================

- index: e2
  name: page_cycle
  type: page-cycle
  pages:
    - fms_plan
    - fms_route
    - fms_leg
    - fms_nav
  page-labels:
    - PLAN
    - ROUT
    - LEG
    - NAV

# ============================================================
# Side screens
# ============================================================

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: ""
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: ""
      - label: ""
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: ""
      - label: "PAGE"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${data:cockpitdecks/page_cycle/current_page}"
