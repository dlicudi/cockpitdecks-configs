
buttons:

# ============================================================
# ACTIVE ROUTE OVERVIEW encoders
# Primary object: ActiveRoute — summary page, no browsing
#
# E2 (e0): no-op  — ActiveRoute has no browsable object
# E3 (e1): no-op  — no action defined for this page
# E1 (e5): PAGE   — page-cycle
#
# Leg browsing belongs to ACTIVE LEG BROWSER, not here.
# Manipulating fms_displayed_index from this page would be
# an invisible side-effect with no feedback on this grid.
# ============================================================

- index: e5
  name: page_cycle
  type: page-cycle
  pages:
    - fms
    - fms_route
    - fms_leg
    - fms_nav
  page-labels:
    - BROW
    - ROUT
    - LEG
    - NAV

# ============================================================
# Side screens
# ============================================================

