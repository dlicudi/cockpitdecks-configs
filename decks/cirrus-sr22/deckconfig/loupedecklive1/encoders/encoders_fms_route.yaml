
buttons:

# ============================================================
# ACTIVE ROUTE OVERVIEW encoders
# Primary object: ActiveRoute — summary page, no browsing
#
# E2 (e0): SCROLL — (unused) no scrollable list on this grid
# E3 (e1): ACTION — (unused) preview only, no aircraft control
# E4 (e2): PAGE   — page-cycle
#
# Leg scrolling belongs to LEG page where displayed_index
# has visual feedback. Scrolling here would be an invisible
# side-effect with no grid update.
# ============================================================

- index: e2
  name: page_cycle
  type: page-cycle
  pages:
    - fms_plan
    - fms_route
    - fms_leg
    - fms_nav
  page-labels:
    - PLAN
    - ROUT
    - LEG
    - NAV

# ============================================================
# Side screens
# ============================================================

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: ""
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: ""
      - label: ""
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: ""
      - label: "PAGE"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${data:cockpitdecks/page_cycle/current_page}"
