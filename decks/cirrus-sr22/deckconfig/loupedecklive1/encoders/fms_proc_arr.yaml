# ARR page encoders
# E0: page scroll  |  E1: select within page  |  E2: func cycle (NAV/FPL/DEP/ARR/APP)
# E3: activate selected STAR  |  E5: refresh

buttons:

- index: e0
  name: browse_arr_pages
  type: encoder
  dataref: cockpitdecks/fms/arr/list_window_page
  commands:
  - cockpitdecks/fms/arr/scroll_up
  - cockpitdecks/fms/arr/scroll_down

- index: e1
  name: select_arr
  type: encoder-push
  dataref: cockpitdecks/fms/arr/index
  commands:
  - cockpitdecks/fms/arr/clear_selected
  - cockpitdecks/fms/arr/previous
  - cockpitdecks/fms/arr/next

- index: e2
  name: func_cycle
  type: page-cycle
  pages:
    - fms_nav
    - fms_fpl
    - fms_proc_dep
    - fms_proc_arr
    - fms_proc_app
  page-labels:
    - NAV
    - FPL
    - DEP
    - ARR
    - APP

- index: e3
  name: activate_arr
  type: push
  command: cockpitdecks/fms/arr/clear_selected
  long-press: cockpitdecks/fms/arr/activate

- index: e5
  name: refresh_arr
  type: push
  command: cockpitdecks/fms/arr/refresh

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "PAGE"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms/arr/list_page}"
      - label: "SEL"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms/arr/list_sel_count}"
      - label: "FUNC"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${data:cockpitdecks/page_cycle/current_page}"

- index: right
  name: right_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "ACTV"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "Hold"
      - label: "ARPT"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms/arr/airport}"
      - label: "LOADED"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 13
        text-font: D-DINCondensed.otf
        text-color: Cyan
        text: "${cockpitdecks/fms/arr/loaded_name}"
