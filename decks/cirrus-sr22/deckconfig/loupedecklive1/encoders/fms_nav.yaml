# NAV encoders — E2 = function cycle (NAV/FPL/DEP/ARR/APP)
# Read-only telemetry page, no browse/action on encoders

buttons:

- index: e2
  name: func_cycle
  type: page-cycle
  pages:
    - fms_nav
    - fms_fpl
    - fms_proc_dep
    - fms_proc_arr
    - fms_proc_app
  page-labels:
    - NAV
    - FPL
    - DEP
    - ARR
    - APP

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: ""
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: ""
      - label: ""
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: ""
      - label: "FUNC"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${data:cockpitdecks/page_cycle/current_page}"
