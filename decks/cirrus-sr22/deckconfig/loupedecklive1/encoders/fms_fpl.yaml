# FPL encoders — E0: waypoint page scroll | E2: function cycle (FPL <-> NAV)
# E1: row selection (within visible rows 1-3) + CLR push | E3: Direct To selected

buttons:

- index: e0
  name: browse_fpl_pages
  type: encoder
  dataref: cockpitdecks/fms/legs/window_start
  commands:
  - cockpitdecks/fms/legs/scroll_up
  - cockpitdecks/fms/legs/scroll_down

- index: e1
  name: select_leg
  type: encoder-push
  dataref: cockpitdecks/fms/legs/selected_index
  commands:
  - cockpitdecks/fms/legs/clear_selected
  - cockpitdecks/fms/legs/previous
  - cockpitdecks/fms/legs/next
  long-press: cockpitdecks/fms/legs/clear_from_here

- index: e2
  name: func_cycle
  type: page-cycle
  pages:
    - fms_nav
    - fms_fpl
    - fms_proc_dep
    - fms_proc_arr
    - fms_proc_app
  page-labels:
    - NAV
    - FPL
    - DEP
    - ARR
    - APP

- index: e3
  name: direct_to
  type: push
  command: cockpitdecks/fms/legs/direct_to
  long-press: cockpitdecks/fms/legs/direct_to_destination

- index: e5
  name: activate_leg
  type: push
  command: cockpitdecks/fms/legs/activate

# Some devices emit SEL push/turn on e4; mirror e1 mapping to avoid dropped events.
- index: e4
  name: select_leg_alt
  type: encoder-push
  dataref: cockpitdecks/fms/legs/selected_index
  commands:
  - cockpitdecks/fms/legs/clear_selected
  - cockpitdecks/fms/legs/previous
  - cockpitdecks/fms/legs/next
  long-press: cockpitdecks/fms/legs/clear_from_here

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "PAGE"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms/legs/page}"
      - label: "SEL"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms/legs/sel_count}"
      - label: "FUNC"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${data:cockpitdecks/page_cycle/current_page}"

- index: right
  name: right_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "DIR-TO"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "LP>DEST"
      - label: "FPL"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms/legs/selected_index}/${cockpitdecks/fms/legs/entry_count}"
      - label: "ACT"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "Push"
