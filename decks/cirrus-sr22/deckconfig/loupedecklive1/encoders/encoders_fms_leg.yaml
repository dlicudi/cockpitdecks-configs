
buttons:

# ============================================================
# LEGS LIST encoders
# E1 (e0): (empty)
# E2 (e1): ACTION — push=direct-to selected waypoint
# E3 (e2): PAGE   — page-cycle
# E6 (e5): BROWSE — turn=scroll selection up/down through route
# ============================================================

- index: e5
  name: browse_legs
  type: encoder
  commands:
  - cockpitdecks/fms_legs/scroll_up
  - cockpitdecks/fms_legs/scroll_down

- index: e1
  name: direct_to
  type: push
  command: cockpitdecks/fms_legs/direct_to

- index: e2
  name: page_cycle
  type: page-cycle
  pages:
    - fms_plan
    - fms_route
    - fms_leg
    - fms_nav
  page-labels:
    - PLN
    - RTE
    - LEGS
    - NAV

# ============================================================
# Side screens
# ============================================================

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: ""
      - label: "D>"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "Push"
      - label: "PAGE"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${data:cockpitdecks/page_cycle/current_page}"

- index: right
  name: right_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: ""
      - label: ""
      - label: "LEGS"
        label-size: 14
        label-font: D-DINCondensed.otf
        label-color: Gold
        text-size: 16
        text-font: D-DIN.otf
        text-color: White
        text: "${cockpitdecks/fms_legs/selected_index}/${cockpitdecks/fms_legs/entry_count}"
