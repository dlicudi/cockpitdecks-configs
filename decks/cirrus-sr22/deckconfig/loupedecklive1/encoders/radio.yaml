
buttons:

# Left encoders: COM1, COM2 standby tuning
- index: e0
  name: com1_encoder
  type: encoder-toggle
  toggle-labels:
    - 0
    - 1
  commands:
  - sim/radios/stby_com1_coarse_up
  - sim/radios/stby_com1_coarse_down
  - sim/radios/stby_com1_fine_up
  - sim/radios/stby_com1_fine_down
  long-press: sim/GPS/g1000n1_com_ff

- index: e2
  name: com2_encoder
  type: encoder-toggle
  toggle-labels:
    - 0
    - 1
  commands:
  - sim/radios/stby_com2_coarse_up
  - sim/radios/stby_com2_coarse_down
  - sim/radios/stby_com2_fine_up
  - sim/radios/stby_com2_fine_down
  long-press: sim/radios/com2_standy_flip


# Right encoders: NAV1, NAV2 standby tuning
- index: e3
  name: nav1_encoder
  type: encoder-toggle
  toggle-labels:
    - 0
    - 1
  commands:
  - sim/radios/stby_nav1_coarse_up
  - sim/radios/stby_nav1_coarse_down
  - sim/radios/stby_nav1_fine_up
  - sim/radios/stby_nav1_fine_down
  long-press: sim/GPS/g1000n3_nav_ff

- index: e5
  name: nav2_encoder
  type: encoder-toggle
  toggle-labels:
    - 0
    - 1
  commands:
  - sim/radios/stby_nav2_coarse_up
  - sim/radios/stby_nav2_coarse_down
  - sim/radios/stby_nav2_fine_up
  - sim/radios/stby_nav2_fine_down
  long-press: sim/radios/nav2_standy_flip

- index: left
  name: left_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "COM1"
        label-size: 20
        label-font: D-DINCondensed.otf
        label-color: Gold
        # formula: "${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /"
        # text-size: 14
        # text-font: Segment7Standard.otf
        # text-color: White
        # text-format: "{0:.3f}"
        # text: "${formula}"
      - label: ""
      - label: "COM2"
        label-size: 20
        label-font: D-DINCondensed.otf
        label-color: Gold

- index: right
  name: right_screen
  type: none
  side:
    icon-color: Black
    labels:
      - label: "NAV1"
        label-size: 20
        label-font: D-DINCondensed.otf
        label-color: Gold
      - label: ""
      - label: "NAV2"
        label-size: 20
        label-font: D-DINCondensed.otf
        label-color: Gold
