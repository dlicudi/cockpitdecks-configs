# LOAD FPL — Browse Output/FMS plans (3 rows / page, same pattern as fms_fpl).
# Select: tap the FILE or WPTS tile in a row, or turn E1.
# Load: E1 push or E2 push.
# Col1: FILE/TIME | Col2: WPTS | Col3: MAX ALT | Col4: DIS
name: fms_load
includes: pager,encoders/fms_load

buttons:

# ── Row 1 ──────────────────────────────────────────────────
- index: 0
  name: LOAD_R1_FILE
  type: push
  command: cockpitdecks/fms/load/list_select_row_1
  dataref: cockpitdecks/fms/load/list_row_1_is_selected
  vibrate: SHORT
  label: FPL
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms/load/list_row_1_filename}"
      text-font: D-DINCondensed.otf
      text-size: 16
      text-color: darkorange
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms/load/list_row_1_filename}"
      text-font: D-DINCondensed.otf
      text-size: 16
      text-color: white
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 1
  name: LOAD_R1_WPTS
  type: push
  command: cockpitdecks/fms/load/list_select_row_1
  dataref: cockpitdecks/fms/load/list_row_1_is_selected
  vibrate: SHORT
  label: WPTS
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms/load/list_row_1_wpt_count}"
      text-format: "{0:.0f}"
      text-color: darkorange
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms/load/list_row_1_wpt_count}"
      text-format: "{0:.0f}"
      text-color: white
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 2
  name: LOAD_R1_MAX
  type: none
  dataref: cockpitdecks/fms/load/list_row_1_is_selected
  label: MAX ALT
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms/load/list_row_1_max_alt_ft}\nft"
      text-format: "{0:.0f}"
      text-color: darkorange
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms/load/list_row_1_max_alt_ft}\nft"
      text-format: "{0:.0f}"
      text-color: white
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 3
  name: LOAD_R1_DIS
  type: none
  dataref: cockpitdecks/fms/load/list_row_1_is_selected
  label: DIS
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms/load/list_row_1_distance_nm}\nnm"
      text-format: "{0:.0f}"
      text-color: darkorange
      text-size: 22
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms/load/list_row_1_distance_nm}\nnm"
