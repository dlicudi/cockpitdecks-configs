name: fms_load
includes: pager,encoders/encoders_fms_load

buttons:

# Row 1: Plan name + file counter + load + max alt

- index: 0
  name: FMS_PLAN_NAME
  type: none
  label: PLAN
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_departure}"
      text-font: B612Mono-Regular.ttf
      text-size: 28
      color: deepskyblue
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_destination}"
      text-font: B612Mono-Regular.ttf
      text-size: 28
      color: deepskyblue
      formula: "1"

- index: 1
  name: FMS_INDEX_COUNT
  type: none
  label: FILE
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/index}/${cockpitdecks/fms_browser/count}"
  text-color: darkorange
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: Black

- index: 2
  name: FMS_STATUS
  type: none
  label: STATUS
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/status}"
      text-font: D-DIN-Bold.otf
      text-size: 24
      color: lime
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_filename}"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: darkorange
      formula: "1"

- index: 3
  name: FMS_MAX_ALT
  type: none
  label: MAX ALT
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_max_altitude}ft"
  text-color: white
  text-size: 16
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 2: Plan info

- index: 4
  name: FMS_DEP
  type: none
  label: DEP
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_departure}"
      text-font: B612Mono-Regular.ttf
      text-size: 36
      color: deepskyblue
      formula: "1"
    B1:
      text: "RW${cockpitdecks/fms_browser/plan_dep_runway}"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: darkorange
      formula: "1"

- index: 5
  name: FMS_SID
  type: none
  label: SID
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_sid}"
  text-color: white
  text-size: 14
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (24, 24, 24)

- index: 6
  name: FMS_DEST
  type: none
  label: DEST
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_destination}"
      text-font: B612Mono-Regular.ttf
      text-size: 36
      color: deepskyblue
      formula: "1"
    B1:
      text: "RW${cockpitdecks/fms_browser/plan_dest_runway}"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: darkorange
      formula: "1"

- index: 7
  name: FMS_STAR
  type: none
  label: STAR
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_star}"
  text-color: white
  text-size: 14
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (24, 24, 24)

# Row 3: Distance + cycle + navigation

- index: 8
  name: FMS_DISTANCE
  type: none
  label: DIST
  label-size: 9
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_distance_nm}nm"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_waypoint_count} wpts"
      text-font: B612Mono-Regular.ttf
      text-size: 16
      color: darkorange
