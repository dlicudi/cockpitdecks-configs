  text-bg-color: (20, 20, 24)

- index: 10
  type: page
  page: fms_edit
  text: "EDIT"
  text-color: khaki
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (40, 30, 40)

- index: 11
  type: page
  page: fms
  text: "TRACK"
  text-color: khaki
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (40, 30, 40)
