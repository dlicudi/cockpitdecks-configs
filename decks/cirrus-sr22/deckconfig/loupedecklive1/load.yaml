# LOAD — External utility to browse and load flight plans.
# Top-level from HOME. No nesting.
name: load
includes: pager,encoders/encoders_load

buttons:

# Row 1: Plan identity
- index: 0
  name: LOAD_PLAN
  type: none
  render-cooldown-ms: 80
  label: PLAN
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_browser/plan_name}"
      text-font: D-DINCondensed.otf
      text-size: 50
      color: darkorange
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_browser/plan_filename}"
      text-font: D-DINCondensed.otf
      text-size: 34
      color: white
      formula: "1"

- index: 1
  name: LOAD_DEP
  type: none
  render-cooldown-ms: 80
  label: DEP
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_departure}"
  text-color: deepskyblue
  text-size: 24
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 2
  name: LOAD_DEST
  type: none
  render-cooldown-ms: 80
  label: DEST
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_destination}"
  text-color: deepskyblue
  text-size: 24
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 3
  name: LOAD_DIST
  type: none
  render-cooldown-ms: 80
  label: NM
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_distance_nm}\nnm"
  text-format: "{0:.0f}"
  text-color: white
  text-size: 24
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 2: Runway + waypoint count + index
- index: 4
  name: LOAD_IDX
  type: none
  render-cooldown-ms: 80
  label: IDX
  label-color: Gold
  text: "${cockpitdecks/fms_browser/index}/${cockpitdecks/fms_browser/count}"
  text-color: white
  text-size: 24
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 5
  name: LOAD_DEP_RWY
  type: none
  render-cooldown-ms: 80
  label: RWY
  label-color: Gold
  text: "RW${cockpitdecks/fms_browser/plan_dep_runway}"
  text-color: darkorange
  text-size: 28
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 6
  name: LOAD_DEST_RWY
  type: none
  render-cooldown-ms: 80
  label: RWY
  label-color: Gold
  text: "RW${cockpitdecks/fms_browser/plan_dest_runway}"
  text-color: darkorange
  text-size: 28
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 7
  name: LOAD_WPTS
  type: none
  render-cooldown-ms: 80
  label: WPTS
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_waypoint_count}"
  text-color: white
  text-size: 32
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 3: Procedures + status
- index: 8
  name: LOAD_STATUS
  type: push
  render-cooldown-ms: 80
  label: STATUS
  label-color: Gold
  vibrate: SHORT
  command: cockpitdecks/fms_browser/refresh
  text: "${cockpitdecks/fms_browser/status}"
  text-color: lime
  text-size: 18
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 9
  name: LOAD_SID
  type: none
  render-cooldown-ms: 80
  label: SID
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_sid}"
  text-color: white
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 10
  name: LOAD_STAR
  type: none
  render-cooldown-ms: 80
  label: STAR
  label-color: Gold
  text: "${cockpitdecks/fms_browser/plan_star}"
  text-color: darkorange
  text-size: 20
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 11
  name: LOAD_BACK
  type: page
  page: index
  label: BACK
  label-color: Gold
  text: "<<"
  text-color: khaki
  text-size: 28
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (40, 30, 40)
