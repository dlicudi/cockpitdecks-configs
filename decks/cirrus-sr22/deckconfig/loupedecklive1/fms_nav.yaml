name: fms_nav
includes: pager,encoders/encoders_fms_nav

buttons:

# ============================================================
# NAV PRIMARY
# Question: Where am I relative to the active route right now?
# Primary object: NavState
# All read-only telemetry. No browse or action encoders.
# →WPT and DEST are nav anchors — ETE/DTK are meaningless without them.
# ============================================================

# Row 1: Immediate situational awareness

- index: 0
  name: FMS_DIST
  type: none
  label: NM
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/radios/indicators/gps_dme_distance_nm}\nnm"
  text-format: "{0:.1f}"
  text-color: white
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 1
  name: FMS_ETE
  type: none
  label: ETE
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/radios/indicators/gps_dme_time_min}\nmin"
  text-format: "{0:.0f}"
  text-color: darkorange
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 2
  name: FMS_GS
  type: none
  label: GS
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/gauges/indicators/ground_speed_kt}\nkts"
  text-format: "{0:.0f}"
  text-color: white
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 3
  name: FMS_DTK
  type: none
  label: DTK
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}°"
  text-format: "{0:.0f}"
  text-color: darkorange
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 2: Planning horizon + nav anchors

- index: 4
  name: FMS_TOD
  type: none
  label: TOD
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/radios/indicators/fms_distance_to_tod_pilot}\nnm"
  text-format: "{0:.1f}"
  text-color: white
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 5
  name: FMS_ETA
  type: none
  label: ETA
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/radios/indicators/fms1_act_eta_hour}:${sim/cockpit2/radios/indicators/fms1_act_eta_minute}Z"
  text-color: darkorange
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 6
  name: FMS_WPT
  type: none
  label: ">WPT"
  label-size: 9
  label-color: lime
  text: "${cockpitdecks/fms_browser/fms_active_ident}"
  text-color: lime
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 7
  name: FMS_DEST
  type: none
  label: DEST
  label-size: 9
  label-color: Gold
  text: "${cockpitdecks/fms_browser/fms_last_ident}"
  text-color: deepskyblue
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

# Row 3: Track + reserved

- index: 8
  name: FMS_TRK
  type: none
  label: TRK
  label-size: 9
  label-color: Gold
  text: "${sim/cockpit2/gauges/indicators/ground_track_mag_pilot}°"
  text-format: "{0:.0f}"
  text-color: white
  text-size: 20
  text-font: B612Mono-Regular.ttf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 9
  name: FMS_R3_B
  type: none

- index: 10
  name: FMS_R3_C
  type: none

- index: 11
  name: FMS_R3_D
  type: none
