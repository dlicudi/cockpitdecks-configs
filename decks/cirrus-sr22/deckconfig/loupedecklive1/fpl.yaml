# FPL — Flight Plan. View and edit route, scroll waypoints, DIRECT TO.
# E2 = page cycle (FPL <-> NAV) | E5 = waypoint paging
name: fpl
includes: pager,encoders/encoders_fpl

buttons:

# Row 1: Waypoint 1 — IDENT | DTK | DIST | scroll up
- index: 0
  name: FPL_R1_IDX
  type: none
  render-cooldown-ms: 80
  label: "#"
  label-color: Gold
  annunciator:
    size: medium
    model: B
    B0:
      text: "${cockpitdecks/fms_legs/row_1_index}"
      text-font: D-DINCondensed.otf
      text-size: 48
      color: white
      formula: "1"
    B1:
      text: "${cockpitdecks/fms_legs/row_1_status}"
      text-font: D-DINCondensed.otf
      text-size: 28
      color: lime
      formula: "${cockpitdecks/fms_legs/row_1_is_active} ${cockpitdecks/fms_legs/row_1_is_selected} or"

- index: 1
  name: FPL_R1_WPT
  type: push
  command: cockpitdecks/fms_legs/select_row_1
  dataref: cockpitdecks/fms_legs/row_1_is_selected
  vibrate: SHORT
  render-cooldown-ms: 80
  label: WPT
  label-color: Gold
  multi-texts:
    - text: "${cockpitdecks/fms_legs/row_1_ident}"
      text-color: white
      text-size: 30
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (20, 20, 24)
    - text: "${cockpitdecks/fms_legs/row_1_ident}"
      text-color: white
      text-size: 30
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: (70, 55, 20)

- index: 2
  name: FPL_R1_ALT
  type: none
  render-cooldown-ms: 80
  label: ALT
  label-color: Gold
  text: "${cockpitdecks/fms_legs/row_1_alt}"
  text-color: darkorange
  text-size: 22
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

- index: 3
  name: FPL_SCROLL_UP
  type: push
  command: cockpitdecks/fms_legs/scroll_up
  vibrate: SHORT
  label: UP
  label-color: Gold
  text: "UP"
  text-color: white
  text-size: 28
  text-font: D-DINCondensed.otf
  text-position: cm
  text-bg-color: (20, 20, 24)

