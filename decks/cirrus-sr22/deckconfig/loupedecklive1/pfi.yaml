name: pfi
includes:
- pager
- encoders/fcu
buttons:
- index: 0
  name: SPD
  label: SPD
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 38
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 1
  name: HDG
  label: HDG
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 38
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  name: ALT
  label: ALT
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 27
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 12
      formula: '1'
      text-format: '{0:.2f}'
      text: '${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}

        inHg'
    - color: white
      text-size: 12
      formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.8639
        *
      text-format: '{0:.0f}'
      text: '${formula}

        hPa'
  activation: none
  representation: annunciator
- index: 3
  name: VS
  label: VS
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 30
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 4
  name: FUEL
  label: FUEL QTY
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 12
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: L ${formula} gal
    - color: yellow
      text-size: 12
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: R ${formula} gal
  activation: none
  representation: annunciator
- index: 5
  name: EGT/Fuel Flow
  label: EGT/FF
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 12
      formula: ${sim/cockpit2/engine/indicators/EGT_deg_cel[0]}
      text: ${formula} EGT
      text-format: '{0:.2f}'
    - color: yellow
      text-size: 12
      formula: ${sim/flightmodel/engine/ENGN_FF_[0]} 0.69 / 0.264172 * 3600 *
      text: ${formula} GPH
      text-format: '{0:.2f}'
  activation: none
  representation: annunciator
- index: 6
  name: OIL
  label: OIL
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 12
      formula: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]}
      text: TEMP ${formula} F
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 12
      formula: ${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}
      text: PRESS ${formula} PSI
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 7
  name: VACAMP
  label: VAC/AMP
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 12
      text: VAC ${sim/cockpit/misc/vacuum}
      text-format: '{0:.2f}'
      formula: '1'
    - color: yellow
      text-size: 12
      text: AMP ${sim/cockpit2/electrical/battery_amps[0]}
      text-format: '{0:.2f}'
      formula: '1'
  activation: none
  representation: annunciator
- index: 8
  name: RPM
  label: RPM
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 16
      text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: white
      text-size: 11
      text: ${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}:${sim/cockpit2/clock_timer/hobbs_time_seconds}
      formula: '1'
  activation: none
  representation: annunciator
- index: 9
  name: CAUTION
  label: CAUTION
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - text: OIL PRESS
      text-color: firebrick
      off-color: '#3f1414'
      text-font: D-DINCondensed-Bold.otf
      text-size: 19
      formula: ${sim/cockpit/warnings/annunciators/oil_pressure}
    - text: VOLTS
      text-color: firebrick
      off-color: '#3f1414'
      text-font: D-DINCondensed-Bold.otf
      text-size: 19
      formula: ${sim/cockpit/warnings/annunciators/generator}
  activation: none
  representation: annunciator
- index: 10
  name: WARNING
  label: WARNING
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - text: L FUEL R
      text-color: darkorange
      text-font: D-DINCondensed-Bold.otf
      text-size: 19
      formula: ${sim/cockpit/warnings/annunciators/fuel_pressure}
    - text: L VAC R
      text-color: darkorange
      text-font: D-DINCondensed-Bold.otf
      text-size: 19
      formula: ${sim/cockpit/warnings/annunciators/low_vacuum}
  activation: none
  representation: annunciator
- index: 11
  name: WAYPOINT
  render-cooldown-ms: 750
  label: NEXT WAYPOINT
  label-size: 8
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
  annunciator:
    size: medium
    model: F
    parts:
    - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 14
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

        DIS'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 14
      text-format: '{0:.1f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

        DTK'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 15
      text-format: '{0:.0f}'
      formula: '1'
    - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 15
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
