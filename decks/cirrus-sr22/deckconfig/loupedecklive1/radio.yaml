name: radio
includes:
- pager
- encoders/radio
buttons:
- index: 0
  name: COM1_STDBY
  label: STDBY
  label-color: white
  vibrate: SHORT
  annunciator:
    size: medium
    model: D
    parts:
    - color: cyan
      text-size: 30
      text-font: D-DINCondensed.otf
      formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000
        /
      text: ${formula}
      text-format: '{0:.3f}'
    - color: cyan
      led: dot
      formula: ${data:com1_encoder-toggle} 0 eq
    - color: cyan
      led: dot
      formula: ${data:com1_encoder-toggle} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/GPS/g1000n1_com_ff
- index: 1
  name: COM1_ACTIVE
  label: COM1
  label-color: white
  vibrate: SHORT
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 30
      text-font: D-DINCondensed.otf
      formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
      text: ${formula}
      text-format: '{0:.3f}'
    - color: darkgrey
      text-size: 24
      text-font: DejaVuSans.ttf
      formula: '1'
      text: ⇄
  activation: push
  representation: annunciator
  commands:
    press: sim/GPS/g1000n1_com_ff
