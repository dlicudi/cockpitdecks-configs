        text-size: 80
        text-font: D-DINCondensed.otf
        formula: "${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /"
        text: "${formula}"
        text-format: "{0:.3f}"
      B1:
        color: darkgrey
        text-size: 64
        text-font: DejaVuSans.ttf
        formula: "1"
        text: "⇄"
        # framed: true

