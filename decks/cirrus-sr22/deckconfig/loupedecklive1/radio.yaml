      size: medium
      model: B
      parts:
      - color: lime
        text-size: 30
        text-font: D-DINCondensed.otf
        formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
      - color: darkgrey
        text-size: 24
        text-font: DejaVuSans.ttf
        formula: '1'
        text: ⇄
  vibrate: SHORT
