name: radio
includes: pager,encoders/encoders_radio
buttons:

# ROW 1: COM1 (left) / COM2 (right)
- index: 0
  name: COM1
  label: "COM 1"
  label-color: white
  label-size: 9
  type: push
  vibrate: SHORT
  command: sim/GPS/g1000n1_com_ff
  annunciator:
    size: medium
    model: D
    parts:
      D0:
        color: lime
        text-size: 36
        formula: "${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /"
        text: "${formula}"
        text-format: "{0:.3f}"
      D1:
        color: cyan
        text-size: 36
        formula: "${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /"
        text: "${formula}"
        text-format: "{0:.3f}"
        frame: True
      D2:
        text-size: 28
        text: "${data:com1_encoder-toggle}"
        text-color: Orange
        formula: 1

- index: 3
  name: COM2
  label: "COM 2"
  label-color: white
  label-size: 9
  type: push
  vibrate: SHORT
  command: sim/radios/com2_standy_flip
  annunciator:
    size: medium
    model: D
    parts:
      D0:
        color: lime
        text-size: 36
        formula: "${sim/cockpit2/radios/actuators/com2_frequency_hz_833} 1000 /"
