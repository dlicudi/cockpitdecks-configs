name: radio
includes:
- pager
- encoders/radio
buttons:
- index: 0
  name: COM1_STDBY
  activation:
    type: push
    commands:
      press: sim/GPS/g1000n1_com_ff
  representation:
    type: annunciator
    label: STDBY
    label-color: white
    annunciator:
      size: medium
      model: D
      parts:
      - color: cyan
        text-size: 30
        text-font: D-DINCondensed.otf
        formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
      - color: cyan
        led: dot
        formula: ${data:com1_encoder-toggle} 0 eq
      - color: cyan
        led: dot
        formula: ${data:com1_encoder-toggle} 1 eq
  vibrate: SHORT
- index: 1
  name: COM1_ACTIVE
  activation:
    type: push
    commands:
      press: sim/GPS/g1000n1_com_ff
  representation:
