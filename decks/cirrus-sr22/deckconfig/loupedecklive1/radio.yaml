name: radio
includes: pager,encoders/encoders_radio
buttons:

# ROW 1: COM1 (left) / NAV1 (right)
- index: 0
  name: COM1_STDBY
  label: "STDBY"
  label-color: white
  type: push
  vibrate: SHORT
  command: sim/GPS/g1000n1_com_ff
  annunciator:
    size: medium
    model: D
    parts:
      D0:
        color: cyan
        text-size: 80
        text-font: D-DINCondensed.otf
        formula: "${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /"
        text: "${formula}"
        text-format: "{0:.3f}"
        # frame: True
      D1:
        color: cyan
        led: dot
        formula: ${data:com1_encoder-toggle} 0 eq
      D2:
        color: cyan
        led: dot
        formula: ${data:com1_encoder-toggle} 1 eq


