aircraft: Cirrus SR22
icao: SR22
model:  Cirrus SR22
render-flush-delay-ms: 50
decks:
  - name: Loupedeck Live 1
    type: LoupedeckLive
    layout: loupedecklive1
    brightness: 70
  - name: StreamDeck XL 1
    type: Stream Deck XL
    layout: streamdeckxl1
    brightness: 70
  # - name: Virtual Streamdeck XL 1
  #   type: Virtual Streamdeck XL
  #   layout: streamdeckxl1
  # - name: Virtual Loupedeck Live 1
  #   type: Virtual LoupedeckLive
  #   layout: loupedecklive1
  - name: sr22-ipad
    type: iPad
    layout: ipad1
  - name: sr22-iphone
    type: iPhone
    layout: iphone1
description: Decks for Cirrus SR22

web-deck-defaults:
    highlight: "#ffffff10"
    flash: "#0f80ffb0"
    flash_duration: 100


# cache-icon: True
dataref-roundings:
    # Keep websocket churn aligned with what the deck actually displays.
    sim/cockpit/autopilot/heading_mag: 0
    sim/cockpit/autopilot/vertical_velocity: 0
    sim/cockpit/misc/barometer_setting: 2
    sim/cockpit2/autopilot/altitude_dial_ft: 0
    sim/cockpit2/electrical/battery_on[*]: 0
    sim/cockpit2/electrical/generator_on[*]: 0
    sim/cockpit2/engine/actuators/ignition_key[*]: 0
    sim/cockpit2/engine/indicators/EGT_deg_cel[*]: 0
    sim/cockpit2/engine/indicators/oil_pressure_psi[0]: 0
    sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]: 0
    sim/cockpit2/engine/indicators/prop_speed_rpm[0]: 0
    sim/cockpit2/fuel/fuel_quantity[*]: 1
    sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot: 2
    sim/cockpit2/gauges/indicators/airspeed_kts_pilot: 0
    sim/cockpit2/gauges/indicators/altitude_ft_pilot: 0
    sim/cockpit2/gauges/indicators/compass_heading_deg_mag: 0
    sim/cockpit2/gauges/indicators/vvi_fpm_pilot: 0
    sim/cockpit2/radios/indicators/gps_bearing_deg_mag: 0
    sim/cockpit2/radios/indicators/gps_dme_distance_nm: 1
    sim/cockpit2/radios/indicators/gps_dme_time_min: 0
    sim/flightmodel/engine/ENGN_FF_[0]: 4
    sim/flightmodel/engine/ENGN_mixt[0]: 2
    sim/flightmodel/engine/ENGN_thro[0]: 2
    sim/weather/aircraft/temperature_ambient_deg_c: 0
    sim/cockpit2/engine/indicators/engine_speed_rpm[0]: 0
    sim/cockpit2/engine/indicators/CHT_deg_C[*]: 0
    sim/cockpit2/engine/indicators/MPR_in_hg[0]: 2
    sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]: 4
    sim/cockpit2/electrical/battery_amps[0]: 2
    sim/cockpit2/electrical/generator_amps[*]: 2
    sim/cockpit/electrical/battery_charge_watt_hr[0]: 1
    sim/cockpit2/transmissions/indicators/oil_pressure: 0
    sim/cockpit2/transmissions/indicators/oil_temperature: 0
    sim/cockpit/misc/vacuum: 1
    sim/cockpit2/gauges/indicators/ground_speed_kt: 0
