- index: 0
  activation:
    type: push
    commands:
      press: sim/electrical/battery_2_toggle
  representation:
    type: annunciator
    label: BAT 2
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[1]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[1]} 1 eq
  vibrate: SHORT
