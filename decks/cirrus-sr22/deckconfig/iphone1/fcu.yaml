name: fcu
fill-empty-keys: false
buttons:
- index: 0
  name: hdg_swipe
  span:
  - 1
  - 3
  activation:
    type: swipe
    commands:
      up: sim/autopilot/heading_up
      down: sim/autopilot/heading_down
    step: 40
    minimum-distance: 20
  representation:
    label: ↕ HDG
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - text: ${sim/cockpit/autopilot/heading_mag}
        text-size: 34
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
        formula: '1'
        color: cyan
      - text: HDG
        text-size: 12
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 1
  name: APR
  activation:
    type: push
    commands:
      press: sim/autopilot/approach
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/approach_status}
      - text: APR
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 2
  name: AP
  activation:
    type: push
    commands:
      press: sim/autopilot/servos_toggle
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/servos_on}
      - text: AP
        text-size: 20
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 3
  name: vs_swipe
  span:
  - 1
  - 3
  activation:
    type: swipe
    commands:
      up: sim/autopilot/vertical_speed_down
      down: sim/autopilot/vertical_speed_up
    step: 40
    minimum-distance: 20
  representation:
    label: ↕ VS
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - text: ${sim/cockpit/autopilot/vertical_velocity}
        text-size: 30
        text-font: Seven Segment.ttf
        text-format: '{0:+.0f}'
        formula: '1'
        color: cyan
      - text: VS
        text-size: 12
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 4
  name: FLC
  activation:
    type: push
    commands:
      press: sim/autopilot/level_change
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_mode} 5 eq
      - text: FLC
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 5
  name: altitude_swipe
  span:
  - 1
  - 3
  activation:
    type: swipe
    commands:
      up: sim/autopilot/altitude_up
      down: sim/autopilot/altitude_down
    step: 40
    minimum-distance: 20
  representation:
    label: ↕ ALT
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - text: ${sim/cockpit/autopilot/altitude}
        text-size: 28
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
        formula: '1'
        color: cyan
      - text: ALT
        text-size: 12
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 7
  vibrate: SHORT
  activation:
    type: page
    page: home
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: HOME
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 10
  name: FD
  activation:
    type: push
    commands:
      press: sim/autopilot/fdir_toggle
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/flight_director_mode}
      - text: FD
        text-size: 20
        text-font: D-DINCondensed-Bold.otf
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 12
  name: VNAV
  activation:
    type: push
    commands:
      press: sim/autopilot/vnav
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/vnav_armed}
      - text: VNAV
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 15
  vibrate: SHORT
  activation:
    type: page
    page: switches
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: SWITCHES
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 23
  activation:
    type: page
    page: fcu
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: FCU
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 24
  name: HDG
  activation:
    type: push
    commands:
      press: sim/autopilot/heading
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/heading_status}
      - text: HDG
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 25
  name: NAV
  activation:
    type: push
    commands:
      press: sim/autopilot/NAV
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/sr22/annunciators/ap/nav}
      - text: NAV
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 27
  name: VS
  activation:
    type: push
    commands:
      press: sim/autopilot/vertical_speed
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_mode} 4 eq
      - text: VS
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
- index: 29
  name: ALT
  activation:
    type: push
    commands:
      press: sim/autopilot/altitude_hold
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_hold_status}
      - text: ALT
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 31
  vibrate: SHORT
  activation:
    type: page
    page: engine
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: ENGINE
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
