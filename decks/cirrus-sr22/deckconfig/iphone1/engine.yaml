name: engine
fill-empty-keys: false
buttons:
- index: 0
  name: throttle_slider
  span:
  - 1
  - 3
  activation:
    type: slider
    set-dataref: sim/flightmodel/engine/ENGN_thro[0]
    value-min: 0
    value-max: 1
  representation:
    type: slider-icon
    slider-icon:
      dataref: sim/flightmodel/engine/ENGN_thro[0]
      value-min: 0
      value-max: 1
      label: POWER
      fill-color: cyan
      orientation: vertical
- index: 1
  name: mixture_slider
  span:
  - 1
  - 3
  activation:
    type: slider
    set-dataref: sim/flightmodel/engine/ENGN_mixt[0]
    value-min: 0
    value-max: 1
  representation:
    type: slider-icon
    slider-icon:
      dataref: sim/flightmodel/engine/ENGN_mixt[0]
      value-min: 0
      value-max: 1
      label: MIXTURE
      fill-color: '#ff8c00'
      orientation: vertical
- index: 2
  name: NEW 16
  activation:
    type: sweep
    positions:
    - laminar/sr22/fuel_sel_left_select
    - laminar/sr22/fuel_sel_right_select
  representation:
    label: FUEL TANKS
    type: annunciator
    annunciator:
      model: F
      size: medium
      parts:
      - text: ${formula} g
        text-size: 11
        color: yellow
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      - text: ${formula} g
        text-size: 11
        color: yellow
        formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      - text-size: 12
        color: lime
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq
        led: dot
      - text-size: 12
        color: lime
        formula: ${laminar/sr22/fuel_selector_pos} 2 eq
        led: dot
- index: 3
  activation:
    type: push
    commands:
      press: sim/flight_controls/park_brake_valve_toggle
  representation:
    type: annunciator
    label: PARK BRAKE
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
      - text: 'ON'
        color: red
        framed: true
        formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq
  vibrate: SHORT
- index: 7
  vibrate: SHORT
  activation:
    type: page
    page: home
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: HOME
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 8
  vibrate: SHORT
  activation:
    type: page
    page: engine
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: ENGINE
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 9
  activation:
    type: page
    page: fcu
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: FCU
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 10
  name: ENGINE START
  activation:
    type: begin-end-command
    commands:
      press: sim/starters/engage_starter_1
  representation:
    type: multi-icons
    multi-icons:
    - ENGINE_START.png
    - ENGINE_START.png
    - ENGINE_START.png
    - ENGINE_START.png
    - ENGINE_START_PRESSED.png
    formula: ${sim/cockpit2/engine/actuators/ignition_key[0]}
  vibrate: LONG
- index: 11
  activation:
    type: push
    commands:
      press: laminar/sr22/fuel_sel_left_off
  representation:
    type: annunciator
    label: FUEL OFF
    annunciator:
      model: B
      size: medium
      parts:
      - led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq ${laminar/sr22/fuel_selector_pos}
          2 eq +
      - text: 'OFF'
        color: red
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 0 eq ${laminar/sr22/fuel_selector_pos}
          3 eq +
  vibrate: SHORT
- index: 15
  vibrate: SHORT
  activation:
    type: page
    page: switches
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: SWITCHES
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 23
  activation:
    type: page
    page: fcu
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: FCU
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 31
  vibrate: SHORT
  activation:
    type: page
    page: engine
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: ENGINE
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
