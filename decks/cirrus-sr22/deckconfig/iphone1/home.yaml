name: home
fill-empty-keys: false
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/electrical/battery_2_toggle
  representation:
    type: annunciator
    label: BAT 2
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[1]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[1]} 1 eq
  vibrate: SHORT
- index: 1
  activation:
    type: push
    commands:
      press: sim/electrical/battery_1_toggle
  representation:
    type: annunciator
    label: BAT 1
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq
  vibrate: SHORT
- index: 2
  activation:
    type: push
    commands:
      press: sim/electrical/generator_1_toggle
  representation:
    type: annunciator
    label: ALT 1
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[0]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[0]} 1 eq
  vibrate: SHORT
- index: 3
  activation:
    type: push
    commands:
      press: sim/electrical/generator_2_toggle
  representation:
    type: annunciator
    label: ALT 2
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[1]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[1]} 1 eq
  vibrate: SHORT
- index: 4
  activation:
    type: push
    commands:
      press: sim/ice/window_heat_tog
  representation:
    type: annunciator
    label: WSHLD
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_window_heat} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_window_heat} 1 eq
  vibrate: SHORT
- index: 5
  name: FLC
  activation:
    type: push
    commands:
      press: sim/autopilot/level_change
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_mode} 5 eq
      - text: FLC
        text-size: 23
        text-font: D-DINCondensed-Bold.otf
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 6
  name: WAYPOINT
  activation:
    type: none
  representation:
    type: annunciator
    label: NEXT WPT
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
      - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
        text-color: Lime
        text-font: OverpassMono-Medium.ttf
        text-size: 10
        formula: '1'
      - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

          DIS'
        text-color: Lime
        text-font: RobotoCondensed-Regular.ttf
        text-size: 10
        text-format: '{0:.1f}'
        formula: '1'
      - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

          DTK'
        text-color: Lime
        text-font: RobotoCondensed-Regular.ttf
        text-size: 10
        text-format: '{0:.0f}'
        formula: '1'
      - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
        text-color: Lime
        text-font: RobotoCondensed-Regular.ttf
        text-size: 10
        text-format: '{0:.0f}'
        formula: '1'
  render-cooldown-ms: 750
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
- index: 7
  vibrate: SHORT
  activation:
    type: page
    page: home
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: HOME
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 8
  name: ENGINE START
  activation:
    type: begin-end-command
    commands:
      press: sim/starters/engage_starter_1
  representation:
    type: multi-icons
    multi-icons:
    - ENGINE_START.png
    - ENGINE_START.png
    - ENGINE_START.png
    - ENGINE_START.png
    - ENGINE_START_PRESSED.png
    formula: ${sim/cockpit2/engine/actuators/ignition_key[0]}
  vibrate: LONG
- index: 9
  activation:
    type: push
    commands:
      press: sim/flight_controls/park_brake_valve_toggle
  representation:
    type: annunciator
    label: PARK BRAKE
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: green
        formula: ${sim/cockpit2/controls/park_brake_valve} 0 eq
        text-size: 14
      - text: 'ON'
        color: red
        framed: true
        formula: ${sim/cockpit2/controls/park_brake_valve} 1 eq
        text-size: 14
      annunciator-style: v
  vibrate: SHORT
- index: 10
  activation:
    type: push
    commands:
      press: laminar/sr22/fuel_sel_left_off
  representation:
    type: annunciator
    label: FUEL OFF
    annunciator:
      model: B
      size: medium
      parts:
      - led: bar
        color: grey
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq ${laminar/sr22/fuel_selector_pos}
          2 eq +
      - text: 'OFF'
        color: red
        framed: true
        formula: ${laminar/sr22/fuel_selector_pos} 0 eq ${laminar/sr22/fuel_selector_pos}
          3 eq +
  vibrate: SHORT
- index: 11
  name: FUEL SEL
  activation:
    type: sweep
    positions:
    - laminar/sr22/fuel_sel_left_select
    - laminar/sr22/fuel_sel_right_select
  representation:
    type: annunciator
    annunciator:
      model: F
      size: medium
      parts:
      - text: ${formula} g
        text-size: 11
        color: yellow
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      - text: ${formula} g
        text-size: 11
        color: yellow
        formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      - text-size: 12
        color: lime
        formula: ${laminar/sr22/fuel_selector_pos} 1 eq
        led: dot
      - text-size: 12
        color: lime
        formula: ${laminar/sr22/fuel_selector_pos} 2 eq
        led: dot
- index: 12
  activation:
    type: push
    commands:
      press: sim/ice/pitot_heat0_tog
  representation:
    type: annunciator
    label: PITOT
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
  vibrate: SHORT
- index: 13
  activation:
    type: push
    commands:
      press: sim/lights/generic_13_light_tog
  representation:
    type: annunciator
    label: ICE
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/generic_lights_switch[12]} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/generic_lights_switch[12]} 1 eq
  vibrate: SHORT
- index: 14
  activation:
    type: sweep
    positions:
    - sim/ice/tks_bkup_off
    - sim/ice/tks_bkup_on
  representation:
    type: annunciator
    label: PUMP BKUP
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/ice/tks_backup_pump} 0 eq
      - text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/ice/tks_backup_pump} 1 eq
  vibrate: SHORT
- index: 15
  vibrate: SHORT
  activation:
    type: page
    page: switches
  representation:
    text-bg-color: (20, 20, 20)
    type: text
    text: SWITCHES
    text-font: D-DINCondensed.otf
    text-size: 18
    text-color: khaki
    text-position: cm
- index: 16
  name: AP
  activation:
    type: push
    commands:
      press: sim/autopilot/servos_toggle
  representation:
    type: annunciator
    annunciator:
      size: medium
