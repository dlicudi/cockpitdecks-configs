description: Switch Panel
includes:
- pager
- encoders/encoders_fcu
name: icing
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/ice/pitot_heat0_tog
  representation:
    type: annunciator
    label: PITOT L
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
- index: 1
  activation:
    type: push
    commands:
      press: sim/ice/pitot_heat1_tog
  representation:
    type: annunciator
    label: PITOT R
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on2} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on2} 1 eq
- index: 2
  activation:
    type: push
    commands:
      press: sim/ice/AOA_heat0_tog
  representation:
    type: annunciator
    label: STALL WARN
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/ice/ice_AOA_heat_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/ice/ice_AOA_heat_on} 1 eq
- index: 3
  activation:
    type: push
    commands:
      press: sim/ice/prop_heat_tog
  representation:
    type: annunciator
    label: PROP
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_prop_heat} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_prop_heat} 1 eq
- index: 4
  activation:
    type: push
    commands:
      press: sim/ice/window_heat_tog
  representation:
    type: annunciator
    label: WSHLD
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_window_heat} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_window_heat} 1 eq
- index: 5
  activation:
    type: push
    commands:
      press: sim/ice/wing_boot0_on
  representation:
    type: annunciator
    label: BOOTS AUTO
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_surf_boot} 1 eq not
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_surf_boot} 1 eq
- index: 6
  activation:
    type: push
    commands:
      press: sim/ice/wing_boot0_off
  representation:
    type: annunciator
    label: BOOTS OFF
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        color: grey
        led: bars
        formula: ${sim/cockpit/switches/anti_ice_surf_boot} 0 eq not
      B1:
        color: lime
        led: bars
        framed: true
        formula: ${sim/cockpit/switches/anti_ice_surf_boot} 0 eq
- index: 7
  activation:
    type: long-press
    commands:
      press: sim/ice/wing_boot0_man
  representation:
    type: multi-texts
    label: BOOTS
    label-color: Lime
    text-bg-color: Black
    multi-texts:
    - text: 'OFF'
      text-color: White
    - text: AUTO
      text-color: Orange
    - text: MANUAL
      text-color: Orange
    - text: MAN
      text-color: Orange
    formula: ${sim/cockpit/switches/anti_ice_surf_boot}
  vibrate: LONG
  size: medium
- index: 11
  activation:
    type: page
    page: switches
  representation:
    type: text
    label: SWITCHES
    label-color: Gold
    label-size: 10
    text: →
    text-font: fontawesome.otf
    text-size: 48
    text-color: Gold
