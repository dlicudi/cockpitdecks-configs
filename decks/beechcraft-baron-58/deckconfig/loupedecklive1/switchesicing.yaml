description: Switch Panel
includes:
- pager
- encoders/encoders_fcu
name: icing
buttons:
- index: 0
  label: PITOT L
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/pitot_heat0_tog
- index: 1
  label: PITOT R
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/switches/pitot_heat_on2} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/switches/pitot_heat_on2} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/pitot_heat1_tog
- index: 2
  label: STALL WARN
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/ice/ice_AOA_heat_on} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/ice/ice_AOA_heat_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/AOA_heat0_tog
- index: 3
  label: PROP
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/switches/anti_ice_prop_heat} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/switches/anti_ice_prop_heat} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/prop_heat_tog
- index: 4
  label: WSHLD
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/switches/anti_ice_window_heat} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/switches/anti_ice_window_heat} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/window_heat_tog
- index: 5
  label: BOOTS AUTO
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/switches/anti_ice_surf_boot} 1 eq not
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/switches/anti_ice_surf_boot} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/wing_boot0_on
- index: 6
  label: BOOTS OFF
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      color: grey
      led: bars
      formula: ${sim/cockpit/switches/anti_ice_surf_boot} 0 eq not
    B1:
      color: lime
      led: bars
      framed: true
      formula: ${sim/cockpit/switches/anti_ice_surf_boot} 0 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/wing_boot0_off
- index: 7
  vibrate: LONG
  size: medium
  label: BOOTS
  label-color: Lime
  text-bg-color: Black
  multi-texts:
  - text: 'OFF'
    text-color: White
  - text: AUTO
    text-color: Orange
  - text: MANUAL
    text-color: Orange
  - text: MAN
    text-color: Orange
  formula: ${sim/cockpit/switches/anti_ice_surf_boot}
  activation: long-press
  representation: multi-texts
  commands:
    press: sim/ice/wing_boot0_man
- index: 11
  label: SWITCHES
  label-color: Gold
  label-size: 10
  page: switches
  text: →
  text-font: fontawesome.otf
  text-size: 48
  text-color: Gold
  activation: page
  representation: text
