buttons:
- index: e0
  name: range_encoder
  activation: encoder
  commands:
    cw: sim/GPS/g430n1_zoom_out
    ccw: sim/GPS/g430n1_zoom_in
- index: e1
  name: comvloc_outer
  activation: encoder-push
  commands:
    press: sim/GPS/g430n1_nav_com_tog
    cw: sim/GPS/g430n1_coarse_up
    ccw: sim/GPS/g430n1_coarse_down
- index: e2
  name: comvloc_inner
  activation: encoder-push
  commands:
    press: sim/GPS/g430n1_nav_com_tog
    cw: sim/GPS/g430n1_fine_up
    ccw: sim/GPS/g430n1_fine_down
- index: e3
  name: volume_encoder
  commands:
    ccw: sim/GPS/g430n1_cvol_dn
    cw: sim/GPS/g430n1_cvol_up
    ccw-off: sim/GPS/g430n1_vvol_dn
    cw-off: sim/GPS/g430n1_vvol_up
  activation: encoder-mode
- index: e4
  name: fms_encoder_outer
  activation: encoder-push
  commands:
    press: sim/GPS/g430n1_cursor
    cw: sim/GPS/g430n1_chapter_up
    ccw: sim/GPS/g430n1_chapter_dn
- index: e5
  name: fms_encoder_inner
  activation: encoder-push
  commands:
    press: sim/GPS/g430n1_cursor
    cw: sim/GPS/g430n1_page_up
    ccw: sim/GPS/g430n1_page_dn
- index: left
  name: left_screen
  side:
    icon-color: Black
    labels:
    - label: RNG
      label-size: 14
      label-font: B612-Bold
      label-color: Gold
      text-size: 18
      text-font: Seven Segment.ttf
      text-color: White
      text: +/-
    - label: COM/VLOC
      label-size: 10
      label-font: B612-Bold
      label-color: Gold
      text-size: 18
      text-font: Seven Segment.ttf
      text-color: White
      text: OUTER
    - label: COM/VLOC
      label-size: 10
      label-font: B612-Bold
      label-color: Gold
      text-size: 18
      text-font: Seven Segment.ttf
      text-color: White
      text: INNER
  activation: none
- index: right
  name: right_screen
  side:
    icon-color: Black
    labels:
    - label: VOLUME
      label-size: 14
      label-font: B612-Bold
      label-color: Gold
      text-size: 18
      text-font: Seven Segment.ttf
      text-color: White
      text: C/V
    - label: GPS
      label-size: 14
      label-font: B612-Bold
      label-color: Gold
      text-size: 18
      text-font: Seven Segment.ttf
      text-color: White
      text: Outer
    - label: GPS
      label-size: 14
      label-font: B612-Bold
      label-color: Gold
      text-size: 18
      text-font: Seven Segment.ttf
      text-color: White
      text: Inner
  activation: none
