description: Switch Panel
includes:
- pager
- encoders/encoders_fcu
name: lights
buttons:
- index: 0
  label: ICE
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/generic_lights_switch[0]} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/switches/generic_lights_switch[0]} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/generic_01_light_tog
