- index: 6
  name: ROOF LIGHT L
  activation:
    type: sweep
    dataref: laminar/b58/lighting/roof_L_on
    set-dataref: laminar/b58/lighting/roof_L_on
  representation:
    type: switch
    label: ROOF L
    label-font: DIN Condensed Regular
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-label-size: 42
      tick-label-font: DIN Bold
      tick-underline: false
- index: 7
  name: ROOF LIGHT R
  activation:
    type: sweep
    dataref: laminar/b58/lighting/roof_R_on
    set-dataref: laminar/b58/lighting/roof_R_on
  representation:
    type: switch
    label: ROOF R
    label-font: DIN Condensed Regular
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-label-size: 42
      tick-label-font: DIN Bold
      tick-underline: false
- index: 11
  activation:
    type: page
    page: icing
  representation:
    type: text
    label: ICING
    label-color: Gold
    label-size: 10
    text: →
    text-font: fontawesome.otf
    text-size: 48
    text-color: Gold
