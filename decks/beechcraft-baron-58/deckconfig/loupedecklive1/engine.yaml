description: Engine
includes:
- pager
- encoders/encoders_fcu
name: engine
buttons:
- index: 0
  name: MANIFOLD_PRESSURE
  activation:
    type: none
  representation:
    type: annunciator
    label: MAN PRESS
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 40
        formula: ${sim/cockpit2/engine/indicators/MPR_in_hg[0]} round
        text: ${formula} inHg
      - color: green
        text-size: 40
        formula: ${sim/cockpit2/engine/indicators/MPR_in_hg[1]} round
        text: ${formula} inHg
- index: 1
  name: PROP_RPM
  activation:
    type: none
  representation:
    type: annunciator
    label: PROP RPM
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 42
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/engine_speed_rpm[0]}
        text-format: '{0:.0f}'
      - color: green
        text-size: 42
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/engine_speed_rpm[1]}
        text-format: '{0:.0f}'
- index: 2
  name: FUEL_FLOW
  activation:
    type: none
  representation:
    type: annunciator
    label: FUEL FLOW
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 42
        formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3600 * 0.8 / 3.78541 / 2 roundn
        text: ${formula} GPH
        text-format: '{0:.2f}'
      - color: green
        text-size: 42
        formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[1]} 3600 * 0.8 / 3.78541 / 2 roundn
        text: ${formula} GPH
        text-format: '{0:.2f}'
- index: 3
  name: TEMP_CHT
  activation:
    type: none
  representation:
    type: annunciator
    label: TEMP CHT
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/CHT_deg_C[0]}
        text-format: '{0:.0f}°C'
        formula: '1'
      - color: green
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/CHT_deg_C[1]}
        text-format: '{0:.0f}°C'
        formula: '1'
- index: 4
  name: TEMP_EGT
  activation:
    type: none
  representation:
    type: annunciator
    label: TEMP EGT
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/EGT_deg_cel[0]}
        text-format: '{0:.0f}°C'
        formula: '1'
      - color: green
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/EGT_deg_cel[1]}
        text-format: '{0:.0f}°C'
        formula: '1'
- index: 5
  name: OIL_TEMP
  activation:
    type: none
  representation:
    type: annunciator
    label: OIL TEMP
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]}
        text-format: '{0:.0f}°C'
        formula: '1'
      - color: green
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[1]}
        text-format: '{0:.0f}°C'
        formula: '1'
- index: 6
  name: OIL_PRESS
  activation:
    type: none
  representation:
    type: annunciator
    label: OIL PRESS
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}
        text-format: '{0:.0f} PSI'
        formula: '1'
      - color: green
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/oil_pressure_psi[1]}
        text-format: '{0:.0f} PSI'
        formula: '1'
- index: 7
  name: FUEL
  activation:
    type: none
  representation:
    type: annunciator
    label: FUEL QTY
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 32
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
        text: L ${formula} gal
      - color: yellow
        text-size: 32
        formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
        text: R ${formula} gal
- index: 8
  name: FUEL_QTY_TOTAL
  activation:
    type: none
  representation:
    type: data
    label: FUEL QTY
    label-size: 10
    label-color: Lime
    data-bg-color: Black
    data:
      icon: fa:gas-pump
      top-line-color: ivory
      top-line-width: 10
      icon-size: 60
      icon-color: white
      data: ${formula}
      data-format: '{:3.0f}'
      data-font: DIN Condensed Light
      data-size: 50
      data-color: white
      data-progress: 141
      data-trend: 1
      data-unit: gal
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]} + 0.264172 * 2 roundn
      bottomline: Gallons
      bottomline-size: 30
      bottomline-color: ivory
      mark: ${fa:arrow-right}
      mark-size: 20
      mark-font: fontawesome.otf
      mark-color: red
- index: 11
  name: FUEL EST
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: green
        text-size: 42
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]} + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 + / 3600 / 1 roundn
        text: ${formula} hrs
      - text: FUEL EST
        text-size: 42
        text-font: DIN Bold
        formula: '1'
