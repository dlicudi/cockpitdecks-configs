description: FCU
includes:
- pager
- encoders/encoders_fcu
name: fcu
buttons:
- index: 0
  name: AP
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/servos_on}
    - text: AP
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/servos_toggle
- index: 1
  name: FD
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/flight_director_mode}
    - text: FD
      text-size: 60
      text-font: DIN Bold
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/fdir_toggle
- index: 2
  name: HDG
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/heading_status}
    - text: HDG
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/heading
- index: 3
  name: ALT
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_hold_status}
    - text: ALT
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/altitude_hold
- index: 4
  name: NAV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/gpss_status} 2 eq
    - text: NAV
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/gpss
- index: 5
  name: VNAV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/vnav_armed}
    - text: VNAV
      text-size: 60
      text-font: DIN Bold
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/vnav
- index: 6
  name: APR
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/approach_status}
    - text: APR
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/approach
- index: 7
  name: REV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/backcourse_status}
    - text: REV/BC
      text-size: 50
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/back_course
- index: 8
  name: VS
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_mode} 4 eq
    - text: VS
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/vertical_speed
- index: 9
  page: g530
  label: G530
  label-color: Gold
  text: 
  text-color: khaki
  text-size: 40
  text-font: fontawesome.otf
  text-position: cm
  text-bg-color: (40, 30, 40)
  activation: page
  representation: text
- index: 10
  name: FLC
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_mode} 5 eq
    - text: FLC
      text-size: 60
      text-font: DIN Bold
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/level_change
- index: 11
  name: NAVGPS
  label: NAVGPS
  label-size: 10
  label-color: black
  annunciator:
    size: medium
    model: B
    parts:
    - text: NAV
      text-color: yellow
      text-font: DIN Condensed Black.otf
      text-size: 50
      formula: ${sim/cockpit/switches/HSI_selector} 0 eq
    - text: GPS
      text-color: lime
      text-font: DIN Condensed Black.otf
      text-size: 50
      formula: ${sim/cockpit/switches/HSI_selector} 2 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/GPS/g430n1_cdi
