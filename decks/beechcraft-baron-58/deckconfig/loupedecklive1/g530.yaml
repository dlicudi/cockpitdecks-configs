name: g530
includes:
- pager
- encoders/encoders_g530
buttons:
- index: 0
  name: DIRECT
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_direct
  representation:
    type: text
    text: DIRECT
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 1
  name: MENU
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_menu
  representation:
    type: text
    text: MENU
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 2
  name: FPL
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_fpl
  representation:
    type: text
    text: FPL
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 3
  name: PROC
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_proc
  representation:
    type: text
    text: PROC
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 4
  name: CLR
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_clr
  representation:
    type: text
    text: CLR
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 5
  name: ENT
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_ent
  representation:
    type: text
    text: ENT
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 6
  name: CDI
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_cdi
  representation:
    type: annunciator
    label: CDI
    label-size: 10
    label-color: khaki
    annunciator:
      size: medium
      model: B
      parts:
      - text: VLOC
        text-color: lime
        text-font: DIN Condensed Black.otf
        text-size: 50
        formula: ${sim/cockpit/switches/HSI_selector} 0 eq
      - text: GPS
        text-color: lime
        text-font: DIN Condensed Black.otf
        text-size: 50
        formula: ${sim/cockpit/switches/HSI_selector} 2 eq
- index: 7
  name: OBS
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_obs
  representation:
    type: text
    text: OBS
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 8
  name: MSG
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_msg
  representation:
    type: text
    text: MSG
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 9
  name: VNAV
  activation:
    type: push
    commands:
      press: sim/GPS/g430n1_vnav
  representation:
    type: text
    text: VNAV
    text-color: khaki
    text-size: 24
    text-font: DIN Condensed Light
    text-position: cm
    text-bg-color: (40, 40, 40)
- index: 10
  name: COM1
  activation:
    type: push
    commands:
      press: sim/radios/com1_standy_flip
  representation:
    type: annunciator
    label: COM 1
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 36
        formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
      - color: green
        text-size: 36
        formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
        text-bg-color: (40, 40, 40)
        frame: true
- index: 11
  name: NAV1
  activation:
    type: push
    commands:
      press: sim/radios/nav1_standy_flip
  representation:
    type: annunciator
    label: VLOC 1
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 36
        formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
      - color: green
        text-size: 36
        formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
        frame: true
