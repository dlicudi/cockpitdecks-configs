name: pedestal
includes:
- pager
- encoders/encoders_pedestal
buttons:
- index: 2
  activation:
    type: push
    commands:
      press: sim/flight_controls/brakes_toggle_max
  representation:
    type: multi-texts
    label: TOGGLE BRAKES
    label-size: 8
    label-color: White
    text-bg-color: Black
    multi-texts:
    - text: 'OFF'
      text-color: Lime
    - text: 'ON'
      text-color: Red
    formula: ${sim/cockpit2/controls/parking_brake_ratio}
  vibrate: SHORT
