name: overhead-cargo-smoke
description: "A320 Overhead — CARGO SMOKE (fwd/aft isolation & ventilation)"
includes:
- overhead-pager
fill-empty-keys: false
buttons:
# ── FWD CARGO ───────────────────────────────────────────────────────────────
- index: 0
  name: CARGO_FWD
  activation:
    type: sweep
    set-dataref: AirbusFBW/FwdCargo
  representation:
    type: annunciator
    label: CARGO FWD
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'ON'
        text-color: lime
        framed: true
        text-size: 20
        formula: ${AirbusFBW/FwdCargo}
      - text: 'OFF'
        text-color: darkorange
        text-size: 20
        formula: ${AirbusFBW/FwdCargo} not
  vibrate: SHORT
# ── AFT CARGO ───────────────────────────────────────────────────────────────
- index: 1
  name: CARGO_AFT
  activation:
    type: sweep
    set-dataref: AirbusFBW/AftCargo
  representation:
    type: annunciator
    label: CARGO AFT
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'ON'
        text-color: lime
        framed: true
        text-size: 20
        formula: ${AirbusFBW/AftCargo}
      - text: 'OFF'
        text-color: darkorange
        text-size: 20
        formula: ${AirbusFBW/AftCargo} not
  vibrate: SHORT
# ── SMOKE DETECTION STATUS (OHPLightsATA26) ─────────────────────────────────
- index: 12
  name: FWD_SMOKE_STATUS
  activation:
    type: none
  representation:
    type: annunciator
    label: FWD SMOKE
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: SMOKE
        text-color: red
        framed: true
        text-size: 16
        formula: ${AirbusFBW/OHPLightsATA26[0]}
- index: 13
  name: AFT_SMOKE_STATUS
  activation:
    type: none
  representation:
    type: annunciator
    label: AFT SMOKE
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: SMOKE
        text-color: red
        framed: true
        text-size: 16
        formula: ${AirbusFBW/OHPLightsATA26[1]}
# ── HOME ───────────────────────────────────────────────────────────────────
- index: 96
  activation:
    type: page
    page: overhead
  representation:
    type: text
    label: HOME
    label-color: gold
    text: "\uF015"
    text-color: khaki
    text-size: 40
    text-font: fontawesome.otf
    text-position: cm
    text-bg-color: (40, 40, 40)
