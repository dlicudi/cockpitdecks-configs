name: overhead-intlt
description: "A320 Overhead — INT LT (dome, ann lt, stby compass)"
includes:
- overhead-pager
fill-empty-keys: false
buttons:
# ── DOME ────────────────────────────────────────────────────────────────────
- index: 0
  name: DOME
  activation:
    type: sweep
    stops: 3
    options: 3way,invert,hexa
    dataref: ckpt/oh/domeLight/anim
    set-dataref: ckpt/oh/domeLight/anim
  representation:
    type: switch
    label: DOME
    label-size: 9
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - BRT
      - DIM
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 22
      tick-label-font: D-DIN-Bold.otf
  vibrate: SHORT
# ── ANN LT ──────────────────────────────────────────────────────────────────
- index: 1
  name: ANN_LT
  activation:
    type: sweep
    stops: 3
    options: 3way,hexa
    dataref: AirbusFBW/AnnunMode
    set-dataref: AirbusFBW/AnnunMode
  representation:
    type: switch
    label: ANN LT
    label-size: 9
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - TEST
      - BRT
      - DIM
      tick-space: 10
      tick-color: white
      tick-label-size: 22
      tick-label-font: D-DIN-Bold.otf
  vibrate: SHORT
# ── STBY COMPASS ────────────────────────────────────────────────────────────
- index: 2
  name: STBY_COMPASS
  activation:
    type: sweep
    options: hexa,invert
    dataref: AirbusFBW/StbyCompassLightLevel
    positions:
    - toliss_airbus/lightcommands/CompassLightToggle
    - toliss_airbus/lightcommands/CompassLightToggle
  representation:
    type: switch
    label: STBY COMPASS
    label-size: 9
    switch:
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 10
      tick-color: white
      tick-label-size: 22
      tick-label-font: D-DIN-Bold.otf
  vibrate: SHORT
# ── STBY COMPASS LIGHT (ckpt anim) ──────────────────────────────────────────
- index: 3
  name: STBY_COMPASS_SWITCH
  activation:
    type: sweep
    options: hexa
    dataref: ckpt/oh/stbyCompass/anim
    set-dataref: ckpt/oh/stbyCompass/anim
  representation:
    type: annunciator
    label: COMPASS LT
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'ON'
        text-color: deepskyblue
        framed: true
        text-size: 20
        formula: ${ckpt/oh/stbyCompass/anim}
  vibrate: SHORT
# ── HOME ───────────────────────────────────────────────────────────────────
- index: 96
  activation:
    type: page
    page: overhead
  representation:
    type: text
    label: HOME
    label-color: gold
    text: "\uF015"
    text-color: khaki
    text-size: 40
    text-font: fontawesome.otf
    text-position: cm
    text-bg-color: (40, 40, 40)
