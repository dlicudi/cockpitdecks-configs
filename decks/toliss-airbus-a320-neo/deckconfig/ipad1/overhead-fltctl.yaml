name: overhead-fltctl
description: "A320 Overhead — FLT CTL (ELAC 1/2, SEC 1/2/3, FAC 1/2)"
includes:
- overhead-pager
fill-empty-keys: false
buttons:
- index: 0
  name: ELAC1
  activation:
    type: sweep
    set-dataref: AirbusFBW/FCCSwitchArray[0]
  representation:
    type: annunciator
    label: ELAC 1
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: FAULT
        text-color: darkorange
        text-size: 16
        formula: ${AirbusFBW/FCCSwitchArray[0]} ${AirbusFBW/FCCAvailArray[0]} 0 eq and
      - text: 'OFF'
        text-color: white
        framed: true
        text-size: 20
        formula: ${AirbusFBW/FCCSwitchArray[0]} not
- index: 1
  name: SEC1
  activation:
    type: sweep
    set-dataref: AirbusFBW/FCCSwitchArray[2]
  representation:
