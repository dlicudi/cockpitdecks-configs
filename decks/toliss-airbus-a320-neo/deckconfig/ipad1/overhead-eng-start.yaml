name: overhead-eng-start
description: "A320 Overhead — ENG START (mode selector, MAN START ENG 1/2)"
includes:
- overhead-pager
fill-empty-keys: false
buttons:
# ── ENGINE MODE SELECTOR ────────────────────────────────────────────────────
- index: 0
  name: ENG_MODE_SEL
  activation:
    type: sweep
    stops: 3
    dataref: AirbusFBW/ENGModeSwitch
    set-dataref: AirbusFBW/ENGModeSwitch
    initial-value: 1
  representation:
    type: switch
    label: ENG MODE
    label-size: 9
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - CRANK
      - NORM
      - IGN/START
      tick-space: 10
      tick-color: white
      tick-label-size: 18
      tick-label-font: D-DIN-Bold.otf
  vibrate: SHORT
# ── ENG MODE STATUS ─────────────────────────────────────────────────────────
- index: 1
  name: ENG_MODE_STATUS
  activation:
    type: none
  representation:
    type: annunciator
    label: MODE
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: CRANK
        text-color: deepskyblue
        framed: true
        text-size: 14
        formula: ${AirbusFBW/ENGModeSwitch} 0 eq
      - text: IGN/STA
        text-color: deepskyblue
        framed: true
        text-size: 14
        formula: ${AirbusFBW/ENGModeSwitch} 2 eq
# ── MAN START ───────────────────────────────────────────────────────────────
- index: 12
  name: ENG1_MAN_START
  activation:
    type: sweep
    set-dataref: AirbusFBW/ManStartSwitchArray[0]
  representation:
    type: annunciator
    label: ENG1 MAN START
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: MAN
        text-color: deepskyblue
        framed: true
        text-size: 18
        formula: ${AirbusFBW/ManStartSwitchArray[0]}
  guard:
    dataref: ckpt/engManStart1/cover
    model: grid
  vibrate: SHORT
- index: 13
  name: ENG1_MAN_START_LIGHT
  activation:
    type: none
  representation:
    type: annunciator
    label: ENG1 START
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'ON'
        text-color: lime
        framed: true
        text-size: 18
        formula: ${AirbusFBW/ManStartLightsArray[0]}
- index: 15
  name: ENG2_MAN_START
  activation:
    type: sweep
    set-dataref: AirbusFBW/ManStartSwitchArray[1]
  representation:
    type: annunciator
    label: ENG2 MAN START
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: MAN
        text-color: deepskyblue
        framed: true
        text-size: 18
        formula: ${AirbusFBW/ManStartSwitchArray[1]}
  guard:
    dataref: ckpt/engManStart2/cover
    model: grid
  vibrate: SHORT
- index: 16
  name: ENG2_MAN_START_LIGHT
  activation:
    type: none
  representation:
    type: annunciator
    label: ENG2 START
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: 'ON'
        text-color: lime
        framed: true
        text-size: 18
        formula: ${AirbusFBW/ManStartLightsArray[1]}
# ── HOME ───────────────────────────────────────────────────────────────────
- index: 96
  activation:
    type: page
    page: overhead
  representation:
    type: text
    label: HOME
    label-color: gold
    text: "\uF015"
    text-color: khaki
    text-size: 40
    text-font: fontawesome.otf
    text-position: cm
    text-bg-color: (40, 40, 40)
