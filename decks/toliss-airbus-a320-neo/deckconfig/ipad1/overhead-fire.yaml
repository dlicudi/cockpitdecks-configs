name: overhead-fire
description: "A320 Overhead — FIRE (ENG 1, APU, ENG 2 detection, test & agent discharge)"
includes:
- overhead-pager
fill-empty-keys: false
buttons:
# ── ENG 1 ──────────────────────────────────────────────────────────────────
- index: 0
  name: ENG1_FIRE
  activation:
    type: none
  representation:
    type: annunciator
    label: ENG 1
    label-size: 9
    annunciator:
      model: A
      size: medium
      parts:
      - text: FIRE
        text-color: black
        text-bg-color: red
        framed: true
        text-size: 18
        formula: ${AirbusFBW/FireAgentSwitchAnim[10]}
  guard:
    dataref: AirbusFBW/OHPGuardsAllATA[17]
    model: grid
- index: 1
  name: ENG1_TEST
  activation:
    type: begin-end-command
    commands:
      press: AirbusFBW/FireTestENG1
  representation:
    type: annunciator
    label: ENG1 TEST
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: TEST
        text-color: white
        text-size: 16
        formula: 1
  vibrate: SHORT
- index: 12
  name: ENG1_AGENT1
  activation:
    type: none
  representation:
    type: annunciator
    label: ENG1 AGT 1
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: SQUIB
        text-color: darkorange
        text-size: 14
      - text: DISCH
        text-color: white
        framed: true
        text-size: 16
- index: 13
  name: ENG1_AGENT2
  activation:
    type: none
  representation:
    type: annunciator
    label: ENG1 AGT 2
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - text: SQUIB
        text-color: darkorange
        text-size: 14
      - text: DISCH
        text-color: white
        framed: true
        text-size: 16
