name: pfi
includes:
- pager
- encoders/encoders_fcu
annnunciator-style: v
buttons:
- index: 8
  name: SPD
  label: SPD
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 9
  name: HDG
  label: HDG
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 10
  name: ALT
  label: ALT
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text-format: '{0:.2f}'
      text: '${sim/cockpit/misc/barometer_setting}

        inHg'
    - color: white
      text-size: 32
      formula: ${sim/cockpit/misc/barometer_setting} 33.8639 *
      text-format: '{0:.0f}'
      text: '${formula}

        hPa'
  activation: none
  representation: annunciator
- index: 11
  name: VS
  label: VS
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 12
  name: FUEL
  label: FUEL QTY
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: L ${formula} gal
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: R ${formula} gal
  activation: none
  representation: annunciator
- index: 13
  name: WIND
  label: WIND DATA
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↓ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↑ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: → ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ← ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 14
  name: FUEL_FLOW
  annunciator:
    size: medium
    model: B
    parts:
    - color: green
      text-size: 42
      formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3600 * 0.8 /
        3.78541 / 2 roundn
      text: ${formula}
    - text: FUEL FLOW
      text-size: 36
      text-font: DIN Bold
      formula: '1'
  activation: none
  representation: annunciator
- index: 15
  name: FUEL_DURATION
  label: FUEL DURATION
  label-size: 8
  label-position: ct
  label-color: Lime
  data-bg-color: Black
  data:
    icon: fa:gas-pump
    icon-size: 60
    icon-color: Gold
    data: ${formula}
    data-format: '{:02.0f}'
    data-font: DIN Condensed Light
    data-color: White
    data-size: 70
    data-unit: hrs
    data-progress: 20
    data-trend: 1
    formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]}
      + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 +
      / 3600 / 1 roundn
    bottomline: Go Faster
  activation: none
  representation: data
- index: 16
  name: RPM
  label: RPM
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: white
      text-size: 30
      text: ${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}:${sim/cockpit2/clock_timer/hobbs_time_seconds}
      formula: '1'
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 23
  label: TEST
  label-font: DIN Condensed Regular
  switch:
    switch-style: rect
    button-fill-color: black
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - 'OFF'
    - 'ON'
    tick-label-size: 42
    tick-label-font: DIN Bold
    tick-underline: false
  options: large,invert
  dataref: sim/cockpit/warnings/annunciator_test_pressed
  activation: long-press
  commands:
    press: sim/annunciator/test_all_annunciators
- index: 18
  name: WAYPOINT
  label: NEXT WAYPOINT
  label-size: 8
  label-color: black
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
  annunciator:
    size: medium
    model: F
    parts:
    - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 36
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

        DIS'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 38
      text-format: '{0:.1f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

        DTK'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
    - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
- index: 0
  annunciator:
    size: full
    model: A
    parts:
    - text: 'ENGINE

        CAUTION'
      text-color: Black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${sim/cockpit2/annunciators/oil_pressure_low[0]}
      invert-color: darkorange
  activation: none
  representation: annunciator
- index: 1
  annunciator:
    size: full
    model: A
    parts:
    - text: ALT
      text-color: Black
      text-font: DIN Condensed Black.otf
      text-size: 76
      formula: ${sim/cockpit2/annunciators/generator_off[0]}
      invert-color: firebrick
  activation: none
  representation: annunciator
- index: 2
  annunciator:
    size: full
    model: A
    parts:
    - text: 'FUEL

        LEVEL

        LOW'
      text-color: Black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${sim/cockpit/warnings/annunciators/fuel_quantity}
      invert-color: firebrick
  activation: none
  representation: annunciator
- index: 3
  annunciator:
    size: full
    model: A
    parts:
    - text: 'FADEC

        A'
      text-color: Black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${aerobask/dr401/annun_fadecA}
      invert-color: firebrick
  activation: none
  representation: annunciator
- index: 4
  annunciator:
    size: full
    model: A
    parts:
    - text: 'FADEC

        B'
      text-color: Black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${aerobask/dr401/annun_fadecA}
      invert-color: firebrick
  activation: none
  representation: annunciator
- index: 5
  annunciator:
    size: full
    model: A
    parts:
    - text: 'FLAPS

        DOWN'
      text-color: Black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${aerobask/dr401/annun_flaps}
      invert-color: darkorange
  activation: none
  representation: annunciator
- index: 6
  annunciator:
    size: full
    model: A
    parts:
    - text: 'PITOT

        HEATING'
      text-color: Black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${aerobask/dr401/annun_pitot}
      invert-color: lime
  activation: none
  representation: annunciator
- index: 7
  annunciator:
    size: full
    model: A
    parts:
    - text: 'COOLANT

        LEVEL'
      text-color: Black
      text-font: DIN Condensed Black.otf
      text-size: 65
      formula: ${sim/cockpit2/annunciators/oil_temperature_high[0]}
      invert-color: firebrick
  activation: none
  representation: annunciator
