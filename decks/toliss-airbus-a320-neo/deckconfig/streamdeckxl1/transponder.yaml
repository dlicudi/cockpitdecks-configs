name: transponder
includes:
- pager
- encoders/encoders_fcu
buttons:
- index: 0
  name: SQUAWK0
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_thousands_up
  representation:
    type: text
    label: 'S Q U '
    label-position: rt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 50
    text-font: Seven Segment.ttf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 1000 / floor
  vibrate: SHORT
- index: 1
  name: SQUAWK1
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_hundreds_up
  representation:
    type: text
    label: ' A W K'
    label-position: lt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 50
    text-font: Seven Segment.ttf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 100 / floor 10 %
  vibrate: SHORT
- index: 2
  name: SQUAWK2
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_tens_up
  representation:
    type: text
    label: 'C O '
    label-position: rt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 50
    text-font: Seven Segment.ttf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 10 / floor 10 %
  vibrate: SHORT
- index: 3
  name: SQUAWK3
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_ones_up
  representation:
    type: text
    label: ' D E'
    label-position: lt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 50
    text-font: Seven Segment.ttf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 10 %
  vibrate: SHORT
- index: 4
  name: true
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_on
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/radios/actuators/transponder_mode} 2 eq
      - text: true
        text-size: 60
        text-font: D-DIN-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 5
  name: false
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_off
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/radios/actuators/transponder_mode} 0 eq
      - text: false
        text-size: 60
        text-font: D-DIN-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 6
  name: STBY
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_standby
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/radios/actuators/transponder_mode} 1 eq
      - text: STBY
        text-size: 60
        text-font: D-DIN-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 7
  name: ALT
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_alt
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/radios/actuators/transponder_mode} 3 eq
      - text: ALT
        text-size: 60
        text-font: D-DIN-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 8
  name: IDENT
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_ident
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        led: bars
        formula: ${sim/cockpit/radios/transponder_id}
      - text: IDENT
        text-size: 60
        text-font: D-DIN-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 9
  name: TEST
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_test
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/radios/actuators/transponder_mode} 4 eq
      - text: TEST
        text-size: 60
        text-font: D-DIN-Bold.otf
        formula: '1'
  vibrate: SHORT
- index: 10
  name: LIGHT
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: A
      parts:
      - color: Orange
        led: dot
        formula: ${sim/cockpit/radios/transponder_light}
- index: 11
  name: MODE
  activation:
    type: none
  representation:
    type: multi-texts
    label: MODE
    label-color: White
    text-color: Lime
    text-bg-color: Black
    multi-texts:
    - text: 'OFF'
      text-color: Orange
      text-font: Seven Segment.ttf
    - text: STBY
      text-color: Orange
      text-font: Seven Segment.ttf
    - text: 'ON'
      text-color: Orange
      text-font: Seven Segment.ttf
    - text: ALT
      text-color: Orange
      text-font: Seven Segment.ttf
    - text: TEST
      text-color: Orange
      text-font: Seven Segment.ttf
      text-position: rt
    formula: ${sim/cockpit2/radios/actuators/transponder_mode}
  size: medium
