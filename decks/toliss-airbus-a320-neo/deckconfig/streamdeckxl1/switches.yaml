  representation:
    type: annunciator
    label: TAXI
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/electrical/taxi_light_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/electrical/taxi_light_on} 1 eq
- index: 18
  activation:
    type: push
    commands:
      press: sim/lights/strobe_lights_toggle
  representation:
    type: annunciator
    label: FLASH
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/strobe_lights_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/strobe_lights_on} 1 eq
- index: 19
  activation:
    type: push
    commands:
      press: sim/lights/nav_lights_toggle
  representation:
    type: annunciator
    label: NAV
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/navigation_lights_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/navigation_lights_on} 1 eq
- index: 5
  name: FLAPS
  activation:
    type: sweep
    stops: 3
    options: 3way,invert
    dataref: sim/cockpit2/controls/flap_ratio
    positions:
    - sim/flight_controls/flaps_down
    - sim/flight_controls/flaps_up
  representation:
    type: switch
    label: FLAPS
    label-size: 9
    label-color: black
    switch:
      switch-style: large
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - UP
      - '25'
      - '50'
      tick-space: 24
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: black
    formula: ${sim/cockpit2/controls/flap_ratio} 2 *
- index: 23
  activation:
    type: push
    commands:
      press: sim/ice/pitot_heat0_tog
  representation:
    type: annunciator
    label: PITOT HT
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
- index: 22
  activation:
    type: sweep
    set-dataref: sim/cockpit/engine/fuel_pump_on[0]
  representation:
    type: annunciator
    label: ELECTRIC PUMP
    label-color: black
    label-size: 8
    annunciator:
