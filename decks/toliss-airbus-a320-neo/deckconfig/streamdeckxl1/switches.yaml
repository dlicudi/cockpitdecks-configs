- index: 15
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_transfer_from_off
  representation:
    type: annunciator
    label: FUEL XFER
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        led: dot
        color: Orange
        formula: ${sim/cockpit/engine/fuel_tank_transfer_from} 0 eq
      B1:
        text: 'OFF'
        color: White
        formula: '1'
- index: 14
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_transfer_from_3
  representation:
    type: annunciator
    label: FUEL XFER
    label-color: black
    label-size: 10
    annunciator:
      model: B
      size: medium
      B0:
        led: dot
        color: Orange
        formula: ${sim/cockpit/engine/fuel_tank_transfer_from} 3 eq
      B1:
        text: AUX TANK
        color: White
        formula: '1'
- index: 10
  activation:
    type: long-press
    commands:
      press: sim/ignition/engage_starter_1
  representation:
    type: multi-texts
    label: IGNITION
    label-color: White
    label-size: 9
    text-bg-color: Black
    multi-texts:
    - text: 
      text-color: White
      text-font: fontawesome.otf
      text-size: 30
    - text: 
      text-color: Green
      text-font: fontawesome.otf
      text-size: 50
    - text: 
      text-color: Red
      text-font: fontawesome.otf
      text-size: 60
    formula: ${aerobask/dr401/starter_key}
  vibrate: LONG
- index: 6
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_selector_2
  representation:
    type: annunciator
    label: FUEL
    label-color: black
    label-size: 10
    annunciator:
      model: B
      size: medium
      B0:
        led: dot
        color: Orange
        formula: ${sim/cockpit/engine/fuel_tank_selector} 2 eq
      B1:
        text: 'ON'
        color: White
        formula: '1'
- index: 7
