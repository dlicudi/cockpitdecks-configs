description: Switch Panel
includes:
- pager
- encoders/encoders_fcu
name: switches
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/electrical/battery_1_toggle
  representation:
    type: annunciator
    label: BATTERY
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/electrical/battery_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/electrical/battery_on[0]} 1 eq
- index: 1
  activation:
    type: push
    commands:
      press: aerobask/dr401/engine_master_to
  representation:
    type: annunciator
    label: MASTER ENGN
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${aerobask/dr401/engine_master} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${aerobask/dr401/engine_master} 1 eq
- index: 2
  activation:
    type: push
    commands:
      press: sim/systems/avionics_toggle
