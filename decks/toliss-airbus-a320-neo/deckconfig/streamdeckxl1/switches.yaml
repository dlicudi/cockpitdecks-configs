      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/avionics_power_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/avionics_power_on} 1 eq
- index: 3
  activation:
    type: push
    commands:
      press: sim/electrical/generator_1_toggle
  representation:
    type: annunciator
    label: ALTERNATOR
    label-color: black
    label-size: 9
