      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/engine/fuel_pump_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/engine/fuel_pump_on[0]} 1 eq
- index: 11
  activation:
    type: sweep
    set-dataref: sim/cockpit/switches/anti_ice_engine_air[0]
  representation:
    type: annunciator
    label: ALTERNATE AIR
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/anti_ice_engine_air[0]} 0 eq
      B1:
