      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/dispcommands/CaptVorDPushButton
- index: 7
  annunciator:
    size: small
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/NDShowNDBCapt}
    - text: NDB
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/dispcommands/CaptNdbPushButton
- index: 8
  annunciator:
    size: small
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/NDShowARPTCapt}
    - text: ARPT
