description: FCU
includes:
- pager
name: fcu
buttons:
- index: 0
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/FD1Engage}
    - text: FD
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/fd1_push
- index: 1
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/ILSonCapt}
    - text: LS
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/dispcommands/CaptLSButtonPush
- index: 2
  annunciator:
    size: medium
    model: B
    parts:
