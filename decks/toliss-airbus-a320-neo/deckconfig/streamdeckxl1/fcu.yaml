      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/dispcommands/CaptArptPushButton
- index: 9
  label: ND MODE
  label-size: 9
  label-color: black
  stops: 5
  dataref: AirbusFBW/NDmodeCapt
  set-dataref: AirbusFBW/NDmodeCapt
  initial-value: 0
  circular-switch:
    switch-style: large
    down: 50
    button-size: 42
    button-fill-color: (30, 40, 50)
    button-stroke-color: black
    handle-fill-color: (60, 70, 80)
    tick-from: 90
    tick-to: 270
    tick-color: white
    tick-space: 36
    tick-width: 8
    tick-length: 24
    tick-labels:
    - LS
    - VOR
    - NAV
    - ARC
    - PLAN
    tick-label-font: DIN Bold
    tick-label-size: 30
    needle-underline-width: 8
  activation: sweep
- index: 10
  label: ND RANGE
  label-size: 9
  label-color: black
  stops: 6
  dataref: AirbusFBW/NDrangeCapt
  set-dataref: AirbusFBW/NDrangeCapt
  initial-value: 0
  circular-switch:
    switch-style: large
    down: 50
    button-size: 42
    button-fill-color: (30, 40, 50)
    button-stroke-color: black
    handle-fill-color: (60, 70, 80)
    tick-from: 90
    tick-to: 300
    tick-color: white
    tick-space: 36
    tick-width: 8
    tick-length: 24
    tick-labels:
    - '10'
    - '20'
    - '40'
    - '80'
    - '160'
    - '320'
    tick-label-font: DIN Bold
    tick-label-size: 30
    needle-underline-width: 8
  activation: sweep
