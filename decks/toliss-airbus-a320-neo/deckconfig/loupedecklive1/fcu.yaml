_docs:
  title: FCU
aircraft: Toliss A321neo
description: Main FCU page for Loupedeck Live
version: 1.0.0
includes:
- includes/pager
- includes/encoders_fcu
buttons:
- index: 0
  name: SPDMACH
  label: 'SPD




    MACH'
  label-position: cm
  label-font: DIN Bold
  label-size: 10
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  activation: push
  commands:
    press: toliss_airbus/ias_mach_button_push
- index: 1
  name: MASTER CAUTION
  annunciator:
    text: 'MASTER

      CAUT'
    text-color: darkorange
    text-font: DIN Condensed Black.otf
    text-size: 72
    dataref: AirbusFBW/MasterCaut
  vibrate: RUMBLE5
  activation: push
  representation: annunciator
  commands:
    press: sim/annunciator/clear_master_caution
- index: 2
  name: MASTER WARNING
  annunciator-animate:
    text: 'MASTER

      WARN'
    text-color: firebrick
    text-font: DIN Condensed Black.otf
    text-size: 72
    dataref: AirbusFBW/MasterWarn
    animation-speed: 2.0
  vibrate: LONG
  activation: push
  representation: annunciator-animate
  commands:
    press: sim/annunciator/clear_master_warning
- index: 3
  set-dataref: AirbusFBW/ALT100_1000
  name: ALTSCALE
  label: '1000




    100'
  label-font: DIN Bold
  label-size: 10
  label-position: cm
  command: toliss_airbus/metric_alt_button_push
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  activation: sweep
- index: 4
  name: HDGTRACK
  label: 'HDG TRK




    V/S FPA'
  label-position: cm
  label-font: DIN Bold
  label-size: 10
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  activation: push
  commands:
    press: toliss_airbus/hdgtrk_button_push
- index: 9
  name: A/THR
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/ATHRmode}
    - text: A/THR
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: AirbusFBW/ATHRbutton
- index: 5
  name: AP1
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/AP1Engage}
    - text: AP1
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/ap1_push
- index: 8
  name: BAROMETRIC
  label: 'inHg




    hPa'
  label-position: cm
  label-font: DIN Bold
  label-size: 10
  push-switch:
    button-size: 100
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 0
  set-dataref: AirbusFBW/BaroUnitCapt
  activation: sweep
- index: 7
  name: LOC
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/LOCilluminated}
    - text: LOC
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  options: auto-repeat=3/3
  activation: push
  representation: annunciator
  commands:
    press: AirbusFBW/LOCbutton
- index: 11
  name: APPR
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/APPRilluminated}
    - text: APPR
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: AirbusFBW/APPRbutton
- index: 10
  name: EXPED
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/EXPEDilluminated}
    - text: EXPED
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: AirbusFBW/EXPEDbutton
- index: 6
  name: AP2
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/AP2Engage}
    - text: AP2
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/ap2_push
