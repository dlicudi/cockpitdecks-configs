_docs:
  title: FCU
aircraft: Toliss A321neo
description: Main FCU page for Loupedeck Live
version: 1.0.0
includes:
- includes/pager
- includes/encoders_fcu
buttons:
- index: 0
  name: SPDMACH
  activation:
    type: push
    commands:
      press: toliss_airbus/ias_mach_button_push
  representation:
    type: push-switch
    label: 'SPD




      MACH'
    label-position: cm
    label-font: DIN Bold
    label-size: 10
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 1
  name: MASTER CAUTION
  activation:
    type: push
    commands:
      press: sim/annunciator/clear_master_caution
  representation:
    type: annunciator
    annunciator:
      text: 'MASTER

        CAUT'
      text-color: darkorange
      text-font: DIN Condensed Black.otf
      text-size: 72
      dataref: AirbusFBW/MasterCaut
  vibrate: RUMBLE5
- index: 2
  name: MASTER WARNING
  activation:
    type: push
    commands:
      press: sim/annunciator/clear_master_warning
  representation:
    type: annunciator-animate
    annunciator-animate:
      text: 'MASTER

        WARN'
      text-color: firebrick
      text-font: DIN Condensed Black.otf
      text-size: 72
      dataref: AirbusFBW/MasterWarn
      animation-speed: 2.0
  vibrate: LONG
- index: 3
  name: ALTSCALE
  activation:
    type: sweep
    set-dataref: AirbusFBW/ALT100_1000
    command: toliss_airbus/metric_alt_button_push
  representation:
    type: push-switch
    label: '1000




      100'
    label-font: DIN Bold
    label-size: 10
    label-position: cm
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 4
  name: HDGTRACK
  activation:
    type: push
    commands:
      press: toliss_airbus/hdgtrk_button_push
  representation:
    type: push-switch
    label: 'HDG TRK




      V/S FPA'
    label-position: cm
    label-font: DIN Bold
    label-size: 10
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 9
  name: A/THR
  activation:
    type: push
    commands:
      press: AirbusFBW/ATHRbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/ATHRmode}
      - text: A/THR
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 5
  name: AP1
  activation:
    type: push
    commands:
      press: toliss_airbus/ap1_push
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/AP1Engage}
      - text: AP1
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 8
  name: BAROMETRIC
  activation:
    type: sweep
    set-dataref: AirbusFBW/BaroUnitCapt
  representation:
    type: push-switch
    label: 'inHg




      hPa'
    label-position: cm
    label-font: DIN Bold
    label-size: 10
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 7
  name: LOC
  activation:
    type: push
    options: auto-repeat=3/3
    commands:
      press: AirbusFBW/LOCbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/LOCilluminated}
      - text: LOC
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 11
  name: APPR
  activation:
    type: push
    commands:
      press: AirbusFBW/APPRbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/APPRilluminated}
      - text: APPR
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 10
  name: EXPED
  activation:
    type: push
    commands:
      press: AirbusFBW/EXPEDbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/EXPEDilluminated}
      - text: EXPED
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 6
  name: AP2
  activation:
    type: push
    commands:
      press: toliss_airbus/ap2_push
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/AP2Engage}
      - text: AP2
        text-size: 60
        text-font: DIN Bold
        formula: '1'
