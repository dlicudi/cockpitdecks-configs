description: ICE
includes:
- includes/pager
- includes/encoders_pfd
name: switches_ice
default-text-size: 14
default-annunciator-color: '#222222'
buttons:
- index: 0
  name: PART SEP
  activation:
    type: sweep
    positions:
    - aerobask/ins_sep_tog
    - aerobask/ins_sep_tog
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'INERT

          SEP'
        color: white
        formula: 1
      - text: 'true'
        color: cyan
        framed: false
        formula: ${aerobask/lt_inert_sep} 1 eq
- index: 1
  name: PITOT HEAT
  activation:
    type: sweep
    positions:
    - sim/ice/pitot_heat0_tog
    - sim/ice/pitot_heat0_tog
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'PITOT

          STALL HT'
        color: white
        formula: 1
      - text: 'true'
        color: cyan
        framed: false
        formula: ${aerobask/lt_pitot_stall} 1 eq
- index: 2
  name: PROP HEAT
  activation:
    type: sweep
    positions:
    - sim/ice/prop_heat_tog
    - sim/ice/prop_heat_tog
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'PROP

          HEAT'
        color: white
        formula: 1
      - text: 'true'
        color: cyan
        framed: false
        formula: ${aerobask/lt_prop_heat} 1 eq
- index: 3
  name: WNDSH HEAT
  activation:
    type: sweep
    positions:
    - sim/ice/window_heat_tog
    - sim/ice/window_heat_tog
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'WNDSH

          HEAT'
        color: white
        formula: 1
      - text: 'true'
        color: cyan
        framed: false
        formula: ${aerobask/lt_windsh_heat} 1 eq
- index: 4
  name: DE-ICE
  activation:
    type: sweep
    positions:
    - aerobask/deice_boots_toggle
    - aerobask/deice_boots_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'DE-ICE

          BOOTS'
        color: white
        formula: 1
      - text: 'true'
        color: cyan
        framed: false
        formula: ${aerobask/lt_deice_boots} 1 eq
- index: 8
  name: Back
  activation:
    type: page
    page: switches_lights
  representation:
    type: text
    label: LIGHTS
    label-color: Gold
    label-size: 10
    text: ←
    text-font: fontawesome.otf
    text-size: 36
    text-color: Gold
