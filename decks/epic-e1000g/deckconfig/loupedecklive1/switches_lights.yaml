description: LIGHTS
includes:
- pager
- encoders/encoders_pfd
name: switches_lights
default-text-size: 56
default-annunciator-color: '#222222'
buttons:
- index: 0
  name: STROBE
  activation:
    type: sweep
    positions:
    - sim/lights/strobe_lights_toggle
    - sim/lights/strobe_lights_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: STROBE
        color: white
        formula: 1
      - text: true
        color: cyan
        framed: false
        formula: ${sim/cockpit/electrical/strobe_lights_on} 1 eq
- index: 1
  name: NAV
  activation:
    type: sweep
    positions:
    - sim/lights/nav_lights_toggle
    - sim/lights/nav_lights_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: NAV
        color: white
        formula: 1
      - text: true
        color: cyan
        framed: false
        formula: ${sim/cockpit/electrical/nav_lights_on} 1 eq
- index: 2
  name: TAXI
  activation:
    type: sweep
    positions:
    - sim/lights/taxi_lights_toggle
    - sim/lights/taxi_lights_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: TAXI
        color: white
        formula: 1
      - text: true
        color: cyan
        framed: false
        formula: ${sim/cockpit2/switches/taxi_light_on} 1 eq
- index: 3
  name: LANDING
  activation:
    type: sweep
    positions:
    - sim/lights/landing_lights_toggle
    - sim/lights/landing_lights_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: LAND
        color: white
        formula: 1
      - text: true
        color: cyan
        framed: false
        formula: ${sim/cockpit/electrical/landing_lights_on} 1 eq
- index: 4
  name: BEACON
  activation:
    type: sweep
    set-dataref: aerobask/pb_light_beacon
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: BEACON
        color: white
        formula: 1
      - text: true
        color: cyan
        framed: false
        formula: ${sim/cockpit/electrical/beacon_lights_on} 1 eq
- index: 5
  name: ICE LT
  activation:
    type: sweep
    positions:
    - sim/lights/spot_lights_toggle
    - sim/lights/spot_lights_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: ICE
        color: white
        formula: 1
      - text: true
        color: cyan
        framed: false
        formula: ${sim/cockpit2/switches/spot_light_on} 1 eq
- index: 8
  name: Back
  activation:
    type: page
    page: switches_systems
  representation:
    type: text
    label: SYSTEMS
    label-color: Gold
    label-size: 10
    text: ←
    text-font: fontawesome.otf
    text-size: 48
    text-color: Gold
- index: 11
  name: Next
  activation:
    type: page
    page: switches_ice
  representation:
    type: text
    label: ICE
    label-color: Gold
    label-size: 10
    text: →
    text-font: fontawesome.otf
    text-size: 48
    text-color: Gold
