description: LIGHTS
includes: pager,encoders/encoders_fcu
name: switches_lights

buttons:

  - index: 0
    name: STROBE
    label: STROBE
    label-color: white
    label-size: 9
    type: onoff
    annunciator:
      model: B
      size: medium
      parts:
        B0:
          text: "OFF"
          color: darkorange
          formula: ${sim/cockpit/electrical/strobe_lights_on} 0 eq
        B1:
          text: "ON"
          color: deepskyblue
          framed: true
          formula: ${sim/cockpit/electrical/strobe_lights_on} 1 eq
    set-dataref: aerobask/pb_light_strobe

