description: LIGHTS
includes:
- pager
- encoders/encoders_pfd
name: switches_lights
default-text-size: 56
default-annunciator-color: '#222222'
buttons:
- index: 0
  name: STROBE
  annunciator:
    model: B
    size: full
    parts:
    - text: STROBE
      color: white
      formula: 1
    - text: true
      color: cyan
      framed: false
      formula: ${sim/cockpit/electrical/strobe_lights_on} 1 eq
  activation: sweep
  representation: annunciator
  positions:
  - sim/lights/strobe_lights_toggle
  - sim/lights/strobe_lights_toggle
- index: 1
  name: NAV
  annunciator:
