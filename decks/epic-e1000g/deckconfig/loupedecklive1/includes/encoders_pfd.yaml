buttons:
- index: e0
  name: pitch_trim
  activation:
    type: encoder-push
    commands:
      press: sim/flight_controls/pitch_trim_takeoff
      cw: sim/flight_controls/pitch_trim_up
      ccw: sim/flight_controls/pitch_trim_down
  representation:
    type: none
- index: e1
  name: heading_bug
  activation:
    type: encoder-push
    commands:
      press: sim/autopilot/heading_sync
      long-press: sim/autopilot/servos_toggle
      cw: sim/autopilot/heading_up
      ccw: sim/autopilot/heading_down
  representation:
    type: none
- index: e2
  name: baro
  activation:
    type: encoder-push
    options: modulo
    commands:
      press: sim/instruments/barometer_std
      cw: sim/instruments/barometer_up
      ccw: sim/instruments/barometer_down
  representation:
    type: none
- index: e3
  name: altitude_select
  activation:
    type: encoder-mode
    commands:
      cw: sim/autopilot/altitude_up
      ccw: sim/autopilot/altitude_down
      cw-off: sim/autopilot/altitude_up
      ccw-off: sim/autopilot/altitude_down
      long-press: sim/autopilot/altitude_sync
  representation:
    type: none
- index: e4
  name: vertical_speed
  activation:
    type: encoder-push
    commands:
      press: sim/autopilot/vertical_speed_sync
      cw: sim/autopilot/vertical_speed_up
      ccw: sim/autopilot/vertical_speed_down
  representation:
    type: none
- index: e5
  name: map_range
  activation:
    type: encoder-push
    commands:
      press: sim/GPS/gcu478/pan_push
      cw: sim/GPS/gcu478/range_down
      ccw: sim/GPS/gcu478/range_up
  representation:
    type: none
- index: left
  name: left_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: (64, 64, 64)
      labels:
      - label: TRIM
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/cockpit2/controls/elevator_trim} 100 *
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: '{0:+01.0f}'
        text: ${formula}
      - label: HDG
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/cockpit/autopilot/heading_mag}
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: '{0:00.0f}'
        text: ${formula}
      - label: QNH
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: '{0:01.2f}'
        text: ${formula}
- index: right
  name: right_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: (64, 64, 64)
      labels:
      - label: ALT
        label-size: 16
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
        text-size: 16
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: '{0:04.0f}'
        text: ${formula}
      - label: VS
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: '{0:+01.0f}'
        text: ${formula}
      - label: RNG
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text: +/-
