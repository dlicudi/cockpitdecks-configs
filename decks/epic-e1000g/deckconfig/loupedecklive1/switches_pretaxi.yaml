description: PRE-TAXI
includes:
- pager
- encoders/encoders_pfd
name: switches_pretaxi
default-text-size: 56
default-annunciator-color: '#222222'
buttons:
- index: 0
  name: IGNITER
  annunciator:
    model: B
    size: full
    parts:
    - text: IGNITER
      color: white
      formula: 1
    - text: 'ON'
      color: cyan
      framed: false
      formula: ${sim/cockpit/engine/igniters_on[0]} 1 eq
  dataref: sim/cockpit/engine/igniters_on[0]
  activation: sweep
  representation: annunciator
  positions:
  - aerobask/igniter_toggle
  - aerobask/igniter_toggle
- index: 1
  name: START
  annunciator:
    model: B
    size: full
    parts:
    - text: START
      color: white
      formula: 1
    - text: 'ON'
      color: cyan
      framed: false
      formula: ${sim/cockpit2/engine/actuators/ignition_key[0]} 4 eq
  activation: sweep
  representation: annunciator
  positions:
  - sim/starters/engage_starter_1
  - sim/starters/engage_starter_1
- index: 2
  name: FUEL AUTO
  annunciator:
    model: B
    size: full
    parts:
    - text: 'FUEL

        AUTO SEL'
      color: white
      formula: 1
    - text: 'ON'
      color: cyan
      framed: false
      formula: ${aerobask/lt_fuel_auto} 1 eq
  activation: sweep
  representation: annunciator
  positions:
  - aerobask/fuel_auto_toggle
  - aerobask/fuel_auto_toggle
- index: 3
  name: PUSHER
  annunciator:
    model: B
    size: full
    parts:
    - text: PUSHER
      color: white
      formula: 1
    - text: 'ON'
      color: cyan
      framed: false
      formula: ${aerobask/lt_pusher} 1 eq
  activation: sweep
  representation: annunciator
  positions:
  - aerobask/pusher_toggle
  - aerobask/pusher_toggle
- index: 8
  name: Back
  page: switches_prestart
  label: PRE-START
  label-color: Gold
  label-size: 10
  text: ←
  text-font: fontawesome.otf
  text-size: 48
  text-color: Gold
  activation: page
  representation: text
- index: 11
  name: Next
  page: switches_systems
  label: SYSTEMS
  label-color: Gold
  label-size: 10
  text: →
  text-font: fontawesome.otf
  text-size: 48
  text-color: Gold
  activation: page
  representation: text
