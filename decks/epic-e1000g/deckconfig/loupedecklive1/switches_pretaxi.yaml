description: PRE-TAXI
includes:
- includes/pager
- includes/encoders_pfd
name: switches_pretaxi
default-text-size: 14
default-annunciator-color: '#222222'
buttons:
- index: 0
  name: IGNITER
  activation:
    type: sweep
    dataref: sim/cockpit/engine/igniters_on[0]
    positions:
    - aerobask/igniter_toggle
    - aerobask/igniter_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: IGNITER
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${sim/cockpit/engine/igniters_on[0]} 1 eq
- index: 1
  name: START
  activation:
    type: sweep
    positions:
    - sim/starters/engage_starter_1
    - sim/starters/engage_starter_1
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: START
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${sim/cockpit2/engine/actuators/ignition_key[0]} 4 eq
- index: 2
  name: FUEL AUTO
  activation:
    type: sweep
    positions:
    - aerobask/fuel_auto_toggle
    - aerobask/fuel_auto_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'FUEL

          AUTO SEL'
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${aerobask/lt_fuel_auto} 1 eq
- index: 3
  name: PUSHER
  activation:
    type: sweep
    positions:
    - aerobask/pusher_toggle
    - aerobask/pusher_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: PUSHER
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${aerobask/lt_pusher} 1 eq
- index: 8
  name: Back
  activation:
    type: page
    page: switches_prestart
  representation:
    type: text
    label: PRE-START
    label-color: Gold
    label-size: 10
    text: ←
    text-font: fontawesome.otf
    text-size: 36
    text-color: Gold
- index: 11
  name: Next
  activation:
    type: page
    page: switches_systems
  representation:
    type: text
    label: SYSTEMS
    label-color: Gold
    label-size: 10
    text: →
    text-font: fontawesome.otf
    text-size: 36
    text-color: Gold
