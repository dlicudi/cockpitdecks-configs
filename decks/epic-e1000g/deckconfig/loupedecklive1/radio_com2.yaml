name: radio_com2
includes:
- includes/pager
- includes/encoders_radio
buttons:
- index: 0
  name: COM2_STDBY
  activation:
    type: push
    commands:
      press: sim/radios/com2_standy_flip
  representation:
    type: annunciator
    label: STDBY
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 30
        text-font: D-DINCondensed.otf
        formula: ${sim/cockpit2/radios/actuators/com2_standby_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
  vibrate: SHORT
  render-cooldown-ms: 50
- index: 1
  name: COM2_FLIP
  activation:
    type: push
    commands:
      press: sim/radios/com2_standy_flip
  representation:
    type: annunciator
    label: FLIP FLOP
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: white
        text-size: 91
        text-font: DejaVuSans.ttf
        formula: 1
        text: ↔
        frame: false
  vibrate: SHORT
- index: 2
  name: COM2_ACTIVE
  activation:
    type: none
  representation:
    type: annunciator
    label: COM2
    label-color: white
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 30
        text-font: D-DINCondensed.otf
        formula: ${sim/cockpit2/radios/actuators/com2_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
  render-cooldown-ms: 50
- index: 8
  activation:
    type: page
    page: radio
  representation:
    type: text
    text: COM1
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 9
  activation:
    type: none
  representation:
    type: text
    text: COM2
    text-color: Gold
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (40, 35, 0)
- index: 10
  activation:
    type: page
    page: radio_nav1
  representation:
    type: text
    text: NAV1
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
- index: 11
  activation:
    type: page
    page: radio_nav2
  representation:
    type: text
    text: NAV2
    text-color: khaki
    text-size: 18
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: (20, 20, 20)
  vibrate: SHORT
