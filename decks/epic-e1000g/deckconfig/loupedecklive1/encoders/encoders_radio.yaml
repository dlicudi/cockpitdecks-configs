buttons:
- index: e0
  name: com1_encoder
  commands:
    long-press: sim/radios/com1_standy_flip
  activation: encoder-mode
- index: e1
  name: com2_encoder
  commands:
    long-press: sim/radios/com2_standy_flip
  activation: encoder-mode
- index: e2
  name: adf_encoder
  commands:
    long-press: sim/radios/adf1_standy_flip
  activation: encoder-mode
- index: e3
  name: nav1_encoder
  commands:
    long-press: sim/radios/nav1_standy_flip
  activation: encoder-mode
- index: e4
  name: nav2_encoder
  commands:
    long-press: sim/radios/nav2_standy_flip
  activation: encoder-mode
- index: e5
  name: transponder_encoder_right
  commands:
    ccw: sim/transponder/transponder_12_down
    cw: sim/transponder/transponder_12_up
    ccw-off: sim/transponder/transponder_34_down
    cw-off: sim/transponder/transponder_34_up
  activation: encoder-mode
- index: left
  name: left_screen
  side:
    icon-color: Black
    labels:
    - label: COM1
      label-size: 12
      label-font: D-DIN-Bold.otf
      label-color: Gold
      formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /
      text-size: 14
      text-font: Segment7Standard.otf
      text-color: White
      text-format: '{0:.3f}'
      text: ${formula}
    - label: COM2
      label-size: 12
      label-font: D-DIN-Bold.otf
      label-color: Gold
      formula: ${sim/cockpit2/radios/actuators/com2_standby_frequency_hz_833} 1000 /
      text-size: 14
      text-font: Segment7Standard.otf
      text-color: White
      text-format: '{0:.3f}'
      text: ${formula}
    - label: ADF
      label-size: 14
      label-font: D-DIN-Bold.otf
      label-color: Gold
      formula: ${sim/cockpit/radios/adf1_stdby_freq_hz}
      text-size: 18
      text-font: Segment7Standard.otf
      text-color: White
      text-format: '{0:04.0f}'
      text: ${formula}
  activation: none
- index: right
  name: right_screen
  side:
    icon-color: Black
    labels:
    - label: NAV1
      label-size: 12
      label-font: D-DIN-Bold.otf
      label-color: Gold
      formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
      text-size: 18
      text-font: Segment7Standard.otf
      text-color: White
      text-format: '{0:.2f}'
      text: ${formula}
    - label: NAV2
      label-size: 12
      label-font: D-DIN-Bold.otf
      label-color: Gold
      formula: ${sim/cockpit/radios/nav2_stdby_freq_hz} 100 /
      text-size: 18
      text-font: Segment7Standard.otf
      text-color: White
      text-format: '{0:.2f}'
      text: ${formula}
    - label: XPDR
      label-size: 16
      label-font: D-DIN-Bold.otf
      label-color: Grey
      formula: ${sim/cockpit/radios/transponder_code}
      text-size: 16
      text-font: Segment7Standard.otf
      text-color: White
      text-format: '{0:00.0f}'
      text: ${formula}
  activation: none
