# Encoders for Epic E1000 PFD page
buttons:

- index: e0
  name: pitch_trim
  type: encoder-push
  commands:
  - sim/flight_controls/pitch_trim_takeoff
  - sim/flight_controls/pitch_trim_down
  - sim/flight_controls/pitch_trim_up

- index: e1
  name: heading_bug
  type: encoder-push
  commands:
    - sim/autopilot/heading_sync
    - sim/autopilot/heading_down
    - sim/autopilot/heading_up
  long-press: sim/autopilot/servos_toggle

- index: e2
  name: baro
  type: encoder-push
  commands:
    - sim/instruments/barometer_std
    - sim/instruments/barometer_down
    - sim/instruments/barometer_up
  options: modulo

- index: e3
  name: altitude_select
  type: encoder-toggle
  commands:
  - sim/GPS/g1000n1_alt_outer_down
  - sim/GPS/g1000n1_alt_outer_up
  - sim/GPS/g1000n1_alt_inner_down
  - sim/GPS/g1000n1_alt_inner_up
  long-press: sim/autopilot/altitude_sync

- index: e4
  name: vertical_speed
  type: encoder-push
  commands:
    - sim/autopilot/vertical_speed_sync
    - sim/autopilot/vertical_speed_down
    - sim/autopilot/vertical_speed_up

- index: e5
  name: map_range
  type: encoder-push
  commands:
  - sim/GPS/gcu478/pan_push
  - sim/GPS/gcu478/range_up
  - sim/GPS/gcu478/range_down

- index: left
  name: left_screen
  type: none
  side:
    icon-color: (64, 64, 64)
    labels:
      - label: "TRIM"
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: "${sim/cockpit2/controls/elevator_trim} 100 *"
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: "{0:+01.0f}"
        text: "${formula}"
      - label: "HDG"
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: "${sim/cockpit/autopilot/heading_mag}"
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: "{0:00.0f}"
        text: "${formula}"
      - label: "QNH"
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: "${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}"
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: "{0:01.2f}"
        text: "${formula}"

- index: right
  name: right_screen
  type: none
  side:
    icon-color: (64, 64, 64)
    labels:
      - label: "ALT"
        label-size: 16
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: "${sim/cockpit2/autopilot/altitude_dial_ft}"
        text-size: 16
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: "{0:04.0f}"
        text: "${formula}"
      - label: "VS"
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        formula: "${sim/cockpit/autopilot/vertical_velocity} 100 /"
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text-format: "{0:+01.0f}"
        text: "${formula}"
      - label: "RNG"
        label-size: 14
        label-font: D-DIN-Bold.otf
        label-color: Gold
        text-size: 18
        text-font: D-DINCondensed.otf
        text-color: White
        text: "+/-"
