# GMA 350–style selections via generic X-Plane audio panel commands (no aircraft-specific annunciators).
name: audiopanel
includes: pager,encoders/encoders_radio

buttons:

- index: 0
  type: push
  name: COM MIC 1
  text: COM MIC 1
  text-color: khaki
  text-size: 28
  text-font: D-DIN-Bold.otf
  text-position: cm
  text-bg-color: (40, 40, 40)
  command: sim/audio_panel/transmit_audio_com1

