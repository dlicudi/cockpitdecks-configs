description: PRE-START
includes: pager,encoders/encoders_fcu
name: switches_prestart

buttons:

  - index: 0
    name: BAT 1
    label: BAT 1
    label-color: white
    label-size: 9
    type: onoff
    annunciator:
      model: B
      size: medium
      parts:
        B0:
          text: "OFF"
          color: darkorange
          formula: ${sim/cockpit2/electrical/battery_on[0]} 0 eq
        B1:
          text: "ON"
          color: deepskyblue
          framed: true
          formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq
    commands:
      - sim/electrical/battery_1_toggle
