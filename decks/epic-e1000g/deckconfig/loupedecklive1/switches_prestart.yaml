description: PRE-START
includes: pager,encoders/encoders_fcu
name: switches_prestart

buttons:

  - index: 0
    name: BAT 1
    label: BAT 1
    label-font: D-DINCondensed.otf
    type: onoff
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
        - "ON"
        - "OFF"
      tick-label-size: 42
      tick-label-font: D-DIN-Bold.otf
      tick-underline: false
    dataref: sim/cockpit2/electrical/battery_on[0]
    commands:
      - sim/electrical/battery_1_toggle
