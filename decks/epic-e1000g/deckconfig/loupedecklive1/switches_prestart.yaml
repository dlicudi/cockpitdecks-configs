description: PRE-START
includes:
- pager
- encoders/encoders_pfd
name: switches_prestart
default-text-size: 56
default-annunciator-color: '#222222'
buttons:
- index: 0
  name: BAT 1
  annunciator:
    model: B
    size: full
    parts:
    - text: BATT 1
      color: white
      formula: 1
    - text: 'ON'
      color: cyan
      framed: false
      formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq
  activation: sweep
  representation: annunciator
