name: pfd
includes:
- includes/pager
- includes/encoders_fcu
buttons:
- index: 0
  name: SPD
  activation:
    type: none
  representation:
    label: SPD
    label-size: 9
    label-color: black
    type: annunciator
    annunciator:
      size: medium
      model: D
      parts:
      - text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
        formula: '1'
        text-format: '{0:.0f}'
        text-font: Segment7Standard.otf
        text-size: 16
        color: lime
      - text: '${sim/cockpit2/gauges/indicators/true_airspeed_kts_pilot}

          TAS'
        formula: '1'
        text-format: '{0:.0f}'
        text-font: D-DIN-Bold.otf
        text-size: 10
        color: white
      - text: '${sim/cockpit2/gauges/indicators/ground_speed_kt}

          GS'
        formula: '1'
        text-format: '{0:.0f}'
        text-font: D-DIN-Bold.otf
        text-size: 10
        color: white
- index: 1
  name: HDG
  activation:
    type: none
  representation:
    label: HDG
    label-size: 9
    label-color: black
    type: annunciator
    annunciator:
      size: medium
      model: A
      parts:
      - text: ${sim/cockpit2/gauges/indicators/heading_AHARS_deg_mag_pilot}
        formula: '1'
        text-format: '{0:.0f}'
        text-font: Segment7Standard.otf
        text-size: 30
        color: lime
- index: 2
  name: ALT
  activation:
    type: none
  representation:
    label: ALT
    label-size: 9
    label-color: black
    type: annunciator
    annunciator:
      size: medium
      model: D
      parts:
      - text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
        formula: '1'
        text-format: '{0:.0f}'
        text-font: Segment7Standard.otf
        text-size: 20
        color: lime
      - text: '${sim/cockpit/misc/barometer_setting}

          inHg'
        formula: '1'
        text-format: '{0:.2f}'
        text-size: 10
        color: white
      - text: '${formula}

          hPa'
        formula: ${sim/cockpit/misc/barometer_setting} 33.8639 *
        text-format: '{0:.0f}'
        text-size: 10
        color: white
- index: 3
  name: VS
  activation:
    type: none
  representation:
    label: VS
    label-size: 9
    label-color: black
    type: annunciator
    annunciator:
      size: medium
      model: A
      parts:
      - text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
        formula: '1'
        text-format: '{0:.0f}'
        text-font: Segment7Standard.otf
        text-size: 30
        color: lime
- index: 4
  name: WIND
  activation:
    type: none
  representation:
    type: annunciator
    label: WIND DATA
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
      - color: yellow
        text-size: 28
        formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
          - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
        text-font: fontawesome.otf
        text: "\u2193 ${formula}"
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 28
        formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
          - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
        text-font: fontawesome.otf
        text: "\u2191 ${formula}"
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 28
        formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
          - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
        text-font: fontawesome.otf
        text: "\u2192 ${formula}"
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 28
        formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
          - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
        text-font: fontawesome.otf
        text: "\u2190 ${formula}"
        text-format: '{0:.0f}'
- index: 5
  name: TRK
  activation:
    type: none
  representation:
    type: annunciator
    label: TRK
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 50
        formula: '1'
        text: ${sim/cockpit2/gauges/indicators/ground_track_mag_pilot}
        text-font: Segment7Standard.otf
        text-format: '{0:.0f}'
- index: 6
  name: GEAR
  activation:
    type: push
    commands:
      press: sim/flight_controls/landing_gear_toggle
  representation:
    type: annunciator
    label: GEAR
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: D
      parts:
      - color: Lime
        led: dot
        formula: ${sim/flightmodel2/gear/deploy_ratio[0]} 0.9 gt
      - color: Lime
        led: dot
        formula: ${sim/flightmodel2/gear/deploy_ratio[1]} 0.9 gt
      - color: Lime
        led: dot
        formula: ${sim/flightmodel2/gear/deploy_ratio[2]} 0.9 gt
- index: 7
  name: FLAPS
  activation:
    type: sweep
    stops: 3
    options: 3way,invert
    dataref: sim/cockpit2/controls/flap_ratio
    positions:
    - sim/flight_controls/flaps_down
    - sim/flight_controls/flaps_up
  representation:
    type: switch
    label: FLAPS
    label-size: 9
    label-color: black
    switch:
      switch-style: large
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - UP
      - '25'
      - '50'
      tick-space: 24
      tick-color: white
      tick-label-size: 20
      tick-label-font: D-DIN-Bold.otf
      tick-label-color: black
    formula: ${sim/cockpit2/controls/flap_ratio} 2 *
- index: 8
  name: OAT
  activation:
    type: none
  representation:
    type: annunciator
    label: OAT
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 40
        formula: '1'
        text: "${sim/cockpit2/temperature/outside_air_temp_degc}\xB0C"
        text-font: D-DIN-Bold.otf
        text-format: '{0:.0f}'
- index: 9
  name: ISA
  activation:
    type: none
  representation:
    type: annunciator
    label: ISA
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: white
        text-size: 40
        formula: ${sim/cockpit2/temperature/outside_air_temp_degc} 15 ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
          0.00198 * - -
        text: ${formula}
        text-font: D-DIN-Bold.otf
        text-format: "{0:+.0f}\xB0C"
- index: 10
  name: CLOCK
  activation:
    type: none
  representation:
    type: annunciator
    label: CLOCK
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 24
        formula: '1'
        text: ${sim/cockpit2/clock_timer/local_time_hours}:${sim/cockpit2/clock_timer/local_time_minutes}
        text-font: D-DINCondensed-Bold.otf
        text-format:
          sim/cockpit2/clock_timer/local_time_hours: '{:02.0f}'
          sim/cockpit2/clock_timer/local_time_minutes: '{:02.0f}'
      - color: white
        text-size: 18
        formula: '1'
        text: ${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}:${sim/cockpit2/clock_timer/hobbs_time_seconds}
        text-font: D-DINCondensed-Bold.otf
        text-format:
          sim/cockpit2/clock_timer/hobbs_time_hours: '{:02.0f}'
          sim/cockpit2/clock_timer/hobbs_time_minutes: '{:02.0f}'
          sim/cockpit2/clock_timer/hobbs_time_seconds: '{:02.0f}'
- index: 11
  name: WAYPOINT
  activation:
    type: none
  representation:
    type: annunciator
    label: NEXT WAYPOINT
    label-size: 8
    label-color: black
    annunciator:
      size: medium
      model: F
      parts:
      - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
        text-color: Lime
        text-font: D-DINCondensed-Bold.otf
        text-size: 22
        formula: '1'
      - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

          DIS'
        text-color: Lime
        text-font: D-DINCondensed-Bold.otf
        text-size: 22
        text-format: '{0:.1f}'
        formula: '1'
      - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

          DTK'
        text-color: Lime
        text-font: D-DINCondensed-Bold.otf
        text-size: 28
        text-format: '{0:.0f}'
        formula: '1'
      - text: '${sim/cockpit2/radios/indicators/gps_dme_time_min} min

          ETA'
        text-color: Lime
        text-font: D-DINCondensed-Bold.otf
        text-size: 28
        text-format: '{0:.0f}'
        formula: '1'
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
