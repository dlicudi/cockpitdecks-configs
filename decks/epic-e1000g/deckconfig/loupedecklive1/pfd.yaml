# Epic E1000 PFD page
# Hybrid primary flight display and flight-control setpoint page
name: pfd
includes: pager,encoders/encoders_pfd

buttons:

  - index: 0 # Speed
    name: SPD
    type: none
    label: SPD
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: D
      parts:
        D0:
          color: lime
          text-size: 72
          formula: "1"
          text: "${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"
        D1:
          color: white
          text-size: 32
          formula: "1"
          text: "${sim/cockpit2/gauges/indicators/true_airspeed_kts_pilot}\nTAS"
          text-font: D-DIN-Bold.otf
          text-format: "{0:.0f}"
        D2:
          color: white
          text-size: 32
          formula: "1"
          text: "${sim/cockpit2/gauges/indicators/ground_speed_kt}\nGS"
          text-font: D-DIN-Bold.otf
          text-format: "{0:.0f}"

  - index: 1 # Heading
    name: HDG
    type: none
    label: HDG
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 100
          formula: "1"
          text: "${sim/cockpit2/gauges/indicators/heading_AHARS_deg_mag_pilot}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 2 # Altitude and baro
    name: ALT
    type: none
    label: ALT
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: D
      parts:
        D0:
          color: lime
          text-size: 72
          formula: "1"
          text: "${sim/cockpit2/gauges/indicators/altitude_ft_pilot}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"
        D1:
          color: white
          text-size: 32
          formula: "1"
          text-format: "{0:.2f}"
          text: "${sim/cockpit/misc/barometer_setting}\ninHg"
        D2:
          color: white
          text-size: 32
          formula: "${sim/cockpit/misc/barometer_setting} 33.8639 *"
          text-format: "{0:.0f}"
          text: "${formula}\nhPa"

  - index: 3 # Heading
    name: VS
    type: none
    label: VS
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 80
          formula: "1"
          text: "${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 4
    name: WIND
    label: WIND DATA
    label-color: Black
    label-size: 10
    type: none
    annunciator:
      size: medium
      model: F
      parts:
        F0: # Headwind RPN: [Wind Direction] [Aircraft Heading] - cos [Wind Speed] *
          color: yellow
          text-size: 28
          formula: "${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag} - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *"
          text-font: fontawesome.otf
          text: "↓ ${formula}"
          text-format: "{0:.0f}"
        F2: # Tailwind RPN: [Wind Direction] 180 + [Aircraft Heading] - cos [Wind Speed] *
          color: yellow
          text-size: 28
          formula: "${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag} - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *"
          text-font: fontawesome.otf
          text: "↑ ${formula}"
          text-format: "{0:.0f}"
        F1: # Crosswind L RPN: [Wind Direction] 180 + [Aircraft Heading] - sin [Wind Speed] *
          color: yellow
          text-size: 28
          formula: "${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag} - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *"
          text-font: fontawesome.otf
          text: "→ ${formula}"
          text-format: "{0:.0f}"
        F3: # Crosswind R RPN: [Wind Direction] [Aircraft Heading] - sin [Wind Speed] *
          color: yellow
          text-size: 28
          formula: "${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag} - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *"
          text-font: fontawesome.otf
          text: "← ${formula}"
          text-format: "{0:.0f}"

  - index: 5 # Track over ground
    name: TRK
    type: none
    label: TRK
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 100
          formula: "1"
          text: "${sim/cockpit2/gauges/indicators/ground_track_mag_pilot}"
          text-font: Segment7Standard.otf
          text-format: "{0:.0f}"

  - index: 6
    name: GEAR
    label: GEAR
    label-color: Black
    label-size: 10
    type: push
    command: sim/flight_controls/landing_gear_toggle
    annunciator:
      size: medium
      model: D
      parts:
        D0:
          color: Lime
          led: dot
          formula: "${sim/cockpit2/gear/deploy_ratio[0]} 0.9 gt"
        D1:
          color: Lime
          led: dot
          formula: "${sim/cockpit2/gear/deploy_ratio[1]} 0.9 gt"
        D2:
          color: Lime
          led: dot
          formula: "${sim/cockpit2/gear/deploy_ratio[2]} 0.9 gt"

  - index: 7
    name: FLAPS
    label: FLAPS
    label-size: 9
    label-color: black
    type: updown
    stops: 3
    switch:
      switch-style: large
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
        - "UP"
        - "25"
        - "50"
      tick-space: 24
      tick-color: white
      tick-label-size: 40
      tick-label-font: D-DIN-Bold.otf
      tick-label-color: black
    options: 3way,invert
    dataref: sim/cockpit2/controls/flap_ratio
    formula: "${sim/cockpit2/controls/flap_ratio} 2 *"
    commands:
      - sim/flight_controls/flaps_down
      - sim/flight_controls/flaps_up

  - index: 8 # Outside Air Temperature
    name: OAT
    type: none
    label: OAT
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: lime
          text-size: 80
          formula: "1"
          text: "${sim/cockpit2/temperature/outside_air_temp_degc}°C"
          text-font: D-DIN-Bold.otf
          text-format: "{0:.0f}"

  - index: 9 # ISA deviation: OAT - (15 - altitude_ft * 0.00198)
    name: ISA
    type: none
    label: ISA
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
        A0:
          color: white
          text-size: 80
          formula: "${sim/cockpit2/temperature/outside_air_temp_degc} 15 ${sim/cockpit2/gauges/indicators/altitude_ft_pilot} 0.00198 * - -"
          text: "${formula}"
          text-font: D-DIN-Bold.otf
          text-format: "{0:+.0f}°C"

  - index: 10 # Local simulator time and hobbs
    name: CLOCK
    type: none
    label: CLOCK
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
        B0:
          color: lime
          text-size: 42
          formula: "1"
          text: "${sim/cockpit2/clock_timer/local_time_hours}:${sim/cockpit2/clock_timer/local_time_minutes}"
          text-font: D-DINCondensed-Bold.otf
          text-format:
            sim/cockpit2/clock_timer/local_time_hours: "{:02.0f}"
            sim/cockpit2/clock_timer/local_time_minutes: "{:02.0f}"
        B1:
          color: white
          text-size: 30
          formula: "1"
          text: "${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}:${sim/cockpit2/clock_timer/hobbs_time_seconds}"
          text-font: D-DINCondensed-Bold.otf
          text-format:
            sim/cockpit2/clock_timer/hobbs_time_hours: "{:02.0f}"
            sim/cockpit2/clock_timer/hobbs_time_minutes: "{:02.0f}"
            sim/cockpit2/clock_timer/hobbs_time_seconds: "{:02.0f}"

  - index: 11
    name: WAYPOINT
    type: none
    label: NEXT WAYPOINT
    label-size: 8
    label-color: black
    string-datarefs: ["sim/cockpit2/radios/indicators/gps_nav_id"]
    annunciator:
      size: medium
      model: F
      parts:
        F0:
          text: "${sim/cockpit2/radios/indicators/gps_nav_id}"
          text-color: Lime
          text-font: D-DINCondensed-Bold.otf
          text-size: 36
          formula: "1"
        F1:
          text: "${sim/cockpit2/radios/indicators/gps_dme_distance_nm}\nDIS"
          text-color: Lime
          text-font: D-DINCondensed-Bold.otf
          text-size: 38
          text-format: "{0:.1f}"
          formula: "1"
        F2:
          text: "${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}\nDTK"
          text-color: Lime
          text-font: D-DINCondensed-Bold.otf
          text-size: 40
          text-format: "{0:.0f}"
          formula: "1"
        F3:
          text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min\nETA"
          text-color: Lime
          text-font: D-DINCondensed-Bold.otf
          text-size: 40
          text-format: "{0:.0f}"
          formula: "1"
