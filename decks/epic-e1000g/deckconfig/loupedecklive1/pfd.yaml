name: pfd
includes:
- pager
- encoders/encoders_pfd
buttons:
- index: 0
  name: SPD
  label: SPD
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 72
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text: '${sim/cockpit2/gauges/indicators/true_airspeed_kts_pilot}

        TAS'
      text-font: D-DIN-Bold.otf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text: '${sim/cockpit2/gauges/indicators/ground_speed_kt}

        GS'
      text-font: D-DIN-Bold.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 1
  name: HDG
  label: HDG
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/heading_AHARS_deg_mag_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  name: ALT
  label: ALT
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 72
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text-format: '{0:.2f}'
      text: '${sim/cockpit/misc/barometer_setting}

        inHg'
    - color: white
      text-size: 32
      formula: ${sim/cockpit/misc/barometer_setting} 33.8639 *
      text-format: '{0:.0f}'
      text: '${formula}

        hPa'
  activation: none
  representation: annunciator
- index: 3
  name: VS
  label: VS
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 4
  name: WIND
  label: WIND DATA
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↓ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↑ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: → ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ← ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 5
  name: TRK
  label: TRK
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/ground_track_mag_pilot}
      text-font: Segment7Standard.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 6
  name: GEAR
  label: GEAR
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: D
    parts:
    - color: Lime
      led: dot
      formula: ${sim/flightmodel2/gear/deploy_ratio[0]} 0.9 gt
    - color: Lime
      led: dot
      formula: ${sim/flightmodel2/gear/deploy_ratio[1]} 0.9 gt
    - color: Lime
      led: dot
      formula: ${sim/flightmodel2/gear/deploy_ratio[2]} 0.9 gt
  activation: push
  representation: annunciator
  commands:
    press: sim/flight_controls/landing_gear_toggle
- index: 7
  name: FLAPS
  label: FLAPS
  label-size: 9
  label-color: black
  stops: 3
  switch:
    switch-style: large
    button-fill-color: black
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - UP
    - '25'
    - '50'
    tick-space: 24
    tick-color: white
    tick-label-size: 40
    tick-label-font: D-DIN-Bold.otf
    tick-label-color: black
  options: 3way,invert
  dataref: sim/cockpit2/controls/flap_ratio
  formula: ${sim/cockpit2/controls/flap_ratio} 2 *
  activation: sweep
  positions:
  - sim/flight_controls/flaps_down
  - sim/flight_controls/flaps_up
- index: 8
  name: OAT
  label: OAT
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/temperature/outside_air_temp_degc}°C
      text-font: D-DIN-Bold.otf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 9
  name: ISA
  label: ISA
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: white
      text-size: 80
      formula: ${sim/cockpit2/temperature/outside_air_temp_degc} 15 ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
        0.00198 * - -
      text: ${formula}
      text-font: D-DIN-Bold.otf
      text-format: '{0:+.0f}°C'
  activation: none
  representation: annunciator
- index: 10
  name: CLOCK
  label: CLOCK
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      formula: '1'
      text: ${sim/cockpit2/clock_timer/local_time_hours}:${sim/cockpit2/clock_timer/local_time_minutes}
      text-font: D-DINCondensed-Bold.otf
      text-format:
        sim/cockpit2/clock_timer/local_time_hours: '{:02.0f}'
        sim/cockpit2/clock_timer/local_time_minutes: '{:02.0f}'
    - color: white
      text-size: 30
      formula: '1'
      text: ${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}:${sim/cockpit2/clock_timer/hobbs_time_seconds}
      text-font: D-DINCondensed-Bold.otf
      text-format:
        sim/cockpit2/clock_timer/hobbs_time_hours: '{:02.0f}'
        sim/cockpit2/clock_timer/hobbs_time_minutes: '{:02.0f}'
        sim/cockpit2/clock_timer/hobbs_time_seconds: '{:02.0f}'
  activation: none
  representation: annunciator
- index: 11
  name: WAYPOINT
  label: NEXT WAYPOINT
  label-size: 8
  label-color: black
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
  annunciator:
    size: medium
    model: F
    parts:
    - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
      text-color: Lime
      text-font: D-DINCondensed-Bold.otf
      text-size: 36
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

        DIS'
      text-color: Lime
      text-font: D-DINCondensed-Bold.otf
      text-size: 38
      text-format: '{0:.1f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

        DTK'
      text-color: Lime
      text-font: D-DINCondensed-Bold.otf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_dme_time_min} min

        ETA'
      text-color: Lime
      text-font: D-DINCondensed-Bold.otf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
