          PRESS'
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${aerobask/lt_emerg_press} 1 eq
- index: 8
  name: Back
  activation:
    type: page
    page: switches_pretaxi
  representation:
    type: text
    label: PRE-TAXI
    label-color: Gold
    label-size: 10
    text: ←
    text-font: fontawesome.otf
    text-size: 36
    text-color: Gold
- index: 11
  name: Next
  activation:
    type: page
    page: switches_lights
  representation:
    type: text
    label: LIGHTS
    label-color: Gold
    label-size: 10
