description: SYSTEMS
includes:
- includes/pager
- includes/encoders_pfd
name: switches_systems
default-text-size: 14
default-annunciator-color: '#222222'
buttons:
- index: 0
  name: PRESS AIR
  activation:
    type: sweep
    positions:
    - aerobask/press_air_toggle
    - aerobask/press_air_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'PRESS

          AIR'
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${aerobask/lt_press_air} 1 eq
- index: 1
  name: AUTOPILOT
  activation:
    type: sweep
    positions:
    - aerobask/otto_pwr_toggle
    - aerobask/otto_pwr_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'AUTO

          PILOT'
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${aerobask/lt_otto} 1 eq
- index: 2
  name: TRIM
  activation:
    type: sweep
    positions:
    - aerobask/trim_toggle
    - aerobask/trim_toggle
  representation:
    type: annunciator
    annunciator:
