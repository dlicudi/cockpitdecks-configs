      size: full
      parts:
      - text: TRIM
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${aerobask/lt_trim} 1 eq
- index: 4
  name: DUMP VALVE
  activation:
    type: sweep
    positions:
    - aerobask/dump_valve_toggle
    - aerobask/dump_valve_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'DUMP

          VALVE'
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
        formula: ${aerobask/lt_dump_valve} 1 eq
- index: 5
  name: EMERG OXYGEN
  activation:
    type: sweep
    positions:
    - aerobask/emerg_oxygen_toggle
    - aerobask/emerg_oxygen_toggle
  representation:
    type: annunciator
    annunciator:
      model: B
      size: full
      parts:
      - text: 'EMERG

          OXYGEN'
        color: white
        formula: 1
      - text: 'ON'
        color: cyan
        framed: false
