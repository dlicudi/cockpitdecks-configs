description: FCU
includes:
- pager
- encoders/encoders_fcu
name: fcu
buttons:
- index: 0
  name: AP
  text-bg-color: (40, 40, 40)
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/servos_on}
    - text: AP
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/servos_toggle
- index: 1
  name: FD
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/flight_director_mode}
    - text: FD
      text-size: 60
      text-font: DIN Bold
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/fdir_toggle
- index: 2
  name: HDG
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/heading_status}
    - text: HDG
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/heading
- index: 3
  name: ALT
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_hold_status}
    - text: ALT
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/altitude_hold
- index: 4
  name: NAV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/gpss_status} 2 eq
    - text: NAV
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/gpss
- index: 5
  name: VNAV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/vnav_armed}
    - text: VNAV
      text-size: 60
      text-font: DIN Bold
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/vnav
- index: 6
  name: APR
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/approach_status}
    - text: APR
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/approach
- index: 7
  name: REV
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/backcourse_status}
    - text: REV/BC
      text-size: 50
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/back_course
- index: 8
  name: VS
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_mode} 4 eq
    - text: VS
      text-size: 60
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/vertical_speed
- index: 9
  icon: TEXTURE_FRAME.png
  activation: none
  representation: icon
- index: 10
  name: FLC
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit2/autopilot/altitude_mode} 5 eq
    - text: FLC
      text-size: 60
      text-font: DIN Bold
      text-color: Turquoise
      formula: '1'
  vibrate: SHORT
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/level_change
- index: 11
  stops: 3
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 200
    tick-to: 340
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - LOC1
    - LOC2
    - GPS
    up: 30
    left: 45
  dataref: sim/cockpit/switches/HSI_selector
  set-dataref: sim/cockpit/switches/HSI_selector
  activation: sweep
