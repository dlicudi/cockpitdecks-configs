    commands:
      press: sim/transponder/transponder_on
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/radios/actuators/transponder_mode} 2 eq
      - text: true
        text-size: 60
        text-font: DIN Bold
        formula: '1'
  vibrate: SHORT
