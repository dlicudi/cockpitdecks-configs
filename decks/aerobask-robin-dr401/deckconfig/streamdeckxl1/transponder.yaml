name: transponder
includes:
- includes/pagerfull
buttons:
- index: 0
  name: SQUAWK0
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_thousands_up
  representation:
    type: text
    label: 'S Q U '
    label-position: rt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 50
    text-font: Seven Segment.ttf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 1000 / floor
  vibrate: SHORT
- index: 1
  name: SQUAWK1
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_hundreds_up
  representation:
    type: text
    label: ' A W K'
    label-position: lt
    label-size: 10
    label-color: White
    text: ${formula}
    text-format: '{:01.0f}'
    text-size: 50
    text-font: Seven Segment.ttf
    text-color: Lime
    text-bg-color: Black
    formula: ${sim/cockpit/radios/transponder_code} 100 / floor 10 %
  vibrate: SHORT
- index: 2
  name: SQUAWK2
