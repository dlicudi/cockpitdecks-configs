description: Switch Panel
includes:
- includes/pagerfull
name: switches
buttons:
- index: 0
  label: BATTERY
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/electrical/battery_on[0]} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/electrical/battery_on[0]} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/electrical/battery_1_toggle
- index: 1
  label: MASTER ENGN
  label-color: black
  label-size: 8
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${aerobask/dr401/engine_master} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${aerobask/dr401/engine_master} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: aerobask/dr401/engine_master_to
- index: 2
  label: AVIONICS
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/avionics_power_on} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/switches/avionics_power_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/systems/avionics_toggle
- index: 3
  label: ALTERNATOR
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
