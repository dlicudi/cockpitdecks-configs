      framed: true
      formula: ${sim/cockpit/electrical/landing_lights_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/landing_lights_toggle
- index: 17
  label: TAXI
  label-color: black
  label-size: 9
  annunciator:
