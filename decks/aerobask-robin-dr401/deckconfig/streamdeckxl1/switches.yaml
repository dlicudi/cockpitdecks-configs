- index: 13
  name: PARKING BRAKE
  label: PARKING BRAKE
  label-size: 8
  label-color: black
  stops: 2
  switch:
    switch-style: rect
    button-fill-color: black
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - 'ON'
    - 'OFF'
    tick-space: 24
    tick-color: white
    tick-label-size: 40
    tick-label-font: DIN Bold
    tick-label-color: black
  formula: ${sim/cockpit2/controls/parking_brake_ratio}
  activation: sweep
  positions:
  - sim/flight_controls/brakes_toggle_regular
  - sim/flight_controls/brakes_toggle_regular
- index: 15
  label: FUEL XFER
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      led: dot
      color: Orange
      formula: ${sim/cockpit/engine/fuel_tank_transfer_from} 0 eq
    B1:
      text: 'OFF'
      color: White
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/fuel/fuel_transfer_from_off
- index: 14
  label: FUEL XFER
  label-color: black
  label-size: 10
  annunciator:
    model: B
    size: medium
    B0:
      led: dot
      color: Orange
      formula: ${sim/cockpit/engine/fuel_tank_transfer_from} 3 eq
    B1:
      text: AUX TANK
      color: White
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/fuel/fuel_transfer_from_3
- index: 10
  vibrate: LONG
  label: IGNITION
  label-color: White
  label-size: 9
  text-bg-color: Black
  multi-texts:
  - text: 
    text-color: White
    text-font: fontawesome.otf
    text-size: 30
  - text: 
    text-color: Green
    text-font: fontawesome.otf
    text-size: 50
  - text: 
    text-color: Red
    text-font: fontawesome.otf
    text-size: 60
  formula: ${aerobask/dr401/starter_key}
  activation: long-press
  representation: multi-texts
  commands:
    press: sim/ignition/engage_starter_1
- index: 6
  label: FUEL
