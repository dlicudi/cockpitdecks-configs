- index: 21
  name: FLAPS
  label: FLAPS
  label-size: 9
  label-color: black
  stops: 3
  switch:
    switch-style: large
    button-fill-color: black
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - UP
    - '25'
    - '50'
    tick-space: 24
    tick-color: white
    tick-label-size: 40
    tick-label-font: DIN Bold
    tick-label-color: black
  options: 3way,invert
  dataref: sim/cockpit2/controls/flap_ratio
  formula: ${sim/cockpit2/controls/flap_ratio} 2 *
  activation: sweep
  positions:
  - sim/flight_controls/flaps_down
  - sim/flight_controls/flaps_up
- index: 23
  label: PITOT HT
  label-color: black
  label-size: 8
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/ice/pitot_heat0_tog
- index: 22
  set-dataref: sim/cockpit/engine/fuel_pump_on[0]
  label: ELECTRIC PUMP
  label-color: black
  label-size: 8
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/engine/fuel_pump_on[0]} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/engine/fuel_pump_on[0]} 1 eq
  activation: sweep
  representation: annunciator
- index: 11
  set-dataref: sim/cockpit/switches/anti_ice_engine_air[0]
  label: ALTERNATE AIR
  label-color: black
  label-size: 8
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/switches/anti_ice_engine_air[0]} 0 eq
    B1:
