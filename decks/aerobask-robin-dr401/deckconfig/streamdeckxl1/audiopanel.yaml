name: audiopanel
includes:
- includes/pagerfull
buttons:
- index: 0
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${sim/cockpit/switches/audio_panel_out} 6 eq
    - text: COM MIC 1
      text-size: 40
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: sim/audio_panel/transmit_audio_com1
