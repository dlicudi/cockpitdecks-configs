name: engine
description: Engine monitoring — N1, EGT, fuel flow, oil
includes:
- includes/pager
buttons:
# Row 0 — N1
- index: 0
  name: N1_ENG1
  activation:
    type: none
  representation:
    type: annunciator
    label: N1 ENG1
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 32
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/N1_percent[0]}
        text-font: Seven Segment.ttf
        text-format: '{0:.1f}'

- index: 1
  name: N1_ENG2
  activation:
    type: none
  representation:
    type: annunciator
    label: N1 ENG2
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 32
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/N1_percent[1]}
        text-font: Seven Segment.ttf
        text-format: '{0:.1f}'

- index: 2
  name: ENG_START_SEL
  activation:
    type: none
  representation:
    type: annunciator
    label: STARTER
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: ENG1
        text-size: 38
        color: white
        formula: '1'
      - text: ${laminar/B738/engine/starter1_pos}
        text-size: 24
        color: cyan
        formula: '1'
        text-format: '{0:.0f}'

# Row 1 — EGT
- index: 3
  name: EGT_ENG1
  activation:
    type: none
  representation:
    type: annunciator
    label: EGT ENG1
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: yellow
        text-size: 28
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/EGT_deg_cel[0]}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 4
  name: EGT_ENG2
  activation:
    type: none
  representation:
    type: annunciator
    label: EGT ENG2
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: yellow
        text-size: 28
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/EGT_deg_cel[1]}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 5
  name: FUEL_FLOW
  activation:
    type: none
  representation:
    type: annunciator
    label: FF (PPH)
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 16
        formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 7936.64 *
        text: E1 ${formula}
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 16
        formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[1]} 7936.64 *
        text: E2 ${formula}
        text-format: '{0:.0f}'

# Row 2 — Oil
- index: 6
  name: OIL_PRESS_E1
  activation:
    type: none
  representation:
    type: annunciator
    label: OIL PSI E1
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: white
        text-size: 26
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 7
  name: OIL_PRESS_E2
  activation:
    type: none
  representation:
    type: annunciator
    label: OIL PSI E2
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: white
        text-size: 26
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/oil_pressure_psi[1]}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 8
  name: FUEL_QTY
  activation:
    type: none
  representation:
    type: annunciator
    label: FUEL (LBS)
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 14
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 2.20462 *
        text: L ${formula}
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 14
        formula: ${sim/cockpit2/fuel/fuel_quantity[2]} 2.20462 *
        text: C ${formula}
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 14
        formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 2.20462 *
        text: R ${formula}
        text-format: '{0:.0f}'

# Row 3 — Mixture cutoff
- index: 9
  name: MIXTURE_E1
  activation:
    type: push
    commands:
      press: laminar/B738/engine/mixture1_toggle
  representation:
    type: annunciator
    label: MIX ENG1
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'CUTOFF'
        text-color: red
        framed: true
        formula: ${laminar/B738/engine/mixture_ratio1} 0 eq
        text-size: 42
      - text: 'RUN'
        text-color: lime
        framed: true
        formula: ${laminar/B738/engine/mixture_ratio1} 0 gt
        text-size: 52
  vibrate: LONG

- index: 10
  name: MIXTURE_E2
  activation:
    type: push
    commands:
      press: laminar/B738/engine/mixture2_toggle
  representation:
    type: annunciator
    label: MIX ENG2
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'CUTOFF'
        text-color: red
        framed: true
        formula: ${laminar/B738/engine/mixture_ratio2} 0 eq
        text-size: 42
      - text: 'RUN'
        text-color: lime
        framed: true
        formula: ${laminar/B738/engine/mixture_ratio2} 0 gt
        text-size: 52
  vibrate: LONG

- index: 11
  name: PARKING_BRAKE
  activation:
    type: push
    commands:
      press: sim/flight_controls/park_brake_valve_toggle
  representation:
    type: annunciator
    label: PARK BRK
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'ON'
        text-color: red
        framed: true
        formula: ${laminar/B738/annunciator/parking_brake}
        text-size: 52
      - text: 'OFF'
        text-color: green
        formula: ${laminar/B738/annunciator/parking_brake} not
        text-size: 52
  vibrate: SHORT
