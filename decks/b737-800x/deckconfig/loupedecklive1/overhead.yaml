name: overhead
description: Overhead - Electrical, APU, Fuel
includes:
- includes/pager
buttons:
# Row 0 — Electrical / APU
- index: 0
  name: APU_START
  activation:
    type: push
    commands:
      press: laminar/B738/spring_toggle_switch/APU_start_pos_up
  representation:
    type: annunciator
    label: APU
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'FAULT'
        text-color: amber
        off-color: '#1a0e00'
        text-font: DIN Condensed Black.otf
        text-size: 50
        formula: ${laminar/B738/annunciator/apu_fault}
      - text: 'START'
        text-color: deepskyblue
        text-size: 50
        formula: ${laminar/B738/switches/apu_start} 2 eq
  vibrate: SHORT

- index: 1
  name: APU_GEN1
  activation:
    type: push
    commands:
      press: laminar/B738/toggle_switch/apu_gen1_up
  representation:
    type: annunciator
    label: APU GEN 1
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'OFF BUS'
        text-color: amber
        off-color: '#1a0e00'
        text-font: DIN Condensed Black.otf
        text-size: 42
        formula: ${laminar/B738/annunciator/apu_gen_off_bus}
      - text: 'ON'
        text-color: deepskyblue
        framed: true
        formula: ${laminar/B738/annunciator/apu_gen_off_bus} not
        text-size: 50
  vibrate: SHORT

- index: 2
  name: GPU
  activation:
    type: push
    commands:
      press: laminar/B738/toggle_switch/gpu_up
  representation:
    type: annunciator
    label: GPU
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'AVAIL'
        text-color: lime
        text-size: 52
        formula: ${laminar/B738/annunciator/ground_power_avail}
      - text: 'OFF'
        text-color: darkorange
        text-size: 52
        formula: ${laminar/B738/annunciator/ground_power_avail} not

