name: mcp
description: MCP - Mode Control Panel
includes:
- includes/pager
- encoders/encoders_mcp
buttons:
# Row 0 — Lateral / Vertical modes
- index: 0
  name: N1
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/n1_press
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/n1_status}
      - text: N1
        text-size: 64
        text-font: DIN Bold
        formula: '1'

