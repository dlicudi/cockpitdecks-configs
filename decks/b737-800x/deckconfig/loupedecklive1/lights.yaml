name: lights
description: Exterior and cabin lights
includes:
- includes/pager
buttons:
# Row 0 — Landing lights
- index: 0
  name: LAND_LIGHT_L
  activation:
    type: push
    commands:
      press: laminar/B738/switch/land_lights_ret_left_up
  representation:
    type: annunciator
    label: LAND L
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'ON'
        text-color: lime
        framed: true
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]}
        text-size: 52
      - text: 'OFF'
        text-color: darkorange
        formula: ${sim/cockpit2/switches/landing_lights_switch[0]} not
        text-size: 52
  vibrate: SHORT

- index: 1
  name: LAND_LIGHT_R
  activation:
    type: push
