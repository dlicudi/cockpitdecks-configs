name: index
description: Home — status overview and page navigation
buttons:
# Row 0 (0-7) — Warnings + AP engagement
- index: 0
  name: MASTER_CAUTION
  activation:
    type: push
    commands:
      press: laminar/B738/push_button/master_caution1
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: darkorange
        led: bars
        formula: ${laminar/B738/annunciator/master_caution_light}
      - text: 'MASTER CAUT'
        text-size: 48
        text-font: DIN Condensed Black.otf
        text-color: darkorange
        formula: '1'

- index: 1
  name: FIRE_WARN
  activation:
    type: push
    commands:
      press: laminar/B738/push_button/fire_bell_light1
  representation:
    type: annunciator-animate
    annunciator-animate:
      size: medium
      model: B
      parts:
      - color: firebrick
        led: bars
        formula: ${laminar/B738/annunciator/fire_bell_annun}
      - text: 'FIRE WARN'
        text-size: 52
        text-font: DIN Condensed Black.otf
        text-color: firebrick
        formula: '1'
      animation-speed: 1.5

- index: 2
  name: CMD_A
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/cmd_a_press
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/cmd_a_status}
      - text: CMD A
        text-size: 56
        text-font: DIN Bold
        formula: '1'

- index: 3
  name: CMD_B
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/cmd_b_press
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/cmd_b_status}
      - text: CMD B
        text-size: 56
        text-font: DIN Bold
        formula: '1'

- index: 4
  name: AT_ARM
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/autothrottle_arm_toggle
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/autothrottle_status}
      - text: A/T ARM
        text-size: 48
        text-font: DIN Bold
        formula: '1'

- index: 5
  name: FD_CAPT
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/flight_director_toggle
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/switches/autopilot/fd_ca}
      - text: F/D CAPT
        text-size: 46
        text-font: DIN Bold
        formula: '1'

- index: 6
  name: VNAV
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/vnav_press
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/vnav_status1}
      - text: VNAV
        text-size: 56
        text-font: DIN Bold
        formula: '1'

- index: 7
  name: LNAV
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/lnav_press
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/lnav_status}
      - text: LNAV
        text-size: 56
        text-font: DIN Bold
        formula: '1'

# Row 1 (8-15) — MCP display
- index: 8
  name: IAS_DISPLAY
  activation:
    type: none
  representation:
    type: annunciator
    label: IAS (kts)
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 34
        formula: '1'
        text: ${sim/cockpit2/autopilot/airspeed_dial_kts_mach}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 9
  name: HDG_DISPLAY
  activation:
    type: none
  representation:
    type: annunciator
    label: HDG (mag)
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 34
        formula: '1'
        text: ${laminar/B738/autopilot/mcp_hdg_dial}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 10
  name: ALT_DISPLAY
  activation:
    type: none
  representation:
    type: annunciator
    label: ALT (ft)
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 26
        formula: '1'
        text: ${laminar/B738/autopilot/mcp_alt_dial}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 11
  name: VS_DISPLAY
  activation:
    type: none
  representation:
    type: annunciator
    label: V/S (fpm)
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 28
        formula: '1'
        text: ${sim/cockpit2/autopilot/vvi_dial_fpm}
        text-font: Seven Segment.ttf
        text-format: '{0:+.0f}'

- index: 12
  name: BARO_DISPLAY
  activation:
    type: none
  representation:
    type: annunciator
    label: BARO
    annunciator:
      size: medium
      model: B
      parts:
      - color: white
        text-size: 18
        formula: '1'
        text: ${laminar/B738/EFIS/baro_sel_in_hg_pilot} inHg
        text-format: '{0:.2f}'
      - color: white
        text-size: 18
        formula: ${laminar/B738/EFIS/baro_sel_in_hg_pilot} 33.8639 *
        text: '${formula} hPa'
        text-format: '{0:.0f}'

- index: 13
  name: CRS_DISPLAY
  activation:
    type: none
  representation:
    type: annunciator
    label: CRS PILOT
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 34
        formula: '1'
        text: ${laminar/B738/autopilot/course_pilot}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 14
  name: N1_ENG1_DISPLAY
  activation:
    type: none
  representation:
    type: annunciator
    label: N1 E1 E2
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 18
        formula: '1'
        text: E1 ${sim/cockpit2/engine/indicators/N1_percent[0]}%
        text-format: '{0:.1f}'
      - color: lime
        text-size: 18
        formula: '1'
        text: E2 ${sim/cockpit2/engine/indicators/N1_percent[1]}%
        text-format: '{0:.1f}'

- index: 15
  name: PARKING_BRAKE
  activation:
    type: push
    commands:
      press: sim/flight_controls/park_brake_valve_toggle
  representation:
    type: annunciator
    label: PARK BRK
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'ON'
        text-color: red
        framed: true
        formula: ${laminar/B738/annunciator/parking_brake}
        text-size: 52
      - text: 'OFF'
        text-color: green
        formula: ${laminar/B738/annunciator/parking_brake} not
        text-size: 52

