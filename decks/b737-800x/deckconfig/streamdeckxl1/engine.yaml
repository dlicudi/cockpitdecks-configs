name: engine
description: Engine monitoring — N1, EGT, FF, oil, fuel quantity
includes:
- includes/pagercompact
buttons:
# Row 0 (0-7) — Engine primary
- index: 0
  name: N1_ENG1
  activation:
    type: none
  representation:
    type: annunciator
    label: N1 ENG 1
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 34
        formula: '1'
        text: ${sim/cockpit2/engine/indicators/N1_percent[0]}
        text-font: Seven Segment.ttf
        text-format: '{0:.1f}'

- index: 1
  name: N1_ENG2
  activation:
