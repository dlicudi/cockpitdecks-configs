- index: 13
  name: MIX_ENG1
  activation:
    type: push
    commands:
      press: laminar/B738/engine/mixture1_toggle
  representation:
    type: annunciator
    label: MIX ENG1
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'CUTOFF'
        text-color: red
        framed: true
        formula: ${laminar/B738/engine/mixture_ratio1} 0 eq
        text-size: 40
      - text: 'RUN'
        text-color: lime
        framed: true
        formula: ${laminar/B738/engine/mixture_ratio1} 0 gt
        text-size: 52
  vibrate: LONG

- index: 14
  name: MIX_ENG2
  activation:
    type: push
    commands:
      press: laminar/B738/engine/mixture2_toggle
  representation:
    type: annunciator
    label: MIX ENG2
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'CUTOFF'
        text-color: red
        framed: true
        formula: ${laminar/B738/engine/mixture_ratio2} 0 eq
        text-size: 40
      - text: 'RUN'
        text-color: lime
        framed: true
        formula: ${laminar/B738/engine/mixture_ratio2} 0 gt
        text-size: 52
  vibrate: LONG

- index: 15
  name: PARKING_BRAKE
  activation:
    type: push
    commands:
      press: sim/flight_controls/park_brake_valve_toggle
  representation:
    type: annunciator
    label: PARK BRK
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - text: 'ON'
        text-color: red
        framed: true
        formula: ${laminar/B738/annunciator/parking_brake}
        text-size: 52
      - text: 'OFF'
        text-color: green
        formula: ${laminar/B738/annunciator/parking_brake} not
        text-size: 52

