# Row 1 (8-15) — Transponder + NAV swap
- index: 8
  name: XPDR_CODE
  activation:
    type: none
  representation:
    type: annunciator
    label: TRANSPONDER
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 30
        formula: '1'
        text: ${sim/cockpit/radios/transponder_code}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 9
  name: XPDR_MODE_DN
  activation:
    type: push
    commands:
      press: laminar/B738/knob/transponder_mode_dn
  representation:
