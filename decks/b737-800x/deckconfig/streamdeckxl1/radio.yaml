name: radio
description: Radio — COM1, COM2, NAV1, NAV2, transponder
includes:
- includes/pagercompact
buttons:
# Row 0 (0-7) — COM / NAV active frequencies
- index: 0
  name: COM1_ACT
  activation:
    type: push
    commands:
      press: sim/radios/com1_standy_flip
  representation:
    type: annunciator
    label: COM1 ACT
    label-size: 10
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 22
        formula: '1'
        text: ${sim/cockpit2/radios/actuators/com1_frequency_hz}
        text-font: Seven Segment.ttf
        text-format: '{0:.3f}'

- index: 1
