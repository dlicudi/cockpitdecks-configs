name: overhead
description: Overhead — electrical, APU, fuel, hydraulics, bleed air
includes:
- includes/pagercompact
buttons:
# Row 0 (0-7) — Electrical / APU / GPU
- index: 0
  name: APU_START
  activation:
    type: push
    commands:
      press: laminar/B738/spring_toggle_switch/APU_start_pos_up
  representation:
    type: annunciator
    label: APU
    annunciator:
      size: medium
      model: B
      parts:
      - color: amber
        led: bars
        formula: ${laminar/B738/annunciator/apu_fault}
      - text: 'FAULT'
        text-color: amber
        text-size: 48
        formula: ${laminar/B738/annunciator/apu_fault}
      - text: 'START'
        text-color: deepskyblue
        framed: true
        text-size: 48
        formula: ${laminar/B738/switches/apu_start} 2 eq
      - text: 'ON'
        text-color: lime
        text-size: 48
        formula: ${laminar/B738/switches/apu_start} 1 eq

