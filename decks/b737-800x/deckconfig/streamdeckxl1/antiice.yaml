name: antiice
description: Anti-ice — wing, engines, windows, probes, bleed air
includes:
- includes/pagercompact
buttons:
# Row 0 (0-7) — Wing, engine anti-ice, window heat
- index: 0
  name: WING_ANTI_ICE
  activation:
    type: push
    commands:
      press: laminar/B738/toggle_switch/wing_heat
  representation:
    type: annunciator
    label: WING A/ICE
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/annunciator/wing_ice_on_L}
      - text: 'ON'
        text-color: lime
        framed: true
        formula: ${laminar/B738/ice/wing_heat_pos}
        text-size: 52
      - text: 'OFF'
        text-color: darkorange
        formula: ${laminar/B738/ice/wing_heat_pos} not
        text-size: 52

