name: main
fill-empty-keys: false
buttons:
# ── Row 0: Warnings & AP engagement ──────────────────────────────────────────
- index: 0
  name: MASTER_CAUTION
  activation:
    type: push
    commands:
      press: laminar/B738/push_button/master_caution1
  representation:
    type: annunciator
    label: MASTER CAUT
    label-size: 9
    annunciator:
      model: B
      size: medium
      parts:
      - color: darkorange
        led: bars
        formula: ${laminar/B738/annunciator/master_caution_light}
      - text: CAUT
        text-font: D-DINCondensed-Bold.otf
        text-size: 22
        text-color: darkorange
        formula: '1'
  vibrate: SHORT

- index: 1
  name: FIRE_WARNING
  activation:
    type: push
    commands:
      press: laminar/B738/push_button/fire_bell_light1
  representation:
    type: annunciator-animate
    label: FIRE WARN
    label-size: 9
    annunciator-animate:
      model: B
      size: medium
      parts:
      - color: firebrick
        led: bars
        formula: ${laminar/B738/annunciator/fire_bell_annun}
      - text: FIRE
        text-font: D-DINCondensed-Bold.otf
        text-size: 22
        text-color: firebrick
        formula: '1'
      animation-speed: 1.5

