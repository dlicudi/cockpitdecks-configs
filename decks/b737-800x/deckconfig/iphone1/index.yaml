name: index
description: B737-800X overview — warnings, lights, anti-ice, cabin signs
includes:
- includes/pager
buttons:
# Row 0 (0-6) — Warnings + AP engagement
- index: 0
  name: MASTER_CAUTION
  activation:
    type: push
    commands:
      press: laminar/B738/push_button/master_caution1_pos
  representation:
    type: annunciator
    label: MASTER CAUT
    label-size: 8
    annunciator:
      size: medium
      model: B
      parts:
      - color: amber
        led: bars
        formula: ${laminar/B738/annunciator/master_caution_light}
      - text: CAUT
        text-color: amber
        framed: true
        formula: ${laminar/B738/annunciator/master_caution_light}
        text-size: 42
      - text: CAUT
        text-color: (80, 80, 80)
        formula: ${laminar/B738/annunciator/master_caution_light} not
        text-size: 42

- index: 1
  name: FIRE_WARN
  activation:
    type: push
    commands:
      press: laminar/B738/push_button/fire_bell_annun_pos
  representation:
    type: annunciator
    label: FIRE WARN
    label-size: 8
    annunciator:
      size: medium
      model: B
      parts:
      - color: red
        led: bars
        formula: ${laminar/B738/annunciator/fire_bell_annun}
      - text: FIRE
        text-color: red
        framed: true
        formula: ${laminar/B738/annunciator/fire_bell_annun}
        text-size: 46
      - text: FIRE
        text-color: (60, 60, 60)
        formula: ${laminar/B738/annunciator/fire_bell_annun} not
        text-size: 46

- index: 2
  name: CMD_A
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/cmd_a_press
  representation:
    type: annunciator
    label: CMD A
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/cmd_a_status}
      - text: A
        text-color: lime
        framed: true
        formula: ${laminar/B738/autopilot/cmd_a_status}
        text-size: 52
      - text: A
        text-color: (60, 60, 60)
        formula: ${laminar/B738/autopilot/cmd_a_status} not
        text-size: 52

- index: 3
  name: CMD_B
