      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/cmd_b_status}
      - text: B
        text-color: lime
        framed: true
        formula: ${laminar/B738/autopilot/cmd_b_status}
        text-size: 52
      - text: B
        text-color: (60, 60, 60)
        formula: ${laminar/B738/autopilot/cmd_b_status} not
        text-size: 52

- index: 4
