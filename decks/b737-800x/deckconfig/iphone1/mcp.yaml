name: mcp
description: MCP — autopilot modes and displays
includes:
- includes/pager
buttons:
# Row 0 (0-6) — AP mode buttons
- index: 0
  name: N1
  activation:
    type: push
    commands:
      press: laminar/B738/autopilot/n1_press
  representation:
    type: annunciator
    label: N1
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/autopilot/n1_status}
      - text: N1
        text-color: lime
        framed: true
        formula: ${laminar/B738/autopilot/n1_status}
        text-size: 42
      - text: N1
        text-color: (60, 60, 60)
        formula: ${laminar/B738/autopilot/n1_status} not
        text-size: 42

