# Row 2 (16-22) — MCP numeric displays
- index: 16
  name: IAS_DISPLAY
  activation:
    type: none
  representation:
    type: annunciator
    label: IAS
    annunciator:
      size: medium
      model: A
      parts:
      - color: cyan
        text-size: 28
        formula: ${laminar/B738/autopilot/mcp_speed_dial_kts_mach}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'

- index: 17
  name: HDG_DISPLAY
  activation:
