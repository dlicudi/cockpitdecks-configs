name: overhead
description: Overhead panel — power, fuel, hydraulics, bleed air
includes:
- includes/pager
buttons:
# Row 0 (0-6) — Electrical
- index: 0
  name: APU_START
  activation:
    type: push
    commands:
      press: laminar/B738/switch/apu_start_pos
  representation:
    type: annunciator
    label: APU START
    label-size: 8
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${laminar/B738/electric/apu_gen_on}
      - text: 'ON'
        text-color: lime
        framed: true
        formula: ${laminar/B738/electric/apu_gen_on}
        text-size: 46
      - text: 'OFF'
        text-color: darkorange
        formula: ${laminar/B738/electric/apu_gen_on} not
        text-size: 46

