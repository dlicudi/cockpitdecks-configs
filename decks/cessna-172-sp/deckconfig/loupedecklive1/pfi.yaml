name: pfi
includes:
- pager
- encoders/encoders_fcu
buttons:
- index: 0
  name: SPD
  activation:
    type: none
  representation:
    type: annunciator
    label: SPD
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        formula: '1'
        text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 1
  name: HDG
  activation:
    type: none
  representation:
    label: HDG
    label-size: 9
    label-color: black
    type: annunciator
    annunciator:
      size: medium
      model: A
      parts:
      - text: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        formula: '1'
        text-format: '{0:.0f}'
        color: lime
- index: 2
  name: ALT
  activation:
    type: none
  representation:
    type: annunciator
    label: ALT
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: D
      parts:
      - color: lime
        text-size: 40
        formula: '1'
        text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
      - color: white
        text-size: 16
        formula: '1'
        text-format: '{0:.2f}'
        text: '${sim/cockpit/misc/barometer_setting}

          inHg'
      - color: white
        text-size: 16
        formula: ${sim/flightmodel/position/y_agl} 3.28084 *
        text-format: '{0:.0f}'
        text: '${formula}

          ft AGL'
- index: 3
  name: VS
  activation:
    type: none
  representation:
    type: annunciator
    label: VS
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 52
        formula: '1'
        text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 4
  name: FUEL
  activation:
    type: none
  representation:
    type: annunciator
    label: FUEL QTY
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 20
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
        text: L ${formula} gal
      - color: yellow
        text-size: 20
        formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
        text: R ${formula} gal
- index: 5
  name: WIND
  activation:
    type: none
  representation:
    type: annunciator
    label: WIND DATA
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: F
      parts:
      - color: yellow
        text-size: 16
        formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
          - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
        text-font: fontawesome.otf
        text: "\u2193 ${formula}"
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 16
        formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
          - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
        text-font: fontawesome.otf
        text: "\u2191 ${formula}"
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 16
        formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
          - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
        text-font: fontawesome.otf
        text: "\u2192 ${formula}"
        text-format: '{0:.0f}'
      - color: yellow
        text-size: 16
        formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
          - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
        text-font: fontawesome.otf
        text: "\u2190 ${formula}"
        text-format: '{0:.0f}'
- index: 6
  name: FLAPS
  activation:
    type: sweep
    stops: 3
    options: 3way,invert
    dataref: sim/cockpit2/controls/flap_ratio
    positions:
    - sim/flight_controls/flaps_down
    - sim/flight_controls/flaps_up
  representation:
    type: switch
    label: FLAPS
    label-size: 9
    label-color: black
    switch:
      switch-style: large
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - UP
      - '25'
      - '50'
      tick-space: 24
      tick-color: white
      tick-label-size: 24
      tick-label-font: D-DIN-Bold.otf
      tick-label-color: black
    formula: ${sim/cockpit2/controls/flap_ratio} 2 *
- index: 7
  activation:
    type: none
  representation:
    type: annunciator
    label: TEMP
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 46
        formula: '1'
        text: ${sim/cockpit2/temperature/outside_air_temp_degc}
        text-format: "{0:.0f} \xB0C"
- index: 8
  activation:
    type: none
  representation:
    type: annunciator
    label: ENGINE
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 22
        text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]} RPM
        text-format: '{0:.0f}'
        formula: '1'
      - color: lime
        text-size: 22
        text: MP ${sim/cockpit2/engine/indicators/MPR_in_hg[0]} in
        text-format: '{0:.0f}'
        formula: '1'
- index: 9
  name: CAUTION
  activation:
    type: none
  representation:
    type: annunciator
    label: CAUTION
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
      - text: OIL PRESS
        text-color: firebrick
        text-font: D-DINCondensed-Bold.otf
        text-size: 22
        formula: ${sim/cockpit/warnings/annunciators/oil_pressure}
      - text: VOLTS
        text-color: firebrick
        text-font: D-DINCondensed-Bold.otf
        text-size: 22
        formula: ${sim/cockpit/warnings/annunciators/generator}
- index: 10
  name: WARNING
  activation:
    type: none
  representation:
    type: annunciator
    label: WARNING
    label-size: 10
    label-color: black
    annunciator:
      size: medium
      model: B
      parts:
      - text: L FUEL R
        text-color: darkorange
        text-font: D-DINCondensed-Bold.otf
        text-size: 22
        formula: ${sim/cockpit/warnings/annunciators/fuel_pressure}
      - text: L VAC R
        text-color: darkorange
        text-font: D-DINCondensed-Bold.otf
        text-size: 22
        formula: ${sim/cockpit/warnings/annunciators/low_vacuum}
- index: 11
  name: WAYPOINT
  activation:
    type: none
  representation:
    type: annunciator
    label: NEXT WAYPOINT
    label-size: 8
    label-color: black
    annunciator:
      size: medium
      model: D
      parts:
      - text: ${sim/cockpit2/radios/indicators/gps_dme_distance_nm} nm DIS
        text-color: Lime
        text-font: Seven Segment.ttf
        text-size: 26
        text-format: '{0:.1f}'
        formula: '1'
      - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

          DTK'
        text-color: Lime
        text-font: Seven Segment.ttf
        text-size: 16
        text-format: '{0:.0f}'
        formula: '1'
      - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
        text-color: Lime
        text-font: Seven Segment.ttf
        text-size: 16
        text-format: '{0:.0f}'
        formula: '1'
