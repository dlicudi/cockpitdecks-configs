name: pfi
includes:
- pager
- encoders/encoders_fcu
buttons:
- index: 0
  name: SPD
  label: SPD
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 1
  name: HDG
  label: HDG
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  name: ALT
  label: ALT
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text-format: '{0:.2f}'
      text: '${sim/cockpit/misc/barometer_setting}

        inHg'
    - color: white
      text-size: 32
      formula: ${sim/flightmodel/position/y_agl} 3.28084 *
      text-format: '{0:.0f}'
      text: '${formula}

        ft AGL'
  activation: none
  representation: annunciator
- index: 3
  name: VS
  label: VS
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 4
  name: FUEL
  label: FUEL QTY
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: L ${formula} gal
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: R ${formula} gal
  activation: none
  representation: annunciator
- index: 5
  name: WIND
  label: WIND DATA
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↓ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↑ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: → ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ← ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 6
  name: FLAPS
  label: FLAPS
  label-size: 9
  label-color: black
  stops: 3
  switch:
    switch-style: large
    button-fill-color: black
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - UP
    - '25'
    - '50'
    tick-space: 24
    tick-color: white
    tick-label-size: 40
    tick-label-font: DIN Bold
    tick-label-color: black
  options: 3way,invert
  dataref: sim/cockpit2/controls/flap_ratio
  formula: ${sim/cockpit2/controls/flap_ratio} 2 *
  activation: sweep
  positions:
  - sim/flight_controls/flaps_down
  - sim/flight_controls/flaps_up
- index: 7
  label: TEMP
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 70
      formula: '1'
      text: ${sim/cockpit2/temperature/outside_air_temp_degc}
      text-format: '{0:.0f} °C'
  activation: none
  representation: annunciator
- index: 8
  label: ENGINE
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]} RPM
      text-format: '{0:.0f}'
      formula: '1'
    - color: lime
      text-size: 42
      text: MP ${sim/cockpit2/engine/indicators/MPR_in_hg[0]} in
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
- index: 9
  name: CAUTION
  label: CAUTION
  label-size: 10
  label-color: black
  annunciator:
    size: medium
    model: B
    parts:
    - text: OIL PRESS
      text-color: firebrick
      text-font: DIN Condensed Black.otf
      text-size: 50
      formula: ${sim/cockpit/warnings/annunciators/oil_pressure}
    - text: VOLTS
      text-color: firebrick
      text-font: DIN Condensed Black.otf
      text-size: 50
      formula: ${sim/cockpit/warnings/annunciators/generator}
  activation: none
  representation: annunciator
- index: 10
  name: WARNING
  label: WARNING
  label-size: 10
  label-color: black
  annunciator:
    size: medium
    model: B
    parts:
    - text: L FUEL R
      text-color: darkorange
      text-font: DIN Condensed Black.otf
      text-size: 50
      formula: ${sim/cockpit/warnings/annunciators/fuel_pressure}
    - text: L VAC R
      text-color: darkorange
      text-font: DIN Condensed Black.otf
      text-size: 50
      formula: ${sim/cockpit/warnings/annunciators/low_vacuum}
  activation: none
  representation: annunciator
- index: 11
  name: WAYPOINT
  label: NEXT WAYPOINT
  label-size: 8
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - text: ${sim/cockpit2/radios/indicators/gps_dme_distance_nm} nm DIS
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 48
      text-format: '{0:.1f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

        DTK'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
    - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
