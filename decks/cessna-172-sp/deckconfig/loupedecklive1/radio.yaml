name: radio
includes:
- pager
- encoders/encoders_radio
buttons:
- index: 0
  name: COM1
  activation:
    type: push
    commands:
      press: sim/radios/com1_standy_flip
  representation:
    type: annunciator
    label: COM 1
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 36
        formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
      - color: green
        text-size: 36
        formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
        text-bg-color: (40, 40, 40)
        frame: true
- index: 4
  name: COM2
  activation:
    type: push
    commands:
      press: sim/radios/com2_standy_flip
  representation:
    type: annunciator
    label: COM 2
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 36
        formula: ${sim/cockpit2/radios/actuators/com2_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
      - color: green
        text-size: 36
        formula: ${sim/cockpit2/radios/actuators/com2_standby_frequency_hz_833} 1000 /
        text: ${formula}
        text-format: '{0:.3f}'
        text-bg-color: (40, 40, 40)
        frame: true
- index: 8
  name: ADF
  activation:
    type: push
    commands:
      press: sim/radios/adf1_standy_flip
  representation:
    type: annunciator
    label: ADF FREQ
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: red
        text-size: 36
        formula: ${sim/cockpit/radios/adf1_freq_hz}
        text: ADF ${formula}
        text-format: '{0:04.0f}'
      - color: red
        text-size: 36
        formula: ${sim/cockpit/radios/adf1_stdby_freq_hz}
        text: FRQ ${formula}
        text-format: '{0:04.0f}'
        frame: true
- index: 3
  name: NAV1
  activation:
    type: push
    commands:
      press: sim/radios/nav1_standy_flip
  representation:
    type: annunciator
    label: NAV 1
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 36
        formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
      - color: green
        text-size: 36
        formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
        frame: true
- index: 7
  name: NAV2
  activation:
    type: push
    commands:
      press: sim/radios/nav2_standy_flip
  representation:
    type: annunciator
    label: NAV 2
    label-color: black
    label-size: 9
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 36
        formula: ${sim/cockpit/radios/nav2_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
      - color: green
        text-size: 36
        formula: ${sim/cockpit/radios/nav2_stdby_freq_hz} 100 /
        text: ${formula}
        text-format: '{0:.2f}'
        frame: true
- index: 11
  name: TRANSPONDER_MODE
  activation:
    type: sweep
    dataref: sim/cockpit/radios/transponder_mode
    set-dataref: sim/cockpit/radios/transponder_mode
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 20
      angle-end: 160
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      ticks:
      - 'OFF'
      - STBY
      - 'ON'
      - ALT
      - TEST
      up: 30
      left: 45
