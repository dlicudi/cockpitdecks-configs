description: Engine
includes:
- pager
- encoders/encoders_fcu
name: engine
buttons:
- index: 0
  activation:
    type: none
  representation:
    type: annunciator
    label: RPM/MANIFOLD
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]} RPM
        text-format: '{0:.0f}'
        formula: '1'
      - color: lime
        text-size: 42
        text: MP ${sim/cockpit2/engine/indicators/MPR_in_hg[0]} in
        text-format: '{0:.0f}'
        formula: '1'
- index: 1
  name: FUEL
  activation:
    type: none
  representation:
    type: annunciator
    label: FUEL
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: Lime
        text-size: 42
        text-format: '{0:.1f}'
        text: ${formula} GPH
        formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3600 * 0.8 / 3.78541 / 2 roundn
      - color: Lime
        text-size: 42
        text-format: '{0:.0f}'
        text: ${sim/cockpit2/engine/indicators/fuel_pressure_psi[0]} PSI
        formula: '1'
- index: 2
  name: OIL
  activation:
    type: none
  representation:
    type: annunciator
    label: OIL
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/oil_pressure_psi[0]}
        text-format: '{0:.0f} PSI'
        formula: '1'
      - color: lime
        text-size: 42
        text: ${sim/cockpit2/engine/indicators/oil_temperature_deg_C[0]}
        text-format: '{0:.0f} °C'
        formula: '1'
- index: 3
  name: EGT/Fuel Flow
  activation:
    type: none
  representation:
    type: annunciator
    label: EGT/FF
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 32
        formula: ${sim/cockpit2/engine/indicators/EGT_deg_cel[0]}
        text: ${formula} EGT
        text-format: '{0:.2f}'
      - color: yellow
        text-size: 32
        formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3600 * 0.8 / 3.78541 / 2 roundn
        text: ${formula} GPH
        text-format: '{0:.2f}'
- index: 4
  name: VACAMP
  activation:
    type: none
  representation:
    type: annunciator
    label: VAC/AMP
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 32
        text: VAC ${sim/cockpit/misc/vacuum}
        text-format: '{0:.2f}'
        formula: '1'
      - color: yellow
        text-size: 32
        text: AMP ${laminar/c172/electrical/battery_amps}
        text-format: '{0:.2f}'
        formula: '1'
- index: 5
  name: FUEL QTY
  activation:
    type: none
  representation:
    type: annunciator
    label: FUEL QTY
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: yellow
        text-size: 32
        formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
        text: L ${formula} gal
      - color: yellow
        text-size: 32
        formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
        text: R ${formula} gal
- index: 6
  name: VOLTS
  activation:
    type: none
  representation:
    type: annunciator
    label: VOLTS
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        text-size: 42
        text: ${sim/cockpit2/electrical/bus_volts[0]}
        text-format: '{0:.1f}'
        formula: '1'
      - color: lime
        text-size: 42
        text: ${sim/cockpit2/electrical/bus_volts[1]}
        text-format: '{0:.1f}'
        formula: '1'
- index: 7
  name: AMPS
  activation:
    type: none
  representation:
    type: annunciator
    label: AMPS
    label-color: Black
    label-size: 10
    annunciator:
      size: medium
      model: B
      parts:
      - color: Lime
        text-size: 42
        text: ${sim/cockpit2/electrical/bus_load_amps[0]}
        text-format: '{0:.1f}'
        formula: '1'
      - color: Lime
        text-size: 42
        text: ${sim/cockpit2/electrical/bus_load_amps[1]}
        text-format: '{0:.1f}'
        formula: '1'
