description: Switch Panel
includes:
- pager
- encoders/encoders_fcu
name: switches
buttons:
- index: 0
  activation:
    type: long-press
    commands:
      press: sim/ignition/engage_starter_1
  representation:
    type: multi-texts
    label: IGNITION
    label-color: Lime
    text-bg-color: Black
    multi-texts:
    - text: 'OFF'
      text-color: White
    - text: R
      text-color: Orange
    - text: L
      text-color: Orange
    - text: BOTH
      text-color: Orange
    - text: START
      text-color: Red
    formula: ${sim/cockpit2/engine/actuators/ignition_key[0]}
  vibrate: LONG
- index: 1
  activation:
    type: push
    commands:
      press: sim/electrical/generator_1_toggle
  representation:
    type: annunciator
    label: ALTERNATOR
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[0]} 1 eq
  vibrate: SHORT
- index: 2
  activation:
    type: push
    commands:
      press: sim/electrical/battery_1_toggle
  representation:
    type: annunciator
    label: BATTERY
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/electrical/battery_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/electrical/battery_on[0]} 1 eq
- index: 3
  activation:
    type: push
    commands:
      press: sim/fuel/fuel_pump_1_tog
  representation:
    type: annunciator
    label: FUEL PUMP
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/engine/fuel_pump_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/engine/fuel_pump_on[0]} 1 eq
- index: 4
  activation:
    type: push
    commands:
      press: sim/lights/beacon_lights_toggle
  representation:
    type: annunciator
    label: BCN
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/beacon_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        dataref: sim/cockpit2/switches/beacon_on[0] 1 eq
- index: 5
  activation:
    type: push
    commands:
      press: sim/lights/landing_lights_toggle
  representation:
    type: annunciator
    label: LAND
    label-color: black
    label-size: 9
