description: Switch Panel
includes:
- pager
- encoders/encoders_fcu
name: switches
buttons:
- index: 0
  vibrate: LONG
  label: IGNITION
  label-color: Lime
  text-bg-color: Black
  multi-texts:
  - text: 'OFF'
    text-color: White
  - text: R
    text-color: Orange
  - text: L
    text-color: Orange
  - text: BOTH
    text-color: Orange
  - text: START
    text-color: Red
  formula: ${sim/cockpit2/engine/actuators/ignition_key[0]}
  activation: long-press
  representation: multi-texts
  commands:
    press: sim/ignition/engage_starter_1
- index: 1
  vibrate: SHORT
  label: ALTERNATOR
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/electrical/generator_on[0]} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit2/electrical/generator_on[0]} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/electrical/generator_1_toggle
- index: 2
  label: BATTERY
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/electrical/battery_on[0]} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/electrical/battery_on[0]} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/electrical/battery_1_toggle
- index: 3
  label: FUEL PUMP
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit/engine/fuel_pump_on[0]} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      formula: ${sim/cockpit/engine/fuel_pump_on[0]} 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/fuel/fuel_pump_1_tog
- index: 4
  label: BCN
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
