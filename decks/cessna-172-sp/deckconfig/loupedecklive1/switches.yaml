      text: 'OFF'
      color: darkorange
      formula: ${sim/cockpit2/switches/beacon_on} 0 eq
    B1:
      text: 'ON'
      color: deepskyblue
      framed: true
      dataref: sim/cockpit2/switches/beacon_on[0] 1 eq
  activation: push
  representation: annunciator
  commands:
    press: sim/lights/beacon_lights_toggle
