name: audiopanel
includes:
- pager
- encoders/encoders_radio
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/audio_panel/transmit_audio_com1
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit/switches/audio_panel_out} 6 eq
      - text: COM MIC 1
        text-size: 40
        text-font: DIN Bold
        formula: '1'
- index: 1
  activation:
    type: push
    commands:
      press: sim/audio_panel/monitor_audio_com1
