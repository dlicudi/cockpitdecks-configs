- index: 9
  name: Audio Panel
  page: audiopanel
  label: Audio Panel
  label-size: 9
  label-color: black
  text: →
  text-font: fontawesome.otf
  text-size: 48
  text-color: Gold
  activation: page
  representation: text
- index: 10
  icon: INOP.png
  activation: none
  representation: icon
- index: 11
  stops: 3
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 200
    tick-to: 340
    tick-space: 40
    tick-underline-width: 8
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - LOC1
    - LOC2
    - GPS
    up: 30
    left: 45
  dataref: sim/cockpit/switches/HSI_selector
  set-dataref: sim/cockpit/switches/HSI_selector
  activation: sweep
