name: radio
includes:
- pager
- encoders/encoders_radio
buttons:
- index: 0
  name: COM1
  label: COM 1
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 36
      formula: ${sim/cockpit2/radios/actuators/com1_frequency_hz_833} 1000 /
      text: ${formula}
      text-format: '{0:.3f}'
    - color: white
      text-size: 36
      formula: ${sim/cockpit2/radios/actuators/com1_standby_frequency_hz_833} 1000
        /
      text: ${formula}
      text-format: '{0:.3f}'
      text-bg-color: (40, 40, 40)
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/com1_standy_flip
- index: 1
  icon: INOP.png
  activation: none
  representation: icon
- index: 2
  icon: INOP.png
  activation: none
  representation: icon
- index: 4
  name: COM2
  label: COM 2
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 36
      formula: ${sim/cockpit2/radios/actuators/com2_frequency_hz_833} 1000 /
      text: ${formula}
      text-format: '{0:.3f}'
    - color: white
      text-size: 36
      formula: ${sim/cockpit2/radios/actuators/com2_standby_frequency_hz_833} 1000
        /
      text: ${formula}
      text-format: '{0:.3f}'
      text-bg-color: (40, 40, 40)
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/com2_standy_flip
- index: 5
  icon: INOP.png
  activation: none
  representation: icon
- index: 6
  icon: INOP.png
  activation: none
  representation: icon
- index: 8
  name: ADF
  label: ADF FREQ
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: red
      text-size: 36
      formula: ${sim/cockpit/radios/adf1_freq_hz}
      text: ADF ${formula}
      text-format: '{0:04.0f}'
    - color: white
      text-size: 36
      formula: ${sim/cockpit/radios/adf1_stdby_freq_hz}
      text: FRQ ${formula}
      text-format: '{0:04.0f}'
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/adf1_standy_flip
- index: 3
  name: NAV1
  label: NAV 1
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 40
      formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
    - color: white
      text-size: 36
      formula: ${sim/cockpit/radios/nav1_stdby_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
      frame: true
  activation: push
  representation: annunciator
  commands:
    press: sim/radios/nav1_standy_flip
- index: 7
  name: NAV2
  label: NAV 2
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 40
      formula: ${sim/cockpit/radios/nav2_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
    - color: white
      text-size: 36
      formula: ${sim/cockpit/radios/nav2_stdby_freq_hz} 100 /
      text: ${formula}
      text-format: '{0:.2f}'
      frame: true
  activation: push
  representation: annunciator
