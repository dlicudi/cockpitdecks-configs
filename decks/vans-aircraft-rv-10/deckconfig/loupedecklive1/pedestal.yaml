name: pedestal
includes:
- pager
- encoders/encoders_pedestal
buttons:
- index: 0
  name: THROTTLE
  label: THROTTLE
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
      text: ${formula}%
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 4
  name: MIXTURE
  label: MIXTURE
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
      text: ${formula}%
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  vibrate: SHORT
  label: TOGGLE BRAKES
  label-size: 8
  label-color: White
  text-bg-color: Black
  multi-texts:
  - text: 'OFF'
    text-color: Lime
  - text: 'ON'
    text-color: Red
  formula: ${sim/cockpit2/controls/parking_brake_ratio}
  activation: push
  representation: multi-texts
  commands:
    press: sim/flight_controls/brakes_toggle_max
- index: 3
  vibrate: SHORT
  text: UP
  text-color: Lime
  text-bg-color: Black
  activation: push
  representation: text
  commands:
    press: sim/flight_controls/flaps_up
- index: 11
  text: DOWN
  text-color: Lime
  text-bg-color: Black
  activation: push
  representation: text
  commands:
    press: sim/flight_controls/flaps_down
- index: 7
  label: FLAPS RATIO
  label-color: black
  label-size: 9
  annunciator:
    model: B
    size: medium
    B0:
      text: DISAGREE
      color: darkorange
      formula: ${sim/cockpit2/controls/flap_disagree} 1 eq
    B1:
      color: deepskyblue
      framed: true
      text: ${sim/cockpit2/controls/flap_ratio}
      text-format: '{0:.2f}'
      formula: '1'
  activation: none
  representation: annunciator
