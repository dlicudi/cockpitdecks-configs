name: pedestal
includes:
- pager
- encoders/encoders_pedestal
buttons:
- index: 0
  name: THROTTLE
  activation:
    type: none
  representation:
    type: annunciator
    label: THROTTLE
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 100
        formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
        text: ${formula}%
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 4
  name: MIXTURE
  activation:
    type: none
  representation:
    type: annunciator
    label: MIXTURE
    label-size: 9
    label-color: black
    annunciator:
      size: medium
      model: A
      parts:
      - color: lime
        text-size: 100
        formula: ${sim/flightmodel/engine/ENGN_mixt[0]} 100 *
        text: ${formula}%
        text-font: Seven Segment.ttf
        text-format: '{0:.0f}'
- index: 2
  activation:
    type: push
    commands:
      press: sim/flight_controls/brakes_toggle_max
  representation:
    type: multi-texts
    label: TOGGLE BRAKES
    label-size: 8
    label-color: White
    text-bg-color: Black
    multi-texts:
    - text: 'OFF'
      text-color: Lime
    - text: 'ON'
      text-color: Red
    formula: ${sim/cockpit2/controls/parking_brake_ratio}
  vibrate: SHORT
- index: 3
  activation:
    type: push
    commands:
      press: sim/flight_controls/flaps_up
  representation:
    type: text
    text: UP
    text-color: Lime
    text-bg-color: Black
  vibrate: SHORT
- index: 11
  activation:
    type: push
    commands:
      press: sim/flight_controls/flaps_down
  representation:
    type: text
    text: DOWN
    text-color: Lime
    text-bg-color: Black
- index: 7
  activation:
    type: none
  representation:
    type: annunciator
    label: FLAPS RATIO
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: DISAGREE
        color: darkorange
        formula: ${sim/cockpit2/controls/flap_disagree} 1 eq
      B1:
        color: deepskyblue
        framed: true
        text: ${sim/cockpit2/controls/flap_ratio}
        text-format: '{0:.2f}'
        formula: '1'
