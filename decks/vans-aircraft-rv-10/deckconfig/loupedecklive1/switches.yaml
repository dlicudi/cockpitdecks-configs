description: Switch Panel
includes:
- pager
- encoders/encoders_lights
name: switches
buttons:
- index: 0
  activation:
    type: push
    commands:
      press: sim/electrical/battery_1_toggle
  representation:
    type: annunciator
    label: BATTERY
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/battery_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/battery_on[0]} 1 eq
  vibrate: SHORT
- index: 1
  activation:
    type: push
    commands:
      press: sim/electrical/generator_1_toggle
  representation:
    type: annunciator
    label: ALTERNATOR
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/electrical/generator_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/electrical/generator_on[0]} 1 eq
  vibrate: SHORT
- index: 2
  activation:
    type: sweep
    set-dataref: sim/cockpit2/autopilot/autopilot_electric_master
  representation:
    type: annunciator
    label: AUTOPILOT
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/autopilot/autopilot_electric_master} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/autopilot/autopilot_electric_master} 1 eq
  vibrate: SHORT
- index: 3
  activation:
    type: push
    commands:
      press: sim/systems/avionics_toggle
  representation:
    type: annunciator
    label: AVIONICS
    label-color: black
    label-size: 9
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit2/switches/avionics_power_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit2/switches/avionics_power_on} 1 eq
  vibrate: SHORT
- index: 4
  name: ENGINE START
  activation:
    type: begin-end-command
    commands:
      press: sim/starters/engage_starter_1
  representation:
    type: multi-icons
    multi-icons:
    - ENGINE_START.svg
    - ENGINE_START.svg
    - ENGINE_START.svg
    - ENGINE_START.svg
    - ENGINE_START_PRESSED.png
    formula: ${sim/cockpit2/engine/actuators/ignition_key[0]}
  vibrate: LONG
- index: 5
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 6
  activation:
    type: sweep
    set-dataref: sim/cockpit/engine/fuel_pump_on[0]
  representation:
    type: annunciator
    label: ELECTRIC PUMP
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/engine/fuel_pump_on[0]} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/engine/fuel_pump_on[0]} 1 eq
  vibrate: SHORT
- index: 7
  activation:
    type: push
    commands:
      press: sim/ice/pitot_heat0_tog
  representation:
    type: annunciator
    label: PITOT HT
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${sim/cockpit/switches/pitot_heat_on} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${sim/cockpit/switches/pitot_heat_on} 1 eq
  vibrate: SHORT
- index: 8
  name: FLAPS
  activation:
    type: sweep
    stops: 3
    options: 3way,invert
    dataref: sim/cockpit2/controls/flap_ratio
    positions:
    - sim/flight_controls/flaps_down
    - sim/flight_controls/flaps_up
  representation:
    type: switch
    label: FLAPS
    label-size: 9
    label-color: black
    switch:
      switch-style: large
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - UP
      - '25'
      - '50'
      tick-space: 24
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: black
    formula: ${sim/cockpit2/controls/flap_ratio} 2 *
  vibrate: SHORT
- index: 9
  activation:
    type: sweep
    set-dataref: laminar/rv10/handles/alt_air_pull
  representation:
    type: annunciator
    label: ALTERNATE AIR
    label-color: black
    label-size: 8
    annunciator:
      model: B
      size: medium
      B0:
        text: 'OFF'
        color: darkorange
        formula: ${laminar/rv10/handles/alt_air_pull} 0 eq
      B1:
        text: 'ON'
        color: deepskyblue
        framed: true
        formula: ${laminar/rv10/handles/alt_air_pull} 1 eq
  vibrate: SHORT
- index: 10
  name: PARKING BRAKE
  activation:
    type: sweep
    stops: 2
    positions:
    - sim/flight_controls/park_brake_valve_toggle
    - sim/flight_controls/park_brake_valve_toggle
  representation:
    type: switch
    label: PARKING BRAKE
    label-size: 8
    label-color: black
    switch:
      switch-style: rect
      button-fill-color: black
      button-underline-width: 4
      button-underline-color: coral
      tick-labels:
      - 'ON'
      - 'OFF'
      tick-space: 24
      tick-color: white
      tick-label-size: 40
      tick-label-font: DIN Bold
      tick-label-color: black
    formula: ${sim/cockpit2/controls/park_brake_valve}
  vibrate: SHORT
- index: 11
  name: Switches2
  activation:
    type: page
    page: switches2
  representation:
    type: text
    text: →
    text-font: fontawesome.otf
    text-size: 48
    text-color: Gold
  vibrate: SHORT
