buttons:
- index: e0
  name: throttle_encoder
  activation:
    type: encoder-push
    commands:
      press: sim/engines/throttle_full
      cw: sim/engines/throttle_up
      ccw: sim/engines/throttle_down
  representation:
    type: none
- index: e1
  name: FCU Heading
  activation:
    type: encoder-push
    commands:
      press: sim/autopilot/heading_sync
      long-press: sim/autopilot/servos_toggle
      cw: sim/autopilot/heading_up
      ccw: sim/autopilot/heading_down
  representation:
    type: none
- index: e2
  name: FCU Baro
  activation:
    type: encoder-push
    options: modulo
    commands:
      press: sim/instruments/barometer_std
      cw: sim/instruments/barometer_up
      ccw: sim/instruments/barometer_down
  representation:
    type: none
- index: e3
  name: alt_encoder
  activation:
    type: encoder-mode
    commands:
      long-press: sim/autopilot/altitude_sync
  representation:
    type: none
- index: e4
  name: FCU V Speed
  activation:
    type: encoder-push
    commands:
      press: sim/autopilot/vertical_speed_sync
      long-press: sim/autopilot/servos_toggle
      cw: sim/autopilot/vertical_speed_up
      ccw: sim/autopilot/vertical_speed_down
  representation:
    type: none
- index: e5
  name: crs
  activation:
    type: encoder-push
    commands:
      press: sim/radios/obs_HSI_direct
      cw: sim/radios/obs_HSI_up
      ccw: sim/radios/obs_HSI_down
  representation:
    type: none
- index: left
  name: left_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: Black
      labels:
      - label: THR
        label-size: 14
        label-font: D-DINExp.otf
        label-color: Gold
        formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
        text-size: 18
        text-font: OverpassMono-Regular.ttf
        text-color: White
        text-format: '{0:01.0f}'
        text: ${formula}%
      - label: HDG
        label-size: 14
        label-color: Gold
        formula: ${sim/cockpit/autopilot/heading_mag}
        text-size: 18
        text-color: White
        text-format: '{0:00.0f}'
        text: ${formula}
      - label: QNH
        label-size: 14
        label-color: Gold
        formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
        text-size: 18
        text-color: White
        text-format: '{0:01.2f}'
        text: ${formula}
  render-cooldown-ms: 100
- index: right
  name: right_screen
  activation:
    type: none
  representation:
    type: side-display
    side:
      icon-color: Black
      labels:
      - label: ALT
        label-size: 16
        label-color: Gold
        formula: ${sim/cockpit2/autopilot/altitude_dial_ft}
        text-size: 16
        text-color: White
        text-format: '{0:04.0f}'
        text: ${formula}
      - label: VS
        label-size: 14
        label-color: Gold
        formula: ${sim/cockpit/autopilot/vertical_velocity} 100 /
        text-size: 18
        text-color: White
        text-format: '{0:+01.0f}'
        text: ${formula}
      - label: CRS
        label-size: 16
        label-color: Gold
        formula: ${sim/cockpit2/radios/actuators/hsi_obs_deg_mag_pilot}
        text-size: 18
        text-color: White
        text-format: '{0:00.0f}'
        text: ${formula}
  render-cooldown-ms: 100
