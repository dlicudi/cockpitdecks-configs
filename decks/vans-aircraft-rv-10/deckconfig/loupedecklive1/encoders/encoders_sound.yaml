- index: left
  name: left_screen
  render-cooldown-ms: 333
  side:
    icon-color: Black
    labels:
    - label: Master
      label-size: 12
      label-font: B612-Bold
      label-color: Gold
      formula: ${sim/operation/sound/master_volume_ratio} 100 *
      text-size: 18
      text-font: Seven Segment.ttf
      text-color: White
      text-format: '{0:.0f}'
      text: ${formula}%
    - label: Exterior
      label-size: 12
      label-font: B612-Bold
      label-color: Gold
      formula: ${sim/operation/sound/exterior_volume_ratio} 100 *
