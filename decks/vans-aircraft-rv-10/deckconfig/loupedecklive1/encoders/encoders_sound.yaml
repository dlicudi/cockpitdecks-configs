buttons:
- index: e0
  activation:
    type: encoder-value-extended
    dataref: sim/operation/sound/master_volume_ratio
    step: 0.1
    value-min: 0
    value-max: 1
    initial-value: 0.5
    set-dataref: sim/operation/sound/master_volume_ratio
    step-xl: 0.1
  representation:
    type: none
- index: e1
  activation:
    type: encoder-value-extended
    dataref: sim/operation/sound/exterior_volume_ratio
    step: 0.1
    value-min: 0
