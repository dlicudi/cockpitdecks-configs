name: pfi
includes:
- pager
- encoders/encoders_fcu
buttons:
- index: 0
  name: SPD
  label: SPD
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 1
  name: HDG
  label: HDG
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 2
  name: ALT
  label: ALT
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text-format: '{0:.2f}'
      text: '${sim/cockpit/misc/barometer_setting}

        inHg'
    - color: white
      text-size: 32
      formula: ${sim/flightmodel/position/y_agl} 3.28084 *
      text-format: '{0:.0f}'
      text: '${formula}

        ft AGL'
  activation: none
  representation: annunciator
- index: 3
  name: VS
  label: VS
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 4
  render-cooldown-ms: 500
  initial-value: 1
  stops: 2
  label: FUEL QTY
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: lime
      text-size: 34
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: '${formula}

        gal'
      text-format: '{0:.2f}'
    - color: lime
      text-size: 34
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: '${formula}

        gal'
      text-format: '{0:.2f}'
    - color: gold
      formula: ${laminar/rv10/switch/fuel_tank_pos} 1 eq
      led: dot
    - color: gold
      formula: ${laminar/rv10/switch/fuel_tank_pos} 2 eq
      led: dot
  activation: sweep
  representation: annunciator
  positions:
  - laminar/rv10/tank_sel_right
  - laminar/rv10/tank_sel_left
- index: 5
  name: WIND
  render-cooldown-ms: 1000
  label: WIND DATA
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↓ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↑ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: → ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ← ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 6
  label: COM/NAV
  render-cooldown-ms: 750
  page: radio
  label-color: black
  label-size: 9
  annunciator:
    size: medium
    model: F
    parts:
    - color: lime
      text-size: 28
      formula: ${sim/cockpit/radios/nav1_freq_hz} 100 /
      text: '${formula}

        NAV1'
      text-format: '{0:.2f}'
    - color: lime
      text-size: 28
      formula: ${sim/cockpit/radios/nav2_freq_hz} 100 /
      text: '${formula}

        NAV2'
      text-format: '{0:.2f}'
    - color: lime
      text-size: 28
      formula: ${sim/cockpit/radios/com1_freq_hz} 100 /
      text: '${formula}

        COM1'
      text-format: '{0:.2f}'
    - color: lime
      text-size: 28
      formula: ${sim/cockpit/radios/com2_freq_hz} 100 /
      text: '${formula}

        COM2'
      text-format: '{0:.2f}'
  activation: page
  representation: annunciator
- index: 7
  page: transponder
  size: medium
  label: MODE
  label-size: 9
  label-color: White
  text-color: Lime
  text-bg-color: Black
  multi-texts:
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      OFF'
    text-format: '{:0.0f}'
    text-color: White
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: cm
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      STBY'
    text-format: '{:0.0f}'
    text-color: White
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: cm
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      ON'
    text-format: '{:0.0f}'
    text-color: Lime
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: cm
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      ALT'
    text-format: '{:0.0f}'
    text-color: Lime
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: cm
  - text: '${sim/cockpit2/radios/actuators/transponder_code}

      TEST'
    text-format: '{:0.0f}'
    text-color: White
    text-font: Seven Segment.ttf
    text-size: 30
    text-position: cm
  formula: ${sim/cockpit2/radios/actuators/transponder_mode}
  activation: page
  representation: multi-texts
- index: 8
  name: RPM
  render-cooldown-ms: 1000
  label: RPM
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 42
      text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}
      text-format: '{0:.0f}'
      formula: '1'
    - color: white
      text-size: 30
      text: ${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}
      formula: '1'
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 9
  label: GLIDESLOPE
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: lime
      formula: ${sim/cockpit2/autopilot/glideslope_status} 2 eq
      led: dot
    - color: gold
      formula: ${sim/cockpit2/autopilot/glideslope_status} 1 eq
      led: dot
    - color: firebrick
      text-size: 32
      text-font: fontawesome.otf
      text: ↓ ${formula}%
      text-format: '{0:.0f}'
      formula: ${sim/cockpit/radios/nav1_vdef_dot} 100 * round
    - color: firebrick
      text-size: 32
      text: ↑ ${formula}%
      text-format: '{0:.0f}'
      text-font: fontawesome.otf
      formula: ${sim/cockpit/radios/nav1_vdef_dot} chs 100 * round
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/approach
- index: 10
  label: LOCALIZER
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: lime
      formula: ${sim/cockpit2/autopilot/nav_status} 2 eq
      led: dot
    - color: gold
      formula: ${sim/cockpit2/autopilot/nav_status} 1 eq
      led: dot
    - color: firebrick
      text-size: 32
      text-font: fontawesome.otf
      text: → ${formula}%
      text-format: '{0:.0f}'
      formula: ${sim/cockpit/radios/nav1_hdef_dot} 100 * round
    - color: firebrick
      text-size: 32
      text: ← ${formula}%
      text-format: '{0:.0f}'
      text-font: fontawesome.otf
      formula: ${sim/cockpit/radios/nav1_hdef_dot} chs 100 * round
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/approach
- index: 11
  name: WAYPOINT
  render-cooldown-ms: 750
  label: NEXT WAYPOINT
  label-size: 8
  label-color: black
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
  annunciator:
    size: medium
    model: F
    parts:
    - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 36
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

        DIS'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 38
      text-format: '{0:.1f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

        DTK'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
    - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
