description: FCU
includes:
- pager
- encoders/encoders_fcu
name: fcu
buttons:
- index: 0
  name: AP
  activation:
    type: push
    commands:
      press: sim/autopilot/servos_toggle
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/servos_on}
      - text: AP
        text-size: 60
        text-font: DIN Bold
        formula: '1'
  vibrate: SHORT
- index: 1
  name: FD
  activation:
    type: push
    commands:
      press: sim/autopilot/fdir_toggle
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/flight_director_mode}
      - text: FD
        text-size: 60
        text-font: DIN Bold
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 2
  name: HDG
  activation:
    type: push
    commands:
      press: sim/autopilot/heading
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/heading_status}
      - text: HDG
        text-size: 60
        text-font: DIN Bold
        formula: '1'
  vibrate: SHORT
- index: 3
  name: ALT
  activation:
    type: push
    commands:
      press: sim/autopilot/altitude_hold
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_hold_status}
      - text: ALT
        text-size: 60
        text-font: DIN Bold
        formula: '1'
  vibrate: SHORT
- index: 4
  name: NAV
  activation:
    type: push
    commands:
      press: sim/autopilot/gpss
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/gpss_status} 2 eq
      - text: NAV
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 5
  name: VNAV
  activation:
    type: push
    commands:
      press: sim/autopilot/vnav
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/vnav_armed}
      - text: VNAV
        text-size: 60
        text-font: DIN Bold
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 6
  name: APR
  activation:
    type: push
    commands:
      press: sim/autopilot/approach
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/approach_status}
      - text: APR
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 7
  name: REV
  activation:
    type: push
    commands:
      press: sim/autopilot/back_course
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/backcourse_status}
      - text: REV/BC
        text-size: 50
        text-font: DIN Bold
        formula: '1'
- index: 8
  name: VS
  activation:
    type: push
    commands:
      press: sim/autopilot/vertical_speed
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_mode} 4 eq
      - text: VS
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 9
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 10
  name: FLC
  activation:
    type: push
    commands:
      press: sim/autopilot/level_change
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${sim/cockpit2/autopilot/altitude_mode} 5 eq
      - text: FLC
        text-size: 60
        text-font: DIN Bold
        text-color: Turquoise
        formula: '1'
  vibrate: SHORT
- index: 11
  activation:
    type: sweep
    stops: 3
    dataref: sim/cockpit/switches/HSI_selector
    set-dataref: sim/cockpit/switches/HSI_selector
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      tick-from: 200
      tick-to: 340
      tick-space: 40
      tick-underline-width: 8
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      tick-labels:
      - LOC1
      - LOC2
      - GPS
      up: 30
      left: 45
