description: TruTrak Sorcerer
includes:
- includes/pagerfull
name: trutrak_sorcerer
buttons:
- index: 0
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: full
      model: E
      parts:
      - color: lime
        text-size: 60
        formula: '1'
        text: TRK
      - led: dot
        color: lime
        formula: ${laminar/rv10/autopilot_knob_mode} 0 eq
      - color: lime
        text-size: 80
        formula: '1'
        text: ${sim/cockpit/autopilot/heading_mag}
        text-format: '{0:03.0f}'
- index: 1
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: full
      model: E
      parts:
      - color: lime
        text-size: 60
        formula: '1'
        text: ALT
      - led: dot
        color: lime
        formula: ${laminar/rv10/autopilot_knob_mode} 1 eq
      - color: lime
        text-size: 60
        formula: '1'
        text: ${sim/cockpit/autopilot/altitude}
        text-format: '{0:.0f}'
- index: 2
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 3
  activation:
    type: push
    options: auto-repeat=1/0.05
    commands:
      press: laminar/rv10/ap_knob_right
  representation:
    type: multi-texts
    multi-texts:
    - text: 'TRK

        UP'
      text-color: white
      text-size: 50
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: black
    - text: 'ALT

        UP'
      text-color: white
      text-size: 50
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: black
    formula: ${laminar/rv10/autopilot_knob_mode}
- index: 4
  activation:
    type: push
    commands:
      press: sim/autopilot/track
  representation:
    type: text
    text: TRK
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
- index: 5
  activation:
    type: push
    commands:
      press: sim/autopilot/gpss
  representation:
    type: multi-texts
    text-bg-color: black
    multi-texts:
    - text: NAV
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: NAV
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: NAV
      text-color: Lime
      text-size: 40
      text-font: D-DINCondensed.otf
    formula: ${sim/cockpit2/autopilot/nav_status}
- index: 6
  activation:
    type: push
    commands:
      press: sim/autopilot/back_course
  representation:
    type: text
    text: REV
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
- index: 7
  activation:
    type: push
    options: auto-repeat=1/0.05
    commands:
      press: sim/autopilot/nose_down
  representation:
    type: text
    text: DN
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
- index: 8
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: full
      model: B
      parts:
      - color: lime
        text-size: 60
        formula: ${sim/cockpit2/autopilot/st55_gpss}
        text: +
      - color: lime
        text-size: 60
        formula: ${sim/cockpit2/autopilot/st55_gpss}
        text: GPSS
- index: 9
  activation:
    type: none
  representation:
    type: annunciator
    annunciator:
      size: full
      model: E
      parts:
      - color: lime
        text-size: 60
        formula: '1'
        text: SVS
      - led: dot
        color: lime
        formula: ${sim/cockpit/autopilot/vertical_velocity} abs
      - color: lime
        text-size: 60
        formula: '1'
        text: ${sim/cockpit/autopilot/vertical_velocity}
        text-format: '{0:.0f}'
- index: 10
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 11
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 12
  activation:
    type: push
    commands:
      press: sim/autopilot/altitude_hold
  representation:
    type: text
    text: ALT
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
  vibrate: SHORT
- index: 13
  activation:
    type: push
    commands:
      press: sim/autopilot/alt_vs
  representation:
    type: multi-texts
    text-bg-color: black
    multi-texts:
    - text: SEL
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: SEL
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: SEL
      text-color: Lime
      text-size: 40
      text-font: D-DINCondensed.otf
    formula: ${sim/cockpit2/autopilot/vvi_status}
- index: 14
  activation:
    type: push
    commands:
      press: sim/autopilot/vnav
  representation:
    type: text
    text: VNAV
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
  vibrate: SHORT
- index: 15
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 16
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 17
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 18
  activation:
    type: none
  representation:
    type: icon
    icon: INOP.png
- index: 19
  activation:
    type: push
    options: auto-repeat=1/0.05
    commands:
      press: laminar/rv10/ap_knob_left
  representation:
    type: multi-texts
    multi-texts:
    - text: 'TRK

        DN'
      text-color: white
      text-size: 50
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: black
    - text: 'ALT

        DN'
      text-color: white
      text-size: 50
      text-font: D-DINCondensed.otf
      text-position: cm
      text-bg-color: black
    formula: ${laminar/rv10/autopilot_knob_mode}
- index: 20
  activation:
    type: push
    commands:
      press: sim/autopilot/servos_toggle
  representation:
    type: multi-texts
    text-bg-color: black
    multi-texts:
    - text: AP
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: AP
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: AP
      text-color: Lime
      text-size: 40
      text-font: D-DINCondensed.otf
    formula: ${sim/cockpit/autopilot/autopilot_mode}
- index: 21
  name: GPSS
  activation:
    type: push
    commands:
      press: sim/autopilot/gpss
  representation:
    type: multi-texts
    text-bg-color: black
    multi-texts:
    - text: GPSS
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: GPSS
      text-color: White
      text-size: 40
      text-font: D-DINCondensed.otf
    - text: GPSS
      text-color: Lime
      text-size: 40
      text-font: D-DINCondensed.otf
    formula: ${sim/cockpit2/autopilot/gpss_status}
- index: 22
  activation:
    type: push
    commands:
      press: sim/autopilot/heading
  representation:
    type: text
    text: EXT
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
- index: 23
  activation:
    type: push
    options: auto-repeat=1/0.05
    commands:
      press: sim/autopilot/nose_up
  representation:
    type: text
    text: UP
    text-color: white
    text-size: 40
    text-font: D-DINCondensed.otf
    text-position: cm
    text-bg-color: black
