name: pfi
includes:
- includes/pagerfull
- includes/annunciators
buttons:
- index: 8
  name: SPD
  label: SPD
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 140
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/airspeed_kts_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 9
  name: HDG
  label: HDG
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 140
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 10
  name: ALT
  label: ALT
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: D
    parts:
    - color: lime
      text-size: 80
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/altitude_ft_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
    - color: white
      text-size: 32
      formula: '1'
      text-format: '{0:.2f}'
      text: '${sim/cockpit/misc/barometer_setting}

        inHg'
    - color: white
      text-size: 32
      formula: ${sim/cockpit/misc/barometer_setting} 33.8639 *
      text-format: '{0:.0f}'
      text: '${formula}

        hPa'
  activation: none
  representation: annunciator
- index: 11
  name: VS
  label: VS
  label-size: 9
  label-color: black
  annunciator:
    size: medium
    model: A
    parts:
    - color: lime
      text-size: 100
      formula: '1'
      text: ${sim/cockpit2/gauges/indicators/vvi_fpm_pilot}
      text-font: Seven Segment.ttf
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 12
  name: FUEL
  label: FUEL QTY
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.264172 * 2 roundn
      text: L ${formula} gal
    - color: yellow
      text-size: 32
      formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.264172 * 2 roundn
      text: R ${formula} gal
  activation: none
  representation: annunciator
- index: 13
  name: WIND
  label: WIND DATA
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↓ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - cos ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ↑ ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} 180 + ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: → ${formula}
      text-format: '{0:.0f}'
    - color: yellow
      text-size: 28
      formula: ${sim/cockpit2/gauges/indicators/wind_heading_deg_mag} ${sim/cockpit2/gauges/indicators/compass_heading_deg_mag}
        - sin ${sim/cockpit2/gauges/indicators/wind_speed_kts} *
      text-font: fontawesome.otf
      text: ← ${formula}
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 14
  name: FUEL_FLOW
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 60
      formula: ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3600 * 0.8 /
        3.78541 / 2 roundn
      text: ${formula}
      text-font: Seven Segment.ttf
    - text: FUEL FLOW
      text-size: 36
      text-font: DIN Bold
      formula: '1'
  activation: none
  representation: annunciator
- index: 15
  name: FUEL_DURATION
  label: FUEL DURATION
  label-size: 8
  label-position: ct
  label-color: Lime
  data-bg-color: Black
  data:
    icon: fa:gas-pump
    icon-size: 60
    icon-color: Gold
    data: ${formula}
    data-format: '{:02.0f}'
    data-font: D-DINCondensed.otf
    data-color: White
    data-size: 70
    data-unit: hrs
    data-progress: 20
    data-trend: 1
    formula: ${sim/cockpit2/fuel/fuel_quantity[0]} ${sim/cockpit2/fuel/fuel_quantity[1]}
      + ${sim/cockpit2/engine/indicators/fuel_flow_kg_sec[0]} 3 roundn 0.000001 +
      / 3600 / 1 roundn
    bottomline: Estimate
    bottomline-size: 30
    bottomline-color: ivory
  activation: none
  representation: data
- index: 16
  name: RPM
  label: RPM
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      text-size: 100
      text: ${sim/cockpit2/engine/indicators/prop_speed_rpm[0]}
      text-format: '{0:.0f}'
      text-font: Seven Segment.ttf
      formula: '1'
    - color: white
      text-size: 40
      text: ${sim/cockpit2/clock_timer/hobbs_time_hours}:${sim/cockpit2/clock_timer/hobbs_time_minutes}:${sim/cockpit2/clock_timer/hobbs_time_seconds}
      formula: '1'
      text-format: '{0:.0f}'
  activation: none
  representation: annunciator
- index: 17
  label: FUEL TANK 1
  label-size: 10
  label-color: Black
  data-bg-color: Black
  data:
    icon: fa:gas-pump
    top-line-color: ivory
    top-line-width: 45
    icon-size: 60
    icon-color: white
    data: ${formula}
    data-format: '{:3.0f}'
    data-font: D-DINCondensed.otf
    data-size: 70
    data-color: white
    data-progress: 33.14
    data-trend: 1
    data-unit: gal
    formula: ${sim/cockpit2/fuel/fuel_quantity[0]} 0.739 / 3.78541 /
    bottomline: Gallons
    bottomline-size: 30
    bottomline-color: ivory
    mark: ${fa:arrow-right}
    mark-size: 20
    mark-font: fontawesome.otf
    mark-color: red
  activation: none
  representation: data
- index: 18
  label: FUEL TANK 2
  label-size: 10
  label-color: Black
  data-bg-color: Black
  data:
    icon: fa:gas-pump
    top-line-color: ivory
    top-line-width: 45
    icon-size: 70
    icon-color: white
    data: ${formula}
    data-format: '{:3.0f}'
    data-font: D-DINCondensed.otf
    data-size: 70
    data-color: white
    data-progress: 14.91
    data-trend: 1
    data-unit: gal
    formula: ${sim/cockpit2/fuel/fuel_quantity[1]} 0.739 / 3.78541 /
    bottomline: Gallons
    bottomline-size: 30
    bottomline-color: ivory
    mark: ${fa:arrow-right}
    mark-size: 20
    mark-font: fontawesome.otf
    mark-color: red
  activation: none
  representation: data
- index: 22
  name: FLAPS
  label: FLAPS
  label-size: 9
  label-color: black
  stops: 3
  switch:
    switch-style: large
    button-fill-color: black
    button-underline-width: 4
    button-underline-color: coral
    tick-labels:
    - UP
    - '25'
    - '50'
    tick-space: 24
    tick-color: white
    tick-label-size: 40
    tick-label-font: DIN Bold
    tick-label-color: black
  options: 3way,invert
  dataref: sim/cockpit2/controls/flap_ratio
  formula: ${sim/cockpit2/controls/flap_ratio} 2 *
  activation: sweep
  positions:
  - sim/flight_controls/flaps_down
  - sim/flight_controls/flaps_up
- index: 23
  label: THROTTLE
  label-size: 10
  label-color: Black
  data-bg-color: Black
  data:
    icon: fa:gauge-high
    top-line-color: ivory
    top-line-width: 45
    icon-size: 70
    icon-color: Gold
    data: ${formula}
    data-format: '{:0.0f}'
    data-font: D-DINCondensed.otf
    data-size: 100
    data-color: white
    data-progress: 100
    data-trend: 1
    data-unit: '%'
    formula: ${sim/flightmodel/engine/ENGN_thro[0]} 100 *
    bottomline: Throttle
    bottomline-size: 30
    bottomline-color: ivory
    mark: ${fa:arrow-right}
    mark-size: 20
    mark-font: fontawesome.otf
    mark-color: red
  activation: none
  representation: data
- index: 19
  name: WAYPOINT
  label: NEXT WAYPOINT
  label-size: 8
  label-color: black
  string-datarefs:
  - sim/cockpit2/radios/indicators/gps_nav_id
  annunciator:
    size: medium
    model: F
    parts:
    - text: ${sim/cockpit2/radios/indicators/gps_nav_id}
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 36
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_dme_distance_nm}

        DIS'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 38
      text-format: '{0:.1f}'
      formula: '1'
    - text: '${sim/cockpit2/radios/indicators/gps_bearing_deg_mag}

        DTK'
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
    - text: "${sim/cockpit2/radios/indicators/gps_dme_time_min} min \nETA"
      text-color: Lime
      text-font: Seven Segment.ttf
      text-size: 40
      text-format: '{0:.0f}'
      formula: '1'
  activation: none
  representation: annunciator
- index: 20
  label: GLIDESLOPE
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: F
    parts:
    - color: lime
      formula: ${sim/cockpit2/autopilot/glideslope_status} 2 eq
      led: dot
    - color: gold
      formula: ${sim/cockpit2/autopilot/glideslope_status} 1 eq
      led: dot
    - color: firebrick
      text-size: 32
      text-font: fontawesome.otf
      text: ↓ ${formula}%
      text-format: '{0:.0f}'
      formula: ${sim/cockpit/radios/nav1_vdef_dot} 100 * round
    - color: firebrick
      text-size: 32
      text: ↑ ${formula}%
      text-format: '{0:.0f}'
      text-font: fontawesome.otf
      formula: ${sim/cockpit/radios/nav1_vdef_dot} chs 100 * round
  activation: push
  representation: annunciator
  commands:
    press: sim/autopilot/approach
- index: 21
  label: AP MODE
  label-color: Black
  label-size: 10
  annunciator:
    size: medium
    model: B
    parts:
    - color: gold
      formula: ${sim/cockpit/autopilot/autopilot_mode} 1 eq
      text: FD
    - color: lime
      formula: ${sim/cockpit/autopilot/autopilot_mode} 2 eq
      text: 'ON'
      framed: true
  activation: none
  representation: annunciator
