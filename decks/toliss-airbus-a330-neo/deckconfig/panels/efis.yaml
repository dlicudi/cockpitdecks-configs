aircraft: ToLiss A339
description: EFIS display selector + some FCU commands
version: 1.0.0
last-updated: 31-OCT-2024
name: efis
buttons:
- index: 31
  activation:
    type: page
    page: back
  representation:
    type: icon
    icon: A339
- index: 0
  name: CSTR
  activation:
    type: push
    commands:
      press: toliss_airbus/dispcommands/CaptCstrPushButton
  representation:
    type: annunciator
    annunciator:
      size: small
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/NDShowCSTRCapt}
      - text: CSTR
        color: white
        text-size: 40
        formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
- index: 1
  name: WPT
  activation:
    type: push
    commands:
      press: toliss_airbus/dispcommands/CaptWptPushButton
