    type: annunciator
    annunciator:
      size: small
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/NDShowWPTCapt}
      - text: WPT
        color: white
        text-size: 40
        formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
- index: 2
  name: VOR.D
  activation:
    type: push
    commands:
      press: toliss_airbus/dispcommands/CaptVorDPushButton
  representation:
    type: annunciator
    annunciator:
