  initial-value: 0
  push-switch:
    button-size: 120
    button-fill-color: black
    button-stroke-width: 0
    witness-size: 10
    witness-color: red
  activation: push
  commands:
    press: sim/autopilot/knots_mach_toggle
- index: 10
  name: ND MODE
  stops: 5
  initial-value: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 90
    tick-to: 270
    tick-space: 40
    tick-underline-width: 8
    tick-underline-color: white
    needle-color: white
    needle-length: 130
    tick-label-size: 28
    tick-labels:
    - LS
    - VOR
    - NAV
    - ARC
    - PLAN
  dataref: AirbusFBW/NDmodeCapt
  activation: sweep
  positions:
  - sim/instruments/EFIS_mode_up
  - sim/instruments/EFIS_mode_dn
- index: 11
  name: ND RANGE
  stops: 6
  initial-value: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 90
    tick-to: 315
    tick-space: 40
    tick-underline-width: 8
    tick-underline-color: white
    needle-color: white
    needle-length: 130
    tick-label-size: 28
    tick-labels:
    - '10'
    - '20'
    - '40'
    - '80'
    - '160'
    - '320'
  dataref: AirbusFBW/NDrangeCapt
  activation: sweep
  positions:
  - sim/instruments/map_zoom_out
  - sim/instruments/map_zoom_in
- index: 14
  name: TERRONND1
  label: TERR ON ND
  label-color: lemonchiffon
  label-font: DIN Bold
  label-size: 12
  annunciator:
    size: large
    model: B
    parts:
    - text: 'ON'
      text-color: lime
      text-size: 70
      text-font: DIN Bold
      formula: ${AirbusFBW/TerrainSelectedND1}
      framed: true
  options: square
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/dispcommands/TerrOnND1Toggle
