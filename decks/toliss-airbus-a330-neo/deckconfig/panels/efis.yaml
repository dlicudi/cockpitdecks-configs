      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/NDShowVORDCapt}
      - text: VOR.D
        color: white
        text-size: 40
        formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
- index: 3
  name: NDB
  activation:
    type: push
    commands:
      press: toliss_airbus/dispcommands/CaptNdbPushButton
  representation:
    type: annunciator
    annunciator:
      size: small
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/NDShowNDBCapt}
      - text: NDB
        color: white
        text-size: 40
        formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
- index: 4
  name: ARPT
  activation:
    type: push
    commands:
      press: toliss_airbus/dispcommands/CaptArptPushButton
  representation:
    type: annunciator
    annunciator:
      size: small
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/NDShowARPTCapt}
      - text: ARPT
        color: white
        text-size: 40
        formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
- index: 5
  name: CHRONO
  activation:
    type: push
    commands:
      press: AirbusFBW/CaptChronoButton
  representation:
    type: push-switch
    label: CHRONO
    label-size: 10
    push-switch:
      button-size: 120
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 6
  name: FD 1
  activation:
    type: push
    commands:
      press: toliss_airbus/fd1_push
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/FD1Engage}
      - text: FD
        color: white
        text-size: 64
        formula: '1'
- index: 7
  name: LS 1
  activation:
    type: push
    commands:
      press: toliss_airbus/dispcommands/CaptLSButtonPush
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/ILSonCapt}
      - text: LS
        color: white
        text-size: 64
        formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
- index: 8
  name: LOC 1
  activation:
    type: push
    commands:
      press: AirbusFBW/LOCbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/LOCilluminated}
      - text: LOC
        color: white
        text-size: 64
        formula: '1'
- index: 9
  name: SPD/MACH
  activation:
    type: push
    dataref: sim/cockpit/autopilot/airspeed_is_mach
    initial-value: 0
    commands:
      press: sim/autopilot/knots_mach_toggle
  representation:
    type: push-switch
    label: SPD/MACH
    label-size: 10
    push-switch:
      button-size: 120
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 10
      witness-color: red
- index: 10
  name: ND MODE
  activation:
    type: sweep
    initial-value: 2
    dataref: AirbusFBW/NDmodeCapt
    positions:
    - sim/instruments/EFIS_mode_up
    - sim/instruments/EFIS_mode_dn
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 270
      angle-end: 90
      tick-space: 40
      tick-underline-width: 8
      tick-underline-color: white
      needle-color: white
      needle-length: 130
      tick-label-size: 28
      ticks:
      - LS
      - VOR
      - NAV
      - ARC
      - PLAN
- index: 11
  name: ND RANGE
  activation:
    type: sweep
    initial-value: 2
    dataref: AirbusFBW/NDrangeCapt
    positions:
    - sim/instruments/map_zoom_out
    - sim/instruments/map_zoom_in
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 270
      angle-end: 135
      tick-space: 40
      tick-underline-width: 8
      tick-underline-color: white
      needle-color: white
      needle-length: 130
      tick-label-size: 28
      ticks:
      - '10'
      - '20'
      - '40'
      - '80'
      - '160'
      - '320'
- index: 14
  name: TERRONND1
  activation:
    type: push
    options: square
    commands:
      press: toliss_airbus/dispcommands/TerrOnND1Toggle
  representation:
    type: annunciator
    label: TERR ON ND
    label-color: lemonchiffon
    label-font: DIN Bold
    label-size: 12
    annunciator:
      size: large
      model: B
      parts:
      - text: 'ON'
        text-color: lime
        text-size: 70
        text-font: DIN Bold
        formula: ${AirbusFBW/TerrainSelectedND1}
        framed: true
- index: 12
  name: ADFVOR1
  activation:
    type: sweep
    stops: 3
    options: 3way,horizontal
    dataref: ckpt/fcu/adf1Left/anim
    set-dataref: ckpt/fcu/adf1Left/anim
  representation:
    type: switch
    switch:
      base-underline-width: 6
      tick-labels:
      - ADF1
      - 'OFF'
      - VOR1
      tick-space: 0
      tick-label-size: 30
      tick-label-font: DIN Bold
- index: 13
  name: ADFVOR2
  activation:
    type: sweep
    stops: 3
    options: 3way,horizontal
    dataref: ckpt/fcu/adf2Left/anim
    set-dataref: ckpt/fcu/adf2Left/anim
  representation:
    type: switch
    switch:
      base-underline-width: 6
      tick-labels:
      - ADF2
      - 'OFF'
      - VOR2
      tick-space: 0
      tick-label-size: 30
      tick-label-font: DIN Bold
