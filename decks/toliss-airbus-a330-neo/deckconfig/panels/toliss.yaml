aircraft: ToLiss A339
description: ToLiss aircraft specific actions, not available in real aircraft...
version: 1.0.0
last-updated: 31-OCT-2024
buttons:
- index: 31
  name: Old Index
  activation:
    type: page
    page: index-alt
  representation:
    type: icon
    icon: A339
- index: 6
  name: ISCS
  activation:
    type: push
    initial-value: 0
    commands:
      press: toliss_airbus/iscs_open
  representation:
    type: multi-icons
    multi-icons:
    - ISCS_DARK
    - ISCS_DARK
- index: 10
  name: Doors
  activation:
    type: page
    page: doors
  representation:
    type: text
    label: DOORS
    text:
      text: ${fa:door-closed}
      text-font: fontawesome.otf
      text-size: 48
- index: 2
  name: POWER
  activation:
    type: sweep
    set-dataref: AirbusFBW/EnableExternalPower
  representation:
    type: annunciator
    label: EXT.POWER
    annunciator:
      model: B
      B0:
        text: AVAIL
        color: lime
        formula: ${AirbusFBW/EnableExternalPower} not
      B1:
        text: true
        framed: true
        color: deepskyblue
        dataref: AirbusFBW/EnableExternalPower
- index: 3
  name: HP
  activation:
    type: sweep
    set-dataref: AirbusFBW/GroundHPAir
  representation:
    type: annunciator
    label: HP AIR
    annunciator:
      model: B
      B0:
        text: AVAIL
        color: lime
        formula: ${AirbusFBW/GroundHPAir} not
      B1:
        text: true
        framed: true
        color: deepskyblue
        dataref: AirbusFBW/GroundHPAir
- index: 4
  name: LP
  activation:
    type: sweep
    set-dataref: AirbusFBW/GroundLPAir
  representation:
    type: annunciator
    label: LP AIR
    annunciator:
      model: B
      B0:
        text: AVAIL
        color: lime
        formula: ${AirbusFBW/GroundLPAir} not
      B1:
        text: true
        framed: true
        color: deepskyblue
        dataref: AirbusFBW/GroundLPAir
- index: 5
  name: CHOCKS
  activation:
    type: sweep
    set-dataref: AirbusFBW/Chocks
  representation:
    type: annunciator
    label: CHOCKS
    label-color: yellow
    annunciator:
      model: B
      B0:
        text: AVAIL
        color: lime
        formula: ${AirbusFBW/Chocks} not
      B1:
        text: true
        framed: true
        color: yellow
        dataref: AirbusFBW/Chocks
- index: 8
  name: AviTab
  activation:
    type: push
    commands:
      press: AviTab/toggle_tablet
  representation:
    type: annunciator
    label: AviTab
    annunciator:
      model: B
      size: large
      B0:
        formula: ${state:activation_count} 2 % 1 - abs
        text: AVAIL
        text-color: lime
      B1:
        formula: ${state:activation_count} 2 %
        text: true
        text-color: deepskyblue
        framed: true
- index: 0
  name: Next Livery
  activation:
    type: push
    commands:
      press: sim/operation/next_livery
  representation:
    type: text
    label: Next Livery
    text:
      text: ${fa:plane-departure}
      text-font: fontawesome.otf
      text-size: 48
- index: 1
  name: Previous Livery
  activation:
    type: push
    commands:
      press: sim/operation/prev_livery
  representation:
    type: text
    label: Prev Livery
    text:
      text: ${fa:plane-arrival}
      text-font: fontawesome.otf
      text-size: 48
- index: 7
  name: METAR_LOCAL
  activation:
    type: none
  representation:
    type: none
    label: Weather
  weather-metar:
    weather-font: B612-Regular
    weather-size: 24
- index: 14
  name: METAR_DEP
  activation:
    type: none
  representation:
    type: none
    label: FMC DEP
  string-dataref: toliss_airbus/flightplan/departure_icao
  weather-metar:
    weather-font: B612-Regular
    weather-size: 24
- index: 15
  name: METAR_ARR
  activation:
    type: none
  representation:
    type: none
    label: FMC DEST
  string-dataref: toliss_airbus/flightplan/destination_icao
  weather-metar:
    weather-font: B612-Regular
    weather-size: 24
- index: 12
  name: Jump Next Waypoint
  activation:
    type: push
    dataref: toliss_airbus/iscsinterface/jumpPossible
    commands:
      press: toliss_airbus/iscsinterface/jumpToNextWaypoint
  representation:
    type: multi-texts
    label: NEXT WPT
    multi-texts:
    - text: ${fa:forward}
      text-font: fontawesome.otf
      text-size: 48
      text-color: grey
    - text: ${fa:forward}
      text-font: fontawesome.otf
      text-size: 48
      text-color: lime
- index: 30
  name: Save situation
  activation:
    type: push
    commands:
      press: toliss/save_situation_now
  representation:
    type: text
    label: SAVE SIT
    label-color: lime
    text:
      text: ${fa:floppy-disk}
      text-font: fontawesome.otf
      text-size: 48
      text-color: lime
includes:
- popups
