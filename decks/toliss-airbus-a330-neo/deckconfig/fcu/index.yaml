_docs:
  title: Home
aircraft: ToLiss A339
description: Transponder and other communication for Loupedeck Live
version: 1.0.1
last-updated: 31-OCT-2024
buttons:
- index: 1
  name: AIRCRAFT
  activation:
    type: none
  representation:
    type: text
    label: Aircraft
    text:
      text: '${sim/aircraft/view/acf_ICAO}

        ${sim/aircraft/view/acf_tailnum}'
      text-font: B612-Bold
      text-size: 18
  string-datarefs:
  - sim/aircraft/view/acf_ICAO
  - sim/aircraft/view/acf_tailnum
  - sim/aircraft/view/acf_relative_path
- index: 2
  activation:
    type: short-or-long-press
    commands:
      press: /press/short
      long-press: /press/long
    long-time: 3
  representation:
    type: push-switch
    label: Short/Long
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
  vibrate: RUMBLE5
- index: 3
  name: RELOAD
  activation:
    type: reload
  representation:
    type: text
    text:
      text: ${fa:rotate-right}
      text-font: fontawesome.otf
      text-size: 60
      text-position: cm
      text-color: lime
- index: left
  activation:
    type: page
    page: fcu
  representation:
    type: text
    label: FCU
    text:
      text: ${fa:backward}
      text-font: fontawesome.otf
      text-size: 30
      text-position: cm
      text-color: coral
- index: right
  activation:
    type: page
    page: toliss
  representation:
    type: text
    label: VIEWS
    text:
      text: ${fa:forward}
      text-font: fontawesome.otf
      text-size: 30
      text-position: cm
      text-color: coral
- index: 0
  name: ATCONOFF
  activation:
    type: sweep
    dataref: AirbusFBW/XPDRTCASMode
    set-dataref: AirbusFBW/XPDRTCASMode
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 340
      angle-end: 20
      tick-space: 40
      tick-underline-width: 8
      tick-label-color: coral
      tick-underline-color: coral
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      ticks:
      - AUTO
      - true
      left: 10
- index: 4
  name: ATCSYS
  activation:
    type: sweep
    initial-value: 2
    dataref: AirbusFBW/XPDRSystem
    set-dataref: AirbusFBW/XPDRSystem
  representation:
    type: circular-switch
    label: 'S

      Y

      S'
    label-size: 8
    label-position: lm
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 320
      angle-end: 20
      tick-space: 40
      tick-underline-width: 8
      tick-label-color: coral
      tick-underline-color: coral
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      ticks:
      - ' '
      - '1'
      - '2'
      left: 10
- index: 5
  name: SQUAWK00XX
  activation:
    type: none
  representation:
    type: text
    formula: ${sim/cockpit/radios/transponder_code} 100 / floor
    text:
      text: ${formula}
      text-format: '{:02.0f}'
      text-font: 7-segment-display-extended.otf
      text-size: 50
      text-position: rm
      text-color: khaki
      text-bg-color: (40, 40, 40)
- index: 6
  name: SQUAWKXX00
  activation:
    type: none
  representation:
    type: text
    formula: ${sim/cockpit/radios/transponder_code} ${sim/cockpit/radios/transponder_code} 100 / floor 100 * -
    text:
      text: ${formula}
      text-format: '{:02.0f}'
      text-font: 7-segment-display-extended.otf
      text-size: 50
      text-position: lm
      text-color: khaki
      text-bg-color: (40, 40, 40)
- index: 7
  name: TCASMODE
  activation:
    type: sweep
    dataref: AirbusFBW/XPDRPower
    set-dataref: AirbusFBW/XPDRPower
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 20
      angle-end: 160
      tick-space: 40
      tick-underline-width: 8
      tick-label-color: coral
      tick-underline-color: coral
      needle-color: white
      needle-length: 30
      tick-label-size: 24
      tick-label-font: DIN Bold
      ticks:
      - STBY
      - ALT RPTG OFF
      - XPNDR
      - TA ONLY
      - TA/RA
      up: 30
      left: 55
- index: 8
  name: ATCMODE
  activation:
    type: sweep
    initial-value: 2
    set-dataref: AirbusFBW/XPDRTCASAltSelect
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 40
      angle-end: 140
      tick-space: 40
      tick-underline-width: 8
      tick-label-color: coral
      tick-underline-color: coral
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      ticks:
      - ABV
      - N
      - BLW
      left: 30
      up: 20
- index: 9
  name: ATCCLR
  activation:
    type: push
    commands:
      press: AirbusFBW/ATCCodeKeyCLR
  representation:
    type: text
    text:
      text: CLR
      text-font: DIN Bold
      text-color: coral
      text-size: 24
      text-position: cm
- index: 10
  name: ATCFAIL
  activation:
    type: none
  representation:
    type: push-switch
    label: 'ATC




      FAIL'
    label-position: cm
    label-size: 11
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 40
      witness-fill-color: (64, 32, 0)
      witness-stroke-color: (128, 64, 0)
- index: 11
  name: ATCIDENT
  activation:
    type: push
    commands:
      press: sim/transponder/transponder_ident
  representation:
    type: push-switch
    label: IDENT
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
