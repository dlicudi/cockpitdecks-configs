_docs:
  title: FCU
aircraft: ToLiss A339
description: Main FCU page for Loupedeck Live
version: 1.0.1
last-updated: 31-OCT-2024
buttons:
- index: e0
  name: FCU Airspeed
  activation:
    type: encoder-push
    commands:
      press: AirbusFBW/PushSPDSel
      long-press: AirbusFBW/PullSPDSel
      cw: sim/autopilot/airspeed_up
      ccw: sim/autopilot/airspeed_down
  representation:
    type: none
- index: e1
  name: FCU Heading
  activation:
    type: encoder-push
    commands:
      press: AirbusFBW/PushHDGSel
      long-press: AirbusFBW/PullHDGSel
      cw: sim/autopilot/heading_up
      ccw: sim/autopilot/heading_down
  representation:
    type: none
- index: e2
  name: FCU Baro
  activation:
    type: encoder-toggle
    commands:
      toggle-on: toliss_airbus/capt_baro_push
      toggle-off: toliss_airbus/capt_baro_pull
      cw: sim/instruments/barometer_up
      ccw: sim/instruments/barometer_down
    options: modulo
  representation:
    type: none
- index: e3
  name: FCU Altitude
  activation:
    type: encoder-push
    commands:
      press: AirbusFBW/PushAltitude
      long-press: AirbusFBW/PullAltitude
      cw: sim/autopilot/altitude_up
      ccw: sim/autopilot/altitude_down
  representation:
    type: none
- index: e4
  name: FCU V Speed
  activation:
    type: encoder-value
    dataref: sim/cockpit/autopilot/vertical_velocity
    step: 100
    value: 0
    value-min: -6000
    value-max: 6000
    set-dataref: sim/cockpit/autopilot/vertical_velocity
    commands:
      toggle-on: AirbusFBW/PullVSSel
      toggle-off: AirbusFBW/PushVSSel
    step-xl: 1000
  representation:
    type: none
- index: e5
  name: FCU Unused
  activation:
    type: none
    options: nostate
  representation:
    type: none
- index: 0
  name: SPDMACH
  activation:
    type: push
    commands:
      press: toliss_airbus/ias_mach_button_push
  representation:
    type: push-switch
    label: 'SPD




      MACH'
    label-position: cm
    label-font: DIN Bold
    label-size: 10
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 1
  name: MASTER CAUTION
  activation:
    type: push
    commands:
      press: sim/annunciator/clear_master_caution
  representation:
    type: annunciator
    annunciator:
      text: 'MASTER

        CAUT'
      text-color: darkorange
      text-font: DIN Condensed Black.otf
      text-size: 72
      dataref: AirbusFBW/MasterCaut
  vibrate: RUMBLE5
- index: 2
  name: MASTER WARNING
  activation:
    type: push
    commands:
      press: sim/annunciator/clear_master_warning
  representation:
    type: annunciator-animate
    annunciator-animate:
      text: 'MASTER

        WARN'
      text-color: firebrick
      text-font: DIN Condensed Black.otf
      text-size: 72
      dataref: AirbusFBW/MasterWarn
      animation-speed: 2.0
  vibrate: LONG
- index: 3
  name: ALTSCALE
  activation:
    type: push
    commands:
      press: toliss_airbus/metric_alt_button_push
  representation:
    type: push-switch
    label: '1000




      100'
    label-font: DIN Bold
    label-size: 10
    label-position: cm
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 4
  name: HDGTRACK
  activation:
    type: push
    commands:
      press: toliss_airbus/hdgtrk_button_push
  representation:
    type: push-switch
    label: 'HDG TRK




      V/S FPA'
    label-position: cm
    label-font: DIN Bold
    label-size: 10
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 5
  name: A/THR
  activation:
    type: push
    commands:
      press: AirbusFBW/ATHRbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/ATHRmode}
      - text: A/THR
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 6
  name: AP1
  activation:
    type: push
    commands:
      press: toliss_airbus/ap1_push
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/AP1Engage}
      - text: AP1
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 8
  name: BAROMETRIC
  activation:
    type: sweep
    set-dataref: AirbusFBW/BaroUnitCapt
  representation:
    type: push-switch
    label: 'inHg




      hPa'
    label-position: cm
    label-font: DIN Bold
    label-size: 10
    push-switch:
      button-size: 100
      button-fill-color: black
      button-stroke-width: 0
      witness-size: 0
- index: 9
  name: LOC
  activation:
    type: push
    options: auto-repeat=3/3
    commands:
      press: AirbusFBW/LOCbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/LOCilluminated}
      - text: LOC
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 10
  name: APPR
  activation:
    type: push
    commands:
      press: AirbusFBW/APPRbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/APPRilluminated}
      - text: APPR
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 11
  name: EXPED
  activation:
    type: push
    commands:
      press: AirbusFBW/EXPEDbutton
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/EXPEDilluminated}
      - text: EXPED
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: 7
  name: AP2
  activation:
    type: push
    commands:
      press: toliss_airbus/ap2_push
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/AP2Engage}
      - text: AP2
        text-size: 60
        text-font: DIN Bold
        formula: '1'
- index: left
  name: FCU-L
  activation:
    type: none
  representation:
    type: none
  multi-datarefs:
  - sim/cockpit2/autopilot/airspeed_dial_kts_mach
  - sim/cockpit/autopilot/heading_mag
  - sim/cockpit/autopilot/airspeed_is_mach
  - AirbusFBW/HDGTRKmode
  - AirbusFBW/SPDmanaged
  - AirbusFBW/HDGmanaged
  - AirbusFBW/SPDdashed
  - AirbusFBW/HDGdashed
  - AirbusFBW/BaroStdCapt
  - AirbusFBW/BaroUnitCapt
  - sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot
  fcu:
    mode: vertical-left
    text-size: 36
    text-font: B612-Bold
    text-color: gold
    value-size: 48
    value-font: Segment7Standard
    value-color: white
- index: right
  name: FCU-R
  activation:
    type: page
    page: index
  representation:
    type: none
  multi-datarefs:
  - sim/cockpit2/autopilot/altitude_dial_ft
  - sim/cockpit/autopilot/vertical_velocity
  - AirbusFBW/HDGTRKmode
  - AirbusFBW/ALTmanaged
  - AirbusFBW/VSdashed
  fcu:
    mode: vertical-right
    text-size: 36
    text-font: B612-Bold
    text-color: gold
    value-size: 48
    value-font: Segment7Standard
    value-color: white
includes:
- views
