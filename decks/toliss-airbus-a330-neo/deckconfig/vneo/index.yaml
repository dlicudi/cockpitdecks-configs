aircraft: ToLiss A339
description: Test deck for Virtual Streamdeck Neo (8 images, 2 buttons, 2 leds, 1 display)
version: 1.0.1
last-updated: 31-OCT-2024
buttons:
- index: 0
  activation:
    type: reload
  representation:
    type: push-switch
    label: CHRONO
    label-size: 10
    push-switch:
      button-size: 120
      button-fill-color: black
      button-stroke-width: 0
      button-underline-color: coral
      witness-size: 0
      down: 36
- index: 1
  name: INHGORHPA
  activation:
    type: sweep
    options: invert,horizontal
    set-dataref: AirbusFBW/BaroUnitCapt
  representation:
    type: switch
    switch:
      button-fill-color: black
      button-underline-width: 10
      button-underline-color: coral
      tick-labels:
      - inHg
      - hPa
      tick-width: 0
      tick-length: 0
      tick-space: 20
      tick-label-size: 48
      tick-label-font: DIN
- index: 2
  name: ND MODE
  activation:
    type: sweep
    initial-value: 2
    dataref: AirbusFBW/NDmodeCapt
    positions:
    - sim/instruments/EFIS_mode_up
    - sim/instruments/EFIS_mode_dn
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 270
      angle-end: 90
      tick-space: 40
      tick-underline-width: 8
      tick-label-color: coral
      tick-underline-color: coral
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      ticks:
      - LS
      - VOR
      - NAV
      - ARC
      - PLAN
- index: 3
  name: ND RANGE
  activation:
    type: sweep
    initial-value: 2
    dataref: AirbusFBW/NDrangeCapt
    positions:
    - sim/instruments/map_zoom_out
    - sim/instruments/map_zoom_in
  representation:
    type: circular-switch
    circular-switch:
      button-size: 50
      switch-style: medium
      down: 30
      angle-start: 270
      angle-end: 135
      tick-space: 40
      tick-underline-width: 8
      tick-label-color: coral
      tick-underline-color: coral
      needle-color: white
      needle-length: 30
      tick-label-size: 28
      ticks:
      - '10'
      - '20'
      - '40'
      - '80'
      - '160'
      - '320'
- index: 5
  activation:
    type: sweep
    positions:
    - toliss_airbus/capt_baro_push
    - toliss_airbus/capt_baro_pull
  representation:
    type: multi-texts
    formula: ${AirbusFBW/BaroUnitCapt} ${AirbusFBW/BaroStdCapt} 2 * +
    multi-texts:
    - text: ${formula}
      text-format: '{:4.2f}'
      text-color: khaki
      text-size: 48
      text-font: Segment7Standard.otf
      text-bg-color: (40, 40, 40)
      formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
    - text: ${formula}
      text-format: '{:4.0f}'
      text-color: khaki
      text-size: 48
      text-font: Segment7Standard.otf
      text-bg-color: (40, 40, 40)
      formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.86389 * round
    - text: Std
      text-color: khaki
      text-size: 48
      text-font: Segment7Standard.otf
      text-bg-color: (40, 40, 40)
    - text: Std
      text-color: khaki
      text-size: 48
      text-font: Segment7Standard.otf
      text-bg-color: (40, 40, 40)
- index: 6
  name: FD 1
  activation:
    type: push
    commands:
      press: toliss_airbus/fd1_push
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/FD1Engage}
      - text: FD
        color: white
        text-size: 64
        text-font: DIN Bold
        formula: '1'
- index: 7
  name: LS 1
  activation:
    type: push
    commands:
      press: toliss_airbus/dispcommands/CaptLSButtonPush
  representation:
    type: annunciator
    annunciator:
      size: medium
      model: B
      parts:
      - color: lime
        led: bars
        formula: ${AirbusFBW/ILSonCapt}
      - text: LS
        color: white
        text-size: 64
        text-font: DIN Bold
        formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
- index: 4
  name: RELOAD
  activation:
    type: reload
  representation:
    type: annunciator
    label: SIDE STICK PRIORITY
    label-size: 7
    label-color: white
    annunciator:
      size: large
      model: B
      parts:
      - text: ${fa:arrow-left-long}
        text-color: lime
        text-font: fontawesome.otf
        text-size: 64
      - text: CAPT
        color: lime
        text-size: 64
        text-font: DIN Bold
        framed: true
- index: b0
  activation:
    type: page
    page: index
  representation:
    type: led
    led: true
- index: b1
  activation:
    type: page
    page: index
  representation:
    type: led
    led: true
  virtual-sd-neoled:
    color: yellow
