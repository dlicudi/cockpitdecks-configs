aircraft: ToLiss A339
description: Test deck for Virtual Streamdeck Neo (8 images, 2 buttons, 2 leds, 1
  display)
version: 1.0.1
last-updated: 31-OCT-2024
buttons:
- index: 0
  label: CHRONO
  label-size: 10
  push-switch:
    button-size: 120
    button-fill-color: black
    button-stroke-width: 0
    button-underline-color: coral
    witness-size: 0
    down: 36
  activation: reload
- index: 1
  name: INHGORHPA
  switch:
    button-fill-color: black
    button-underline-width: 10
    button-underline-color: coral
    tick-labels:
    - inHg
    - hPa
    tick-width: 0
    tick-length: 0
    tick-space: 20
    tick-label-size: 48
    tick-label-font: DIN
  options: invert,horizontal
  set-dataref: AirbusFBW/BaroUnitCapt
  activation: sweep
- index: 2
  name: ND MODE
  stops: 5
  initial-value: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 90
    tick-to: 270
    tick-space: 40
    tick-underline-width: 8
    tick-label-color: coral
    tick-underline-color: coral
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - LS
    - VOR
    - NAV
    - ARC
    - PLAN
  dataref: AirbusFBW/NDmodeCapt
  activation: sweep
  positions:
  - sim/instruments/EFIS_mode_up
  - sim/instruments/EFIS_mode_dn
- index: 3
  name: ND RANGE
  stops: 6
  initial-value: 2
  circular-switch:
    button-size: 50
    switch-style: medium
    down: 30
    tick-from: 90
    tick-to: 315
    tick-space: 40
    tick-underline-width: 8
    tick-label-color: coral
    tick-underline-color: coral
    needle-color: white
    needle-length: 30
    tick-label-size: 28
    tick-labels:
    - '10'
    - '20'
    - '40'
    - '80'
    - '160'
    - '320'
  dataref: AirbusFBW/NDrangeCapt
  activation: sweep
  positions:
  - sim/instruments/map_zoom_out
  - sim/instruments/map_zoom_in
- index: 5
  formula: ${AirbusFBW/BaroUnitCapt} ${AirbusFBW/BaroStdCapt} 2 * +
  multi-texts:
  - text: ${formula}
    text-format: '{:4.2f}'
    text-color: khaki
    text-size: 48
    text-font: Segment7Standard.otf
    text-bg-color: (40, 40, 40)
    formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot}
  - text: ${formula}
    text-format: '{:4.0f}'
    text-color: khaki
    text-size: 48
    text-font: Segment7Standard.otf
    text-bg-color: (40, 40, 40)
    formula: ${sim/cockpit2/gauges/actuators/barometer_setting_in_hg_pilot} 33.86389
      * round
  - text: Std
    text-color: khaki
    text-size: 48
    text-font: Segment7Standard.otf
    text-bg-color: (40, 40, 40)
  - text: Std
    text-color: khaki
    text-size: 48
    text-font: Segment7Standard.otf
    text-bg-color: (40, 40, 40)
  activation: sweep
  representation: multi-texts
  positions:
  - toliss_airbus/capt_baro_push
  - toliss_airbus/capt_baro_pull
- index: 6
  name: FD 1
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/FD1Engage}
    - text: FD
      color: white
      text-size: 64
      text-font: DIN Bold
      formula: '1'
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/fd1_push
- index: 7
  name: LS 1
  annunciator:
    size: medium
    model: B
    parts:
    - color: lime
      led: bars
      formula: ${AirbusFBW/ILSonCapt}
    - text: LS
      color: white
      text-size: 64
      text-font: DIN Bold
      formula: '1'
  view: SRS/X-Camera/Select_View_ID_1
  activation: push
  representation: annunciator
  commands:
    press: toliss_airbus/dispcommands/CaptLSButtonPush
- index: 4
  name: RELOAD
  label: SIDE STICK PRIORITY
  label-size: 7
  label-color: white
  annunciator:
    size: large
    model: B
    parts:
    - text: ${fa:arrow-left-long}
      text-color: lime
      text-font: fontawesome.otf
      text-size: 64
    - text: CAPT
      color: lime
      text-size: 64
      text-font: DIN Bold
      framed: true
  activation: reload
  representation: annunciator
- index: b0
  page: index
  led: true
  activation: page
  representation: led
- index: b1
  page: index
  led: true
  virtual-sd-neoled:
    color: yellow
  activation: page
  representation: led
