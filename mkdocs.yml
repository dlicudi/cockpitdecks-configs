# Project information
site_name: Cockpitdecks Configs
site_url: https://dlicudi.github.io/cockpitdecks-configs/
site_author: Duane Licudi
site_description: >-
  A set of aircraft cockpit configs for Cockpitdecks

# Repository
repo_name: dlicudi/cockpitdecks-configs
repo_url: https://github.com/dlicudi/cockpitdecks-configs
edit_uri: blob/main/docs/

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Requirements: getting-started/requirements.md
      - Development: getting-started/development.md
  - Aircraft:
      - Overview: decks/index.md
      - Cessna 172 SP: decks/cessna-172-sp.md
      - Cirrus SR22: decks/cirrus-sr22.md
      - Beechcraft Baron 58: decks/beechcraft-baron-58.md
      - Lancair Evolution: decks/lancair-evolution.md
      - ToLiss Airbus A321 NEO: decks/toliss-airbus-A321-neo.md
      - ToLiss Airbus A320 NEO: decks/toliss-airbus-A320-neo.md
      - Aerobask Robin DR401: decks/aerobask-robin-dr401.md
  - Modules:
      - Overview: modules/modules.md
      - Audio Panel: modules/audio-panel.md
      - Engine: modules/engine.md
      - G1000: modules/g1000.md
      - Radio: modules/radio.md
      - Views: modules/views.md
      - Weather: modules/weather.md
  - Examples:
      - Annunciators: examples/annunciators.md
      - Encoder Toggle: examples/encoder-toggle.md
      - Encoder Value: examples/encoder-value.md
      - Side Icon: examples/side-icon.md
  - Experimental:
      - Encoder Toggle: experimental/encoder-toggle.md
      - Encoder Value: experimental/encoder-value.md
      - Side Icon: experimental/side-icon.md

# Copyright
copyright: Copyright &copy; 2023 - 2024 Duane Licudi

# Configuration
theme:
  name: material

  # custom_dir: material/overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: logo
    annotation: material/plus-circle-outline


# Plugins
plugins:
  - social
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # - minify:
  #     minify_html: true

# Hooks
# hooks:
#   - material/overrides/hooks/shortcodes.py
#   - material/overrides/hooks/translations.py

# Additional configuration
extra:
  # version:
  #   provider: mike
  status:
    new: Recently added
    deprecated: Deprecated
  # analytics:
  #   provider: google
  #   property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dlicudi
    # - icon: fontawesome/brands/docker
    #   link: https://hub.docker.com/r/squidfunk/mkdocs-material/
    # - icon: fontawesome/brands/python
    #   link: https://pypi.org/project/mkdocs-material/
    # - icon: fontawesome/brands/mastodon
    #   link: https://fosstodon.org/@squidfunk
    # - icon: fontawesome/brands/twitter
    #   link: https://twitter.com/squidfunk

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde



extra_css:
  - stylesheets/extra.css
