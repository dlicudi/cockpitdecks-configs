# Project information
site_name: Cockpitdecks Configs
site_url: https://dlicudi.github.io/cockpitdecks-configs/
site_author: Duane Licudi
site_description: >-
  A set of aircraft cockpit configs for Cockpitdecks

# Repository
repo_name: dlicudi/cockpitdecks-configs
repo_url: https://github.com/dlicudi/cockpitdecks-configs
edit_uri: blob/main/docs/

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Development: getting-started/development.md
  - Decks:
      - Overview: decks/index.md
      - Robin DR401: decks/aerobask-robin-dr401/index.md
      - Beechcraft Baron 58: decks/beechcraft-baron-58/index.md
      - Cessna 172 SP: decks/cessna-172-sp/index.md
      - Cirrus SR22: decks/cirrus-sr22/index.md
      - Embraer E-Jets Family: decks/embraer-e-jets-family/index.md
      - Lancair Evolution: decks/lancair-evolution/index.md
      - Airbus A320neo: decks/toliss-airbus-a320-neo/index.md
      - Toliss A321neo: decks/toliss-airbus-a321-neo/index.md
      - ToLiss A330neo: decks/toliss-airbus-a330-neo/index.md
      - Van's Aircraft RV-10: decks/vans-aircraft-rv-10/index.md
  - Reference:
      - Overview: reference/index.md
      - Compatibility: reference/compatibility.md
      - Deck Types: reference/deck-types.md
      - Modules: modules/modules.md
      - Tags: reference/tags.md

not_in_nav: |
  examples/*
  experimental/*
  generated/*

# Copyright
copyright: Copyright &copy; 2023 - 2024 Duane Licudi

# Configuration
theme:
  name: material

  # custom_dir: material/overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: logo
    annotation: material/plus-circle-outline
    tag:
      default: material/tag-outline
      ga: material/airplane
      airliner: material/airplane-takeoff
      loupedeck: material/dialpad
      g1000: material/navigation-variant-outline
      toliss: material/airplane-marker


# Plugins
plugins:
  - glightbox
  - social
  - optimize:
      enabled: !ENV [CI, false]
  - tags:
      tags_allowed:
        - GA
        - Airliner
        - Loupedeck
        - Loupedeck Live
        - G1000
        - ToLiss
        - X-Plane 12
        - Stream Deck XL
        - Work in Progress
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # - minify:
  #     minify_html: true

# Hooks
# hooks:
#   - material/overrides/hooks/shortcodes.py
#   - material/overrides/hooks/translations.py

# Additional configuration
extra:
  # version:
  #   provider: mike
  status:
    new: Recently added
    deprecated: Deprecated
    stable: Stable
    active: Active Development
    wip: Work in Progress
  # analytics:
  #   provider: google
  #   property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dlicudi
  tags:
    GA: ga
    Airliner: airliner
    Loupedeck: loupedeck
    G1000: g1000
    ToLiss: toliss
    # - icon: fontawesome/brands/docker
    #   link: https://hub.docker.com/r/squidfunk/mkdocs-material/
    # - icon: fontawesome/brands/python
    #   link: https://pypi.org/project/mkdocs-material/
    # - icon: fontawesome/brands/mastodon
    #   link: https://fosstodon.org/@squidfunk
    # - icon: fontawesome/brands/twitter
    #   link: https://twitter.com/squidfunk

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - material.extensions.preview:
      configurations:
        - sources:
            include:
              - decks/*
          targets:
            include:
              - decks/**
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
      auto_append:
        - docs/includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde



extra_css:
  - stylesheets/extra.css
