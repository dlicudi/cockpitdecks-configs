# Project information
site_name: Cockpitdecks Configs
site_url: https://dlicudi.github.io/cockpitdecks-configs/
site_author: Duane Licudi
site_description: >-
  A set of aircraft cockpit configs for Cockpitdecks

# Repository
repo_name: GitHub
repo_url: https://github.com/dlicudi/cockpitdecks-configs
edit_uri: blob/main/docs/

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Development: getting-started/development.md
  - Architecture: architecture/index.md
  - Aircraft: aircraft/index.md
  - Reference: reference/index.md
  - Compatibility: reference/compatibility.md
  - Config Patterns: reference/config-patterns.md
  - Plugin Interface: reference/plugin-interface.md

not_in_nav: |
  includes/*

# Copyright
copyright: Copyright &copy; 2023 - 2024 Duane Licudi

# Configuration
theme:
  name: readthedocs

# Plugins
plugins:
  - search

# Extensions
markdown_extensions:
  - abbr
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: dlicudi
      repo: cockpitdecks-configs
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
      auto_append:
        - docs/includes/abbreviations.md
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
